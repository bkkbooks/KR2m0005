body:
  text: 建炎雜記乙集卷六宋李心傳撰朝事一臺諫給舍論龍曽事始末紹興三十二年六月左武大夫龍大淵為樞密院副都承旨武翼郎曽覿帶御器械兼幹辦皇城司二人上為建王時內知客也其年十月劉汝一度除右諫議大夫汝一入對首論待小人不可無節因奏潛邸舊寮宣召當有時蓋為二人出也後數月汝一遂上奏劾大淵輕儇浮淺憑恃恩寵入則侍帷幄之謀出則陪廟堂之議搖唇鼓舌變亂是非凡皇圍燕昵之私宫嬪嬉笑之語宣言於外以自夸嫮至引北人孫照出入清禁為擊毬雜舞之戲上纍聖德伏望斥退時三月六日丁酉也是日凡兩奏七日戊戌汝一進故事因論京房指謂石顯元帝亦自知而不能用蓋不能以公議勝私欲耳反復數百言尤為切至九日庚子詔大淵除知閣門事覿權知閣門事並填見闕下供職蓋汝一苐一劄子中有云毋使御干預樞管故解大淵副都承旨也汝一言臣欲抑之而陛下揚之臣欲退之而陛下進之臣欲使之畏戢而陛下示之以無所忌憚是臣所言皆為欺罔何施顔面尚為諫官乞賜貶黜奏入不報張真父震時為中書舍人繳其􅒛至再十一日壬寅真父除敷文閣待制知紹興府真父力辭具言若同惜爵祿之為榮而喪其名節之實在於公議誠所不容望改除一在外宫觀不許胡周伯沂時為殿中侍御史亦論二人市權招士望屏遠之以防其微奏入不出十三日甲辰給舍金彥行金安節周子充周必大再封還録黃彥行時為給事中子充時為起居郎兼權中書舍人大略言二人功過能否臣等初不詳知但見縉紳士民指目者多今論其職事或捨劇而就閒論班次則皆遷矣陛下即位以來凡臺諫所彈奏雖兩府如葉義問大將如成閔欲罷則罷欲貶則貶一付公議獨於二人乃為之遷就諱避殆非舍己從人之義也况二人者攀附惟舊過此以往事君之日甚長儻其謹畏有加何患身不富貴十四日乙巳上命二相陳魯公史魏公召給舍至都堂宣示御札大略謂安節等為人扇動議論羣起又謂在太上時小事不敢如此於是彥行子充皆退而待罪是日真父再奏引司馬公言以不行不拜樞密副使故事辭職就祠又不許十五日丙午詔金安節周必大所請不允無罪可待而丞相又遣宰掾以上意諭子充若將調停者子充貽書言為之計莫若使二人者出奉外祠以息公論然後必大自以私計為請求一宫觀仰以釋聖上朋黨之疑下以息二人報復之怨此上策也若不決去此輩必謂士大夫可以威脅而人主信之愈堅任之愈篤禍發蕭牆毒流華夏矣惟相公念大臣以道事君不可則止之義而審處焉十六日丁未降出二人繳章有㫖給舍未知功過臺諫止是防微罷劇就閒已允公議尚兹回繳可特依奉內龍大淵已辭樞密副承旨職事目今在假候假滿日别與差遣曽覿仍舊帶御器械十八日丁未張忠定自新除參知政事罷為資政殿大學士提舉萬夀觀侍讀以病自請也朝子西曰張子公入對欲與曽龍決去就上問所從聞子公云聞之陸游上云游反復小人已得罪行遣矣子公謝云臣妄言不實有罪而忠定家傳無此疑作傳時覿尚為使想其家未敢書也是日彥行子充再上奏乞竄責以明邦憲不允子充入謝上曰朕察卿舉職但朕欲破朋黨紀綱耳二十一日庚戌汝一改權工部侍郎以所言過實也附傳云爾真父又欲辭職名且遺史丞相書云臺諫有言而不行給舍受責而請罪震乃安受美職竊取要藩况越之為郡近在肘腋它時為所陰中重纍聖知曷若保全使得善去二十五日甲寅上批張震除職已有成命纍上辭免特從所請可與外祠從其本意汝一亦辭新命二十六日乙卯除知建寧府是日詔大淵覿依舊知閣門事二相召子充諭上意且云後省想亦無他子充曰前已反汚今復申命豈敢但已格除目不下右相以聞越三日不獲命二十八日戊午子充乃以母葬信州久欲遷奉乞宫觀差遣詔依所乞主管台州崇道觀而二人之命亦寢俄王文忠除侍御史周伯乃求去五月十六日丙午罷為直顯謨閣奉祠八月五日癸亥安行除兵部侍郎解給事中二十五日癸未大淵自左武大夫宜州觀察使幹辦皇城司除知閣門事覿自武義大夫文州刺史帶御器械幹辦皇城司除權知閣門事依舊兼幹辦皇城司書行者中書錢舍人周材權給事中工部陳侍郎之淵也二年三月十四日己亥內批劉度罷建寧府給舍黃通老中馬德駿騏言度與郡且一歲矣今被㫖放罷人莫測其故必謂其以諫得罪又謂陛下不忘人之過如此望賜審處上批劉度黨附敢為欺罔尚除大藩本出意未為允當可依已降放罷指揮二十三戊申詔通老德駿同班進對上問卿等已書行罷度文書否通老曰䝉陛下批已書行矣上曰甚善前曰卿等未知故未書行然卿等在後省切不可觀望臺諫二人皆言臣等各有本職不敢觀望通老奏度罷命雖已書行然臺諫之言有未契聖心者若無它意更乞陛下包容以來善言德駿奏諫官又與臺官不同諫官拾遺補闕去就無名仰纍聖德如今日罷度在聖意固自有所謂然度當言事不一恐外人未必盡察望陛下與宫祠以絶事論之疑上曰既已罷矣豈可復與宫祠後十三日通老為尹正言而所論罷禮部侍郎給事中四月六日庚申又十三日德駿亦罷起居舍人兼侍講權直學士院為直敷文閣知遂寧府四月十九日癸酉方大淵初用事時宰輔臺諫合一辭以為當去故上意有朋黨之疑不三年上察其姦欺諸人相繼召用而大淵卒以斥死可謂明也已矣故常論人臣事主患不能盡言茍能言之雖拂逆於當時必信用於異日雖無聞於近效必有味於方來此類是也故詳志其始末以見隆興主聖臣直之盛後有君子可以監觀焉孝宗黜曽龍本末光宗黜姜特立附乾道三年春知閣門事龍大淵曽覿竝補外以參知政事陳俊卿奏其罪也二人始以潜邸恩進隆興初給舍周子充張真父臺諫劉汝一龔實之皆以論列兩人去位張子公外召為執政鋭欲去之覺其不可搖乃力辭老病不拜周元特為侍御史論列至十五章亦不效陸務觀文士也為密院官屬坐漏二人密語被逐林謙之劉復之以名儒薦對頗及二人罪皆補縣自是無敢言者及陳應求除執政一日起居舍人洪景盧來見曰聞鄭聞當除右史邁當遷西掖信乎應求曰不知之也公何自得之景盧以二人告明日應求至漏舍語葉魏二相及同列蔣子禮曰外議久指此兩人漏泄省中語而未得其實收故前此言者雖多而不能入今幸得此不可不以聞諸公皆以為然入奏事畢應求獨進且以景盧語質於上前曰臣不知平日此等除目兩人實與聞乎抑其密伺聖意而播之於外以竊㺯陛下威福之權也上曰朕何嘗謀及此輩必竊聽而得之卿言其忠當為卿逐之應求歸未及門已有旨出二人於外矣中外快之蓋上之英哲無私如此漢唐所未見也二月四日癸酉昭慶軍承宣使龍大淵為江東副使總管建康府駐劄和州防御使曽覿為淮西副都總管和州駐劄明日大淵改浙東路駐明州覿改福建路駐福州初七日奉旨竝令內殿朝辭景盧俄亦自右史除正字而鄭仲一由樞掾進都司遂侍講席以至侍從似亦有宿議也明年夏大淵死六月十二日致仕覿時為福建副總管上憐覿欲還之劉共副同知樞密院事奏曰此曹奴𨽻耳憐之則厚賜之可也今引以自近而賔友接之至使得以與聞政事進退人臣則臣懼非所以增光聖德整飭朝綱也上納其言為止不召既而覿官滿當代應求度其必將復入預請以浙東總管上曰覿意似不欲為此官應求曰外藉藉以謂覿必復來願陛下且捐私恩以伸公議察官李平子劉少度聞其事共勸副端徐彥才論之疏入不報舍人王養源在省中揚言云詞頭下必繳時養源已引病求去乃除次對奉祠乾道五年七月己酉覿之代歸也道遇衢州守臣劉賔之遣人諭以入城决不相見覿乃取道城外太學録魏元履聞覿且來亟上封事以諫又見應求切責之應求亦不能堪乃因其告歸罷為台州州學教授待六年闕覿時至龍山已久伺候元履之去然後入國門焉有某者坐秦黨失右史已久自福唐隨覿至行在遂以為起居郎朝子西日記云耳子西時為兵部郎官除左史在七月丁卯於是虞并父自蜀還朝為樞密使上眷之厚并甫乃與應求面奏覿不可留上曰然留必纍朕後旬日竟除覿浙東副總管明州駐劄七月丁丑指揮又月餘上復以墨詔進覿一官為觀察使舍人胡長文繳還詞頭以為不因事除拜必有人言應求亦持不可上未聽應求曰不爾亦須有名乃遣介汪仲嘉賀金正旦邸報十月十六日五年曽覿朝見比還進一官六年二月二十九日庚戌而竟申浙東之命又戒閣門吏趣覿朝辭邸報六年四月十三日曽覿朝辭覿怏怏而去明年夏應求罷知福州其十月覿以京祠召舍人趙溫叔留黃見并父謀其可否并父曰此舍人職也溫叔卒行之實録年六月甲寅曽覿進對明年春立皇太子覿又以伴讀之勞特遷承宣使權舍人黃仲秉引故事繳黃乞移鎮㑹溫叔使北還行在溫叔見上自訴曰臣不行詞則獲譴行詞則得罪清議上諭以衆皆轉行而覿獨否為有頗焉溫叔承命而退張南軒時為左司員外郎兼侍講在殿庭語同列曰溫叔若入文字爭辦庶幾可回若只面奏決無可回之理既而果如所料右司韓彥古又以言間之於是溫叔與南軒始有隙又明年夏覿介姚令則賀金主尊號而歸遂除節度使以至保傅矣其除少保也周子充當直議者疑其不草制及制出首云八統馭民敬故在尊賢之上大夫頗惜之也及紹興初姜譙得幸留仲至為右揆適亞參尚闕特立忽見仲至曰上以丞相在位久欲遷左揆而葉張二尚書中擇一人執政二人孰先明日仲至奏之上大怒逐特立外祠而葉尋為劉德修所劾除職補外二人絶相類故併記之建炎雜記乙集卷六

body:
  text: 建炎雜記甲集卷四宋李心傳撰制作八寶御寶備於政和自太祖開基始有大宋受命之寶後諸聖嗣服皆自為一寶以皇帝恭膺天命之寶為文元符間既得漢傳國璽因以為受命寶受命於天既夀永昌大觀初又得良工倣古作天子皇帝六璽已而徽宗又作鎮國寶遂天福延萬億永無極通號八寶焉久之作定命寶其文冇範圍天地幽贊神明保合太和萬夀無疆凡十六字實蔡京所賦號九寶京城破自定命寶外悉為敵所得而大宋受命之寶邵澤民侍郎給之隨葬乃得全張邦昌將復辟遣謝任伯參政奉寶歸於髙宗建炎二年秋始鑄三御寶一曰皇帝欽崇國祀之寶印香合詞表二曰天下合同之寶印中書門下省之事三曰書詔之寶印詔書皆以金為之建炎十六年郊始偹八寶八寶者入內侍省掌之紹興末上即位於重華宫時寶藏於大內太皇太后旨取之今八寶未知何人所書其文如政和之制三省樞密印三省樞密院印建炎三年秋鑄以銀為之時上命勝子濟權知恭省樞密院扈從隆祐皇太后往豫章故鑄此印入宫殿諸門號入宫殿寺諸門號皇城司掌之紹興二年正月更定其制刺入禁門衛號八角三千道入殿門黃絹以方一千道入宫門黃絹以圓八千道入皇城門黃絹以長三千道三年十一月更宫門號以緋紅絹方城門內以緋紅絹圓自後不易其制禮神十二玉禮神十二玉昊天上帝以蒼璧皇地祗以黃琮感生帝以四圭有邸神州地祗社稷以兩圭有邸日月以圭璧五帝以青圭赤璋白琥玄璜黃琮紹興初以闕祭玉但命隨方色奠幣焉是年當大禮禮官請以木為璧繪天地之色上難之因命訪美玉以為蒼璧黃琮時明堂不祠五帝等諸神故他未及也四年明堂始制五帝日月等玉初以未得美璞將用天聖故事以珉為之既而得真玉數十斤遂命改制其中赤璋多粹美他玊多不及禮經尺寸云景鍾景鍾紹興十六年秋七月鑄鍾髙九尺天子親祠上帝則用之以皇祐黍尺為凖於是上命太師秦檜銘之曰德純懿兮舜文維躋夀域兮熟內外薦上帝兮偉兹器聲氣應兮同久視貽子孫兮彌萬世鍾成冬十月上御射殿觀之時以雅樂多闕命給事中段拂等補造是日撞景鍾奏新樂正刺史以上皆與觀焉飲福金爵飲福金爵紹興十年明堂始用之政和大禮舊用萬夀玉尊時無玉尊故以金爵代之也先是大禮自天地至從祀諸神七百七十一位當用籩豆簠簋尊罍彛鼎之屬九千二百五太廟用五百九十六舊用銅玉者權以木代之王伯照普為國子博士嘗言今祭器皆倣聶崇義三禮圖非是請改作時多事未克行十八年始命段樞密拂等改作焉由是禮器煥然復如東都承天之故矣五輅五輅靖康中已遺敵人紹興十二年始為玉輅九月輅成上御射殿觀之明年春遂作金象革木四輅及大安輦舊鹵簿悉用之以文繡中興皆以纈七寶輦七寶輦上皇所御也紹興二年始為之有司言東都舊制輦飾以玉裙網用七寶而滴子用真珠及進呈上曰太上皇帝之意不欲如此上欲節省兼物料未易辦湯慶公等因請下禮官看詳禮官奏以塗金易玊飾梅紅絲結裙網而象牙代真珠上曰以七寶為之網零碎者亦可辦既而上皇不肯造每至大內多乘馬而間至湖上則用肩輿蓋不欲煩臣民云渾天儀渾天儀古器也舊京凡四座每座約用銅二萬斤至道儀在測驗渾儀所皇祐間儀在翰林天文局熙寧儀在太史局天文院元祐儀在合臺紹興三年工部員外郎晉陵袁正功獻渾儀本樣命有司製之太史局請折半製造計用銅八千四百餘斤詔工部侍郎提舉後以巡幸不克成時資州龍水縣士人張大楫以木為蓋言可備軍幕中候驗七年夏席大光為制置大使獻諸朝其後上在宫中自作渾儀然制差小十四年四月遂命有司製之內侍邵諤領其事久之乃成三十二年以授太史局焉紀元統元會元厯宣靖間用紀元厯兵興後失之司天無所考由是厯差一日紹興二年夏上命訪得舊厯以授史官五年正月朔日有食之史官所定不驗時常州布衣陳得一為侍御史沙縣張致逺言史官立朔有訛定臘失序致逺言於朝遂命得一造新厯朱子發以祕書少監視即祕書省置局八月厯成名統元賜得一號通微處士官一子焉乾道淳熙稍復更定皆判太史局劉孝榮所作也紹熙初有武臣趙渙者言其差故命孝榮更造會元厯統天厯統天厯慶元五年京文忠鏜為丞相時所上也初會元厯既成而布衣王孝禮言孝榮未嘗以銅表圭面測影故冬至後天朝廷然之未暇改作至慶元元年九月朔太史言月蝕夜而草澤言食在晝詔楊子美祕監驗視如草澤言乃改造厯以祕書省正字馮履為恭定官履字叔常臨卭人嘗從故直徽猷閣張行成為數學故以命之厯未成明年正月癸卯監察御史張巖言履唱為陂辭搖撼因是遂罷去三月庚戌乃詔諸道有曉通天之厯算者所在具名來上五月厯成厯經凡三卷沿厯他書十七種凡二十九卷又上臨安進士侯望重校萬年厯十七卷綱目二卷嘉泰二年日食五月朔太史以為午正而草澤趙大猷言午初三刻半日三分詔著作佐郎張嗣古監視渾儀祕書丞朱欽則著作王容測驗起居舍人俞澄覆言卒如大猷所言史官乃抵罪蓋自渡江後來厯差者多矣神宗哲宗新實録神宗哲宗新實録趙元鎮為相時所修也神録有考異哲録有辨誣皆出范元長侍讀一手與修者任德初張子韶尹彥明髙抑崇胡德輝范伯達朱喬年王信伯李似之等俱一時名人始髙宗在南都以二録成於京卞之手多矯誣嘗下詔更修而未果己酉南渡國史散佚靡有孑遺其後數詔訪求之紹興元年才得布衣何克忠所藏太祖實録四册而已上以書籍殘缺之際特命以官已而藏里張懋家獻太祖至神宗六朝實録會要史志等書小校唐開亦獻王圭所編五朝全要最後五年三月始從丞相趙挺之家得蔡京所修哲宗實録皆下之史官六年正月新神録成八年九月新哲録成時范元長已去官而尹彥明以祕書少監典其事元長所修神録舊文以墨書刪去者以黃書新修者以朱書世號朱墨書徽宗欽宗髙宗孝宗光宗實録徽宗實録紹興末嘗成書始建炎兵火後史院片紙不存汪彥章內翰守湖以湖州獨不被兵當時所頒賞功罰罪等事咸在乃因以為張本又訪諸士大夫間編集元符庚辰以來詔旨至宣和乙巳上之其書凡八百六十五卷其後修徽録史官皆仰之然猶多脫略淳熙中文簡仁父在史院奉詔增修之欽宗實録洪景盧因龔實之所補日厯而修皆文直而事核髙宗實録慶元嘉泰間京冀公仲逺謝魯公子肅為丞相所上時史館無專任未知果誰筆也孝宗光宗實録嘉泰二年詔寶文閣學士傅伯夀直文華閣陸遊同修蓋專以委之先是和州布衣龔敦熙者元祐黨人厚之曾孫也嘗著符祐本末黨籍别傳等書數百卷淳熙末洪景盧領史院奏官之後光宗名改頥正朝廷以其有史學嘉泰七年七月賜出身除實録檢討官蓋付以史事未幾而頥正卒乃外召傅陸還朝孝録比他書尤踈放四朝正史四朝正史始於李仁父而終於洪景盧乾道中仁父初入史院上四朝帝紀再還朝乃修諸志未及進書而仁父去國時史館官多以為侍從兼職往往不能淹貫則私假朝士之有文章者代為之今四朝藝文志一書實先君子筆也淳熙中趙衛公溫叔為相史志告成仁父時守遂寧大臣言仁父之力為多特進秩一等久之列傳猶未就緒上遂召仁父成之書垂成而仁父卒乃自婺女召景盧入領內祠專典史事文踰嵗而始成書焉凡列傳八百七十總一百三十五卷紹興乾道淳熙慶元敕令格式國朝法令大抵從寬政和後始有御筆特斷刑名是蓋多出於三尺之外矣靖康元年九月議者請恭用嘉祐元豐舊法以俟新書之成詔可尋詔律令依嘉祐斷刑依元豐明年四月復詔政和海行法非御筆修立者許引用建炎三年復避赦舉行仁宗法度即嘉祐元豐法有不同者賞格聼從重條約聼從輕時吕元直張德逺始為政也明年六月范覺民相乃奏命有司以嘉祐政和刺對修成書紹興元年八月上之其後乾道淳熙慶元年際率十餘嵗一修然大槩以紹興重修敕令格式為準淳熙事類淳熙事類孝宗時所修也國初但有刑統謂之律後有敕令格式與律並行若不同則從敕令格式然士大夫罕通法律而數書散漫故吏得以舞文上患之淳熙中始命敕局官取敕令格式及申明五書分門來上七年四月乃成為總門三十二别門四百二十詔頒行之賜名淳熙事類紹興淳熙慶元寬恤詔令寬恤詔令者始紹興二十二年八月王瞻叔知荆門軍代還入見請命有司編集中興以來寬恤詔令而知惠州鄭康佐者亦言守令奉行詔書不虔請編類成書以賜從之二十五年九月乃成凡二百卷號紹興寬恤詔令其後淳熙慶元皆有之淳熙書成於十二年夏慶元書編於五年終兩朝聖政録光堯聖政録者隆興乾道間所修也紹興三十二年九月以敕令所為類聖政命輔臣領之乾道二年冬蔣子禮為參知政事上其書凡三十卷上自為之序大凡分門立論視寶訓而加詳焉紹興中又為夀皇聖政録上之其書亦三十卷御製序文寶祕書少監陳傅良視草中興禮書中興禮書者淳熙中所上也紹興間太常少卿趙子盡採渡江以來所行為續因革禮三十卷其後禮官踵為之然未上也淳熙十二年春史彌大方叔權禮部侍郎乃言此書一朝大典如內禪慶夀等禮皆歷代所未嘗行乞下禮官宣取以進仍不必推恩上許之其書凡八百餘卷方叔文惠王長子後終敷文閣待制續通鑑長編續通鑑長編者李文簡燾所修也其書倣司馬氏通鑑踵為之然文簡謙不敢名續通鑑故但謂之續長編乾道初上召文簡為史官命有司給筆扎四年四月以五朝事上之孝宗謂輔臣曰自建隆至治平百餘嵗事迹偹於此矣淳熙十年文簡為遂寧守始具全書自建隆至靖康凡一百六十八卷舉要六十八卷上甚重之以其書付祕書省十二年十二月又有知台州熊克上所著九朝通略詔遷一官克字子復建寧人嘗為起居郎直學士院其書視長編才十二頗訛舛十三年八月又有知龍州王稱亦獻東都事略百三十卷於朝洪內翰主之明年春除直祕閣然其書特掇取五朝史傳及四朝實録附傳而微以野史附益之尤疏駁稱眉山人故禮部侍郎賞之子慶元終於吏部侍郎中興館閣書目中興館閣書目者孝宗淳熙中所修也髙宗始渡江書籍散佚紹興初有言賀方回子孫鬻其故書於道者上命有司悉市之時洪上父為少卿建言蕪湖縣僧有蔡京所寄籍因取之以實三館劉季髙為宰掾又請以重賞訪求之五年九月大理評事諸葛行仁獻書百卷於朝詔官一子十三年初建祕閣又命即紹興府借故直祕閣陸家書繕藏之農師子也十五年遂以秦伯陽提舉祕書省掌求遺書圖畫及先賢墨迹時朝廷既好文四方多來獻者至是數十年祕府所藏益充牣乃命館職為書目其綱例皆崇文總目焉書目有三十卷祕書監陳騤領其事五年六月上之監本書籍監本書籍者紹興末年所刋也國家艱難以來固未及九年九月張彥實待制為尚書郎請下詔諸道州學取舊監本書籍鏤板頒賜從之然所取諸多殘缺故舊監刋六經無禮記三史無漢書二十一年五月輔臣復以為言上謂秦益公曰監中所闕之書亦令次第鏤板雖有重費亦所不惜也由是籍經復全先是王瞻叔為學官嘗請摹印諸經義疏及經典釋文許郡縣以贍學或係省錢各市一本置之於學上許之令士大夫仕於朝者率費紙墨錢千餘緡而得書一監云建炎雜記甲集卷四

body:
  text: 建炎雜記甲集卷五宋李心傳撰朝事一髙宗即位册文淵聖北狩康王在山東羣寮請奉大統上謙讓未受時趙伯山延康守淮寧與諸鎮爭為盟主而宗室在京西或招羣賊置乘輿服御上優容之一日羣寮議纂服之禮宗室承宣使仲宗等曰今二帝蒙塵王不當即位宜著淡黃衣稱制不改元下詔書四方稱元帥有副元帥汪廷俊等以唐肅宗故事折之參議官耿伯順語仲宗曰公是宗室豈不避嫌仲宗語塞乃定即位於南都焉五月庚寅朔王登壇告天册文曰嗣天子臣某敢昭告於昊天上帝金人內侵二帝北狩天之戚屬混於穹居宗社罔所依憑諸夏罔知攸主臣某以道君皇帝之子奉宸旨以總六師握大元帥之權唱義旅以先諸將冀清京邑復兩宫而百辟卿士萬邦黎獻謂人思宋德天眷趙宗宜以神器屬於臣某辭之再四懼不克負荷貽羞於來世九州四海萬口一辭咸曰不可稽皇天之寶命凛凛震惕敢不欽承尚祈隂相以中興於宋祚册文乃勝子濟所撰也禮成上流涕即位於府治之正衙壇在府治中門之東實耿伯順建議所築後名其壇曰受命中興之壇中興定都本末靖康末髙宗初建元帥府於河北後聞京城破汪廷俊等遂奉王如山東久之聞張邦昌僣立廷俊等欲奉王走宿州謀渡江有先鋒至山口鎮三軍籍籍乃罷行五月王即位於南都六月李伯紀入相將奉鑾輿狩襄鄧八月伯紀去位十月上遂幸維揚時黃懋和汪廷俊為政也三年二月尼雅滿遣五千騎犯揚州上幸杭州駐蹕三月苖傅劉彥謀逆尊上為睿聖仁孝皇帝居别宫四月傅等敗上進幸江寧冬烏珠入冦上用吕元直議自明州幸海四年春始還越州時范覺民為相後覺民罷紹興二年正月以漕運不繼復移臨安冬烏珠又入冦趙元鎮張德逺共事上幸平江時朱藏一首建避敵之議元鎮闢之朱由此罷相明年敵退上復還臨安六年秋劉豫入冦上進幸平江七年春元鎮罷德逺獨相乃有建康之幸秋酈瓊叛德逺罷元鎮復相八年二月復奉上還臨安自元鎮罷相後秦檜獨相從此不復進都矣褒録元祐黨籍紹興初朝廷褒録元祐黨人且擢用其子弟六年正月樞密院檢詳文字范直方言自蔡京用事凡妬賢嫉能助成黨論之人偶乖迎合遂致睚眥京卞欲終廢之故借黨以報怨如李清臣首唱異議即加誣證大母楊畏反覆妄詐皆𨽻名石刻之人今又推恩子孫傷教敗俗莫此為甚請命近臣審訂而甄别之上納其言遂命給舍甄别元祐黨籍他日上謂趙忠簡曰一時甚有濫居黨人之數者范仲任申先皆能辨之先是渡江以來黨碑無復存者凡自陳者悉以胥吏私傳之本為據紹興四年陳去非在吏部以為言始加搜訪後二年乃命甄别焉時朱子發為給事中董令升任世初為中書舍人元鎮以為賢故付以此然亦不克當意也直方蓋忠宣公孫云籍記崇觀姦邪建炎初言者請以崇寧以來無位人為一籍詔諌官御史具名以聞臺省各録副本不許堂除及任守令事已行俄命執政恭酌非罪惡深重之人皆許自新量才擢用時宰相黃懋和汪廷俊意也四年范覺民相吏部侍郎季陵上疏請收用近年廢黜之人且詔臺諫勿復論列敕榜朝堂臺諌沈與求等以為言陵遂坐絀紹興五年趙忠簡為相會右丞鄧洵仁卒詔贈官推恩如故事劉立道為中書舍人封還詞頭言今日之事洵仁父子實有力焉得死牖下已為失刑乃敢援例加恩不知上皇今在何地請令自今崇寧以來侍從以上如洵仁等輩一切更不推恩自靖康初遺録元祐諸臣然議論不一是非淆混忠簡夙有此志以身任之因繳洵仁詞頭遂歷言熙豐紹聖崇觀政事人才善惡利害本末甚備上嘉納之命榜於朝堂焉臨軒疏決自真宗以來率以盛暑臨軒録囚建炎初廢二年六月始詔疏決行在揚州繫囚雜犯死罪已下減一等杖以下釋之其後越州縣府皆同此制紹興二年六月上在臨安甲申始臨軒疏決御史臺大理寺臨安府三衙諸軍繫囚自是遂為故事然諸道未及也五年趙元鎮為相復舉故事命諸路提刑以盛暑行之迄今不改然憲臣多不能遍所部則以諸州通判代行久之通判亦不能行第傳檄往來徒為具文而已朝廷屢戒飭之終不能革參政分治省事元豐官治尚書左右丞分治六曹後以為皆執政官乃令通治省事紹興四年張魏公再入宰府上諭魏公凡事於三四大臣皆當分委張浚可專治軍旅胡松年可專治戰艦如財用亦須委一大臣後魏公相不果行七年魏公獨相三月詔尚書省常程事權令參知政事分治於是張全貞治吏禮兵房陳去非治戶刑工房九月魏公免復詔三省事令𠫭知政事權輪日當事更不分政常程事俟除相如故自是參知政事復通治省事矣修政局自王荆公秉政始創制置三司條例司以行新法其後蔡儋州當國踵其故置講議司儋州罷張文忠代之乃置政典局不𨽻三省靖康初徐釋之吳原中共政又置詳議司俄以人言罷紹興二年吕元直秦會之同相元直督軍於外會之欲奪其柄乃置修政局自欽之詔職事官及守令以上言省費裕國強兵息民之䇿以戶部侍郎黃叔敖為參詳官職局如講議司故事曾諫議説時為尚書郎謂會之曰宰相事無不説何以局為會之不聽數月會之罷是日彗星出議者以為修政局所講多刻薄之事失人心致天變後五日遂罷修政局焉經界法經界法李椿年仲永所建也紹興十三年仲永為兩浙轉運副使上疏言經界不正有十害一侵耕失稅二推割不行三衙前及坊場户虛供抵當四鄉司走弄稅名五詭名寄産六兵火後稅籍不信爭訟日起七倚閣不實八州縣隱賦多公私兩困九豪猾户自陳稅籍不實十逃田稅偏重故稅不行十一月癸巳疏奏上納其言仲永又言平江嵗入昔有七十萬斛有竒今入才二十萬耳詢之土人其餘皆欺隱也請考按核實自平江始然後推之天下因上經界畫一其法令民以所業田各置坫基簿圖田之形狀及其田𤱔數目四至土地所宜永為照應即田不如簿者雖有契據可執並拘入官知縣各為坫基簿三一留縣一送州凡漕臣若守令交承悉以相付詔專委仲永措置遂置局於平江周敦義遂車事免十三年六月詔頒其法於天下仲永亦遷戶部侍郎十五年仲永以憂去命王成可以戶部侍郎代之成可請員外郎開封李朝正同措置又請令民十家為甲自陳不復圖畫丈量即有隱田以給告者正月辛未成可罷朝正權戶部侍郎十六年二月丙寅十七年春仲永免喪復故官專一措置經界五月丁邜仲永復以結甲自陳為不便請令州縣造圖而遣官核實先成有賞如慢有罰十九年經界畢民多詣臺省訴其不均曹庭筠時為臺官因奏仲永私結將帥曲庇家鄉請罷之更選官核實十一月辛丑初朝廷既頒其法於諸道其後有司畫圖供帳分立土色均認苖稅民始病其煩仲永既遣官屬分往諸道又覆視之議者不以為便明年二月壬子戶部請委漕臣限一季結局悉罷先所遣官三月戊戌遂下詔曰昨李椿年乞行經界初欲去民十害遂從其請今聞寢失本意可令監司將乖謬害民者日下改正時敕令所刪定官開封鄭克經界川陜四路頗峻責州縣故蜀中增稅亦多又官田號省庒者所租有米穀粟麥麻豆桑茶鴨卵之屬凡十八種皆令輸以錢故事至今尤以為患時馮濟川楫為瀘南撫使論於朝於是瀘敘長寧獨免經界仲永蓋饒州浮梁人云然諸路田稅由此始均今州縣坫基簿半不存典吏豪民又有走移之患矣籍記監司郡守紹興初樓仲輝資政為左吏請命從官舉可為監司者令中書籍記姓名遇缺除授上從之已而謂輔臣曰朕亦當書之屏風以時揭帖其不任職而無他過者以自陳宫觀與之乾道初孝宗新創選德殿於御殿後作金漆大屏分畫諸道各列監司郡守而兩行以金簽標識居官者職位姓名其餘皆為華夷之圖云隆興臺諫隆興初湯慶公復除右僕射王諫議大寶上章論列不從奉祠去自是臺諫多引退者張忠簡闡時為工部尚書因奏事面請增臺諫員上曰士大夫多賣直故難其選忠簡曰直言事之所尚陛下開納則有益於國家胡忠簡銓時為左史造朝以張公之語質上曰此語非也朕與張闡所言謂臺諫論事當辨曲直非謂賣直也明日張公請對又論臺諫一空上曰卿與胡銓昨議論一同得非傅會聖意止欲辨論其直非惡直也忠簡曰陛下當受垢納汙若校曲直是非便拒諫也上改容納之隆興時主聖臣直蓋如此隆興和戰孝宗初受禪起張魏公為江淮宣撫使上委以經略北事魏公欲命李顯忠邵宏淵引兵進取而史曽公以宫寮位執政謂強弱不敵未可進也數從中止之魏公及陳魯公皆主招納東北人史公尤以為不可因城洲白遣大府寺丞史正志志道合兩淮帥臣監司集議俾諭以廟堂指意志道有口辨既見魏公諭説云云魏公之意不回而史公亦數致書為言兵少而不精二未可恃魏公不聼也時上意鄉魏公故史公拜右僕射而魏公亦拜樞密使都督江淮軍馬會顯忠宏淵進師取宿州命從中出三省樞密院不預知史公遂丐免不數日符離師潰上意亦浸疑湯丞相進之還朝復主和議由是魏公遂絀而海泗唐鄧商秦棄矣論者惜之孝宗革冗官孝宗初受禪以官冗恩濫議革之欲定制百官已任事者遇郊恩權免奉薦開賢良科令中外普薦而權罷者得已奏名隆興二年秋詔右諫議大夫王之望右正言尹穡殿中侍御史朝公武恭酌來上之望言陛下即位未久恩澤未遍此二事關於士大夫者甚多願少寬之不已則宜立為奏薦限員踰數者許回受罷門客親戚漕司之職止移鄰州如是省額可減百十人此救弊之䇿也疏奏亦不果行至淳熙中始定奏薦員限云上書補官乾道初陳正獻公恭知政事時有衢州進士毛日新者以上書補文學陳公與同時相葉子昂覆奏其事且曰陛下識其人否上曰朕不識之但見纍上書陳公曰士人上書果有益國家如賈誼治安之䇿魏元忠防邊利害雖朝奏暮召可也今觀其書無甚可行之事此例一開恐舉人舍本業而事上書紛然何以應之又安知非假手以欺朝廷也上乃止乾道郊賜國朝故事郊祀大禮宰臣樞密使賜銀帛四千匹兩執政官三千三司使行資政殿學士五百直省已上四百雜學士省副三百中丞給諌舍人待制各一百慶歷二年減冗官於是執政以上各減一千三司使減三百餘減二百中丞以下減三十遂為定制焉渡江以來宰臣郊賜匹兩不過千兩乾道六年虞忠肅為大禮使率同列懇辭上不許忠肅曰舊來銀一兩為錢四百絹一匹為錢七八百故千匹兩其直不過千餘緡今則七八千緡或者但言祖宗時錫豫甚厚今徒多裁減不知所賜之直已過祖宗時數倍也恭知政事梁文靖公奏曰今祕閣中有太祖御扎禁軍劵錢至親筆裁減一二百者上曰雖一麻鞋之微亦經祖宗區處愛惜用度如此於是上遂許羣公之辭自是進書加恩率多辭賜矣孝宗總核名實孝宗總核名實於官職未嘗妄授劉忠肅為建康留守終更當再任上知其政績特除觀文殿學士以旌之執政除目云劉珙居守建康已及二年可除觀文殿學士再任上曰以及二年而除職非用人之體乃改云居守建康績效顯著淳熙慶夀禮淳熙中再行慶夀禮時舊相史文惠以平保寧軍節度使魏國公致仕居明州陳正獻以少傅觀文殿大學士福國公致仕居興化軍十二年十一月丁未詔二公赴闕立班令明州興化軍以禮餽遺上又賜手扎令勿過辭用赴廷侍陳公以道逺不能至十二月史公至江臯上遣使賜銀盒茶藥又詔都城外賜御筵及見畢對御賜燕皆固辭甲戌入見內殿上為之曲宴且還賜第居之十三年春王正月庚辰朔旦上率百官簮花用樂上夀於康夀殿是日自人主至羣臣禁衛吏卒往還皆簮花癸未百官拜表稱賀於文德殿又移班秩束箋賀中宫史公丐以戊子辭朝上不可賜手筆留之推恩拜史公太傅陳公少師二月壬子賜史公玉帶金魚庚子史公入辭且請歸賜第詔修內史交割又命三省樞密院官燕飯恩數悉視文潞公禮遇之優厚自中興以來所未有也大理獄非得旨不得送理官宅自神宗置大理寺著令専一承受內降朝旨重密公事及推究內外諸司庫務侵盜官物餘民事送開封府乾道三年二月癸酉詔事涉情理巨蠧及經州縣推勘番異者方許取旨送寺七年四月辛亥又詔諸處合送寺公事並取朝旨時曹欽道為戶部尚書不以為便是嵗五月詣都堂白云六曹所行最計利害若俟取朝旨恐事政彰露犯人逃竄請先次送寺仍申朝廷照會丞相出劄子許之自是六曹寺監事無巨細率皆送寺矣淳熙十四年正順伯少卿為大理寺丞轉對言所以重天獄者請復舊典十月丁邜先是大理寺官散居僦舍論者以為非宜淳熙中乃創大第聚居之如臺諫之宅也福建經界自紹興年經界後久之諸道經界圖籍多散佚吏緣為姦淳熙八年閏三月癸巳新知江隂軍王師古言於朝詔漕臣督州縣補葺八月戊辰諫官葛楚輔言其擾民乃止初紹興時之經界也漳泉汀三郡以何白旗作過之後朝廷恐其重擾故止不行然漳泉富饒未見其病惟汀在深山窮谷中兵火之餘舊籍無存者豪民溺稅常賦無矣五六郡邑無以支吾因有計口科鹽之事一斤之鹽至出數斤之直論者患之淳熙十四年四月福建轉運判官王回代還入見為上言其病不專在鹽請先行經界上是其言丙申以回為户部右曹郎官往汀措辦未至官有武臣提刑言其不便遂止之其後朱文公守漳州亦以為可行而卒不聽也軍中承代敦減渡江以來江上及關外諸軍使臣死亡率以宅內人承代朝廷患之乾道二年正月建康都統劉源繳納事故人付身二萬有竒樞密都統承旨龍大淵言於朝詔進官二等然統帥多庇其部曲罕能行朝廷乃許之自陳敦減補正淳熙七年三月丁丑權吏部侍郎閻蒼舒才元言今內外報到承代官數二萬三千五百餘人請置取會銷落從之自後冒官率皆補正矣六部舊無圖籍八年七月才元始搜索氏族簿書凡七百八十册請下本部收管并令他部倣此以扼姦從之淳熙臧否郡守孝宗留意治民紹興三十三年十一月丙申首詔諸路帥臣監司每日悉具部內知州治行臧否連銜聞奏後以多事不克行淳熙八年閏三月辛巳復命監司帥臣嵗以所部郡守臧否來上皆著事實即考察不公者御史劾十年四月丙申詔新知歸州湯鷽罷所除官己酉以知普州范仲圭為利州路轉運判官知瓊州韓碧提舉廣東常平茶鹽公事知復州閣門祇侯王去惡為右領軍衛中郎將皆用監司奏臧否也十二年六月丁丑浙東安撫使鄭丙提舉常平等事勾昌泰皆坐奏臧否稽緩降官時趙衛公判江州奏言當舉劾而必臧否之不從趙公因具文以事報乃以七月乙巳詔漳州見任守臣及監司令其精察臧否來上已除者俟到闕令都堂審察既而漳守黃啓首以臧聞遂除直祕閣再任十二年未除後又遷廣東轉運判官九月乙巳侍御史陳賈奏令諸路臧否既上而黜陟未行請令諸州見任守臣係監司所否之人許令自陳並與宫觀違者御史糾之使臧者益勸否者知勉又言諸路臧否外間多不聞知請劄下給舍臺諫其不公不實者許繳駁論奏從之十月癸亥又詔今後諸路守臣臧否限次年三月終川廣五月終聞奏時青州蒲果知忠州為監司所否果代還入見上問之果曰臣得罪於監司不得罪於百姓翊日上諭輔臣曰蒲果誠直可取十三年潼川路漕臣嶽霖奏知瀘州眉山史臯為否五月壬辰詔罷臯時趙昌裔者守全州帥臣林栗監司宋若水張栁管鑑連年以為否六月癸丑詔昌裔奉祠右諌議大夫陳賈言非所以示懲七月己丑遂寢其命十四年六月癸未江西提刑馬大同坐臧否稽緩降官時蘷州路安撫楊輔所奏亦久不至己丑詔詰之尋送貶秩上既留意黜陟之政由是諸道皆奉承行之然恐十餘年不免有徇私之弊上亦疑其不可盡信嘗以諭輔臣要在精擇部使者而以臺諫考察之庶乎可也上語在十五年七月丙午事具宣諭聖語經筵轉官裁省故事經筵讀一書畢自儒臣修注下至中人吏士皆遷一官雖篙工廄卒無不霑被淳熙十三年冬陳大諫賈因史苑進書言酬賞泛濫上納其説於是吏輩易轉官為磨勘者無慮三數百人議者猶以為濫十四年春陳又言經筵及宫讀陸贄奏議皆終篇經筵轉官者三十二人東宫講堂轉官循資者二百九十一人平陽郡王府授論語徹章轉官者二十二人至有點授論語末篇才一日而與轉官者冗濫極矣請自今並行裁抑官吏實預者量與推恩其餘竄名一切省汰或量豫犒設上從之時人皆以為當役設總要自髙宗紹興中始修常平免役之令其後嵗月浸久弊端益多視舊法或抵牾吏緣為姦淳熙末中書舍人莆田陳居仁詳定一司敕令因請下令敕取祖宗免役舊法及於戶部括取紹興十七年以後續降指揮精加恭考其有與舊法抵牾者悉行刪去萃為一書名曰役法撮要書成鏤板布之天下從之建炎雜記甲集卷五

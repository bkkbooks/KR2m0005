body:
  text: 建炎雜記甲集卷二宋李心傳撰郊廟宫省祠觀陵寢附南北郊明堂自元豐分南北郊至政和乃克行之建炎二年上祀圜丘獨祭上帝而配以太祖用元豐禮也紹興十三年郊祀始設大神大示及太祖太宗配位自天地至從祀諸神凡七百七十有一蓋元祐禮云明堂者仁宗皇祐中始行之其禮合祭天地並配祖宗又設從祀諸神如郊丘之數政和七年既建明堂於大內自是嵗以九月行之然獨祀上帝而配以神宗惟五帝從祀紹興元年上在會稽將行明堂禮命邇臣議之王剛中居正為禮部郎官首建合祭之議宰相范覺民主之乃以常御殿為明堂但設天地祖宗四位而已四年始設從祀諸神七年復祀明堂而徽宗崩問已至中書舍人傅嵩鄉請增設道君太上皇帝配位於太宗之次禮部侍郎陳公輔言道君方在几筵未可配帝乃不行三十一年始崇祀徽宗於明堂以祀上帝而祀五天帝於堂上五官神於東廂罷從祀諸神位用熙寧禮也乾道以後說者以德夀宫為嫌止行郊禮淳熙六年用李仁父周之充議復行明堂禮之祭遂合祭並侑焉逮十四年髙宗崩明年季秋乃用嚴父之典今郊禮從紹興明堂從皇祐惟歲時帝祀則以太祖配冬至圜丘太祖配祈榖大雩髙宗配明堂宗祀蓋尤延之為禮官時所請云郊丘明堂之費隆興二年孝宗初行大禮時湯慶公思退為左相上問郊與明堂之費如何戶部尚書韓仲通曰郊之費倍於明堂侍郎錢端禮言不過增二十萬若從祖宗故事一切從儉自宜大有减省上以為然乃照除事神賞軍外並從省約會其秋金人入寇遂用明年正月辛亥朔旦行之上自宫徂郊乘玉輅用鹵簿之半禮畢乘平輦而歸乾道三年再郊始復偹五輅歸用大安輦焉當喪罷祭廟自咸平以來人主有三年之喪則罷廟祭熙寧元年郊祀英宗喪未除然前二日猶朝獻景靈宫前一日朝饗太廟元祐元年宗祀亦如之紹興七年上祀明堂於建康時徽宗未祔廟太常少卿吳表臣奏行其禮翰林學士朱震以為不然監察御史趙渙言升祔以後宗廟常祭皆不當廢而當喪享廟亦有顯據左氏傳曰蒸嘗禘於廟曾子問曰已葬而祭此不當廢也詩頌成王即位諸侯助祭春秋文公四年十二月成風薨六年十月猶朝於廟此顯據也疏奏詔侍從臺諫議議者吏部尚書孫近等十五人言按唐故事以皇帝將郊禮奏告太廟太清宫蓋告也非祭也上從之三十一年當宗祀其夏已聞欽宗之喪禮部侍郎金安節言宫廟皆當以大臣攝事亦不從紹熙五年明堂孝宗未卒哭時趙汝愚朝獻景靈宫嗣季王伯圭朝饗太廟而上獨祀明堂慶元六年上執光宗之喪甫踰月而當行大禮乃命右丞相謝深甫欵天興之祠嗣濮王不儔攝宗廟之祭蓋用紹熙禮云太祖正東嚮之位國朝自太祖追王四親以來每遇禘祫祖宗以昭穆相對而虛東嚮之位王介甫用事以為僖祖以上世次不可知則僖祖之有廟與后稷疑無以異當時諸儒韓持國輩辨之不從熙寧八年夏禘於太廟以尊僖祖自是無敢議者紹興五年八月董舍人弅為吏部員外郎始請正太祖東嚮之位上命防秋後議之明年春王侍郎普為太常丞復以為請趙元鎮為相白行之下侍從臺諫禮官集議上謂元鎮曰太祖開基創業始受天命祫享居東嚮之位合於禮今必無異議而諫官趙霈者乃謂上皇在逺宗廟之事未容輕議事遂止淳熙末尤延之尚書為江西提刑復建此議紹興初入為宗伯遂申言之詔侍從臺諫兩省與禮官同議其後亦不行時丘宗卿侍郎在奉常亦以為言而議終格逮趙子直得政遂决行之朱元晦侍講獨言僖祖皇家始祖不當一旦并行祧毁不從故事祔廟二百年而後正太祖之位蓋自紹熙五年冬始而别建一殿以奉祧主於大殿之西今謂四祖殿者是也九廟七廟之制太廟自仁宗以來皆祀七世崇寧初蔡京秉政始取王肅說謂二祧在七廟之外乃建九廟奉祖宣祖咸歸本說焉然莽已營九廟唐明皇又用之非始於蔡京也紹興中徽宗附廟以與哲宗同為一世故無所祧及升祔欽宗始祧翼祖髙宗與欽宗同為一世亦不祧由是淳熙末年太廟祀九世十二室及阜陵復土趙子直為政遂祧僖宣二祖而祔孝宗朱元晦在經筵獨以九廟為政子直不從元晦議遂格及光宗祔廟復不祧今又祀九世矣太廟景靈宫天章閣欽先殿諸陵上宫祀式國朝宗廟之制太廟以奉神主一嵗五享朔祭而月薦新五享以宗室諸王朔祭以太常卿行事景靈宫以奉塑像嵗四孟享上親行之帝后大忌則宰相率百官行香僧道士作法事而后妃六宫皆亦繼往天章閣以奉畫像時節朔望帝后生辰日皆遍薦之內臣行事欽先孝思殿亦奉神上日焚香而諸陵之上宫亦有御容時節酌獻如天章閣每歲寒食及十月朔宗室內人各往朝拜春秋二仲太常行陵園季秋監察御史檢視太廟之祭以爼豆景靈宫用牙盤而天章閣等以常饌用家人之禮云迄今不改光堯之崩詔從官議廟號洪景盧內翰請稱世祖從官多同之禮官顔師魯尤袤鄭僑奏疏曰臣等切惟宗廟之制祖有功而宗有德創業垂統功莫大焉繼體守文德莫茂焉藝祖帝規創大業為宋太祖太宗皇帝混一區夏為宋太宗自真宗至於欽宗聖聖相傳廟制一定萬世莫易仰惟大行太上皇帝宏濟多難紹開中興功德兼隆上足比太祖陛下孝思罔極是所以盡尊親之意稱祖立廟有何不可然在記子為父屈亦有尊也雖聖不先父食大行太上皇帝親為徽宗之子子而為祖父而為宗則難以正尊卑昭穆之序今議者不過以光武為比太上皇帝中興大業雖與光武同然漢自髙祖至於平帝國統中絶光武以長沙王之後起布衣之中不與哀平相為繼承其稱祖無嫌一也漢制每帝即位輒立廟不列昭穆故明帝更為光武立廟號為世祖廟蓋不與髙祖為一其稱祖無嫌者二也太上皇帝功德盛大禮當尊崇然實繼徽宗之正統以子繼父非若光武比也本朝恭稽三代之制列昭穆於太廟非若漢世可以更為廟也仰惟大行太上皇帝孝悌之至冠於百王將來祔廟若在父廟之下而稱祖竊恐在天之靈有所不安若更為廟如東漢則於國朝之制豈容違戾質之典禮則不合驗之人情則不順夫昭穆尊卑之序所以關綱常係事體者甚大豈易輕變乞以臣等此章付集議所恭稽禮經博采衆論施行從之遂定為髙宗矣光堯廟號議初髙宗廟號未定殿中侍御史冷世光監察御史吳博古黃謙共議謂宜稱聖宗權兵部侍郎林栗又議宜存尊號中十六字而益以聖神光孝四字廟號堯宗詔侍從臺諫兩省禮官同議時栗又奏謂唐髙宗有嬖后國祚幾危非所宜比皇太后聞其說必欲易之於是從官于文價洪邁韓彥質葉翥劉國瑞王信李巘謝諤吳琚章森諫官謝諤禮官顔師魯黃黼倪思張體仁沈鑑等同奏聖字乃契丹隆緒號恐難用也又諡法雖有堯字乃後人採取傅會之說金人亦有名宗堯者斷不可用惟髙字或光字為宜栗又固爭以堯字為可用太常少卿尤袤奏曰昔曹操朱溫皆號太祖本朝太祖用之不嫌者名實所在自有定論也堯乃古號不可單用為號烈宗劉聰楊渥僣僞之主皆嘗用之光字雖若可用然字體太輕士庶名字多或用之於是稱藝祖者以為種藝之藝建位天地開植宗社滋養萬物傳之皆無藝也大臣主之復與侍從臺諫禮官議議者皆謂孔安國注舜云藝者文也書之取義止於如此又經典中有才藝伎與成而下之文可以為重可以為輕况施之於祖猶有可據施之於宗則失之牽合臣等謂極天下之美而前世未用者莫如大之一字易曰大哉乾元語曰大哉堯之為君大之為義其如此請號曰大宗於是內出詔曰堯自載於諡法唐髙祖亦諡神堯用為廟號似亦無嫌可令議定奏聞禮部太常寺奏堯舜乃二帝之名唐髙祖諡神堯太上皇帝尊號光堯猶曰比德於堯而又過之爾今獨取堯之一字以為廟號有所未安本朝開基中興皆在商丘國號大宋則今擬廟號獨取乎商之髙宗實為有證詔從初議遂定為宗方羣臣之集議也又有欲稱成宗者袤曰此吳越錢元瓘僞號也議者乃止其後夀康升附遂號為光宗云髙宗孝宗配享功臣祖宗故事大臣配享皆附廟後議之若趙韓王曹秦王之配享太祖蓋真宗咸平時而韓魏王曾魯公之配享英宗皆其身薨日降制亦在祔十數年後永思陵復土翰林學士洪邁言聖神文武憲孝皇帝祔廟有期所有配食臣寮先期議定臣兩䝉宣諭欲用文武臣各兩人文臣故宰相贈太師秦國公諡忠穆吕頤浩特進觀文殿大學士諡忠簡趙鼎武臣太師蘄王諡忠武韓世忠太師魯王諡忠烈張俊此四人皆一時名將相合於天下公論望付侍臣詳議以聞議者皆以為宜遂從之祕書少監楊萬里獨謂張丞相浚不與配食為非宜爭之因罷補外去國焉孝宗既祔廟詔以故相陳康伯侑食寶文閣待制吳總上疏請以其父璘配享廟廷不報中興典祀中興典祀冬至圜丘夏至皇帝祗太祖配孟春祈穀孟夏雩祀神州地祗並太宗配季秋明堂淳熙十六年閏五月改髙祖配感生帝僖祖配已上帝執亮獻官髙禖青帝配以伏犧髙辛氏朝日大明夕月夜明九宫貴神太一攝提權主招搖夫符青龍咸池太陰天一熒惑常五宣明王配大社大稷土右正稷出火納火祀大臣商丘宣明王配蠟祭東蠟后稷大明配以神農神農無配西蠟夜明配以北蠟神農配以后稷五方嶽鎮無配四海四瀆無配風雨雷師無配先農神農后稷先蠶先蠶至聖文宣王兗國公鄒國公昭烈武成王留侯祚德廟强濟公英略公啓佑公渡江後郊廟宫省紹興四年髙祖在平江將還臨安始命有司建太廟十二年和議成乃作大社大稷皇后廟都亭驛太學十三年築圜丘景靈宫髙禖壇祕書省十五年依內中神御殿十六年廣太廟建武學十七年作玉津園太一宫萬夀觀十八年築九宫貴神壇十九年建太廟齊殿二十年作玉牒所二十二年作左藏庫南省倉二十五年建執政府二十六年築兩相第太醫局二十七年建尚書六部大兄都二十年而郊廟宫省始備焉今圜丘青城齊宫今圜丘在龍華寺之西壇四城上城縱橫七丈下城二十二丈分三陛陛七十二級壇及內壝凡九十步中壝外壝共二十五步紹興十三年楊存中領殿前司所築也東都舊有青城齊宫渡江後以幕屋絞縛為之每郊費緡錢十餘萬淳熙末張端明初為京尹始議築齊宫可以勞而永逸上從之宇文寶學價時為兵部尚書因宿直奏曰陛下方經略河南今築青城是無中原之意也上以為然亟命罷役京太廟京太廟舊十六楹其十四楹為七室東西二楹為夾室康定元年冬直祕閣趙希言請倣古制每主為一廟一寢或未能然則更立祧廟事下禮部宋子京等言晉宋多同殿異室祖宗至今行之已久遂不從及哲宗祔七室已滿僖祖太祖至神宗李邦直議父子曰世兄弟曰及乃祔哲宗主於東夾室焉室既隘神帳祭器至不能容乃皆裁削論者非之逮崇寧始改今太廟今太廟紹興四年創始髙宗在揚州寓安祖宗神主於夀寧寺己酉南渡太常少卿季陵遣親事官負神主以行金人驅之遂失太祖神主後朝廷以重賞求之上自海道還神主留溫州久之江端友為禮官請建太廟正殿七楹分為十三室祖宗十一室二夾室七年夏更築太廟於建康以臨安太廟為聖祖殿十二月復奉神主還臨安十六年新祭器將成而太廟室隘至不能陳列巫端明伋請增建太廟從之於是從西增六楹通舊十三楹每楹為一室東西二楹為夾室又作西神門册寶殿祭器庫景靈東西宫祖宗以來帝后神御皆道釋之館祖宗元豐中始倣漢原廟之制即景靈宫之東西為六殿每殿皆館御前殿以奉宣祖以下御容而後殿以奉母后各揭以美名徽宗崇寧初以景靈無隙地乃絶馳道之西立西宫以神宗為館御首哲宗次之號舊宫為景靈東宫建炎改元之二日即命有司建景靈宫於江寧帝后異殿然不克成渡江後自聖祖以下神御皆寓溫州天慶宫以祠部官亷知州若官使相則兼景靈宫使典奉神御趙忠簡為相議築宫臨安以奉神祖御而留聖祖於東嘉後不果紹興十三年二月始遷於臨安然但通於三殿以奉神容無復東都之制矣或者謂忠簡之議乃王沂公藏天書之意今景靈宫今景靈宫在新莊橋之西本劉光世賜第也初築三殿聖祖居前宣祖至徽宗居中元天大聖后與祖宗諸后居後掌宫內侍七人道士十人吏卒二百七十六上元結燈樓寒食設鞦韆七夕設摩㬋羅簾幕歲一易用酌獻二百四十羊凡帝后忌辰通用僧道士四七人作法事十八年增建道院二十一年韓世忠卒九月又以其賜第增築之天興殿五楹中殿七楹後殿十有七楹齊殿進食殿皆偹焉期年而畢今大內夀慈宫太學三省臨安府今大內舊杭州州治也紹興初髙宗自越復還臨安命有司裁為行宫百楹而以時內侍楊公弼董其事欲增為三百楹上不可而止蓋上日所御殿茅屋才三楹九年秦丞相用事始作慈寧宫十二年和議成因作戎政殿垂拱殿十八年乃名皇城南門曰麗正北門曰和寧二十四年建天章等六閣二十八年增築皇城東門之外城於是時禁中已復營祥曦福寧等處殿苑中有澄碧觀堂及凌虛閣等而上又自作復古殿損齊實所常御也孝宗乾道初作選德殿淳熙中作翠寒堂今夀慈宫舊秦檜宅也故為德夀宫今太學舊嶽侯宅今三省樞密院舊顯寧寺今臨安府舊祥符寺祕書省祕書省在天井巷之東紹興十三年創以殿前司寨為之中有殿曰右文淳熙中陳叔進樞密為祕書少監始葺省之後園頗華麗紹興末趙子直欲以為泰安宫會上意不欲遷乃止玉津園玉津園紹興十七年建明年金使蕭秉溫來賀天申節始燕射於是園乾道淳熙間初復燕射飲餞親王皆以為講禮之所後又有德夀宫東園集芳園太上皇后下天竺御園睦親宅莊文惠憲府喜王府東都故事宗室子皆築大舍聚居之太祖太宗九王后曰睦親秦王后曰廣親英宗二王曰賢親神宗五王曰棣華徽宗諸王曰蕃衍渡江後宗子始散而居邑也惟親賢子孫為近屬則聚居之孝宗子四人邵悼肅王無後莊文太子魏惠憲王早薨莊文之妃惠憲之夫人皆别居賜第初莊文既大祥議者欲皇孫出居於外或以為不可又踰年竟以知樞密院府為外第焉紹興初今上封喜王將以所籍富民裴氏之居為府第而議者以為非宜乃改築蓋自紹興以來天居鮮少故不復賜宅名云內中神御殿內中神御殿東都舊有之號欽先孝思殿紹興十五年秋始創在崇政殿之東凡朔望節序生辰上皆親酌獻行香著用家人禮也萬夀觀萬夀觀以奉皇帝本命星官大殿曰純福掌觀內侍二人道士十一人吏卒一百五十五人道士歲費縣官錢七百九十二千米百二十斛紹興十七年建太一宫太一宫以紹興十七年建明年宫成凡一百七十楹分六殿大殿曰靈休奉十神太一聖像挾殿曰瓊章寶殿藏殿别殿四曰介福上本命殿金闕寥陽三清明離火德貞君齊明齊殿兩廡繪三皇五帝至里域星官凡一百九十五每歲四立日以籩豆祀之用素饌火禁依皇城法士民許即道院設道場品官聽升殿宫成以秦太師為奉安太一使翊日上親詣職事官寺監簿在京釐務官通直郎已上皆立班道士官給糧歲為五百斛其後又詔市嘉興田三十頃以為道糧宫後小坡上有亭曰武林竹柏周遭頗清絶孝宗受禪增建本命殿曰崇禧光宗受禪乃遷介福像于挾屋而名新殿為崇福殿佑聖觀佑聖觀孝宗舊邸也壁間有上少年時所題云富貴必從勤苦得男兒須讀五車書至今以碧紗籠寶藏之淳熙三年初十二月落成蓋建以奉佑聖真武靈應真君者也內塑真武像蓋肖上之御容也寧夀觀寧夀觀在七寶山之上舊名三茅堂有徽宗御畫茅君像紹興二十年賜額觀後林中可下瞰大內之宫中樓臺殿閣髣佛可見今為禁也延祥觀延祥觀紹興十四年建以奉四聖真君靖康末上自康邸北使將就馬小婢招兒見四金甲人各執弓劍以衛上指示衆人皆云不見顯仁后聞之曰我事四聖香火甚謹必其陰助及陷敵中每夕夜深必四十拜及曹勛南歸后令奏上宜加崇祀以景貺云觀今在西湖上極壯麗其像以沉香斫之修繕之費皆出慈寧宫有司不與焉顯應觀顯應觀紹興十七年建以奉磁州崔府君在西湖之東岸昔髙宗靖康北使至磁而還建炎初年王夫人夢神人自稱崔府君擁一羊謂之曰以此為識已而有娠遂産孝宗亦異矣崔府君束漢崔瓊也封嘉應侯祚德廟祚德廟始於熙寧間神宗未有聖嗣故吳居厚請為之紹興十六年四月立於臨安六月詔成信侯程英增忠定時國嗣未建故祠之且升為中祀又封為公是嵗監察御史石埭王鎡因請行親祠髙禖之禮八月改築髙禖壇於圜丘之東髙咫而廣五倍十七年二月以秦丞相為親祠使丁未上親祠青帝於壇以伏羲髙辛配又祀簡狄姜嫄於壇下牲用太牢玉用青幣放其玉之色樂舞如圓丘之制郡國祖宗神御郡國廟國朝惟祖宗所嘗幸則有之建炎初金圍西京急留守孫昭逺遣其將王仔奉啓運神御間道走揚州後遷於福州而永安軍會聖宫揚州章武殿之御容則遷於溫州天慶觀紹興十三年復奉溫州神御還臨安於萬夀觀之後殿惟啓運留福州以守臣提舉成都府新繁縣御容殿者始在重光寺藥師院雍熙間僧道輝畫太祖皇帝御容於佛屋之後壁熙寧六年趙清獻為成都守請建殿奉安神宗不許但令設板屋欄楯以扄護之元豐元年走馬承受趙選者更具奏得㫖修建殿宇創置門鑰官設監守朝謁以時紹興元年終南山上清太平宫道士柴全真等復持太宗真宗御容自岐下抵宣撫使張忠獻忠獻即遣使奉安於太宗之側四年宣撫副使吳武安玠更自武興送仁宗英宗神宗御容至殿奉安二十七年楊文安椿為兵部侍郎言於朝有㫖别加營繕始更為殿門外向二十九年乃成時王時享知府事請賜宫額及殿名不報淳熙中胡長文入蜀始議即府之聖夀寺創殿以奉御容殿宇甚華供奉之物亦寖偹乃復乞宫額於朝先是長文創雄邊軍數千人列營府治之側又言石室學聚川峽之士而每遇科舉皆歸試其鄉乞為之别立解額事未行議者因謂今蜀已有大學及殿前司獨缺景靈耳由是格不下令春秋以府通判朝謁用素饌道士讀祝文猶如紹南之禮云昭慈永祐􅑼宫儀國朝自宣祖葬河南之永安其後六聖皆祔紹興元年昭慈聖獻皇后崩於越州遣告權宜擇地􅑼殯候軍事寧息歸葬園陵梓宫取周於身以為他日遷奉之便於是權􅑼於會稽縣之上皇村十二年徽宗梓宫將還宰相秦檜白令侍從臺諫禮官赴尚書省集議靈駕既還當崇奉陵寢或稱􅑼宫禮部員外郎眉山程敏厚希檜意獨上奏言仍􅑼宫之舊稱則莫能示通和之大信而用因山之正典則無以為存本之後圖臣以為宜勿循虛名而當示大信於是議者工部尚書莫將等乃言太史稱嵗不利大葬請用明德而先祫昭慈似有所避也其後髙宗遣誥亦稱􅑼宫迄今遂循故事􅑼宫五使昭慈之喪以同知樞密院事李回為總護使刑部尚書胡直孺為橋道頓遞使神武左軍都統制韓世忠為總管內侍楊公弼為都監調三衙神武輜重越州卒千三百人穿復土不置五使永佑顯仁亦如之髙宗山陵始備五使如典禮昭慈永祐顯仁永思永阜永崇六􅑼宫昭慈􅑼宫方百步下宫深一丈五尺眀器止用鉛錫置都監巡檢各一員衛卒百人生日忌辰旦望節序排辦如天章閣之議以香火院為恭寧寺永祐陵在昭慈􅑼宫西北五十步用地二百二十畝兩􅑼宫嵗用祠祭錢八千四百餘緡修繕錢五千緡顯仁皇后􅑼宫顯肅宫之西十九步二􅑼宫舊未有禁地顯仁既葬始立四隅以二十里為禁域凡民居丘墓皆遷之永思陵亦在會稽紹興末將營永阜陵趙子直以思陵之旁土薄水淺議卜於臨安之中軍寨朱晦翁亦乞於近畿改卜衆議不同復祔於㑹稽之域其後遂續建永崇陵焉山陵非宰相護送永佑之權􅑼也宰相秦㑹之不欲行乃命信安孟王忠厚以樞密使為之及營思陵備置五使遂命右相周益公掩􅑼宫從所請也時左相王季海以老母惡凶事故不欲行然陵成而王卒罷永阜之役既命左相留仲至未葬而仲至逐右相趙子直亦不欲行乃以少傅保寧軍節度使郭師禹為總護使而命參知政事徐處恭持節道梓宫既葬師禹封永寧郡王子直遂得罪慶元末永崇陵將復土右相謝子肅亦不行乃命平原王韓托胄焉山陵非宰相護送者遂為故事成恭成穆慈懿恭淑四􅑼宫初營佑陵顯肅皇后同壙後以顯仁祔之憲節皇后陪葬於佑陵故永思獨以憲聖祔孝宗在藩邸成穆已􅑼於臨安府南山之修吉寺乾道初成恭殁因葬其東慈懿皇后􅑼宫又在成穆之東神穴深九尺紅圍裏方二十有五步用成恭例也恭淑皇后􅑼宫在慈懿之東廣教寺元懿太子􅑼所元懿太子􅑼所在建康府城中鐡塔寺法堂西偏之小室無守者蓋時方巡幸庶事草創故也莊文太子園莊丈太子園在臨安府寶林院法堂內初議以南山淨慈寺為之王日曮時為給事中言其髙明顯敞與安穆安恭事體為不相稱遂改用寶林焉秀安僖王園濮王秀王祠堂秀安僖王園在湖州城外之菁山紹興元年八月詔營廟於園之正北三間二厦神門櫺星門各一座神厨齊館隨地之宜又作祠堂於臨安府櫺星門一座朝門祠堂後堂各三間挾屋兩門歇泊位庫屋巡防從人屋等又共為七十三間廟庫以安神主祠堂以藏神貌用濮園故事也濮王祠堂并神主今寓紹興之報恩寺永佑永獻喪徽宗初葬五國城後七年金人乃以梓宫還行在梓宫將至上服黃袍乘輦詣臨平奉迎登舟易緦服百官皆如之既至行在寓於龍德别宫以故待漏院為之待漏院在行宫南門外之東帝后異殿先是選人楊煒獻書於執政反覆言梓宫可還真僞未辨左宣義郎王之道亦貽書諫官曾統乞奏命大臣取神櫬之最下者斫而視之然後奉安既而禮官請用安陵故事梓宫入境即承之以槨有司預製衮冕翬衣以往至則納槨中不改斂欽宗之喪舉哀於天章閣南以學士院為几筵遙上陵名曰永獻既乾道中朝廷遣使求陵寢地金人許以遷奉且併歸靖康梓宫朝廷難之金人乃以禮陪葬於鞏縣云建炎雜記甲集卷二

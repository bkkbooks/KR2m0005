body:
  text: 建炎雜記乙集卷十八宋李心傳撰邉防丙寅淮漢蜀口用兵事吳曦之變附自隆興甲申朝廷與金人再和逮開禧丙寅凡四十三年矣其年夏五月六日丙戌內批北鄙世讐久稽報復爰遵先志决䇿討除宜頒詔音明示海內先是韓托胄用事又有勸其立蓋世功名以自固者托胄然之嘉泰元年秋八月二日己卯殿前都指揮使吳曦為興州都統制窺陕之意自此起矣三年冬知安豐軍廉仲方言淮北流民有願過淮者帥臣以聞㑹辛殿撰棄疾除紹興府過闕入見言金必亂必亡願付之元老大臣務為倉猝可以應變之計托胄大喜時四年正月也既而盱眙臣施宿正旦副使林伯成皆言地方事甚憂議遣許知院及之守金陵為出師之計不行而罷自是襄帥鄭挺淮漕鄧友龍皆進用兵之䇿執政張伯子費戒甫心知其難而未敢顯諫皆出之潼守楊嗣勛湖廣總領傅景初移言其不可相繼抵罪至開禧改元䇿士有論云宜乘機以定中原者托胄大喜用兵之意遂决金人頗伺知之五月遣其平章事布薩揆為宣撫使駐開封是月二十七日甲申鎮江都統戚拱遣忠義人朱裕結連本縣弓手李全焚漣水縣李全即李鐵搶六月五日辛卯詔內外諸軍密為行軍之計十四日庚子程資政松為四川制置使李伯珍諫議以謂止開邉乃同日補外七月二十六日壬辰宰執陳自强等四人援國朝故事乞命托胄兼領平章事臺諫鄧友龍等繼亦請七月四日己未自强等再奏五日庚申托胄除平章軍國事十月己丑樞密承㫖蘇師旦除安逺軍莭度使在京宫觀是月李季章為生辰使乞斬朱裕梟首境上從之八月十九日甲辰趙從善罷户部尚書以其有異論也二十日乙巳殿前副都指揮使郭倪為鎮江都統制李季章使還言兵不可輕動不聽明年正月二十一日癸卯先命户部侍郎薛叔似為京西湖北宣諭使於是左司諌楊枝大理少卿陳景俊太學博士錢廷玉上恢擴大計三月十三日癸巳遂命程松為四川宣撫使吳曦副之十三日甲午鄧給事友龍為兩淮宣諭使二十四日乙巳錢怡同罷參知政事行諫疏也後二日又降兩官送信州居住二十六日丁未松始受命二十七日戊申曦受命㑹徐文子自處州召歸入見言莫若因建儲而弭兵二十八日己酉降其二官用殿中侍御史徐柟章疏也四月十三日甲子兩宣諭並升宣撫使十七日戊辰吳曦兼陕西河東路招撫使十九日庚午特追秦檜王爵仍改諡以李季章有請也詔郭倪兼山東京東招撫使荆鄂都統制趙淳兼京西招撫使副都統皇甫斌副之是日程松發成都二十六日丁丑吳曦遣其客姚淮原詣金廷獻關外四州之地求封為蜀王是日鎮江武鋒軍統制陳孝廣復泗州江州左軍統制許進復新息縣二十七日戊寅光州忠義人孫成復褒信縣二十八日己卯泗州總領所以進義副尉楊巨源監興州合人倉五月辛巳朔陳孝廣復虹縣托胄聞已得泗州乃議降詔七日丁亥詔下十二日壬辰楊嗣勛移知成都府十四日癸巳程松至漢中是日皇甫斌大敗于唐州興元都統秦世輔出師至城固軍亂池州副都統郭偉主管馬軍行司公事李汝翼亦敗于宿州城下二十四日癸卯倬等還至蘄縣敵追而倬等執其馬司後軍統制田俊邁以遺敵人乃得免二十九日甲戌安子文以陕西河東招撫司隨軍轉運置司河池六月四日甲寅鄧友龍罷丘宗卿代為宣撫使七日丁巳官軍復褒信縣十八日丁卯曲赦海州是日建康副都統田林復夀春府二十八日戊寅蘇師旦在外宫觀以托胄奏劾也尋責栁州移韶州先是馬司及建康池州諸軍渡淮者七萬至是招收僅得四萬丘宗卿親往揚州部分諸將悉二衛江上軍民之兵合四十六萬一千一百三十一人分守沿淮要害是日金州副都總彭輅進屯上津金人封吳曦蜀王賜金印七月二日辛巳梁祥義士統制毌丘思襲取和尚原權都統制范仲壬出師寶雞小犍二十四日癸卯李季章參知政事八月二十四日丁卯斬郭倬于京口諸將李汝翼王大節李爽皆流嶺南楊嗣勛遺托胄書言蜀兵驕糧乏國計已匱暫休息以歸再為後圖未謂失計九月四日壬子金復和尚原十月草九日丙子金自清河口渡淮守將郭超失利金圍楚州十一月四日辛巳金犯棗陽有北來韓元靚者至真州微露和意自言安陽人魏公五世孫也丘宗卿遣人護送北還令問端的七日甲申宗卿簽書樞密院事督視江淮軍馬是日金犯神馬坡荆鄂副都統友諒突圍趨襄陽八日乙酉趙淳焚城九日丙戌忠勇軍統制吕渭孫欲圖統制友諒格殺之十一日戊子以金人渡淮奏告天地宗廟社稷是日金犯瀘州副都統制田琳拒之十八日乙未陳益之除荆湖宣撫副使自湖廣總領除金遊騎渡漢十九日丙申托胄獻家財二十萬以贍軍優詔褒納是日瀘州受圍丘宗卿所遣送韓元靚之人還得幅紙乃行省文字宗卿聞于朝二十日丁酉金犯舊岷州踏白軍統制王喜引兵遁二十一日戊戌金圍和州守將周虎拒之信陽軍失守二十四日辛酉襄陽圍合趙淳憂悸成疾將士奉之以守蜀漢路斷金圍皂郊不下移屯天水縣二十五日壬寅金犯隨州守臣遁去州人具香花迎拜金斂兵不殺遂至德安二十七日甲辰金犯真州士民奔逐渡江者十餘萬守臣文挺臣亟具舟以濟又給廪食之於是濠梁安豐及並邉諸戍皆沒于金矣二十八日乙巳金陷西州十二月二日戊申金兵二萬人犯德安府守將季師拒之是日金兵二萬攻襄陽東南西門不克四日庚戌金陷成州守臣辛槱之遁去是晚吳曦焚河池縣退歸青野原七日癸丑曦自殺金平退歸魚關是日和州圍解八日甲寅金攻六合縣郭倪遣前軍統制郭僎救之遇于湑浦橋官軍大敗倪棄揚州走瓜州先是督府募得盱眙小吏王文持書往金帳大略謂用兵乃蘇師旦鄧友龍皇甫斌等所為非朝廷意文等還金答書悖慢多所要索且謂托胄無意于用兵則師旦等豈敢擅專又言奉命往討不敢自專進止豈敢冒罪申奏督府再遺書許以刷還淮元流移人及今年嵗幣金有許意朝廷乃以報書授督府督府遣正從郎招撫司幹辦公事陳璧假工部員外郎與國信所掌儀葛宗裔充小使持第三書以往㑹六合交兵郭僎喪敗而第三書適亦犯金之廟諱金遂以用兵詰責小使却其書而還十一日丁巳金陷大散關都統制毌丘思不知所在十二日戊午思單騎至興元程松絀之以總管孫忠鋭權總制十七日癸亥夜魏友諒之軍又潰於花泉友諒走江陵二十日丙寅金遣吳端持詔印授吳曦于宜口二十一日丁卯金犯七方關興州中軍正將李好義拒之二十二日戊辰曦自宜口歸興州是日以後淮南金騎漸退濠州尚為金據使一統軍守之二十三日己巳郭宜罷招撫使以丘宗卿奏劾也二十四日庚午薛象先陳益之罷宣撫副使吳德夫為京湖撫使仍至江陵府二十六日壬申興州天赤如血照地如晝自月初起有兩耳相摩於初晴之時至是復有此異二十七日癸酉曦始稱蜀王二十八日甲戌鎮江副都統畢再遇升都統制權招撫司公事二十九日乙亥程松自米倉山路出閬州順流以歸三年正月丁丑朔丘宗卿罷初小使既却還宗卿復乞朝廷移書敵帳以續前議又謂金指太師平章為元謀若移書乞暫免繫銜托胄大怒故宗卿遽罷宗卿道遇所遣使臣皇甫恭自汴京回言行省完顔弼右副元帥赫舍哩志寧皆有和意三日己卯吳曦下黃榜於四路僞四川都轉運使徐景望入利州為總領官劉智夫所逐已己卯張知院嚴督視江淮軍馬開府揚州六日辛巳吳曦遣催鋒軍統制祿禧以兵一千五百戍萬州八日癸未金入階州十五日辛卯權大安軍馬震仲革父不受僞命飲藥死十八日甲午曦僣位於興州以安子文為丞相長史權行都省事子文稱疾不出曦又下黃榜於四路二十二日戊戌利州轉運判官陳逢孺不受僞命削髮於利州之石𨫼二十四日庚子彭輅以帳下百餘人奔襄陽二十五日辛丑李好義與其徒謀舉義二十七日癸卯嚴進引兵入城都二月二日戊申楊嗣勛下令稱提錢引大書開禧之號以揭之墨榜凡數千計十一日丁巳祿祁自重慶引兵入䕫州祁即禧也避曦嫌名改之十三日己未曦反書內聞程松罷蠟書拜嗣勛為制置使托胄與曦書許以茅土之封書與御札同發十六日壬戌楊巨源至興州見安子文謀舉義子文喜十七日癸亥始出視事十八日甲子曦之客鄱陽董鎮以僞命至成都二十四日庚子襄陽圍解二十五日辛未鳳州進士楊君玉引楊巨源以見李好義二十六日壬申巨源介好義以謁子文議遂定君玊退與其鄉人白子申共草密詔而子文于二十九日乙亥未明好義以所結官軍殺曦於僞宫軍士李貴斬曦首巨源尋以義士至君玉宣密詔子文權宣撫使巨源為𠫭贊軍事三月二日丁丑托胄手書興州是日斬景望四日己卯利州帥臣劉師文帛書至行在復賜帛書令從長處置六日辛巳董鎮至廣都為費戒甫所殺新知潼川未上十一月丙戌賜安子文帛書諭以能殺曦報國當不次推賞雖二府之崇亦所不吝十二日丁亥新潼川府觀察推官趙彥呐斬祿禧於䕫州十四日己丑瀘帥李君亮所遣間使至行在就賜費戒甫帛書令協心經理十七日壬辰興州踏白軍統領劉昌國引所部至階州敵引去十八日癸巳興州中軍統制李好義復西和州二十一日丙申命吳德夫兼總西事二十二日丁酉敵去成州二十四日己亥興州都統制王喜至河池而敵已遁二十五日庚子露布至行在朝廷大喜即日拜安子文端明殿學士知興州兼四州宣撫副使而楊嗣勛為四川宣撫制置使兼知成都府許成子為四川宣諭使以起居舍人充程松落大學士降六官筠州居住是日忠義統領張翼復鳳州二十六日辛丑曲赦四川二十七日壬寅程松再責順昌軍節度副使澧州安置三十日乙巳改命吳德夫兼四川宣諭使是日忠義人劉信復黃牛堡四月八日癸丑忠義人復大散關十五日庚申宇文挺權京湖宣撫司自兵部尚書除二十二日丁卯吳曦首函至行在詔付都堂審撿詔楊嗣勛赴闕吳德夫代為制置使二十三日戊辰獻曦首於廟社梟二日錢伯同復除𠫭知政事二十八日癸酉金復取大散關五月八日癸未楊巨源殺孫忠鋭於鳳州十六日辛卯巨源與敵戰于長橋敗績二十三戊戌楊嗣勛依舊四川置制使吳德夫撫諭犒勞畢赴行在二十六日辛丑興州副都統制李好義襲秦州不克敗歸六月十五日己未好義遇毒死十九日癸亥太府寺丞林拱辰為金國通謝使以書通問時方信孺自軍前歸言金有和意也二十八日壬申安子文執楊巨源以屬吏二十九日癸酉夜將官樊世顯殺巨源於大安之舟中七月二日己亥通謝使發行在八月十九日壬戌密劄除劉師文四川宣撫使隨所在置制司事訖奏九月四日丁丑詔以和議未可就令諸大帥申警邉備時方信孺自州歸言金人欲責正隆以前禮賂且以侵疆為界又索犒軍銀數十萬又欲縛送首議用兵賊臣信孺至都堂不敢遽白托胄欲窮其說乃微及之托胄大怒復有用兵意六日己卯辛幼安除樞密都承㫖疾速赴行在㑹幼安疾卒乃已八日辛巳詔督視張知院日下前來奏事如久則無功也九日壬午信孺坐以私覿物作大臣送遺有失事體追奪三官臨江軍居住十三日丙戌詔通問使還行在命淮西漕臣張頴措置雄淮軍十八日辛卯新除殿前副都指揮使趙淳為淮制置使二十一日甲午張知院罷二十八日辛丑監登聞鼓院王柟持書赴金國都副元帥府柟倫孫自主管臨安府城南左廂公事差十月七日己未詔諭軍民以和議未成金多要索之故詔詞略曰苐惟敵人隂誘賊曦計其納叛之日乃在交鋒之前是則造端豈專在我又曰事雖過舉蓋係於綱常理貴反求况形於悔艾反我和戰視敵從違自用兵以來蜀口淮漢之民死于兵火者不可勝數公私之力為之大屈而托胄歸罪金人加兵之意未巳國人憂之遂有去凶之議焉去凶和敵事體尤大語在朝事中可互考建炎雜記乙集卷十八

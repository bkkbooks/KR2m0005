body:
  text: 建炎雜記乙集卷四宋李心傳撰典禮紹興至慶元臣寮論太祖東嚮之位四祖廟祔國初倣前代之制立親廟四及仁宗附廟太廟始備七世八室蓋祖宗共為一世故也治平末英宗附廟乃祧禧宗熙寧初王介甫用章子平議復禧祖為太廟始祖而祧順祖司馬公韓持國諸近臣皆言太祖創業當為廟之始祖介甫為上言本朝自禧祖以上世次不可得而知則禧祖之有廟與稷契宜無以異持國欲奉祧主於西夾室介甫笑之伊川先生時方布衣為人言亦以介甫之學為是及神宗祔廟又祧翼祖元符末哲宗祔廟輔臣李邦直議兄弟曰及哲宗不自為世故無所祧崇寧初蔡京入相復以哲宗為世當祧宣祖而宣祖乃祖宗之所自出京意難之因議依唐制立九廟還翼祖於是凡九世十室紹興初董令芬為太常少卿建議太廟世數已偹而藝祖猶居第四室乞遵典禮正廟制遇祫享則太祖居東嚮之位有㫖侍從臺諫與禮官同議既而學官王普又請依唐興聖故事藏祧主于天興殿趙忠簡主之六年正月議于尚書省侍從孫近李光析彥貞劉大中廖剛晏敦復王侯劉寧止胡交修梁汝嘉張致遠朱震任申先禮官何慤楊晨莊必强李弼直皆以為是未幾將作監丞趙渙面對又乞酌量漢太公立廟故事别建一廟安奉四祖禘祫蒸嘗並行特祀上大以為然擢渙監察御史弅中書舍人閠五月除渙七月除弅而右諫議大夫趙霈公時素與忠簡異論乃言上皇在遠宗廟之事未當專議事遂止淳熙初渙之兄子粹中為吏部侍郎又伸前議請為四祖别建一廟否則藏主于天興殿或藏於夾室遇祫享則設幄于夾室之前乃命禮官討論久之未上元年六月丙辰日其後尤延之丘宗卿等又繼言之先是欽宗祔廟已祧翼祖及高宗升祔遂為九世十二室紹興末孝宗升祔趙子直當國用前議欲併祧僖宣二祖事下侍從臺諫禮官議於是孫從之首上疏正太祖東向之位議者皆以為可鄭惠叔尤主之朱文公在講席獨見上論僖祖皇家始祖不當毁其廟上納焉文公議當以僖祖為始祖如周之后稷太祖如周之文王太宗如周之武王與仁宗之廟皆萬世不祧仁宗為昭英宗為穆與真宗主並藏西夾室神宗為昭哲宗為穆徽宗為昭欽宗為穆高宗為昭孝宗為穆而高宗之廟亦萬世不祧若未能然則奉僖祖居第一室太祖居第二室太宗居第三室太祖太宗仍共為一世自真宗以下至于孝宗凡九世十二室于是給舍樓大防陳君舉言未見朱某本議如何乞付出議狀子直不報遂祧二祖神主更立四祖殿于廟之西隅歲命禮官薦獻焉文公時已得罪遺子直書曰相公以宗支入輔王室而無故輕納鄙人之妄議毁拆祖宗之廟以快其私其不祥亦甚欲以望神靈降歆垂休錫美以永國祚於無窮其可得乎時太廟殿已為十二室故孝宗既升祔而東室尚虛文公以為非所以祝延壽康寧之意深不然之因自劾不堪言語侍從之選乞追奪待制章再上詔次對之職除授已久興廟議時初不相關又不許久後光宗祔廟遂復為九世十二室云太廟㸃寶事始自休兵後太廟創冊寶殿凡帝后寶冊洎郊廟金玉禮器皆藏焉始時令太常寺官一員季㸃然苐省閲文厯而已乾道五年春因有盜竊禮器者中書門下始奏令每季取索赤歷㸃檢足偹用印封鎖具有無損失申省二月己丑降㫖慶元五年夏太常寺奏太廟遺失皇后金寶二命大理寺治之六月庚寅降㫖既而廟之衛卒赴有司自言坐獄死蓋故事冊寶以中人領其工作及盜去鑿而售之中乃鐡胎也繇是事敗自後朝廷益謹其事月以察官禮官中官各一官檢視謂之㸃寶禮器中瑶爵玉瓚二事絶佳人間所未見其他圭璧大抵多水漿色也冊寶中惟昭慈聖憲皇后諡冊以象牙為之餘皆䂥玉又有徽宗皇帝諡寶玉色尤溫粹欽廟配饗議欽宗祔廟久未有功臣配饗蓋一時宰相六七人皆有誤國之罪是以不克舉行也乾道五年冬當祫祭其九月太常少卿林粟黃中言當時臣僚遭值艱難莫救淪胥罕可稱述而以身狥國名節暴著不無其人雖生前官品不應配饗之科而事變非常難拘定制乞詔侍從臺諫集議奏可黃中所陳蓋指李清卿若水也汪聖錫時為吏部尚書居侍從之首獨以為無可配饗者可罷集議右侍郎曽逮仲躬謂聖錫云向元祐中神宗未有配饗朝廷依例權塑二侍臣此可用也於是聖錫奏欽宗所圖共政之臣皆未有能勝其任者若應故事姑令偹數上非所以尊宗廟下非所以勸有功誠如太常所言當時死事之臣非一今欲令配享究其本末參差輕重有所取舍尤不可以輕易重昔唐文宗武宗皆無配享功臣本廟太祖英宗既無御集亦不建閣蓋崇奉祖宗必審其實必當於理若虛尚文飾不過茍塞人情而已乞不必集議上從之高廟配享議洪景盧初建髙廟配享之議首採本朝故事謂議者當出於翰苑上亦嘗諭以文武欲各用兩人景盧因即以吕趙韓張四人為請乞付侍從官詳議從之十五年三月庚戌也後三日從官議上時韓子文彥質權工部尚書以嫌不預議而兵部尚書宇文子英為議首遂言四人皆有名績見稱於世宜如明詔配享廟廷議者葛楚輔葉叔羽劉國瑞忘其字王誠之陳安行李獻之謝昌國吳子居章德荗林黃中鄭惠叔皆無議奏上報可其日癸丑也是時識者多謂吕元直不壓人望當以張趙兩公同配又謂張浚晚附秦檜力主和議誣殺嶽飛不宜在預享之列而詔㫖已下莫敢有言後三日丙辰祕書少監楊廷秀獨上書爭其事謂今者建議之臣曰欺曰專曰私而已且列聖之廟有九而廟之有配享者八發配享之議者非一而出於翰苑者止於三今舉其三以見例而不顧其餘之不然非欺乎申之以聖翰之所及惟一已足以定其議非專乎終之以止令侍從數人之附其議而廷臣皆不得議非私乎又論張公有社稷大功者五建復辟之勳一也發儲嗣之議二也誅范瓊以立國基三也用吳玠以保全蜀四也却劉麟以定江左五也若謂浚嘗相隆興則趙普嘗相太宗韓琦曽公亮嘗相神宗不害于配太祖英宗之廟也願酌李唐之制令博士禮官與臺諫兩省侍從及在朝之臣雜議其事而陛下酌其中後二日戊午輔臣進呈次上諭以臣僚言張浚有復辟之功卿等可檢照文冊詢訪事實上因言魏公兩敗事又昧於知人却是有志蓋上意猶有以庭秀之言為未可也而王周二相略無開陳但唯唯而已後十八日四月甲寅太常少卿尤袤等亦言適祖宗典故既祔廟然後議配享趙普曹彬之配食太祖乃定議於二十餘年之後惟王曽吕夷簡之配食於仁宗乃在山林之前然亦必先降詔乃下兩制定議當用何人而王圭等始以曽夷簡姓名上之真不敢倉卒如此今乃忽定於靈引一日之前而不按典故不集衆論懼無以壓服諸勳臣子孫之心而消弭衆多之口乞俟祔廟畢别擇日下侍從兩省臺諫禮官及祕書省官集議茍惟不然則王安石蔡確之言不合衆心雖定於紹聖崇寧而卒改政于紹興間今亦宜反覆熟審以待論定而後奏入乃詔令未集議侍從兩省臺諌官及太常寺祕書省依典禮詳議開奏四月甲申也未集議侍從係吏部侍郎顔曽兩省係起居郎胡晋臣并奉使朱同臺諫係殿中侍御史冷光世左補闕薛叔似右拾遺許及之監察御史吳博黃謙太常寺少卿尤袤寺丞黃甫博士張休仁主簿沈鑑祕書省少監楊萬里丞謝修郎鄧驛著作郎倪思黃唐佐郎莫叔光正字衛涇凡十八人後六日庚寅有㫖定用四人更不須議論以臺諫言配享之議已有一定之諭見施行今再令詳議則二三之論又將紛紛而起甲可乙否重惑朝聽故也此乃冷光世之文字翌日辛卯上諭大臣曰吕頤浩等四人配享正合公論楊萬里乃謂洪邁專與私事邁雖是輕率萬里未免浮薄上又曰靖共爾位好是正直惟其先能靖共而後正直乃可貴耳於是二人皆乞補外後十一日詔景盧以見官正奉大夫知鎮江府庭秀以朝奉大夫知筠州五月壬寅也其後孝宗祔廟議者復推陳魯公而魏公終不得預蓋但以富平淮西符離三敗之故而不考曹彬岐溝之役其喪師蹙國亦不下於富平與符離今以一眚掩其大德蓋景盧兄弟皆湯思退舊客夙有憾於魏公故以復辟之勳歸之吕元直也昔司馬溫公配食泰陵乃在四朝之後蓋公議必以久而後定也今姑思其志而言其本末如此後有諏者可以覽觀焉光宗配享議光宗既祔廟當議配享而一朝三相中周益公留衛公在其時皆嘗以學黨得罪故論者欲葛文定公邲及黨禁解嘉定元年五月益公之子朝請大夫新知筠州綸乞以其父配享廟廷詔兩制禮官詳議明年衛公之孫祕閣校理元剛復言其祖首侍崇陵講讀後在相位始終六年而益公之相才三閲月葛文定之相亦不踰年當以其祖配時章茂獻權禮部尚書乃乞並用二公配享後亦不果行焉蓋益公雖賢相而被罪于授受之初衛公雖舊臣而去國于危難之際是以論者有所不叶也然前朝如富公司馬公皆嘗被罪于熙寧紹聖之間而不害其配享則亦未可以此而致疑云日食奏告當伐鼓淳熙丙申嵗日食三月朔趙衛公為禮部尚書被㫖奏告大社周益公以學士院祝文有伐鼓用牲之語衛公引春秋傳言其誤乞令改正上從之益公因求免不許蓋衛公奏章之詞頗峻故也豫以經考之救日之鼓周禮初不云何日而夏書明以季秋月朔為言則春秋傳所云非矣今有司之制實不伐鼓實不用牲衛公乞改從祝祠可也而反以春秋傳為據則非也明年九月朔日蝕文簡以春官二卿奉㫖祭告大社始奏復伐鼓如政和新儀云元豐至嘉定宣聖配享議自唐以前學校以周公為先聖孔子為先師後以孔子為先聖顔子為先師至元豐間乃封孟子為鄒國公與顔子並配而荀楊韓子列于從祀足以補前世之未及矣蔡京得政乃封王介甫為舒王與顔孟並而王雱在楊韓之次其後陳瑩中諸公但改荆公坐像為僭而不知三代之禮大享先王功臣皆與享焉則尸象必不立受今不論其學術之乖戾而苐以坐視人主之為逆理此學術不醇之過也靖康間楊文靖公為諌議大夫首論荆公不當配享降于從祀紹興六年冬張魏公獨相始用陳公輔言禁臨川學明年春胡文定公以祠官上疏追爵二程邵張四賢列於從祀不報乾道五年春魏元履以布衣為太學録復請去荆公父子而以二程從祀陳正獻公為相難之淳熙三年冬趙叔逹粹中為吏部侍郎論王安石姦邪乞削去從祀上用輔臣言安石前後毁譽不同其文章亦何可掩時李仁父為禮部侍郎上與共議欲升范仲淹歐陽修司馬光蘇軾黜王雱仁父乞取光軾而併去安石父子上又欲升光軾於堂仁父上章稱贊且言若親酌獻則暫遷其坐於他所疏入上命三省密院議之密院王季海依違其詞趙溫叔言仲淹自以功業名當時修亦有微玷不若止用光軾而三省龔實之李秀叔皆以為不可事遂不行久之但除臨川伯雱畫像而已四年七月癸丑降㫖嘉定三年仲貫甫為著作佐郎轉對請追爵用二程張邵列於從祀未克行余謂四先生繼絶學于千載之後正人心明天理自游夏諸賢有不能及其視馬鄭諸儒之功孰多雖以配享可也然論道統之傳則當升曽子子思于堂上而姑列四先生及朱先生于從祀余亦老矣自念不及與朝廷之議㑹或有逹者舉而行之云孟子廟配享從祀自元豐以來封為鄒國公配食先聖而鄒國公廟在兖州之鄒縣政和五年春乃詔樂正子克配享公孫丑以下從祀加封爵焉樂正子克利國侯公孫丑壽光伯告子不害東阿伯孟仲子新秦伯陳臻蓬萊伯充虞昌樂伯屋廬連奉符伯徐辟仙源伯陳代沂水伯彭更雷澤伯公都子平隂伯咸丘䝉須城伯高子泗水伯桃應膠水伯盆成括萊陽伯季孫豐陽伯子叔子陽伯自渡江以後鄒魯隔絶而孟子無廟其配食從祀學者多不及知故表出之高宗四上尊號廷臣議論各有異同壽皇初受禪命近臣集議上皇尊號之禮吕仁甫為禮部侍郎既與宰相陳長卿密定光堯壽聖之號矣及省中聚議者多謂尊號起於開元罷於元豐今不當復或謂光堯二字近於神堯汪聖錫時為户部侍郎謂人曰堯豈可光於是臺諫張貞父給舍金彥行下十二人各具所見以聞而不書議狀上諭既以奏聞不容但已後五日彥行以下遂悉書議狀聖錫尋出知福州周子充時為監察御史嘗自為議狀謂宜以太上德壽皇帝為稱然亦不果奏也乾道庚寅冬上以大禮慶成詔禮官兩省臺諫官集尚書省議加太上尊號時右相虞并父已自書憲天體道四字於幅紙議者書名而已禮官黃仲秉劉文贊欲用憲德惟仁劉文儒欲用明天建極鄭仲一欲用崇道偹德皆不用或謂體道字乃上帝尊號并父云無妨已奏知矣太上欲得道字淳熙乙未秋詔以來春行慶壽禮乃議加性仁立德至誠無為八字而禮部侍郎趙溫叔謂無為二字與太上字相連頗涉忌語請改為明文煥武後又改作無為至誠又改作成武煥文議論凡再旬乃定用性仁立德無為全美八字龔實之參政以下尚不以為然葉夢錫丞相主之衆莫能奪後兩月夢錫罷實之召學士王季海直院周子充共議遂定為性仁誠德經武緯文乙巳再將行慶壽禮季海為相擬議久之苐得紹業興統四字時眉人朱師古時敏為太常少卿季海與之厚師古將入省其子不弃謂之曰光武明明廟謨可用也師古以白季海因再推詳於是增明謨盛烈四字焉朱文公論三年喪髙宗之喪孝宗為三年服及孝宗之喪有司請於易月之外用漆沙淺黃之制蓋循紹興以前之舊故事朱文公後入不以為然奏言今已往之失不及追改惟有將來啓􅓖發引禮當復用初喪之服則其變除之節尚有可議望明詔禮官稽考禮律豫行指定其官吏軍民方喪之服亦宜稍為之制勿使肆為華靡其後詔中外百官皆以凉衫視事蓋用此也方文公上議時門人有疑之者文公未有以折之後讀禮記正議喪服小記為祖後條見其所引鄭志有諸侯父有廢疾不仁國政不任喪事之問而鄭答以天子諸侯之服皆斬之文乃知經文有所未偹而待於傳注者如此因自識於本議北使宴見齊禁不用樂故事北使來朝例錫花宴如在大祀齊禁之中則不用樂辭見亦然行之久矣乾道三年北使來賀㑹慶節上壽在親郊散齊之內陳正獻公時以副樞密兼參政預請令館伴以禮諭之而議者慮其生事多請權用樂者李文簡為禮部郎官建言漢唐祀天地散齊四日致齊三日我藝祖初郊亦然自崇寧大觀間法周禮分祭天地故前十日受誓戒今既合祭宜復漢唐及本朝舊制庶幾兩得上頗難之陳公又奏必不得已則上壽之日設樂而宣㫖罷之及宴使客然後復用庶幾事天之誠得以自盡而所以禮使人者亦不為薄自當悅服也上可其奏且曰宴殿雖進御酒亦毋用樂惟于使人乃用之耳諸公顧以為紫宸上壽乃使客之禮固執前議陳公又不可獨奏言曰適奉詔㫖有以見聖學高明過古帝王遠甚敢不奉詔然竊謂更當先令館伴以初議諭使人再三不從乃從今詔則于禮為盡而彼亦無詞不遽鄙使人而遂自為失禮以狥之也蔣子禮猶守前說陳公爭愈力上顧陳公曰可即諭閣門行之陳公退復為奏曰彼初未嘗必欲用樂我乃望風希意而自欲用之彼必笑我以敵國之臣而虧事天之禮他時輕侮何所不至此尤不可不留聖慮上嘉納之既而卒詔垂拱殿上壽止樂因為北使權用六年生辰使當辭之復在親郊散齊之內趙溫叔丞相時以起居舍人為館伴使面奏决不可用樂上然之十月癸酉北使辭先一日上遣中使諭溫叔云來日已决意不用樂萬一使人不順不知如何結末請舍人更加思慮來日五更溫叔復奏殿階之上匆匆行酒使人决不能省㑹萬一省㑹必不敢不順萬一不順臣忝偹員館伴當直前奏禀乞宣諭使人陛下寅畏上天今既散齊决不用樂若使人必欲設樂乞移此茶酒就驛中館領所謂結末不過如此上納用焉或謂前郊值北使之來極恭順上喜思以異禮待之故葉魏二相皆主用樂之議鄭景望劉文潜時為館職嘗移書政府論之而不聽也至是用趙公之議始去樂論者韙之乾道淳熙五大閲孝宗留意武事隆興甲申仲夏三衙出戍大軍歸司上欲幸候潮門外大教場勞之既卜吉日辛丑㑹雨作而止乾道丙戌冬至甲子遂閲武于白石距城二十里前三日下令至日平旦自祥曦殿戎服乘馬太子親王執政以下並從至大教場進膳畢上獨與太子親王管軍知閣門御帶環衛官俱往白石上升將臺三司以次教閲陳隊射馬觀戰次射獐鹿等于臺下上親臨觀大悅賜殿帥王琪以下金銀碗有差三司主司至統領官各十兩金碗一射生將佐使臣等各七兩銀碗有差上還幄殿管軍進御酒上亦賜親王知閣管軍酒憩息大教場進晚膳畢還內是日賜諸將金𢃄鞍馬以及士卒賞賜有差戊子孟冬冬至甲辰上乃幸茅灘按閲諸軍先十餘日令殿前司相視浙江龍王堂北江岸以東平衍之地築將臺焉先一日諸軍人馬全裝執兵器于教場中東列幕宿營又命忠毅軍統制蕭鷓巴將二百騎射獐鹿于赭山以俟進獻至日諸軍先赴茅灘下方營前司摘諸軍馬步親隨一千人執戎器環立將臺之後質明三衙管軍至將佐各介胄乘馬導駕上戎服乘馬宰執近臣戎服以從護衛聖駕馬軍八百騎執槍旗弓矢軍器分前後奏隨軍番鼓笛大樂至大教場上與慶王恭王皆易金裝甲乘馬宰執使相正任管軍知閣御帶環衛官戎服以從侍從官免從駕上升臺少憩出幄殿坐殿帥王逵舉黃旗諸軍呼拜者三中軍鳴角馬步軍簇隊連三鼓馬軍上馬步軍舉旗槍四鼓舉白旗中軍鼓聲旗應變為方陳作偹敵之形别高一鼓步軍四向作禦敵之勢且戰且前馬軍出陳作戰鬬之勢别高一鼓各歸地分五鼓舉黃旗變圓陳為自環內固之形二鼓舉赤旗變鋭陳諸軍魚貫斜立前列後張為衝敵之形二陳進止皆如方陳舉青旗變直陳收鼓訖一金止重鼓三馬軍下馬步軍植旗槍上大悅犒賞倍之鳴角聲簇隊放教諸軍呈大刀車炮煙槍騎射管軍以所獲獐鹿獻上更常服宰執對御酒五行降臺乘馬至車子院門下馬登樓召親王使相至環衛官各賜酒立飲不坐二王進上酒環衛官及一應從駕官至大教場並戎服乘馬扈駕還內庚寅季冬之戊申上復幸白石始議三司諸軍隨從者萬二千四百人分二百四十八小隊殿前司之旗司以黃馬司以緋步司以白既而恐道隘止以馬步五百騎列于省北步軍千人伺于大教場餘干九百騎駐于中道以俟扈衛上入御幄命軍士皆卓歇散飰既閲武乃召宰執親王使相太尉管軍升幄殿酒三行畢復召親王使相太尉管軍知閣御帶環衛官於御座東席地散酒次登車子院樓宰執亦預此其所以異也淳熙丁酉季冬之乙亥復大閲殿步二司之軍于茅灘殿帥王友直舉黃旗諸軍呼拜奏發嚴舉白旗變方陳舉黃旗變圓陳舉皂旗變曲陳舉青旗變直陳舉緋旗變鋭陳五陳皆畢始令軍士下營散飯宣皇太子執政使相管軍對御宴飲侍從修注官于御臺下幕次賜酒食還入候潮門上皇于都亭驛設簾幄以觀邀上入幄中傳令宣喚管軍于簾前賜酒果飲各一巵謝畢導駕還內乙巳仲冬之甲辰上復講故事大閲于龍山之教場管軍舉青旗變三直陳鼓音作分六行舉白旗聚為四陳舉緋旗為二陳皂旗為一陳繼又散為六行高一鼓變品字作二陳自戊子一日後凡犒士之費皆出于左藏南庫户部不與最後南庫已歸户部宰相王季海猶以故例請上曰處分已定矣何必别項支用止令內藏庫支用可也朕之樁積此錢者初時亦無他用今日軍士犒賜凡用五見鏹三十六萬緡都城㑹子錢為之增貴焉大樂局樂色名件太常寺大樂局祀天神祭地祗享宗廟應用大樂名件凡三十四種歌色一也笛色二也塤色三也篪色四也笙色五也簫色六也編鐘七也編磬八也鎛鐘九也特磬十也琴色十一也瑟色十二也柷敔十三也搏拊十四也晋鼓十五也建鼓十六也鞞應鼓十七也雷鼓祀天神用十八也雷鼗鼓同上十九也靈鼓祭地祗用二十也靈鼗鼓同上二十一也露鼓享宗廟用二十二也露鼗鼓同上二十三也雅鼓二十四也相鼓二十五也單鼗鼓二十六也旌纛二十七也金鉦二十八也金錞二十九也單鐸三十也雙鐸三十一也鐃鐸三十二也奏座三十三也麾幡三十四也此外又有景鋰者天子親祀上帝則用之非祭祀官所當用乾道不置教坊孝宗性恭儉即位之初以欽宗梓宫未還不肯用樂及乾道元年㑹慶節北使初來當大宴始下臨安府募市人為之不直教坊止令修內司先兩旬教習舊例用樂人三百人百戲軍百人百禽鳴二人小兒隊七十一人女童隊百三十七人築毬軍三十二人起立毬門行人三十二人旗鼓四十人以上並臨安府差相撲等子二十一人御前忠佐司差上命罷小兒及女童隊餘用之九月二十七日㫖也建炎雜記乙集卷四

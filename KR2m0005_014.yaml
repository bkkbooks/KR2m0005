body:
  text: 建炎雜記甲集卷十四宋李心傳撰財賦一國初至紹熙天下歲收數國朝混一之初天下歲入緡錢千六百餘萬太宗皇帝以為極盛兩倍唐室矣天禧之末所入又增至二千六百五十餘萬緡嘉祐間又增至三千六百八十餘萬緡其外月增歲廣至熙豐間合苖役易稅等錢所入乃至六千餘萬元祐之初除其苛急歲入尚四千八百餘萬渡江之初東南歲入不滿千萬淳熙末遂增六千五百三十餘萬令東南歲入之數獨上供錢二百萬緡此祖宗之正賦也其六百六十餘萬緡號經制蓋呂元誼在戶部時復之七百八十餘萬緡號總制蓋孟富文秉政創之四百餘萬緡號月樁錢蓋朱藏一當國時取之自經制以下錢皆增賦合茶鹽酒算坑冶𣙜貨糴本和買之入又四千四百九十餘萬緡宜民力之困矣景祐慶厯紹興淳熙鹽酒稅絹數景祐中天下歲收商稅錢四百五十餘萬緡酒課四百二十八萬餘緡鹽課三百五十五萬餘緡和買絹二百萬匹慶厯中商稅錢一千九百七十五萬餘緡酒課一千七百一十餘萬緡鹽課七百一十五萬餘緡和買絹三百萬匹紹興末東南及四川酒課一千四百餘萬緡鹽課二千一百餘萬緡折帛絹三百餘萬匹淳熙中臨安府城內外及諸縣一年共收稅錢一百二萬緡已當景祐四分之一兩浙歲入數祖宗盛時兩浙歲入錢三百三十餘萬緡而鹽酒茶稅十居其八郡國支計皆在其間時以為承錢氏橫斂之政故賦入視他路已厚淳熙末兩浙歲輸左內藏庫錢至千二百萬緡浙東四百二十八萬浙西七百五十餘萬而茶鹽之利𨽻于朝廷者不與焉東南折帛錢東南折帛錢者張本于建炎而加重于紹興祖宗時民戶夏秋輸錢米而已未以絹折也咸平三年度支計殿前諸軍及府界色人春冬衣一應布帛之數計百數始令諸路曹司將出産地土應輸布帛諸州軍于夏秋稅輸錢帛物料輦運上京自此始以秋錢米料而于夏折綿絹料輸之聞諸父老川陜四路大扺以稅錢三百文折絹料一匹此乃咸平之實直也又有所謂和買絹者而祥符九年內帑災乃發鏹下三司預市紬絹是時青齊間絹直八百紬六百官給錢率增二百民甚便之寶元後西邊用兵國用頗屈于是改給鹽七分錢三分至崇寧三年改鈔法則鹽不復支而所謂三分本錢州縣亦無從出矣建炎初苗劉作亂兩浙轉運副使王宗言本路上供和買紬絹每歲為一百七十餘萬匹乞令民戶每匹折納錢二千朱藏一為相許之東南折帛錢蓋自此始三年三月壬辰紹興二年秦檜為相呂元直督軍於外戶部請諸路上供絲帛並半折錢如兩浙例又許之二年五月甲申是時行都月費錢百餘萬緡財無所從出四年梁汝嘉在戶部乃令民輸帛每匹納錢四千或六千紬以十分為率二分折四千八分折六千絹以十分為率折納五分其二分折四千三分折六千折帛錢自此愈重四年十一月甲午九年復河南赦遂減折帛錢匹一千九年正月丙戌其後又增之十七年始詔兩浙絹紬匹減作七千和買六千半綿每兩四百江東紬絹每匹六千綿每兩三百時東南諸路歲起三十九萬匹浙東上供八萬淮衣福衣八千浙西上供九萬二千淮衣萬六千江東上供九萬淮衣福衣二萬七千江西上供五萬二千淮衣福衣五千湖北上供三百皆有竒絹二百六十六萬匹浙東三萬六千淮衣福衣五萬三千天申大禮八千浙西上供八萬一千淮衣福衣十三萬八千天申大禮萬匹江東上供四十萬六千淮衣福衣十三萬九千天申大禮八千江西上供三十萬五千淮衣福衣六萬七千天申大禮八千以上皆有竒淮東天申大禮四萬九百五十淮西天申大禮三千七百湖南天申大禮四百廣東天申大禮四千六百廣西天申大禮六千五百綾羅絁三萬餘匹浙西綾八千七百婺州羅二萬湖南平絁三千其淮衣福衣天申大禮與綾羅紬總五十二萬匹有奇皆起正色其他絹紬二百五十六萬餘匹約折錢一千七百餘萬緡而綿不與焉兩川畸零絹估錢兩川畸零絹估錢者本三路綱也方承平時東西兩川每歲於二稅及和買畸零絹內起正色絹三十萬匹應副陜西京西河東支遣謂之三路綱運建炎三年張魏公出使川陜改理估錢以給軍食西川每匹至為錢十一千東川每匹十千紹興二十五年鍾世明奉詔裕民每匹減一千二十五年七月丙辰二十五年蕭德起為帥又減一千二十七年三月甲申其後節次減免今猶輸七千或七千有半紹熙末楊侍郎輔總計又權減一千至今為例兩路見額裏絹估錢二百餘萬實理錢一百七十餘萬四川上供絹紬綾綿綺四川上供絹紬七萬四千匹西路天申大禮絹一萬三千東路上供一萬一千天申大禮萬六百夔路上供絹二萬二千紬一百三十天申大禮七千利路天申大禮絹八千三百綾三萬四千餘匹東川二萬六千三百西川七千八百綿錦綺一千八百餘匹假成都路皆正色也兩川激賞絹兩川激賞絹者於建炎四年宣撫處置使度量宜於四川民户勸諭令其等第輸納以助給賞凡三十三萬餘匹俟邊事寧息即罷不為永例自後不復減紹興十六年鄭亨仲為宣撫副使始利路絹二萬匹十二月戊戌二十年鍾郎中奉詔裕民復減夔路絹九千餘匹淮東西二川獨存至今遂為常賦舊例皆理正色紹熙末楊嗣勳總計每匹但取估錢引三千民甚便之慶元中司農少卿河間權安節總計又權減一千今以為例凡兩川激賞絹三千萬匹實理緡錢六十萬焉兩川綿估錢兩川綿估錢者舊例上三等戶皆理正色而下戶每兩估錢半千所以優之也楊嗣勳總計始令當輸正色者每兩估錢引二分而舊輸錢者如故是上戶反輕下戶反重矣至今猶然其他紬絲綾凡舊本三路正色綱視此而輸其直四川布估錢四川布估錢者始天聖中薛田帥蜀於成都府卭蜀彭漢州永康軍産麻六郡歲市官布每匹給錢三百以起上供及三路綱運是時價值頗優民樂與官為市至熙寧間物已貴於是每匹增價至四百然始以等配率及軍興以來遂改理估錢以贍大軍每匹至為錢三千後節次減免至慶元初每匹猶理二千或一千七百三年袁起巖為帥與諸司議每年減其半制置司成都府抱五萬緡總領所三千萬緡轉運司五萬緡每年春正月乞降度牒百五十下制司抱納九月癸亥以聞今四川布估錢實理緡錢六十五萬緡廣西布錢廣西折布錢者舊有之獨桂昭二州歲産布九萬二千二百有竒每匹折錢五百紹興五年張魏公為都督每匹增至一千五百文二十年駱彬為廣西提刑還奏減三之一上恱從之擢彬直祕閣二十年正月丙午今實理緡錢九萬總論國朝鹽莢國朝鹽莢舊有三路解鹽行于關中東北鹽行于東西畿甸東南鹽行于江淮東南鹽者通泰煎海也舊為江湖六路漕計蔡京為政始行鈔法取其錢以贍中都自是淮浙之鹽則官給亭戶本錢諸州置倉許商人買鈔算請閩廣鹽則官撇官賣以助歲計其後亦行鈔法然罷復不常舊淮鹽息錢歲八百餘萬緡紹興初才三十五萬緡而已以後朝廷益修其政至紹興末年東南歲産鹽二萬七千八百十六萬斤浙西路臨安平江嘉興三府凡一百十三萬七千一百四十五石六斗七升七勺東路紹興慶元府溫台州凡八十四萬八千二百八十三石九升二勺淮東路通泰楚三州凡二百六十八萬三千七百十一石六斗二升五合廣東路廣惠南恩州凡三十三萬一千六十石三斗四升廣西路亷髙欽化雷五州凡二十三萬一千六百八十九石福建路福泉漳三州興化軍凡二千六百五十九萬九千四百十五斤十三兩六錢自福建外每五十斤為一石淮浙鹽六石為一袋鈔錢十有八千紹興四年正月增三千九月以入納遲罷之今六路十二州收息錢約一千九百二十餘萬紹興中東産鹽每年二萬七千三百七十餘斤淮浙鹽淮浙鹽額最多者泰州歲産鹽一百六十一萬石嘉興八十一萬石通州七十八萬石慶元三十九萬石淮浙鹽一場十竈每竈晝夜煎鹽六盤一盤三百斤兩淳熙末議者謂總轄甲頭權制亭竈懼其赴訴縱令私煎且如一日雨乃妄作三日申若一季之間十日雨則一場私煎三十六萬斤矣而又有所謂鑊子鹽亭戶小大一竈之下無二十家家皆有鑊一家通夜一鑊煎出得鹽六十斤丁竈二百家以季計之則鑊子鹽又百餘萬斤矣一場之數而如此則諸路可知也十三年九月己未遂罷總轄令亭戶自請本錢焉廣鹽廣鹽舊從官賣建炎四年春以淮鹽道不通戶部侍郎葉芬乞通蠻廣鹽于諸路侍郎髙衛因請即處州𣙜貨務鬻南廣鹽鈔二十萬緡以供行宫之用許之四年正月辛亥未幾即止是時恩州未有鹽紹興初以鹹土生發如𣙜田一頃二十四畝置竈二十七歲産七十萬有竒元年二月壬子後收淨息錢三萬餘緡九年罷官賣鹽許通商于嶺外其錢助鄂州飬兵之費十二年冬議者以欽州鹹土生發歲産鹽三十餘萬斤商人不通請復官賣許之十月辛巳已而廣東轉運判官范正國亦言本路上供及經費皆仰于鹽息錢客鈔既行遂或闕乏請得官賣如廣西不許自後廣西官賣之法又改為鈔法乾道四年罷鹽鈔令漕司自認鈔錢嶺南極以為患淳熙初張欽夫為帥始與漕臣詹體仁叶議立為定額價直且條上之雍州官賣鹽每斤百錢二人既去漕臣趙公瀚增其六十欽州歲賣鹽千斛公瀚五增之六年秋侍御史江溥以為言上黜公瀚遂詔閩廣發賣鹽自有舊額及定直自今毋得擅有增添九月癸未九年上命奉議郎胡廷直奉使嶺南詳議鹽法廷直言運以鈔法為便詔罷官賣復通商九年十月己未擢廷直太府寺丞十二月壬寅尋出提舉廣南東路常平茶鹽同措置廣西鹽事使行其法明年春降詔諭二廣官吏以更法之故十年正月己未夏又巡湖廣廣西轉運判官兼提舉鹽事同措置廣東鹽事四月己酉胡本詹體仁所薦體仁時為吏部侍郎即命知靜江府四月庚戌其後又置都提舉廣南鹽事一員俾掌其政淳熙末體仁坐改法不當抵罪如是官搬如故焉福建鹽福建鹽自祖宗以來漕司官搬官賣歲産鹽一千一百萬斤收課錢四十萬建炎末以淮鹽不通權改鈔法未幾與廣鹽皆罷之四年四月辛巳苐令漕司歲認鈔錢二十萬緡赴行在紹興中閩鹽既增倍朝廷以其多羡息十二年又增鈔錢十萬緡正月辛亥時漕司悉貯鹽于海倉令上四州取而鬻之以供歲用後吏緣為姦鹽惡不可售即按籍而繳號口食鹽不理貧民無一免者人甚苦之民多私鬻以給飬而官亦不問二十六年湯中丞鵬舉以為言詔提刑崇安吳逵核實七月甲子逵遂約郡縣歲費除二稅所入外即分鹽綱補之凡上四郡歲搬千有六百萬斤視舊直損其三毋得敷於民戶舊漕司取增鹽錢提舉司吏祿錢皆損三之一增鹽錢每斤二十八令損其九吏祿錢每斤一文令損三分又率漕二司毋得鬻鹽以侵州縣上悉許之十七年三月庚申由是力稍寬然郡邑無以供百費且繁非漕司之便故衆論搖之朝廷遂從吳守鼎命諸司相度更定其令諸司請運鹽如逵數而增其直官司鹽直止減一分漕司鹽本錢每斤為二十五錢上命輔臣計之會提舉常平官張汝楨奏行鈔法陳樞密誠之言於上曰閩中山溪之險細民冒法私販禁之不可恐不盡請鈔則課入愈虧上是之乃減鈔錢十萬十一月癸亥自此漕司及州縣稍舒不復仰售於民矣乾道初陳正獻劉忠肅公在二府有言福建鹽弊者詔戶部侍郎沈度陳彌祚相度二人請量減鈔錢之半歲令漕司於八州增鹽錢及樁錢留鹽本錢內那融十一萬緡起發四年春遂減鈔錢十五萬苐令漕司抱七萬緡以充上供於是宿弊稍去忠肅與三公皆閩人云四年正月壬辰罷鹽錢蜀鹽蜀鹽自祖宗以來皆民間自煮之歲輸課利錢銀絹總為八十萬緡紹興二年秋趙應祥總計始變鹽法盡𣙜之倣蔡京東南東北鈔鹽條約置合同場以稽其出入每斤納引錢二十五土産稅及增添約九錢四分所過稅七分除稅一錢有半每引别輸提勘錢六千其後又增貼納等錢凡四處二十州四千九百餘井歲産鹽約六千餘萬斤引法初行每百斤為一擔又許增十斤勿算以優之其後遞增至四百餘萬緡休兵後數減之今猶存三百餘萬始趙應祥立權法也令商人入錢請引井戶但如額煮鹽赴官輸土産稅而已然鹹脈盈縮不常久之井戶月額不敷則官但以虛鈔付之而收其算引法由是壞井戶既為商人所要因增其斤量以豫之每擔增至有六十斤者又有逃廢絶沒之井許人增其額以承認小民利於得井每界遞增鹽課益多遂不可售而引息土産之輸無所從出由是刎縊相尋公私皆病紹熙三年夏趙子直為吏部尚書奏言趙開鹽法最為精密今井戶多鑿私井務以斤重多寡相髙故鹽日多價日賤而其法大壞乞下總領所參照舊法施行從之時楊嗣勳總計因是遣官核去虛額棧閉助筒二千有竒申嚴合同場舊法禁斤量之踰格者而重私販之罪直由是頓昂嘉泰二年陳郎中燁總計又盡除官井所增之額焉自慶元後州縣及井戶稍舒而民始有鹽矣蜀中官鹽蜀中之官鹽有隆州之仙井卭州之蒲井江之心井大寧富順之井監西河南州之鹽官長寧軍之淯井皆大井也若榮等十七州民間所煎則皆卓筒小井而已其用力甚難惟大寧之井鹹泉出于山竇間有垂瀑民間分而引之又有彭山之瑞應井其味近硝得隆榮鹵餅雜煎然後成鹽元豐崇寧兩處嘗禁止以食者多病故也紹興末總領弛其禁隆簡嘉榮之人病其侵射商販因代輸課息而行棧閉今謂之石腳錢然彭山之民私煎如故仙井歲産鹽二百餘萬斤𨽻轉運司蒲江亞之𨽻總領所大寧鹽二百五十餘萬斤歲取其四分一百三萬七十餘斤計值九萬餘緡亦𨽻總領所每斤舊為三百紹興十七年宣司減五十二十二年辛酉又減二十錢淯井四十餘萬斤歲取其贏五萬餘緡為軍食之用舊額四十九萬二百斤取撥錢引四萬八千八百五道五百七十文應副總所紹興十六年實産鹽四萬一千九百四十斤內三萬三千六百斤稿設七千八百斤贍學三萬斤鍋本外餘三十四萬七千九百斤每斤二百五十文計七萬七千三百十九貫五百文而本軍計應用二萬三千八十七貫八百十二文餘折官價錢引三萬七千六百八十三引而已每歲大科二萬三千餘緡漕司施其半尚虧一萬一千餘緡二十二年十二月乃悉除之鹽官歲産鹽計羡緡錢三萬為利州錢監鑄本云然官鹽多惡雜不可食往往仰售于民州郡苐令其贏無能正之者解鹽解池鹽今𨽻金中置解鹽使以掌之池周百里開畦灌水遇風即成不假人力故味厚而直亷邊人多盜販者往往十百為羣遇巡尉出邏則踏開生路以避之有司亦不敢問第遙護之出境而已今邊上雜行鹽官鹽其鹽官歲課七十餘萬斤半為官吏柴茆之費半鬻於西河成鳳州歲得錢七萬緡為鑄錢之本紹興十五年始鹽多地狹人甚苦之紹興二十九年秋詔減其直之半九月丙戌今每斤猶為二百云礬白礬青膽黃膽礬國朝舊制晉相礬行河北京畿淮南礬行於東南九路今獨無為軍崑山場為盛歲額白礬六十萬斤租額一百二十萬斤紹興十四年始有此額韶州岑水場十萬斤信州鉛山場青膽黃礬無定額其法自權貨務給引赴場許客人算請每百為一大引輸引錢十二千頭子市利雇人工墨錢二百七十六又許二十斤勿算以優之五十斤為中引三十斤為小引錢及加貨以是為差三十年以商販利薄減為十千六月戊午十四年又增一千十一月丙寅崑山礬則民間自煮官置場買納紹興初每斤本錢十三文至二十文十四年十一月增為三十文歲收息錢四萬緡有竒二十九年閏六月以四萬二千五百八十五文為額鉛山礬則官自煎以十分為率四分充工本六分赴𣙜貨務焉總論東南茶法東南茶舊法官買官賣天禧三年合六𣙜貨務十三處山場所收茶錢十二萬緡除買茶本錢外止有息錢三萬緡而已六𣙜貨務乃荆南府漢陽軍蘄州蘄口無為軍直州海州也天聖中稍改其法歲所得亦不過數十萬緡人多盜販抵罪上下苦之嘉祐中韓魏公當國遂弛其禁但收茶租淨利錢三十三萬八千餘緡時以為便元豐後𣙜輦致都下即汴流水磨官自鬻之政和初蔡京欲盡籠天下錢實中都乃創引法即汴京置都茶場印賣茶引許商人赴官算請就園戶市茶赴所在合同場稱發歲收息錢至四百餘萬緡建炎渡江不改其法至紹興末年東南十路六十州二百四十二縣嵗産茶一千五百九十餘萬斤浙東紹興慶元府溫台衢婺處州八萬三千二十一斤三兩浙西臨安平江府湖嚴常州共四百四十八萬四千五百斤十二兩江東寧國府徽饒池信太平州南康廣德軍共三百七十五萬九千一百二十九斤十四兩江西隆興府贑吉袁撫江筠建昌興國臨江南安軍共四百四十五萬三千一百九十七斤十四兩四錢湖南路衡潭永邵全彬桂陽武昌軍共一百十三萬五千三百四十八斤七兩湖北江陵常德府灃辰沅歸峽鄂兵州荆門軍凡九十萬五千七百四十一斤十四兩福建路建寧府福汀南劍州邵武軍共九十八萬一千六百六十九斤半淮西蘆蘄舒州安豐軍共一萬九千三百五十八斤一兩廣東南雄循州二千六百斤廣西靜江府融潯賔照鬱林州共八萬九千七百九十六斤六兩已上總計茶一千五百九十一萬四千三百七十九斤十兩四錢係紹興三十二年數收鈔錢二百七十餘萬淳熙初歲收四百二十萬江茶江茶在東南草茶內最為上品歲産一百四十六萬斤其茶行於東南諸路士大夫貴之隆興亦産茶二百二十八萬斤臨安二百九十萬斤嚴州二百十二萬斤徽州二百十萬斤寧國一百十二萬斤潭州一百三萬斤其他皆不登此數目江南産茶既盛民多盜販數百為羣稍詰之則起而為盜淳熙二年茶冦賴文政反於湖北轉入湖南江西侵犯廣東官軍數為所敗辛棄疾幼安時江西提刑督諸軍討捕命屬吏黃倬錢之望誘致既而殺之江州都統制皇甫倜因招降其黨𨽻中軍今東南茶皆自𣙜場轉入金中亦有私渡於遼海而去者雖嚴為譏禁而終不免於透漏焉建茶建茶歲産九十五萬斤其為團胯者號為茶臘久為人所貴舊制歲貢片茶二十一萬斤建炎二年葉儂之亂園丁亡散遂罷之紹興四年明堂始命市五萬斤為大禮賞五年都督府請如舊額發赴建康召商人持往淮北撿察福建財用章傑以片茶為市請市末茶許之轉運司言其不經久乃止而官給長引許商販渡淮十二年六月興𣙜場遂取為場本九月禁私販官盡𣙜之上京之餘許通商官收息三倍又詔私載建茶入海者斬此五年正月辛未詔旨議者因請鬻建茶於臨安十月移茶事司於建州專一買發十三年閏月以失陷引錢復令通商今上供龍鳳及京鋌茶歲額視承平才半蓋髙宗以錫賚既少懼傷民力故裁損其數云蜀茶蜀茶舊無𣙜禁熙寧間始令官買官賣置提舉司以專𣙜收之政每歲收課三十萬李稷為提舉增至五十萬緡其後歲益多至百緡久之不能敷其數而蜀人以為病建炎初趙應祥為提都漕司上言𣙜茶買馬五害請用嘉祐故事罷𣙜茶仍令漕司買馬或未能然亦當痛減額以蘇園戶輕立價以惠行商如此則私販少而盜賊息矣朝廷然之擢應祥同主管川陜買馬三年十一月應祥至官遂大更茶法官買官賣茶法罷倣蔡京都茶場法印給茶引使商人即園戶市茶置合同場以譏其出入重私商之禁其法每斤引錢春七十夏五十市利頭子在外所過征一錢住征一錢五分每百斤勿算自後引息錢乃復至一百五萬緡紹興後提舉官又旋增引錢至十四年每引收十二道三百文比應祥初立法又增一倍於是茶司一年遂收二百萬而買馬之數不復加多故當此時茶馬之富甲於天下也以其歲剩者上供他司不問也自乾道末青羌作亂茶司為之增長細馬名色等錢約三十萬淳熙六年以後又屢減園戶重額錢歲約十六萬至紹興初楊嗣勳為使遂定以為例焉紹熙元年減今成都府利州路二十三處茶場歲産二千一百二萬斤一千六百十七萬係成都府路九州軍凡二十場四百八十四萬係利州路二州三場通博馬物帛歲收錢約二百四十九萬三千餘緡川茶司歲收一百七十八萬有竒秦口茶司歲收十八萬有竒川秦兩馬司歲收諸州博馬物帛并雜貨收錢共五十二萬有竒朝廷歲撥其一百十三萬緡𨽻總領所贍軍宣撫司先取撥四十萬紹興二十五年七月其裕民所又增撥七十三萬然茶馬司率多難之乾道以後歲撥或止一二十萬緡至淳熙十年遂以五十萬緡為凖蓋茶司自言歲用二百四十六萬餘緡以為比收有剩錢二萬餘緡故也然川秦八場額市馬一萬二千九百九十四匹而比歲所市未嘗及焉則其言蓋未足慿而歲剩之緡可以坐計矣自元豐以來茶事官𣙜出諸司之上淳熙十四年議者請令置制司檢點奏可後亦不果行舊博馬皆以粗茶乾道末趙彥博為提舉始以細茶遣之今雅州徼外夷人亦有即山種茶者由是綱茶遂為夷人所賤然蜀茶之細其品視南方已下惟廣漢之趙坡合州之水南峨眉之白芽雅安之蒙頂士人亦自珍之但所産甚微非江建之比也夔州茶夔路自祖宗以來不𣙜茶政和中有司請賣引者議以民夷不便罷之紹興中韓球美成同提舉茶馬始𣙜忠達州茶即夔合廣安置合同場歲收以八萬斤為額然商人以利薄不通但以引錢敷民間耳民甚苦之二十七年冬忠守董如敏以為言事下茶馬司時許覺民侍郎為主管官不肯蠲乃止後三年王瞻叔以漕副攝事遂除之先是美成在茶司盡取園戶加饒之茶為正額有一場而增至二十萬斤者韓以十七年十二月領茶事十九年五月移夔民知輸官不補所得於是起為私販二十六年六月祕書省正字張震真甫以為言遂命茶司裁損今茶場每百斤加饒率過半若茶官稍加裁抑而販者遂轉而之他宜量減引錢而禁其搭帶又因地之逺近不同而稍為低昂之則庶乎其可矣東南酒課東南酒課之入自祖宗時悉以入舊州慶厯二年秋祠部員外郎王琪始請增價以其錢上京自後提舉司學事司經制司發運司各因事增添然多不過每斤增七八錢少止一二錢而止建炎四年冬每斤始驟增錢二十四謂之軍期錢自是總制司都督府又遞增之迄紹興六年春浙路出煮酒每斤共增一百十五錢而官始為困矣時煮酒每斤百三十錢為率大異祖宗時每斤十五錢其坊場課利者自開寶九年冬詔承買以三年為限期仍戒當職官吏毋得信任小民一時貪利妄增課額此祖宗之仁政也大中祥符元年春始有實封投狀給賣價於商人令之而民亦困矣熙寧以後坊場錢又盡入於常平司紹興元年又命概增五分輸戶部二十七年後其販闕者復弛之惟長沙一城無酒禁蓋劇盜反為稅酒之法人更安之故不復改也舊兩浙坊場有一千三百三十四所每歲收淨利錢八十四萬緡至是合江浙荆湖人戶採買坊場才有一百二十七萬緡而已蓋販客闕者之故也是時行在戶部乃贍軍於東南中三庫并殿司酒坊七十五所歲收息錢亦有一百三十萬緡諸路酒課約有五百餘萬緡蓋自軍興以來諸帥擅𣙜酤之利朝廷所仰者茶鹽耳紹興二十六年正月始詔諸軍採買場務令常平司拘收城郭酒店令總領所拘收二十一年二月楊存中罷趙殿巖密代為帥又上軍中及私家所買酒坊於戶部由是縣官始得佐其經費至乾道間行在有七酒庫日售錢萬緡每歲收錢一百四十萬息錢一百六十萬麯錢二萬而歲額之外羡餘獻於內帑者又二十萬其後加增至五十萬緡遂為數云四川酒課四川酒課在建炎中合官民之入總為緡錢百四十萬三年十月張魏公為宣撫使承制以趙應祥總領財賦應祥商曰蜀民已困惟𣙜酒尚有贏餘遂大變酒法自成都始令罷公帑賣供給酒即舊採買坊埸所置隔釀設官主之民賴釀者米一斛輸錢二千眀年遂遍四路行其法於是嵗課遞增至六十九萬餘緡凡隔槽四百所場店不與焉然法之始行聼民就務分槽醖賣官計所入之本而收其課行之既久醖賣虧欠則責入米之家認定月額不復核其米而苐取其錢民始以為病二十六年二月知榮州安仁費廷直入對為上言之上謂輔臣曰此張浚趙開以軍興財潰濟一時之急耳今休兵既久內外無事自當更改遂命總漕司措置時湯侍郎允恭總計言若改為官監應用米本至多無從應副王瞻叔為潼州漕獨請罷三州官監隔漕二百三十餘毋許採買省官吏冗食以便民眀年詔許之其後採買又改為官監今四川酒課屢減之餘猶為緡錢四百一十餘萬夔路酒夔路自祖宗以來亦不𣙜酒趙應祥為大漕建炎四年始𣙜之舊一路場店一百四所應祥增為六百餘所歲收錢四萬三千九百餘引紹興十六年鄭亨仲為宣撫副使奏除之建炎雜記甲集卷十四

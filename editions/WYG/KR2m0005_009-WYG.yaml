body:
  text: 建炎雜記甲集卷九宋李心傳撰故事潛藩州建軍府名舊制天子即位嘗以所領州鎮自防禦州而下皆陞軍名若節鎮州則建為府如英宗自齊州防禦使登極升齊州為興德軍神宗自忠武軍節度使建儲升許州為𨽻昌府之類孝宗受禪以始封洪鼎宣建州舊有軍額則建為隆興常德寧國建寧府而劔州止升為晉安軍紹興中始再升為隆慶府盖用此制光宗自榮州刺史進封恭王今上自英國公出就傅後封嘉王四州皆為大郡然三州躐升為重慶英徳嘉定府而榮州至今不錫軍名盖中書之誤百官轉對故事百官五日一轉對紹興六年十一月詔百官應轉對而疾病者許封進文字更不引對其後秦相當國久惡聞人言扵是百官當對者多託疾不至十七年八月詔自今當對而在告者竢疾愈日上殿命吏部約束之然所對者不過大理寺官十餘人姑應故事而已自孝宗臨政垂意人才乾道淳熈間朝士抱才氣者皆以得見上為喜而碌碌者頗以轉對為憂然士大夫不為大臣所喜者徃徃竢其對班將至預徙他官至有立朝踰年而不得見上者盖輪其官而不輪其人此立法之弊大臣賜書閣名宣政間大臣賜書閣多得以御筆閣名若蔡京曰君臣慶㑹王黼曰得賢治定是也紹興初髙宗以平江朱勔南園賜韓忠武題其賜書閣曰懋功後秦申王閣曰一徳格天賜和王閣曰風雲慶㑹賜㑹稽王閣曰明良慶㑹云皇甫坦賜書閣名紹興煥文宰臣生拜太師國朝自建隆至紹淳間宰臣生拜太師者五人爾趙韓王普文潞公彦博蔡魯公京秦申公檜史㑹稽王浩惟蔡秦二人以相臣特拜其他皆還政加㤙親王生拜太師本朝親王生拜太師者五人真宗朝楚王元佐仁宗朝燕王元儼哲宗朝呉王顥欽宗朝燕王俁越王偲皆以父兄行乃得之紹熈中嗣秀王伯圭以宗室特拜太師盖王扵光宗為親伯父故用優禮也建隆至嘉泰宰相數國朝宰相自建隆至嘉泰凡一百有二人前軰既自建隆元年至元祐五年一百三十年凡五十人自元祐五年至紹興六年四十六年凡二十八人以為兩倍于前矣自紹興七年至嘉泰二年六十六年其間宰相或席不暇煖而才二十有四人盖秦㑹之獨相十八年故也中興宰相久任者中興宰相二十九人自秦申王外在位踰三年者八人而已王魯公淳熈八年相十五年罷凡七年留衛公淳熈十五年相紹興五年罷京魏公慶元二年相六年罷皆五年陳魯公紹興二十九年相隆興元年罷凡四年虞雍公乾道五年相八年罷趙衛公淳熈五年相八年罷周益公淳熈五年相八年罷周益公淳熈十四年相紹興元年罷皆三年謝魯公慶元六年相至今亦近三年宰相位公孤封國髙宗宰相十五人惟秦㑹之為太師吕元真為少保其他未有至公相者而封國亦在二人秦益公檜張和公俊孝宗宰相十五人生至公少者五人而已史文惠太傅張忠獻陳正獻皆少師陳文㳟虞忠肅皆少保然徹國者已十人陳文公王文定皆封魯史文恵張忠獻陳正獻皆封魏湯特進封慶虞忠肅封雍梁文靖封鄭趙開府封衛周少傅封許紹熈後宰相凡七人京仲逺以少傅封冀國公周洪道畱仲至謝子肅以少保封益衛魯三國公葛楚輔余處㳟官皆至特進宰相官爵之穹未有如近嵗者也中興宰相封國數中興宰相封國者吕忠穆成秦申王萃衛慶冀魏益張忠獻和魏湯特進榮慶陳文㳟信福魯史郡王永衛魯魏陳正獻申福魏虞忠肅濟成華雍梁文靖儀靜趙開府沂衛王特進信福冀韓魯周少傅濟許益留少保申衛魯京文忠祈鄭冀魏謝少保申岐魯一國封两公故事一國未有封两公者宣和末鄭達明封燕國公及薨蔡攸乃封燕國淳熈中史太保封魏陳少傅封福及慶典陳少傅進封魏國公時史公尚亡恙也近嵗趙沂公既封衛後數嵗畱申公以左揆復封衛國公一國两公盖失于討論爾宰相追封王爵中興宰相追封王爵者二人秦申王以久任史㑹稽王以舊恩皆異數也中興諸將封王數中興諸將生享王封者四人張忠烈俊韓忠武世忠楊武㳟存中呉武順璘追封真王者五人張忠烈循魯楊武㳟和呉武順信韓忠武蘄呉武安倍追封郡王者一人劉武僖光世安城郡王中興外戚封王數中興外戚封王者自信安孟王忠厚始其後平樂韋王淵太寧呉王益永寧郭王師禹皆以元舅之貴乃得之慶元中韓太傅侂胄以中宫從曽祖封平原郡葢殊命也髙宗朝叅政最多太祖乾德二年始置叅知政事自是凡十三年止四人而已仁宗在位四十二年参知政事凡三十七人徽宗在位二十六年凡三十四人高宗在位三十六年凡四十八人孝宗在位二十八年凡三十四人以累朝較之而高宗朝除人㝡多盖秦丞相專權不欲其久在位故耳小两制除執政故事小两制未有除執政者乾道二年蔣子和始自中書舎人除僉書樞宻院事中興左揆數中興左相十六人髙宗朝七孝宗朝六光宗及慶元嘉泰三朝外若范覺民洪景伯蔣子禮葉夢錫趙温叔皆獨相而止居右朱藏一張德逺史直翁梁叔子皆再入而亦止為右揆焉本朝執政父在恩數本朝執政父在者若王文康溥章雷州惇張文孝觀呉正肅奎安觀文燾何開府㮚朝廷皆因其入踐二府而峻加恩命然但除四品寄祿官致仕尔徽宗用李太宰邦彦秉政眷遇甚渥其父浦始特除右文殿修撰遷寳文閣待制奉朝請及死又贈雜學士諡宣簡云浦懐州人以鍜銀為生其除拜皆非故事然當時無正之者政和初林彦正攄自翰林擢為執政其父邵以寳文閣待制遷直學士盖異之也近嵗程参政松為諫長其父九萬以子在臺省日久自直敷文閣除秘閣修撰嘉泰中以程入两地两除華文閣待制提舉醴泉觀奉朝請視政和恩數為優云國朝父子祖孫兄弟宰執數國朝父子宰相二家吕許公申公韓魏公儀公祖孫宰相一家曽魯公欽道兄弟宰相一家韓康公莊敏父子執政十三家曹武惠子武穆韓忠獻子獻肅持國莊敏石元懿子文定陳晉公子㳟公王仲明子忠簡王惠獻子安簡吕文靖子恵穆正獻范文正子忠宣㳟獻曽宣靖子令綽蔡新州子彦清蔡儋州子居安秦申王子伯陽王毓節子能甫祖孫執政八家張師黯孫簡冀王文獻孫康靖梁康肅孫才甫富文忠孫季申張章簡孫元量張榮僖曽孫忠文錢文僖元孫䖏和蔣頴叔曽孫子禮兄弟執政十一家吕鎮南弟正恵陳文忠弟文恵任康懿弟安恵吕正肅弟正獻呉恵穆弟正獻韓獻肅弟持國莊敏王文公弟和甫蔡儋州弟元度鄧子能弟文簡洪文惠弟文安宇文仲理弟肅政叔姪執政四家胡文㳟從子修簡林文節從子彦振史簽樞從子文惠章文獻從孫質夫子厚三世宰相一家吕文穆從子文靖從孫正獻三世執政二家韓魏公子儀公曽孫似夫曽魯公子令綽孫欽道四世執政一家吕許公從父文穆子惠穆正獻曽孫舜徒渡江後父子兄弟建節數三世四世五世建節渡江後父子建節十一家劉光世子景慶錢忱子景臻邢煥子孝揚韋淵子謙呉玠子栱郭浩孫果楊存中子倓劉錡父武仲呉益子琚珽呉葢子懐呉挺子儀兄弟建節七家呉玠璘錢忱愐韋謙讜呉益盖呉挺拱呉琚懐挺李友文孝純三世節度使一家呉璘子挺孫曦四世節度使二家錢忱髙祖俶曽祖惟演父景臻鄭藻大父紳父成之從子興裔五世節度使一家韓侂胄曽祖從子邈從孫同忠獻卿從曽孫竣本朝未三十知制誥未四十拜相者本朝未三十知制誥者蘓文簡二十六呉元忠二十七晏元獻宗宣獻王懿恪張安國皆二十八王文正夏文荘皆三十未四十執政㓂莱公三十張魏公三十三晏元獻三十五蘓文簡錢宣靖韓魏公皆三十六趙韓王王沂公皆三十九富韓公四十未四十拜相者范覺民三十一呉元中何文縝皆三十八張魏公三十九中興學士秉政者中興學士自建炎丁未至嘉泰壬戌凡七十人承㫖直院權直並係大拜者十一人朱忠靖勝非沈特進該湯慶公思退虞雍公允文史魏公浩洪文惠适蔣觀文芾梁鄭公克家周益公必大王魯公淮葛開府邲執政者又二十九人可謂盛矣渡江後學士再入三入者渡江後學士三入者二人胡端明交修王端明曮再入者十六人張文靖宇綦寳學宗山禮沈忠獻與求陳資政與乂孫資政近劉閣學才邵李侍郎椿年洪文安遵錢給事周材洪文敏邁劉忠肅珙鄭資政聞周益公必大王魯公淮倪侍郎思國朝學士久任再入三入者學士久次者晁文淵逈十六年王文恭珪十三年王文忠克臣十二年宋文安白章文獻得䝉趙清獻抃楊中翰偉皆十一年陶尚書谷丁文簡度皆十年扈尚書䝉蘓叅政易簡賈參政黄中李昌武宗鍔孫文懿忭胡文恭宿皆九年徐常侍鉉楊文恭億皆八年歐陽常侍逈宋宣猷綬歐陽公修皆七年梁給事周翰李相州維晏元獻殊馮宣靖元皆六年熈寧後學士率一二年即遷久次者三四年而已髙宗朝湯慶公孝宗朝周益公始皆六年學士再入三入者宋文安两入凡二十年李相州孫文懿皆十二年楊文公范仲文皆九年曽宣靖馮文簡皆七年葉道卿張文定皆六年宋景文楊宣懿皆三入而止五年渡江後周益公再入凡九年胡端明二入跨六年久次者止此二公而已父子兄弟入院數錢文僖公記父子入院一家李文武昌武兄弟入院三家二蕭可象望之二李文靖相之二錢希白師聖以為極盛矣其後父子入院者又四家錢希白子飛梁仲素莊肅蘓儀甫子容洪忠宣景白景嚴景盧兄弟入院者又九家二陳文惠康肅二呉正肅正憲二韓康公持國二蘓文忠文定二曾文肅文昭二蔡元長元度二宇文仲理仲通三洪文恵文安景盧然馮氏父子兄弟入翰苑者四人古今所未有也西閤久次祖宗時西閤久次者王晉公再入凡十六年朱公巽十二年盧崖相十一年扈日用李孟雍皆十年張尚賢石文定皆九年錢文僖宋宣獻李儀父皆八年李相州王沂公劉子儀張文孝皆七年盛文肅錢希白丁文簡晁文莊皆六年非進士除内外制臺諫經筵史館事始國朝非進士出身除學士自林彦振始韓持國已省試合格但避嫌不赴廷試除舎人自顔夷仲始除講官自呉傳正始除諫官自徐師川始除臺官自曽統始除史官自邵博始任甲先已先賜出身除修注後乃入史院中興講讀官節料中興講讀官三大節料大觀文錢一百五十千酒十瓶大資政以上錢百千酒十瓶從官錢五十千酒六瓶餘官錢三十千酒三瓶紹興十五年冬所著令也制科宰執數國朝制䇿登科四十人至宰相者一人而已富文忠弼執政者九人夏文莊竦呉正肅育張文定方平田宣簡况呉文肅奎邵安簡元蘓文定轍李黄門清臣范榮公百祿詞科宰執數自紹聖乙亥至紹熈癸丑以宏詞中選者凡七十二人其後至宰執者十一人孫忠定傅滕樞宻康盧左丞益張文靖守范參政同秦忠獻檜周樞宻麟之洪文恵适洪文安遵湯慶公思退周益公必大入翰苑者呉龍學升盧左丞益孫尚書覿張文靖守滕樞宻康胡尚書友修范參政同劉侍郎才邵王端明曮湯丞相思退周樞宻麟之洪丞相适洪樞宻遵洪内翰邁莫直院濟周丞相必大趙舎人彦中李尚書巘陳侍郎峴陳内翰宗召状元大拜數建隆以來状元已沒者六十九人而大拜者七人而已吕文穆䝉正王文正曽李文定迪宋元憲庠何開府㮚梁文靖克家趙銀青汝愚是也執政凡十一人楊樞宻王景莊嗣宗蘓參政易簡陳文忠堯叟張文孝觀蔡文忠齊王文忠堯臣馮文簡京許黄門將陳樞宻誠之鄭樞宻僑是也節度使二人陳康肅堯咨王懿恪拱辰是也父子兄弟祖孫狀元父子兄弟賢良國朝父子狀元三家張去華子師徳安徳裕子守亮梁灝子固祖孫狀元一家沈遘孫晦兄弟狀元二家二陳文忠康肅二孫漢公鄰㡬父子賢良一家錢希白子明逸彦逺兄弟賢良二家二錢子商子飛二蘓文忠文定狀元舉制科唐貞元中魏𢎞簡以狀元舉賢良自是無繼之者至國朝而狀元舉制䇿者復二人孫舎人何孫學士暨二公咸平初連榜冠多士咸平四年同以賢良方正登科近古所未有也狀元年三十以下數狀元年三十以下者王宣徽拱辰汪端明應辰年十八沈内翰遘年二十莫内翰儔二十二梁内翰顥張舎人孝祥王尚書优皆二十三楊樞宻礪蘓參政易簡木尚書待問皆二十四王丞相曽王參政堯臣張監丞唐卿賈内翰黯彭尚書汝礪衛舎人經皆二十五何僕射㮚趙丞相汝愚皆二十七蔡樞宻宻齊宋丞相庠馮樞使京楊監丞寘姚秘書穎王叔興昂皆二十九陳樞相堯叟張參政觀詹舎人駁許僉判奕皆年三十狀元十年執政五年持槖人數狀元及第不出十年而執政者吕許公䝉正丁丑榜癸未年參知政事凡七年董資政徳元丁邜榜甲戌年參知政事凡八年梁鄭公克家庚辰榜己丑年簽書樞宻院事凡十年狀元及第不出五年為侍從者何給事㮚自及第至給事中凡二年蘓參知易簡霍侍郎端友自及第至知制誥凡四年陳英公堯咨自及第至知制誥凡五年此外吕許公何文縝自登第至大拜十二年梁鄭公自登第至大拜十三年而王文正馮文簡趙莊叔自登第至知制誥亦止六年趙温叔自登第至為中書舎人亦止八年狀元三年執政二年持槖者秦伯陽紹興十二年以右通直郎登第一年而為禮部侍郎三年而知樞宻院事其子塤紹興二十四年登第明年為禮郎古今所未有也狀元特任子仁宗時狀元孫暨楊寘死于京官皆得官一子紹興元年六月利州通判何洙言其弟渙死于承事郎太學博士請予一子官許之其後黄司業定終于承議郎直顯謨閣淳熈中余校書復終于奉議郎慶元中皆特官其子一人用此故事近臣舉御史祖宗故事御史有闕例命兩制學士舎人為兩制給舎中承知雜知雜京侍御史同舉一二人自官制行朝廷直除而已淳熈初孝宗始復故事命近臣參舉然從官皆畏避鮮敢以聞故此制又廢至紹熈末纔一舉行耳南班宗室及堂後官臺參事始中興後南班宗室赴臺參自士移等始紹興四年二月朔堂後官赴臺參自魏彦弼等始紹興三年九月丙皆本臺所請也舎人引嫌不草制紹興初王剛中居正獨員為中書舎人時適當三制一其弟居修改京官二甥壻劉立道除起居舎人三本身磨勘剛中引嫌自言乃命左司郎官周綱權舎人命詞行下其後李舎人誼兼直學士院屬李丞相伯紀辭免潭帥有詔不允而李嘗劾伯紀伯紀免章畧曰當時言路公肆詆誣李亦以為言乃命劉舎人一正草制焉都司行制詞閤下草批荅二事皆東都所未有也先是胡尚書交修直學士院其姪丞公請祠不許胡當為荅詔引嫌于朝乃命胡明仲舎人為之遂為故事舎人草内制近嵗翰苑止䨇員淳熈五年學士周洪道為御試詳定官直院范致能除參知政事本院闕官得㫖遇有撰直文字依例權送中書舎人十四年學士洪景盧知貢舉直院李獻之出使主待制詔孔目官李植請于朝遂用五年例云檢正讀錄黄紹興二年十二月韓世忠賞功文字給事中賈安宅除部侍郎門下後省闕官乃詔檢正李與權書讀此事亦前所未有宻白舊制樞宻院事並過下省乾道元年十二月癸夘言者請自今樞宻院已被㫖文書並關中書門下依三省式書黄書讀以示欽重出命之意從之然宻院機速事則不由中書直關門下省謂之宻白慶元三年樞宻院以宻白遷補潜邸醫官二人給事中許深父以非舊典争之遂寢其命給舎不許列御奏事自元豐分三省中書舎人于制敕有誤許其論奏而給事中乃所以駁正中書違失紹興以來間有駁正或給事中中書舎人列御同奏乾道五年二月辛亥中書舎人汪養源言神宗官制以中書為出令之地而門下審駁覆正然後付之尚書三省皆置官属以便相彌縫可否分守甚嚴無碍侵越今給舎列銜同奏則是中書門下混而為一非神宗所以明職分防闕失之意上以為然詔復從舊例禮官學士争詔紙乾道中李仁父為禮部郎中洪景盧直學士院時占城入貢詔學院荅敕景盧引故事乞用金花白藤帋寫詔而仁父上言當從紹興舊例用白藤帋作敕書景盧以為侵官論奏其事上曰禮官議禮豈可謂侵官近例可憑止從紹興可也景盧不懌其后仁父修四朝列傳垂就而卒上命景盧續成之景盧筆削舊史乃無完篇蓋素不相樂也扵是上促進書甚急而新書未畢王稱季平以東都事畧來獻遂取用焉或者但見新書疎畧舛誤甚多而不知倉卒之間乃不暇考擇也書成進御景盧援季平于朝得直秘閣云官告式自建炎後侍從及宗室南班官遷除始給告大卿監防御使以下止用黄勅其後以絹代綾羅纈羅代錦監察御史以上用錦紹興四年始命職事官監司以上並給告十四年始用錦其後又詔内命婦及外命婦郡夫人以上乃得用網袋銷金其餘則否淳熈十三年李叔永昌圖為工部侍官南郊恩贈其父用賓官私命文思院工閻諒以銷金綾紙為告陳子榮侍御劾于朝坐落職奉祠前後官許服紅帶故事從官不帶待制已上職名而罷者止服黒帶佩魚淳熈中王仲行自吏部尚書除端明殿學士知紹興府未行以言章奪王仲行朝辭上殿服金帶垂魚而入閤門吏止之仲行即解所佩魚閤門猶以為不可乃從小吏假黒帶以見仲行殊不平十年十月始有㫖權侍郎以上罷任不帶職許服金鞓排方黒犀帶仍佩魚自是始為定例紫衫自軍興士大夫始衣紫窄衫上下如一紹興九年八月甲子詔公卿長吏毋得以戎服臨民復用官帶然迄不行秦㑹之死魏道弼秉政復舉行之論者以為擾士人貧者尤患苦之未㡬道弼為臺諫所攻遂罷政章中數事此其一也于是紫衫既廢士大夫皆服凉衫乾道中李獻之為學士為上言㑹聚之際顔色可憎今陛下上奉兩宫宜服紫衫為便上從之蓋渡江以来人情日趨簡便不可復故矣國䘏服凉衫孝宗之喪趙子直當國始令羣臣服白凉衫皂帶以治事逮終喪乃止論者以為是及光宗之喪禮部侍郎陳宗召復請百官以日易月禫除畢服紫衫皂帶以治事從之渡江後賜墓碑額渡江後大臣未有賜墓碑額者紹興初上始書韓文定神道曰世濟厚徳之碑其後得此賜者亦不多秦丞相父清徳啟慶秦丞相决䇿元功精忠全徳陳文恭旌忠顯徳楊和王安民定功佐運興徳劉忠顯旌忠褒節呉信王安民保蜀定國同徳韓蘄王中興佐命定國元勲史太師純誠厚徳元老周益公忠文耆徳大臣諡之極美者大臣諡之極美者有二本勲勞則忠獻為大論徳業則文正為美有國二百年諡忠獻者才三人趙韓王韓魏王張魏公是也諡文正者亦才三人王沂公范汝南司馬温公是也其品可知矣李司空王太尉皆諡文貞宣政間蔡卞鄭居中亦諡文正終不足錄渡江後秦惠諡忠獻寔博士曹冠為之定諡不許更易慶元來京丞相薨賜諡文穆既而其子沆請避家諱改文忠于是言者以為楊億巨儒既諡曰文議者欲加一忠字竟不之與夫加一字猶不可况諡以二字又欲極美乎望勅攸司自今議諡務當其寔其或不然當准古法以選舉不寔論若定諡已下其子孫請再更易者以違制論從之渡江後改諡渡江後公卿諡號王仲言揮麈錄有之但殊脫畧今不能盡記記其更易者韓師朴丞相初請諡王剛中為博士曰文禮諡法奉議順曰禮取其為禮官時不主王荆公坐講之議也而韓氏子謂自來未有以禮為諡者以白時相范覺民覺民語剛中剛中不為改于是用吏部覆議改為文定左選侍郎李長民京東帥曽季序之死博士錢葉諡曰剛愍執政嫌之乃改威韓都尉嘉彦之請諡也博士華權定為夷節而方庭實在考功以端節易之司馬侍郎朴之賜諡也博士林彦宗定以忠肅而張敬夫在吏部以忠㓗易之四者皆于諡未定之前更易者也代州王忠植之死事也太常諡為義節而秦丞相以無忠字疑之再令别議太常謂若以忠為諡則子孫誦之非易名之義遂已孝宗初立命有司為岳飛作諡太常議危身奉上曰忠使民悲傷曰愍孝宗以為用愍則于上皇為失政却之乃改為武穆此二者皆于諡以定未下之前有所退却者也劉萃老丞相初諡正肅當矣而正字犯丞相父名為忠肅趙崇公叔寓初諡敦簡美矣而敦字與光宗御名同音其曽孫徳老請于朝改諡清簡此二者皆出于諡號已下之後然迫于名諱不容不避者也葢自紹興至淳熈六十餘年之間改諡纔六七皆有所為非京丞相之比矣張參政初諡文定汪聖錫為吏部尚書駁之乃改章簡後其孫貴竟復諡文定焉建炎雜記甲集卷九

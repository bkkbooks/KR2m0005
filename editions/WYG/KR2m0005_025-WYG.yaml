body:
  text: 建炎雜記乙集卷五宋李心傳撰御制作寳璽國朝南渡之後御府所藏玉寳凡十有一金寳三玉寳一曰鎮國神寳承天福延萬億永無極二曰受命寳受命于天既夀永昌此二寳封禪則用之三曰天子之寳答外夷書用之四曰天子信寳舉大兵用之五曰天子行寳封冊用之六曰皇帝之寳答鄰國書用之七曰皇帝信寳賜鄰國書及物用之八曰皇帝行寳降御劄用之此所謂八寳也皆高宗作九曰大宋受命之寳太祖作十曰定命寳範圍天地幽贊神明保合太和萬夀無疆徽宗作十一曰大宋受命中興之寳高宗作金寳一曰皇帝欽崇國祀之寳印香合詞表二曰天下合同之寳即中書門下省文字三曰詔書之寳印詔書自秦以前上下通稱璽春秋傳季武子取卞璽書追而與之戰國䇿欲璽者段干子是也秦有天下始制天子皇帝六璽自是惟諸侯王得稱之唐武后長夀二年改璽為寳以璽音近死故易之天寳十載又合受命傳國為八寳八寳之稱自此始矣唐末喪亂八寳或亡或失周廣順中始造二寳曰皇帝承天受命之寳皇帝神寳太祖革命傳其二寳至太宗别製承受天命之寳寳廣四寸九分厚一寸二分填以金盤龍紐檢高七寸廣二寸四分自是遂為定制鎮國神寳者仁宗皇祐五年七月所作也篆如其名宰相龎籍書受命寳者哲宗元符元年五月所受也其文相傳是為秦璽者李斯之魚蟲篆也其圍四寸衛宏曰秦以前金玉銀為方寸璽秦以來天子獨用玉按玉璽者以此璽為趙氏之璧刻者璧本卞和所獻之璞藺相如詭奪者余嘗以禮制考之璧五寸而有餘但不得復刻為璽此説謬矣至漢謂之傳國璽自是迄于獻帝所寳用者秦璽也丁嬰所封元后所投王憲所得赤眉所上皆是物也董卓之亂失之吳書謂孫堅得之洛陽甄宫井中後為袁術所奪徐璆得而上之殆不然也若然魏氏何不寳用而又自刻璽乎厥後歴世皆用其名永嘉之亂没于劉石永和之世復歸江左者晉璽也魏氏有國刻傳國璽如秦之文但秦璽讀自右魏璽讀自左耳晉有天下自刻其璽其文曰受命于天皇帝夀昌本志輿服志乃以為漢所傳秦璽實誤矣此璽更劉聰石勒逮石氏死其臣蔣幹求授于謝尚乃以璽送江南王彪之辨之亦不云秦也太元之末得自西燕更渉六朝至于隋代者慕容燕璽也晋孝武太元十九年西燕主求救於郗恢并獻玉璽一紐方濶六寸高四寸六分文如秦璽自是歴宋齊梁皆寳之侯景既死北齊辛術得之廣陵獻之高氏後歴周隋誤指為秦璽後平江南知其非是乃是謂之神璽焉劉裕北伐得之關中歴晉暨陳復為隋有者姚秦之璽也晉義熙十三年劉裕入關得傳國璽而上之大四寸文與秦璽同然隱起而不深刻隋滅陳得此指為真璽遂以宇文周所傳神璽為非是識者謂古璽深刻以印泥後人隱起以印紙則此深刻者非秦璽也姚氏取其文作之耳開運之亂没於耶律汝貞獲之以為大寳者石晉璽也唐太宗貞觀十六年刻受命璽文曰皇帝景命有徳者昌後歸朱全忠及從珂自焚璽亦隨失徳光入汴董貴以璽上之云先帝所刻蓋指石敬塘也蓋在當時皆誤以為秦璽之亡則已久矣紹聖三年冬咸陽民叚義者斵地得璽以獻學士承旨蔡京言于朝曰此秦寳也遂以五月朔大朝㑹受之受寳之禮昉乎此矣徽宗崇寧五月有獻玉印者只有方寸其文曰承天福延萬億永無極大觀元年既得美玉良工遂黜皇祐鎮國元符受命二寳不用命工更刻而以九字為神寳之文合天子皇帝六寳為八寳以二年正月元日受之政和七年復得美玉乃將九寸以作定命寳命蔡京鐫十六字為文謂之九寳以八年正月元日受之又有皇帝恭膺天命之寳至道三年真宗嗣位時所制也後從葬定陵乾興元年仁宗即位更制之㕘知政事王曽書天聖元年為火所燔又制焉叅知政事陳堯佐書後從葬昭陵學士范鎮禮官王言言宜為天子傳器不當改作而弗聽也嘉祐八年六月英宗又制焉叅知政事歐陽修書神宗哲宗皆循此制哲宗寳門下侍郎章亨書靖康之難金人取玉寳十四蓋八寳之外餘寳凡六而皇帝恭膺天命之寳居其二焉其一則徽宗元符三年所制也其一則欽宗靖康元年所制也高宗渡江庶事草創逮紹興十六年再郊始備八寳不復作矣大宋受命之寳者建隆開基所創也史冊不載圍城中副留守邵慱取而藏之張邦昌遣使奉迎大元帥于山東因以為獻定命者宣和内禪藏龍徳宫金人不知之故弗取受命中興寳者高宗紹興元年所作也玉甚美視定命寳猶大半分金寳三皆建炎三年秋所作總論應天至統天十四厯黄帝至周世宗三十六厯㳂革附自黄帝考定星厯建立五行起消息正閏餘堯厯象日月星辰舜在璿璣玊衡以齊七政至於夏商周之世咸正厯紀迄三代之末厯凡七變漢興襲秦正朔以張蒼言用顓帝厯於六厯踈濶中最為微近而晦朔弦望滿虧多非是孝武元豐間乃命唐都洛下閎之徒造八十一厯名曰太初其法以律起晦朔弦望皆密至孝成時劉歆究其微眇作三統厯以十九歳為一章二十七章為一㑹三㑹為一統三統為一元逮後漢時厯復疎濶乃㑹日官造四分厯以九道法候弦望始無差忒至孝靈時劉洪考古今厯法乃悟四分于天疎濶皆斗分太多之故遂又作乾象厯方之前法轉為精密蓋漢四百年間厯凡四變自魏晉迄隋又十五變唐高祖革命始命傅仁均為戊寅元厯太宗又命李淳風為麟徳甲子厯𤣥宗以推日食不效又命一行為開元大衍厯肅宗改至徳厯代宗改寳應五紀厯徳宗改建中正元厯憲宗改元和觀象厯穆宗改長慶宣明厯昭宗改景徳崇元厯蓋唐三百年厯凡八變自漢以降雖沿革不同然其法大抵皆不算積分上求諸千萬歳之前必得甲子朔旦夜半冬至而日月五星皆㑹於子之上元以為厯始識者謂太初歴法號為最密攷今之氣朔則已差數日矣其間有所長者如劉洪首著日行遲月行疾陰陽交錯于黃道表裏晉虞喜始悟日行一歳之中有不匝周天之數自歳差積久漸退失度姜岌歩月食之衝日行之度遂正躔次紀宋何承天攷正日晷知南至之端又用强弱率以配日法以求朔䇿之餘分乃合簡易之要北齊張子正以圜儀揆天測知五星有入氣盈縮之差傅仁均以合朔定月之大小不過連三則日月之食常在朔望李淳風謂前厯分度數参差不齊立演撰法使一術以齊之立九服晷漏之術隨所在而永合焉徐昇創氣刻二差定日之分稍驗各成一家法後代述之者互有損益漸加精密自五代之調元次及欽天而厯法始弊調元作于馬重績施于晉代其法則不復推古上元冬至七曜之㑹而起唐天寳十四載乙未為上元用正月雨水為氣首蓋倣曹士為小厯之舊失之矣欽天作于王樸施于周世宗時而樸昧乎前人簡易之要求之不合遂於朔分之下横立小分而謂之秒説者謂前代諸厯朔餘未有秒者若朔餘可以用秒則可隨意而加減何待求日法以齊朔分也是時民間又有所謂萬分厯者明厯之士往往鄙之太祖皇帝建隆二年始命王處訥造應天厯處訥乃用一萬二分為日法蓋用萬八増二得强率二百有一得弱率九百二十六乗强率以九萬弱率併二者得五千三百七為朔䇿之餘分則强弱適中合簡易之要自然無秒太宗皇帝太平興國初以應天厯置閠有差厯官吳昭素造厯賜名乾元朔餘太强施用未久朔望復差貞宗皇帝命史序造厯賜名儀天仁宗皇帝天聖二年命宋行古造厯賜名崇天及推嘉祐八年十月望月食厯乃後天二刻遂命周琮更造新厯琮測景驗氣始知前厯氣常後天半日改而政之英宗皇帝朝厯成賜名朝天琮于朔望餘分特晩數刻欲合嘉祐八年十月望月食及推熙寧元年正旦日食厯乃後天數刻復與崇天合遂再用崇天頒朔神宗皇帝命衛樸造厯賜命奉天沈括存中時提舉司天監以謂樸能正崇天之失而不知周琮正之在前矣哲宗皇帝元祐五年十一月癸未冬至驗景長之日乃在壬午遂改造新厯賜名觀天徽宗皇帝朝有司以觀天推熙寧二年十一月朔為丙子頒厯之後始悟其朔當進而失遂造占天厯十一月朔丁丑而再頒厯焉既而厯官言占天成於私家不經考騐不可施用乃命姚舜輔等復造新厯視崇天減六十七刻半始與天道相合厯成賜名紀元自大觀元年頒用以紀元推紹興五年正旦日食九分半虧在辰正時常州布衣陳得一獨建言定八分半虧在已初是日果如得一所定高宗皇帝乃命得一造厯秘書少監朱震子發監視厯成賜名統元自紹興六年頒用凡十五年而後有司守之不專暗用紀元之法推歩而用統元之名頒厯乾道二年夏日官以紀元推丁亥十一月朔為甲子欲為刋刻間有武節郎裴伯夀者詣禮部及都省具陳統元厯法推是朔當進作乙丑於是依統元厯法改而正之㑹進士劉孝榮言見行厯交食先天六刻火星差天二度乞造新厯孝榮自謂已有厯不半年而可脩進伯夀獨以謂凡造厯必先立表測景驗氣然後作厯庶可精密不在于速成而判太史局吳澤不達造厯立表之法妄言銅表難成木表易壞蓋欲黨附孝榮僥倖求造厯以覬一時之爵賞固執以難成而沮抑之也其年九月乙卯遂命禮部侍郎周執表卿提領改造新厯表卿亦謂立表驗氣之説經渉歳月由是不行孝榮乃倣萬分厯分作三萬分以為日法命之曰御覽七曜細行歴上之事且預定丁亥歳四月朔日食一分如不驗甘俟朝典太史局亦謂當食二分伯夀皆以為不然既而定之其日晴明而日不食孝榮又定是歳八月望月食六分半俟之止及五分又定戊子歳二月望月食九分以上出地其光復滿係大内二更五㸃而伯夀以為是月之食當既生光在戌初二刻復滿在戌正三刻係大内二更二㸃後伯夀所言皆驗孝榮始論見行厯交食先天六刻及考驗孝榮所定月食光滿乃後天四刻單行可為侍御史固請取二厯所定日月五星躔度其説異同者俟其可驗之時以渾象測之察何厯為近而取其屢中考以定新厯十一月壬辰詔國子司業權禮部侍郎程大昌泰之監察張御史敦寔往太史局監視考驗而紀元及孝榮二厯各有差者行可又乞自同泰之考驗四年三月庚申許之既而二人言以統元紀元及新厯對測星度四事新厯全密者三稍密者一舊厯皆疎李仁父時為禮部郎官繼復與行可往測驗七事而新厯稍宻者五踈者二其四月癸丑先令太使局將舊厯叅照使行五月庚辰遂詔施用新厯仍以乾道為名時孝榮已為保章正同知算造矣而仁父復論厯久必差自當改作但近被㫖監視適逢新厯太陰熒惑兩事之差恐將來成書差者必多乞益募能者熟復討論補治新厯六月己丑詔諸路搜訪精通厯法之人具名申省未㡬有福州阮興祖者言新厯七卷篇中差謬唐志開元十二年測景于天下其安南測夏至午中晷在表南三寸三分劉孝榮新厯算在表北七寸其鐵測冬至午中晷長一丈九尺二寸六分劉孝榮新厯算晷長一丈四尺九寸九分其差謬類如此同判太史局荆大聲不以白部擅補興祖為局生新厯之成也大聲與孝榮共為之至是乃言其法多差遂命大聲别演一法與孝榮比較五年春正月比較二法各有疎繆厯算官蓋堯臣等乃自又演一法上之四月己丑遂命孝榮大聲伯夀各具五月以後至歳終月星躔度申御史臺令見測驗官占考六年九月戊戌有成都府進士賈俊者上厯法九議詔給五人衙官劵館于臨安府九年五月甲寅日官言來年十二月紀元乾道厯係小盡則正月朔在癸未崇天統元厯係大盡則正月朔在甲申是謂疑朔詔厯官看詳指定而荆大聲者謂乾道厯定今年五月日食在午初二刻今測驗得在午時五刻半以此推之則己未年正月之朔已過甲申日四百五十分合作大盡從之淳熙三年三月己丑判局李繼宗等又撰新厯七卷進呈上謂輔臣曰自古以來厯未有不差者况今世此法不專士大夫無習之者求之草澤又難得其人新厯比舊所謂彼善於此不須别命名可以淳熙厯為名五年厯官推九月庚寅晦既頒厯矣而北來賀生辰者乃以為己丑晦實小盡也于是㑹慶節差一日樞密院檢詳文字丘崈宗卿接伴調獲久之金人乃肯用正節日上夀荆大聲乃妄改甲午年十二月為大盡故後天一日矣十二年九月成忠郎楊忠輔言淳熙厯因陋就簡茍且附㑹天道不合自戊戌以來朔差者八年矣今歳九月望日食當在晝而淳熙厯法當在夜以此辨之是非可決兼同臨安地形準之月起虧時日光已盛必不見食而日官言所推在卯初三刻係大内攢㸃㡬刻後乃命禮部侍郎顔師魯視驗㑹雲色遮蔽而止十三年三月丁酉右諫議大夫蔣繼周世修奏民間有知星厯者乞特加試用仍選差領提官以董其事如祖宗之制上曰朝士知星厯者必少不必差官專領乃詔諸路有通曉天文厯算之人令所在州縣報明以聞八月丁丑布衣皇甫繼明等言今歳九月望以淳熙推之當在九月十七日實厯弊也太史乃注望于十六日之下徇私遷就以掩其過乞以今年八月望日太陰虧食及晦日月見東方二事定驗疎密詔師魯世修同視既而厯官劉孝榮所定月食差一㸃繼明等差二㸃楊忠輔差三㸃乃罷遣之十四年四月癸酉國學生㑹稽石萬又請考正厯法之差且言去歳測驗太陰虧食之時蓋大内更㸃乍疾乍徐隨景走算以肆欺蔽因上所著五星再聚厯乞與日官比較詔後省看詳開奏繼明等言淳熙厯立法乖疎必假遷就五星再聚厯乃用一萬三千五百為日法蓋竊取唐末崇元舊厯而婉其名耳皆未可用乞改大厯詔後省同禮部秘書省看詳六月辛未朔給事中王信誠之奏乞令劉孝榮皇甫繼明石萬各造來年一歲之厯詳加測驗取其無差者十二月丙子繼明萬新厯成與淳熙厯差二朔萬等乞以其年六月二日十月晦日月不應見而見為驗㫖朔豈可差朔差則所失多矣乃命禮部侍郎尤袤延之秘書丞宋伯嘉之瑞監視十五年六月二十日丁卯尤袤以疾改命吏部侍郎章森徳茂同往是夜月光明盛十月二十九日壬辰晦延之往視晨見東方十一月七日庚午進呈周丞相言萬等以為月體尚存一分則不應小盡上曰十一月朔在辰時所以二十九日早尚存月體耳十六年十一月壬午承節郎趙渙復言新厯今歳冬至後天一辰詔禮部侍郎李巘之著作郎鄧千里秘書丞黃艾伯耆校書郎王叔簡恭父同驗視紹熙元年八月庚戌遂命同判局劉孝榮改造新厯孝榮已與吳澤荆大聲同造三年正月甲寅歴成詔以㑹元為名十二月甲午朔布衣王孝禮言今年冬至日影表當在十九日壬午西㑹元厯乃在二十日癸未係差一日蓋陳得一劉孝榮所造四厯皆未嘗測影止是寫擬分數所以後天乞將修内司所掌銅表圭面降付太史局測驗從之時雖朝廷多事未睱治厯而忠輔渙則已為日官矣慶元四年九月太史言月食于晝而草澤言食於夜驗視如草澤言有旨改作仍命秘書省正字馮履叔常叅定五年五月壬辰朔厯成賜名統天至今用之蓋自建隆慶元二伯五十年之間厯四十變上距黃帝之歴凡五十變矣而知厯者謂統天新厯尤復疎繆昔洛下閎太初厯成自言八百年當差一度其後未及八十年固已差一度矣李淳風亦曰一氣差三度九日差一刻又曰自太初下至麒徳差四日自太初上及僖公差三日一行亦曰劉洪厯四十五年差一度梁武帝厯八百十六年差一度以前人厯術之精猶不免此况賤工之草創者乎大扺唐以後律厯之法不傳士大夫無所從受而星厯人類多鄙淺是以不足以推明其學也近世蔡元定季通號為知數而亦未嘗見於用余嘗考易之象曰澤中有火革君子以治厯明時革者變治而明之則非但因其已成而無所事乎損益也故記其本末如此以待能者攷焉炎興以來勅局廢置律令者自魏李悝漢蕭何以來有之厯代相傳皆以律書為本至周世宗始謂之刑統國初因之其刪修但属大理寺逮天聖編勅始有詳定編勅所别命官領之淳熙以後詔修一司勅令則又以編修諸司勅式所為名隆祐改熙豐之法則又以重修勅令所為名自後迄政和不改政和元年冬始頒海行勅十二月十一日靖康元年又更修焉其秋議者乃乞用元豐嘉祐之間以俟新書之成九月十三日丙子其冬又詔録用嘉祐如斷刑依元豐十月十四日丁未建炎元年夏因滁州推官趙伯總有言復詔政和海行法非御筆修立者許引用四月二十四日丁亥三年夏復辟赦書修復仁宗故事遵用嘉祐修法四月八日乙卯刑部侍郎商守拙因乞以嘉祐政和二勅相照賞典並從重條約並從寛許之四年夏詔勅令所將嘉祐政和條制對修成書大理卿兼同詳定一司勅令主依乃乞召人言編勅利害仍以詳定重修勅令所為名令寺官局官同共條對六月初七日丁丑後三日始命宰臣范宗尹提舉重修勅令叅知政事張守同提舉其秋言者乞令省部百司吏人將所省記條攢類成册聞奏八月辛未朔至紹興元年秋守等始以紹興重修勅令格式及申明看詳等總七百六卷上之八月四日戊戌自是迄於三十年之秋勅局所修之書又一千八百六十三卷紹興三年九月朱勝非等上吏部勅令格式等一百八十四冊六年九月張浚等上禄秩新書等二百四卷卷八年六月趙鼎等上諸班直諸軍轉員勅格式十三又上親從視事官轉員勅令格七卷格十月秦檜等上禄秩勅令格三十二卷又上三省令二卷樞密院令格二卷六曹寺監通用令一卷太常宗正大理寺通用令一卷右治獄令一卷以上目録申明共十二卷十年十月上在京通用勅令格式六十七卷寺監十二年十二月上六曹通用勅令格式十卷又上通用勅令格式十卷庫務通用勅令格式八卷六曹寺通用勅令格式十卷六曹監庫務通用勅令二卷又申明四卷十三年十月上國子監勅令格式十四卷又上太學勅令格式十四卷武學律學勅令格式各十卷小學勅令格式二卷監學申明等八卷十十七年十一月上常平免役勅令格式申明等共五四卷十九年六月上吏部續降拜别編共四百三十五卷十二十一年七月上監法勅令格式續降等共一百五五卷又上茶法一百四卷寺監庫務通用勅令二卷十二十三年十一月上太宗正司勅令格式申明等八七卷二十五年九月上紹興寛邱詔令二百卷共二十六年十二月万俟卨等上貢舉勅令格式千頁四十五卷又上釐正省曹寺監内外諸司等法四卷等三十年八月陳康伯等上參附吏部勅令格式申明共七十二卷又上刑名疑難斷例二十一卷通海行法為二千六百二十卷有奇論者以為官吏猥多賞費亦濫三十一年遂罷之檢尋月日未獲三十二年夏月旨裒集上皇聖政吏部侍郎徐度乞復置勅令所從之六月二十九日甲午乾道四年冬秘書少監兼權刑部侍郎汪大猷言建炎後續㫖凡二萬條前後殊不合請刪修為書俾吏不得肆詔可之十一月八日乙酉乃以重修勅令所為名六年冬又以詳定一司勅令所以名十二月十九日乙未置提舉官二以属宰相同提舉一以属執政詳定一從官為之刪定官五視曩時官減三之一吏胥徒減三之二自乾道以後新修之書又為三千一百二十五卷乾道二年六月刑部侍郎方滋上特旨斷例七十卷六年八月虞允文等上乾道勅令格式等二百四十六卷共九年二月梁克家等上三省樞密院勅令格式等項一百四十卷看詳議義五百卷淳熙二年十二月龔茂良等上吏部七司法三百卷新三年三月上吏部條法四十卷四年五月上淳熙編特旨斷例四百二十件二十一月十一日李彥穎上淳熙重修勅令格式等項百四十六卷六年七月趙雄等上一州一路酬賞法四項共二百二十三卷看詳六百三十八卷七年五月上淳熙條法事類四百二十二卷十一年五月本所上隆興以來寛恤詔令三百卷而一路别法已修者一千二百餘件外不預焉故例刪定官多以選人為之往往未嘗通練古今明習法律經歴州縣一切受成吏手書成牴牾言論較駁輙往更定間有至局旬月未嘗筆削一字適遇進書亦得改官者遂為宰執周旋親故之地失當時建局命官之意矣淳熙十五年夏林黃中以兵部侍郎兼詳定官四月二十九日乙未未踰月即為上言古今之方書有盡而生民之疾證無窮必欲某里某人某方某證為立準式此其用之則齟齬而不合矣紹興所修一司勅令多歴年所不曽頒降今之所修既已斷絶亦無頒降之期縱使頒降而不免牴牾重别申明則不若無書之為愈也望將已修浙江福建湖南北路條法千二百卷免行供進六部各據所𨽻條件抄録從本所用印以憑照用其京西兩淮未了條法仍令日下刪修結局捐不急之官省無用之費不為無補上從之罷勅令所限一月結局六月三日戊辰紹熙二年夏工部侍郎潘景珪言法令一書久不刪潤乃復置詳定勅令局差詳定官一員刪修官三員四月十三日庚寅差官五月六日癸丑治立局名然未有所進也慶元二年春復置提舉同提舉仍以編修勅令所為名二月六日庚辰遂移牒六曹大理寺及三衙江浙近便州郡監司抄錄乾道五年正月至慶元二年十二月終續降指揮得數萬事參酌淳熙舊法五千八百條刪修為四百七十卷送刑部詳審訖供納提舉官下三省合属房分及檢正都司審覆為書總七百二冊勅令格式及目錄各一百二十二卷隨勅申明十二卷看詳四百三十五冊四年九月丙申進呈自是已修之書次第修進如撮要總類之属殆不一名而編帙浸繁矣文鑑文鑑者吕伯恭被旨所編也先是臨安書坊有所謂聖宋文海者近歳江鈿所編孝宗得之命本府校正刻版時淳熙四年十一月也其七日壬寅周益公以學士輪當内直召對清華閣因奏陛下命臨安府開文海有諸上曰然益公曰此編去取差謬殊無理論今降㫖刋刻事體則重難傳後莫若委館閣官銓擇本朝文章成一代之書上大以為然曰卿可理㑹益公奏乞委官職上遂令伯恭校證本府開刻其日甲辰也始趙丞相以西府奏事上問伯恭文采及為人何如趙公力薦之故有是命伯恭言文海元係書坊一時刻行名賢高文大冊尚多遺落乞一就増損仍斷自中興以銓次庶㡬可以行遠十五日庚戌許之後數日又命知臨安府趙磻老并本府教官二員同伯恭校正二十日乙卯磻老言臣府事繁委若往來秘書同共校正慮有妨礙本職兼䇿府書籍亦難令教官攜出乞傳令祖謙校正從之於是伯恭取秘府及士大夫所藏本朝諸家文集旁采傳記他書悉行編類凡六十一門為百五十卷既而伯恭再遷著作郎兼禮部郎官五年十二月十四夜得中風病六年春正月引疾求去十一日庚午有詔予郡伯恭固辭後十三日癸未上對輔臣因令王季海樞使問伯恭所編文海次第伯恭乃以書進二月四日壬辰上又諭輔臣曰祖謙編類文海採摭精詳可與除直秘閣又遣中使李裕文宣諭賜銀帛三百匹兩時方嚴非有功不除職令舍人陳叔進將􅌳之先以白丞相趙公公諭今毋繳叔進不從七日乙未輔臣奏事上諭曰祖謙平日好名則有之今此編次文海採取精詳且如奏議之精有益於治道於是批旨曰館閣之職文史為先祖謙所進文海採取精詳有益治道故以寵之可即命叔進草制制曰館閣之職文史為先爾編類文海用意甚深採取精詳有益治道寓直中秘酬寵良多爾當知恩之有自乃行之不誣用竭報焉人斯無議時益公為禮部尚書兼學士其月十八日丙午得旨撰文海序四月三日辛卯進呈乞賜名上問何以為名益公乞名皇朝文鑑上曰善時序既成將刻板㑹有近臣密啟云所載臣寮奏議有詆及祖宗政事者不可示後世乃命直院崔大雅更定増損去留凡數十篇然迄不果刻也張南軒時在江陵移書晦翁曰伯恭好弊精神于閒文字中徒自損何益如編文海何補于治道何補於後學徒使精力困於翻閲亦可憐耳臣承當編此等文字亦非所以承君徳也今孝宗實錄書此事頗詳未知何人當筆其詞云初祖謙得旨校正蓋上意令校讎差悞而已祖謙乃奏以為去取未當欲乞一就増損三省取旨許之甫數日上仍命磻老與臨安教官二員同校正則上意猶如初也時祖謙已誦言皆當大去取其實欲自為一書非復如上命議者不以為可磻老及教官畏之不敢與共事故辭不肯預而祖謙方自謂得計及書成前輩名人之文蒐羅殆盡有通經而不能文詞亦以表奏厠其間以自矜黨同伐異之功薦紳公論皆疾之及推恩除直秘閣中書舍人陳騤繳還比再下騤雖奉命然頗詆薄之祖謙不敢辨也故祖謙之書上不復降出云史臣所謂通經不能文詞蓋指伊川也時侂胄方以道學為禁故詆伯恭如此而牽聯及於伊川云然余謂伯恭既為詞臣醜詆自當力遜職名今受之非矣黃直卿亦以余言為然建炎雜記乙集卷五

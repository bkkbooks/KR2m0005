body:
  text: 建炎雜記甲集卷一宋李心傳撰君徳寧皇登位前載憲聖䇿立寧皇事雖黄屋初非堯心而天下皆謂宜立光皇當勵精之初薛公圭投北宫麗正書言頗切至葢孝宗之意初主沂邸光皇亦屬意焉書畧曰庻之亂嫡自宫闈始夫庶之亂嫡則支之亂本之漸也而支之亂本則異姓之亂同姓之漸也異姓之亂同姓則又外域亂中國之漸也又曰陛下踐阼今既五年皇子嫡長已踰弱冠玉册之命未布而青宫之席尚虚又曰陛下不即天下之安而冒天下非常之危不守天下之常而覆天下不測之變採之游言殊有驚悸採之國論曾無建明又曰祖父互疑天地幾變子孫猜防上下解體支嫡交忌臣民異心臣始聞之未敢遽信今既日久不容無惑道路之言喧傳百端中外之心憂疑萬狀燕公聞之寧無懐貳乘輿聞之莫或改容藩邸聞之未免憂禍此何等事也而俾見於世此何等議也而俾聞於時陛下謂孝宗盍亦自思其何以得此議固宜自盡吾為祖為父之道也上光宗盍亦自思其何以得此議固宜自盡吾為子為孫之道也又曰陛下曾知有竊議之人乎否也問之左右問之在朝葢有君也不敢言矣問之主上葢有父也不敢言矣問之太子葢有祖矣仍有父也尤不敢言矣為臣之言不通於君為子之言不通於父為孫之言不通於祖而微臣僣言之死有餘地矣如䝉聖恩特垂天聼君臣之情通自臣言始父子之情通自臣言始祖孫之情通自臣言始臣雖身首異處而忠孝獲書於史册雖瞑目於地下將有辭以對越先朝十御皇帝在天之靈矣盖紹熙五年甲寅嵗所上也嘉熙壬寅公圭之里人陳貴明為䟦其書云􅂴菴趙蹈中載寧廟之立寔出於水心先生之建議雖然水心之議特出於一時之危疑蹈中所載寧廟登極之詔遲下數月襄州之亂作矣特以詔至而止嗚乎孰知有獻䇿於承平無事者哉初光宗疾不能喪襄陽士人陳應詳陰連北方鄧州叛黨欲殺守臣張定叟用縞素代皇帝為太上執喪且舉襄以順地適寧皇登極之詔甫三日而至陳遂變色寢謀旋為其黨所訴定叟臨閲塲問之曰朝廷負爾耶太守負爾耶命各將士射之先誌其箭中其肝者有某賞中其心者有某賞中其體若肢者有某賞發陳之篋惟縞巾數千云先是趙蹈中具載水心贊嘉邸之語數十百親筆其顚末紹翁未之見也薛君永嘉士人子夢桂嘗以其書藁示紹翁當時陳議者恐不止一薛然曲突徙薪之不賞自昔然矣景靈行香百官赴景靈行香僧道分為兩序用其威儀咒語初僧徒欲立道流右且曰僧而後道至交訟久之秦檜批其牘云景靈太乙寔崇奉道教之所道流宜居上至今定為制云紹翁以為祖宗在天之靈必不顧歆於異教且市井髠簮之庸人宜皆斥去近者淳祐進書例用僧道鐃鼓前𨗳朝廷有㫖勿用葢得之矣惜未施於原廟髙宗六飛航海揮麈第三録第一卷載髙宗六飛航海事有宣教郎知餘姚縣李頴士者募鄉兵數千列其旗幟以捍拒之敵既不知其地勢不測兵之多寡為之小却徬徨不敢進者一晝夜由是大駕得以自定海登舟航海事平頴士遷兩官擢通判州事頴士字茂實福州人登進士第紹興中為刑部郎中紹翁謹按揮麈所載李某事迹皆當葢紹翁本生祖也本生祖其先為光州固始人徙居建之浦城非福州也秀岩李公心傳朝野僉載以真公徳秀常以書義魁鄉舉眞公業詞賦亦嘗為魁著述斯難矣不知秀岩曾刋定否寧皇御舟張巨濟字宏圖福清人嘉泰間上書寧宗以慈懿􅑼陵今在湖曲若陛下遊幸則未免張樂此豈履霜露之義寧皇感悟其言旋轉一秩由此湖山遂無清蹕之聲非特儉徳云御鷁至沉於波臣黄洪詩云龍舟大半没西湖便是光皇節儉圖三十六年安静裏棹歌一曲在康衢忠清廟制詞顯仁太后龍輴將渡㑹稽上聖孝出於天性預恐風濤為孽遥於宫中黙禱忠清廟及篙御既戒浪平如席上命詞臣行制詞以封之曰追惟文母將祔裕陵閟殿告成容車將發奈以大江之阻具形羣辟之憂既竭於誠亟孚神聽某王一節甚偉千古如存帖然風濤既頼幽冥之相煥乎天寵用昭崇極之恩尚綏於四方之民以綿爾百世之祀可特封忠壯英烈威顯王葢於舊號四字上加忠壯二字髙宗御書石經髙宗御書六經嘗以賜國子監及石本於諸州庠上親御翰墨稍倦即命憲聖續書至今皆莫能及光皇御製孝宗崇憲聖母弟之恩故稱琚兄弟皆以位曰哥至光宗體孝宗之意故稱琚兄弟曰舅琚尤聖眷後苑安榴盛開光皇以廣團扇自題聖作二句曰細叠輕綃色倍濃晩霞猶在緑陰中命琚足之公再拜援筆即書曰春歸百卉今無幾獨立清微殿閣風上稱嘆者久之憲聖於二王中獨導孝宗以光皇為儲位故公落句有獨立之詠寄意深矣團扇猶藏其家又有石刻火後俱不存云孝宗御製賜呉益孝宗以太母故加眷呉郡王益益太母弟也秋氣向清聖意怡懌至於手書御扎一聨云稱此一天風月好橘香酒熟待君来命近璫持賜益益入對頓首稱謝上曰聊復當折簡耳建炎雜記甲集卷一

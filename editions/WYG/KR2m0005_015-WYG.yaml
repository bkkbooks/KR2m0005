body:
  text: 建炎雜記甲集卷十五宋李心傳撰財賦二常平苖役之制耆戸長雇錢常平苗役之政自熙寧始建炎初遂罷之其二年冬吕元直葉少藴張達眀孫仲益在從班奉詔討論常平法元直等以為此法不宜廢如免役坊場亦可行惟青苖當罷上曰青苖斂散永勿施行遂置諸路主管官追還糴本紹興八年冬李泰發參政復為上言常平法本於漢耿夀昌豈可以王安石而廢之九年遂復提舉官使掌其政然自軍興後常平漕往往撥以贍軍無復如曩時之封樁矣免役錢自熙寕以來已有寛剰之數建炎元年既増射士六月乙亥議者恐費不給眀年夏乃詔官戸役錢勿復減半而民戸役錢槩増三分五月庚戌三年復減之趙直閣善飬議詔品官子孫名田減父祖之半餘同編戸差役其詭名寄産皆并之三月丁丑乾道二年李侍郎若川復請令官戸全納役錢二月辛未上初不可旣而卒行其年六月耆戸長雇錢者舊以免役錢給之建炎四年廣西漕司請罷戸長而用熙豐法每三十戸逐料輸甲頭催租八月辛未紹興初遂盡取其庸錢𨽻提刑司元年五月戊午既而以差甲首不便者五乃不復行而耆戸長雇錢因不復給五年詔其錢分季起發赴行在正月壬戌後遂為總制窠名焉義倉義倉創始於慶歴元年其法令民上三等每税米二斗輸一升以備水旱後亦廢熙寧初神宗嘗欲復之會王介甫主青苖因為上言人有餘粟藏之於家何害而顧乃使之輸官非良法也乃止二年七月熙寧末王尚書古為司農簿奏復行之仍聼就縣倉輸自是義倉入縣倉矣十年九月元豐八年又罷之紹聖初復立然議者謂義倉當留諸鄉以備水旱可也今併入縣倉悉為官吏移用後又命上三等戸輸郡倉轉充軍倉或資他用故㓙年無以救民之死失古立法之意矣紹興末趙郡王令服在戸部言州縣義倉多陳腐請嵗以三之一出陳易新又請水旱傷災檢放不及七分即許賑濟沈守約丞相持不可上獨許之二十八年九月乙酉眀年浙西提舉呂廣問言諸道常平義倉名存實無請遣使核實除其虛數禁其移用二十九年六月壬寅遂命司農寺丞韓元龍往浙西覈實得糴米錢六十餘萬緡詔别行收糴今成都一路義倉歲額二萬七百斛有竒除賑給貧丐人外所餘無幾紹興五年髙平續為提舉遂刷本道義倉錢及金銀總為七萬五千餘緡别除米於彭漢蜀三州以備糴濟饑慶元六年宣城孟論為提舉又欲取本道抵當本錢六十餘萬緡以市義倉米朝廷不從近歲制置司又有廣會倉乃丘宗卿所創凡為米三十餘萬石制司自掌之㐫歲頗資用惟閩中魏元履處士朱元晦先生嘗置於里社每歲以待鄉民至冬而取有司不與焉今若以義倉米置倉於鄉社令鄉人之有行誼者掌之則合先王之遺意矣經制錢經制錢者宣和末鄭亨仲資政所剏也時方臘初平用度百出徽宗命亨仲以發運兼經制使亨仲乃創比較酒務及頭子錢頭子錢者唐德宗除陌錢之法也五代國初亦取之以供州用其數甚鮮康定元年始令其數申省不得擅支政和四年又令給納係省錢物每貫收五文及亨仲為經制遂令凡公家出納每千收二十三文共可供十三州縣及漕計支用而已所謂經制錢者其始行東南後又行之京東西河北歲入錢數百萬緡靖康初廢建炎二年冬上在維揚四方貢賦不能如期至行在戸部尚書呂元直翰林學士葉少藴乃請復之於是先取鈔旁定帖錢命提刑司掌之仍禁不得擅用十月壬戌三年冬遂命東南八路提刑司收五色經制錢赴行在一𣙜茶酒錢二量添賣槽錢三増添田宅牙錢四官貟等請受頭子錢五樓店務添收三分房錢十月戊戌紹興十七年二月又増頭子錢十三文充經制迄今東南經制錢歲入凡六百六十餘萬緡而四川不與焉凡公家出納每千經總二制共五十六錢視宣和時過倍總制錢總制錢紹興初孟富文參政所創也五年春髙宗在平江命富文提領措置財用富文請以總制司為名専察内外官司隐漏遺欠從之閏三月己丑於是首増頭子錢三十文四月乙未其十五文充經制窠名七文充總制窠名六文提轉兩司二文公使支用既又請收耆戸長庸錢抵當四分息錢轉運司移用錢勘合朱墨錢常平司七分錢四月癸亥人戸合零就整二税錢免役一分寛剰錢官戸不減半民戸増三分役錢四月辛未常平司五分頭子錢八月己酉並令諸州通判諸路提刑催充總制至十一年浙東一路收總制錢一百八十九萬總諸路准此乾道元年十月又増頭子錢每貫十三文充總制是時戸部歲入視其出闕七百萬緡故有増頭子錢及官戸不減半役錢之令蓋補經費也時虞并父當國有趙咨者獻言所在吏禄皆除頭子錢而京百官獨否除之歲可得七十萬并父命都司計之僅二十四萬緡以其不多而止時六年四月也至嘉泰初除四川外東南諸州額理經制錢七百八十餘萬經總制錢額廣西經總制銀經總制錢舊法守貳通掌而𨽻提刑司李朝正為戸部侍郎建炎始屬通判一嵗所入一千一百二十萬緡其後復命知通同掌無嵗不虧於是議者乃復請委通判事既行諸道因請以紹興十九年所入為準時汪明逺為侍御史上疏言財賦所出當究源流是年經界初行民輸隠漏之税葢是適然當取十年間酌中之數為額上可之然今東南諸路經總制錢歲收千四百四十餘萬緡又多於朝廷在户部之額三百萬矣乾道初孝宗嘗諭洪景伯丞相曰祖宗時財賦無經總制錢朕他時用度有餘即令民間免輸納然其所入浩大迄不容免也舊廣西經總制銀皆随税均取於民民甚以為患紹興二十六年二月髙宗用知雷州趙伯檉言下詔禁止云十六年專委通判後五年知通同掌四川經息錢四川經總制錢額理五百四十餘萬緡其一百三十一萬緡贍軍一百三十四萬緡應副湖廣總領所一百六十九萬緡上供六萬餘緡諸郡支用光宗受禪蠲湖廣三年錢四百餘萬緡對減鹽酒重額錢即此錢也然四路憲司歲撥湖廣錢實止六十萬緡故減之今後三年乃下而每歲所減通總司抱認亦財九十萬緡迄今遂為永例田契錢王瞻叔括契本末田契錢者亦𨽻經總制司舊民間典買田宅則輸之為州用嘉祐末始定令每千輸四十錢五年二月宣和經制増為六十四年六月靖康初罷建炎三年復之紹興總制遂増為百錢五年四月後以其三十五錢為經制窠名三十二錢半為總制窠名三十二錢半為州用十七年四月乾道末曽懐在戸部又奏取州用之半入總制焉七年七月先已詔牙稅外每千收勘合錢十文紹興五年三月後又增三文並充縂制窠名十七年四月而牙稅勘合之外每千文收五十六文分𨽻諸司大率民間市田百千輸於官者十千七百有奇而請買契紙賄賂吏胥之費不與由是人都憚費隐不告官謂之白契紹興三十一年軍興王瞻叔為四川縂領乃括民間白契稅錢以贍軍十一月丁酉報可遣官置司會三年飛申之籍許人告没三之一以其半給告者嫁資移囑隐其直者視隣田估之雖産去劵存者皆倍收其賦細民墓地亦首納筴錢於是除威茂珍州長寧軍闗外四州不括外他三十三郡共得錢四百六十八萬緡成都等二十四州未見數眀年沈徳和為制置使首以蜀中括契錢不便為言而議者亦譏其歛怨乃下詔自登極赦前頓帯白契者悉蠲之即已輸許對折二稅三十二年十二月戊寅命下瞻叔乃疏駮白劄子於朝且言不願輸者皆豪强與士大夫之家請理納如故詔白契在戸下者許行首納仍依赦免其倍輸隆興元年四月丁卯時瞻叔已被章而徳和入境遂檄郡凡三十年以前白契在戸下者悉放免之又截成都當輸總所折糴錢給民戸沈以元年五月到官瞻叔猶在蜀土上疏争之且言虞允文以買馬職事疑臣張震付邡甲戸輸金甚多故二人以此囑介請下御史䑓大理寺鞫實其實瞻叔以軍興用度不給因行一切之政故議者非之其後所括錢朝廷悉取他用總司迄不能有也今蜀中田契錢諸縣既有定額大抵不能敷則以其錢均取其牙儈人甚苦之隆興二年十二月丙申詔吴挺買御前馬價錢於椿管白契稅錢四百餘萬貫内取撥乾道元年五月辛未詔撥一百五十萬緡赴南庫二年二月壬寅又盡撥赴左蔵稱提錢稱提錢者鄭亨仲改四川宣撫副使為之紹興十四年始命益梓利三路茶鹽酒課及租佃官田應輸錢引者每千輸三十錢為鑄本於是三路每歲共得錢四十三萬一千六百九十道二百九十一文以其二十四萬七千緡為鑄本又得其贏餘十八萬緡有竒以助軍食之用至今不減月樁錢版帳錢月樁錢者自紹興二年冬始是時淮南宣撫使韓世忠駐軍建康宰相呂元直朱蔵一共議令江東漕臣月樁錢十萬緡以酒稅上供經制等錢應副其後江浙湖南皆有之雖命以上供經制係省封樁等錢充其數然所樁不能給十之一二故郡邑多横賦於民如江南之科罰湖南之麯引在上者迄無禁之大為東南之患紹興三年李泰發秉政為上言月樁錢害民而江東西尤甚請損之遂命諸路漕臣均定如窠名不足取㫖自朝廷給降不得一毫及民二月甲子然不能大有所減十七年朝廷既罷兵又命監司郡守將寛剰錢撥充月樁以寛民力八月己未其後遂減江東西月樁錢二十七萬七千緡有竒九月乙亥減徽信州各五萬有竒宜州五萬撫州二萬五千江州一萬筠州南康各六千臨江軍四千建昌軍二千皆有竒十八年冬上又諭秦會之曰昨已減月樁錢要當盡罷會之即諭版曹李仲永以經制錢贍軍然月樁錢卒不能罷乾道中始減廣徳軍月樁錢千八百緡淳熈初又減桂陽軍萬二千緡光宗登極以月樁有數額太重去處令䑓諫侍從同戸部長貳詳悉措畫開春當議斟酌施行以寛民力其年用吏部尚書顏師魯等奏再減江浙諸郡月樁錢十六萬五千緡有竒袁州減三萬五千常州減二萬吉州減七萬三千隆興府饒州各減萬五千信州減一萬撫州減七千贑州減六千七百五十二江池州廣徳臨江建昌軍各減六千湖州減五千徽州南康軍各減四千興國軍減三千筠州南安軍各減二千今東南月樁錢歲為緡錢猶三百九十餘萬又有版帳錢者軍興後諸邑皆有之而浙中為尤甚紹熙元年夏議者請令監司州郡寛屬縣無名之取以紓民力時朝請郎四眀劉侯守岳陽會四縣版帳之額為二萬一千餘緡而無窠名者萬一千餘緡乃與提刑丁端叔漕判薛象先議取凡無名者盡蠲之舉一郡而言則其餘可知矣又有餘郡未減者今猶存之折估錢折估錢者始自紹興初張逺為川陕宣撫使日供給闗外大軍之名也蓋諸軍月支正色米之外又有折支估錢者故以此名之其後衣賜犒賞供給芻豢之屬通以折估為名而其數浸廣矣鹽折估者取三路鹽引稅錢而供此折色也酒折估者取四路塲務坊店酒息錢而供此折色也故又以折估名之大凡一歲折估之入凡七百一十餘萬緡其出一千二十八萬餘緡蓋以糴本經總諸色窠名助其費而糴買糧絹與夫搬運之費八百七十二萬餘緡不與焉諸雜費約九十萬緡又不與焉大抵蜀中之折估與浙江之月樁皆以贍軍得名其事相同名異但折估猶有鹽酒為之窠名而月樁乃曰著横科尤為無藝為今之計要當如蜀中之法以鹽茶錢贍軍則月樁斯可免矣免行錢免行錢者創始於元豐推行於宣和廢罷於靖康紹興十一年以軍事未寧始令諸道量納四月丙子時川陕四路歲取免行錢至五十萬緡東南又倍之十七年既罷兵詔損三之一四月丙申十九年王大寳尚書守連州還官言於上但免廣中新循等六州而已五月丁未二十五年曹泳在戸部言其所取苛細始盡罷之五月戊申隆興用兵後王自外還朝復以免行為請上批曰民不可擾難以施行翼日進呈上諭錢處和曰曹泳所行惟免行一事人至今以為是今日豈可不依曹泳乾道元年七月辛亥遂不行麴引錢麴引錢者湖南路有之紹興間鄉村有吉㐫聚㑹者聴人戸納錢買引於隣近酒戸寄造酒麴不得非理抑配法非不善也然時方用兵而敷大軍月樁錢於諸路湖南諸郡兵火之餘賦入鮮少所樁不能供十之二其劉獬者知衡陽縣始令人戸買麴引以取月樁自是旁郡之邑皆效之後四年當紹興十八年之經界法行遂以人戸田畆分為三等上等輸三千聽造酒十石中等二千造酒七石下等一千造酒三石最下輸五百文造二石若二石以下則例輸百三十錢皆随夏秋税送官自田二十畆而上無能免者袁州江西凋郡也其地西北與長沙接自初科月樁時漕臣韓球與郡守趙士瑗不叶所科偏重無所從出遂亦於麴引中取之每人戸税錢一千則科二百文八十五陌凡為錢五千四百餘緡乾道三年王次長為湖南漕始請禁戢戸部莫如之何苐行下依見行條法而已㑹乾道新書行刪改紹興納錢買引舊令於是麴引錢暫罷施稍復行迄不能禁也四年湖南提刑鄭思恭又乞將衡山等八縣随宜裁酌均於上三等戸黄仲秉為副漕奏言本路三十八縣不皆待此而足歲計匱乏者獨十餘縣望朝廷稍減月樁之額以寛此十數縣之不足則麴引之禁可力行於一路之間而九州三十八縣之民皆被惠澤矣淳熙元年袁州言自乾道新書行月樁始大不足戸部勘當欲權依紹興舊法許之四年張定叟知袁州復奏江西始以稅額均月樁則一路皆輕而袁州獨重今復麴引以補月樁則一路皆無而袁州獨有既未能減月樁之重而反増麴引之征非所以示公於天下趙子直為小漕㑹本州所賣麴引之入歲為三萬緡令本州與漕司各認其半而麴引遂罷獨湖南如故予嘗論之今天下多有不可為之縣而未有不可為之州間有不可為之州而未有不可為之漕若長民使部者人人如定叟子直之心則麴引之征真可免矣身丁錢身丁錢者東南淮浙湖廣等路皆有之自馬氏㨿湖南始取永道彬州桂陽軍茶陵縣民丁錢絹米麥嘉祐四年詔無業者與除放有業者減半然道州丁米每嵗猶為二千石民甚苦之紹興五年守臣趙坦請以二分敷於田畆一分敷於民丁詔下其議漕司言如此則貧民每丁當輸二斗有竒乞盡敷於田畆言者以為太重請損其一詔漕司相度四月甲辰六年樞宻院檢詳王廸又請兩路丁錢随田稅帯納八月己亥不果行十四年知永州羅長源言於朝遂盡放湖南諸郡丁錢十月庚子然上供樁數則如故後十餘年楊良佐邦弼為漕乃奏除之江東諸郡丁口鹽錢者李氏有國日所創也蓋以秦州及静海軍今通州鹽貨計口俵散收錢入官其後失淮南而臣不可得既又令折綿絹輸之民益以為病眀道二年范文正公為江淮安撫乞會一路主戸以現在鹽價於春時給鹽食用随夏税送納價錢奏可其後謂之蠶鹽者此也兩淮身丁錢者始未行鈔法前以歲計丁口官散蠶鹽丁給鹽一斗輸錢百六十六文謂之丁鹽錢皇祐中計民以紬絹依時直折納謂之丁絹自鈔既行之後鹽盡通商而民無所給毎丁仍増錢三百六十文謂之丁身錢大觀中始令三丁納絹一疋當時絹錢未有倍費其物價益貴乃令每丁輸絹一丈綿一兩皆取於五等下戸民甚病之建炎三年詔以一半納絹一半納現錢十一月丁未於是丁絹有二十四萬疋綿百萬兩錢二十萬緡紹興初又用嚴守顏之言増得解人免丁錢三年四月甲午二十五年上命浙民之困特免丁絹錢綿一年以内府錢帛償戸部八月己丑乾道元年孝宗以兩浙歲澇又免災傷郡邑身丁錢十三萬七千緡絹十六萬三千疋皆有竒二月癸卯惟臨安以駐驆所在每三年輙一下詔除之歲滿復然至開禧元年十二月御筆浙路身丁錢自今永與除免恩施浸溥矣先是紹興末吕公雅廣問為浙漕司以湖州丁絹多所隱漏乃給甲帖付民戸俾自俳丁名得四十萬丁每丁為錢一千四百絹八疋有竒三十一年四月丁未眀年守臣陳之茂因請折絹以五千為疋仍止歲額為定不以添丁而増賦詔皆可之五月丁巳自湖州以五丁科一疋矣未幾又増以七千為一疋乾道八年余處恭為烏程令請於朝乞以七丁科一疋曽欽道秉政奏行之自是為例兩淮丁錢者不知所從始乾道末詔民戸一丁充民兵者夲名丁錢勿輸七年八月丙辰二廣丁錢亦不知其所始廣西郡縣貧薄凢民間父祖年六十以上而身丁未成者亦行科納謂之掛丁錢紹熙初詔令本路監司約束二年郊赦申眀大抵丁錢多偽國所剏予嘗謂唐之庸錢楊炎已均入二税而後世差役復不免焉是力役之征已取其二也本朝王安石令民輸錢以免役而紹興以後所謂耆戸長保正雇錢復不給焉是取其三也合丁錢而論之力役之征蓋取其四焉設有一邊事則免夫之令又不得免焉是取其五也孟子曰有布縷之征有榖米之征有力役之征用其一緩其二用其二而民有殍用其三而父子離今布縷之征有折税有和預四川路有給賞而東南有丁絹是布縷之征三也榖米之征有税米有義倉有糴川路謂之勸糴而斗面加耗之輸不與焉是穀粟之征亦三也通力役之征而輸之蓋用其十矣民安得不困乎予惡夫世之俗吏不知財賦本末源流顧以趣辦為能而撥其本也故詳録其事以待上問而出焉閩浙湖廣丁錢在國初歲為四十五萬緡大中祥符四年七月嘗除之後又復僧道免丁錢僧道士免丁錢者紹興十五年始取之正月癸酉自十五千至二千凡九等大率律院散僧丁五千禪寺僧舍觀道士散衆丁二千長老知觀知事法師有紫衣師號者皆次第増錢六字四字師號者又倍於是歲入緡錢約五十萬緡𨽻上供二十四年以紫衣師號不售乃詔律院有紫衣師號者輸錢視禪刹禪僧及宫觀道士有者輸丁錢一千三百有竒八月癸巳至今以為例初取免丁時立法年六十以上及病廢殘疾者聼免後詔七十以上乃免之然今浙中諸大刹及都城道觀時多有㫖免徭役科敷而州縣反以其額敷於民間大為人患田四廂錢田四廂錢者自紹興十三年春以䕶軍統制田晟始所部人馬隷馬司眀年有㫖令四川歲撥總制錢一百七十三萬餘緡紬絹四萬七千餘疋綿五萬四千餘兩赴鄂州十四年二月戊戌蓋此錢本供晟軍費故也二十九年軍事將興乃以其十五萬緡四川應副増招軍兵歲計六月壬辰還二十一萬七月庚戌又増之益路二十萬利梓䕫路通減五萬淳熙末又以其餘緡對減四川鹽酒重額十六年四月乙巳詳在經總制錢事中市舶司本息市舶司者祖宗時有之未廣也神宗時始分閩廣浙三路各置提舉官一員本錢亡慮千萬緡海貨上供者山積宣和後悉歸應奉建炎初李伯紀為相省其事歸轉運司眀年夏復閩浙二司賜度牒直三十萬緡為博易本元年七月己亥廢二年五月丁未復四年春復置廣司二月紹興二年廢閩司七月甲子尋併廣浙提舉官皆罷八月已而重廢復置六年冬福建市舶司言自建炎二年至紹興四年收息錢九十八萬緡詔官其綱首十二年乙巳十四年命蕃商之以香藥至者十取其四十七年詔於沉香荳䓻龍腦之屬號細香藥者十取其一至紹興末兩舶司抽分及和買歲得息錢二百萬緡𨽻版漕然所謂乳香者戸部常以分數下諸路鬻之柳州當湖湘窮程限頗急宜章吏黄谷射士李金數以此事受笞不堪命矣乾道元年春因嘯聚峒民作亂遂䧟桂陽軍上命劉恭父為帥調鄂州兵討平之蓋利之所在害亦從此生可為理財者之戒祠部度牒祠部度牒治平四年冬始鬻之長編云始於熙寕元年秋蓋誤熙寧之直為百二十千渡江後増至二百千其後民間賤之止直三十千而已紹興初李仲永初入朝見上為上言今歲鬻度牒是失萬農也積而索之農幾盡矣非生財之道上納其言十三年既罷兵遂不復鬻五月丙午久之復以其絶產𨽻其國飬士二十一年九月丙午時王元龜尚書為國子司業復請改行上諭大臣曰大賓殊未曉朕意人多以鬻度牒為利亦以延人主夀為言朕為人主且當事合天心而仁及生民自當享國長乆如髙齊蕭梁奉佛皆無益也僧徒不耕而食不蠶而衣無父子君臣之禮以死生禍福恐無知之民蠧教傷民莫此為甚豈宜廣也輔臣皆稱善然諸路僧尼猶有二十餘萬人女冠道士萬餘人二十六年三月甲午眀年遂詔換給不盡度牒皆歸禮部二十七年八月辛亥三十一年春朝廷聞金亮欲敗盟始放度牒増直為五百千二月戊午自後所放滋益多隆興初詔減為三百千因出度牒二萬鬻於江浙湖南福建計直六百萬緡期以一季州縣皆仰給於民民大以為擾二年三月周元持御史言於上乃損為二百五十千三月癸巳自辛巳調兵以後九年之間官鬻度牒至十二萬道有竒孝宗知之乃降詔權行住賣時乾道五年冬矣十二月庚寅眀年春遂増為四百千六年正月甲子淳熙初又増五十千四年七月戊辰眀年夏詔四川度牒每道估川錢引八百千五年六月丁丑尋詔東南度牒如紹興之舊九年五月辛未紹熈三年中書門下言亡僧道度牒申繳絶少顯有弊倖乃又増其直為八百千閏二月甲寅自淳熙後四川總領所歲得度牒六百六十一道以補還酒課蠲減之數三年六月甲申降㫖而東南諸路委都司官給賞歲亦不下二千三百有竒以三十年計之是失十萬農也然僧道士有金錢而度牒不可得故蜀中度牒官直千引而民間至千六百引云今總所對減酒課度牒僧徒已輸錢至嘉泰十五年今方嘉泰二年頃朱晦翁為浙東提舉遇饑歲亦請度牒於朝以備糴濟蓋自紹興以來已為緩急所仰不可復廢矣度牒初以黄紙五年易以絹七年又易以綾東南軍儲數東南軍儲始仰給於江湖轉漕紹興元年以寇盗多貢賦不繼始命戸部降本錢下江浙湖南和糴米以助軍儲所謂本錢者或以官告或以度牒或以錢引數多不售而出納之際吏縁為姦人情大擾五年上在臨安乆命廣東漕臣市米至閩閩中復募客舟赴行在十一年夏始分行在省倉為三界界每百五十萬解凡民戸白苖米南倉受之以廪宗室百官為上界次苖米北倉受之以給衛士及五軍為中界糙米東倉受之以給諸軍衛六月癸酉十八年戸部奏免和糴而命三總領所置塲糴之上大喜閏八月庚申舊制二浙江湖歲當發米四百六十九萬斛二浙一百五十萬江東九十三萬江西二百十六萬湖南六十五萬湖北三十五萬至是欠一百萬斛有竒乃詔臨安平江府及淮東西湖廣三計司歲糴米百二十萬斛浙西七萬六十斛行在省倉上界六萬石中界五萬石下界二十五萬石三界外臨安府行在省倉塲二十萬石平江如之淮西十六萬五千湖廣淮東皆十五萬十八年閏八月甲子二十八年秋戸部遂請二浙江湖米權以見發三百六十七萬為解數從之比祖額二浙欠三十萬江東三十萬江西六萬湖南十萬湖北二十五萬九月壬申降㫖時二浙以三十五萬斛折錢蓋綱米及糴塲歲收四百五十二萬斛也舊川廣荆湖歲自運河漕網至京庾毎有淺阻之患三十年夏議者以建康之鄧歩銀林自江達湖止遵陸二十里請於其地置轉般倉上命江東漕臣相度為之四月壬申然卒不果或謂經由湖中恐有飄失之患故但行運河云四川軍糧數闗上積糧數四川軍糧歲用一百五十六萬餘斛其三萬餘斛歲収入二分稅子二萬五千斛興元府興洋階成利鳳西和州營田租十萬餘斛一百三十七萬餘斛糴買闗内七十八萬石闗外六十萬餘石然糧道既逺水運頗勞紹興六年春吳涪王為宣撫副使命將取秦州必欲從陸運趙應祥為大漕執不可吴迄自為之兩川調夫運米十五萬斛至利州率費四十餘千而致一斛其冬吴復欲從陸運名諸路轉運使持戸籍至軍中邵澤民權宣撫副使獨曰今春立梁洋遺民負糧至秦州餓死十八九豈可再也且司已取蜀民運脚錢百五十萬其忍復使陸運乎既上疏立以便宜止之卒行水運自後席大光胡丞公相繼入蜀率以水運為可行於是總領所委官就糴於㳂流諸郡然民間不免受弊而糧亦不足十八年符行中為總領用其屬官李景孠之策景孠字紹祖開封人遵景之後貪酷吏也終於直秘閣知䕫州就興利閬州置塲聼客市賣由是盡革前弊米運充足三十一年金帥合嘉入寇王瞻叔調利路夫六萬七千人自魚闗負糧至鳯州人持七斗米興元二萬夫巴蓬利各四千夫文龍成各四千五百夫階州二千夫舊民夫裹糧自備至是始給之自魚闗至鳳州百八十里往來六日程日給米二升然民間一夫之費猶數十千又多道死者乾道初王聖錫帥蜀請優恤之漕司人給三千應用度牒八百上命以三千予之二年正月甲子乾道初虞雍公自宣撫使還朝為右僕射上問西邉積糧之數虞公奏臣離蜀時近八十萬斛乾道五年春當紹興初闗外四郡多不耕之田故多從諸軍於内郡以就糧如守邉之兵必就食於内郡之水運其後四十年内耕墾遍野粒米狼戾有司不時措置就糴至辛巳用兵王之望調利路兵丁夫運米一夫之費至七八十千民力告竭又丁夫多死於道者臣始至宣司即邉地措置和糴不惟省内郡水運而邉頭漸有儲蓄矣亦聞王炎委孫叔豹増糴王八眀以樞宻使代為宣撫但近日移兵戍黑谷等處食者既衆或一不熟仰食此米必無贏餘一日邉事起當有辛巳調夫之患上曰然卿宜將此意諭王炎令廣作措置其後至淳熙中西邉乃有積糧一百一十餘萬斛云在魚闗階城西和鳯興洋利金州興元府大安府十一處貯之自符行中於利閬等州置糴塲募商人載兩川米入中其在閬州者泛嘉陵而上至利州又自利州運至魚闗官不勝其費又多亡失者紹興末楊嗣勲總計始用屬官井研陳厚議廢閬州糴塲令商人徑至利州及魚闗仍優其直公私便之行在諸軍馬草行在諸軍馬草每年計三百六十萬數毎束戸部降本錢百文下浙漕司於諸州收買其十六萬緡以權貨務見錢闗子二十萬緡以本部窠名錢科降紹興三十年殿前司既獻酒坊一百六十五戸部因請以其净息錢三十六萬緡専充馬草本錢而以逓年合降本錢收糴馬料從之四月辛未大抵馬草料錢七十餘萬闗上諸軍馬料闗上諸軍馬料舊於㳂流諸州和糴然實以等第分科為始紹熙五年馮震武傳之總計始自置塲糴買歲用大麥二十五萬一千一百四十斛眀年夏請權免和糴馬料一年許之今西邉有積料二十餘萬斛蓋備軍興非歲計所常用都下馬料淮浙江東沙田蘆塲本末都下馬料舊以其數和糴於民紹興二十七年冬言者謂江浙間沙田蘆塲為人冐占歲失官課至多時年春詔遣戸部郎中莫濟子同三路漕臣按視將以其租為馬料之費二十八年正月癸未時葉審言為御史上言陛下初欲免歲糴馬料為國便民然三路遼逺使者豈能盡行必有强増其數以希進者於有力之家無加損而害及貧民慮致逃移坐失税額因極論之始浙漕使趙清卿獻議欲盡行沙田入官随其肥瘠髙下輕立租課就令見佃火客耕種如形勢之家尚敢占吞具名取㫖事既行二十七年十二月乙未而或不以為便乃令見占人且行管佃浄認租課故審言論之尋詔第三等以下戸更不一例根括二十八年二月辛丑後數年又詔淮東人戸檢尋契要未偹可限半年五月庚戌俄特與放免五月丁丑後月餘復命并浙西江東官戸千畆民戸二千畆以下放免餘並依元㫖増六月甲寅時福建江海之濵亦有新出沙田户部聞之遽下常平司出賣而殿院任信儒以為此皆民間自偹錢夲興修數年之間償費未足望少寛之乃止二十五年五月甲寅其後淮東浙西江東三路沙田蘆塲之籍總二百八十萬畆有竒凡為沙田則起催小麥米絲餘田則起催荳麥絲麻蘆塲則起催柴蘆科民間以為擾訴訟不絶方務德滋守京口五䟽論之孝宗問大臣此事或以為可取或以為可損陳魯公曰君子小人各從其類小人樂於生事不惜為斂怨君子務存大體惟恐有傷仁政此所以不同上曰然乃詔沙蘆田塲指揮更不施行三十二年冬也十一月庚戌得㫖乾道元年秋幹辦皇城司梁俊彦復獻議乞以官民請買之田立税請佃之田立租乃詔淮東西紹頌張津楊倓同三路漕臣措置而俊彥總制之葉子昻秉政深不以謂然而弗能止也俊彥等乞沙田折納米沙地及蘆場並紐折現錢從之七月丙寅置措置官田所九月丙子申請折納錢米六年春始立税租數目自一分至三分已業沙田所得花利每米一石於十分内以一分立租蘆塲花利紐錢一貫於十分内以一分五厘立租其租田沙田即立租二分蘆塲立租三分二月己酉也凡為錢六十萬七千七十餘緡詔並赴南庫送納七月癸未八月秋言者以為向來措置之初止為有力之家侵耕冒占而奉行之際乃并人戸租産口業一槩打量加立新租數倍人戸有逃移者乃詔已業蘆塲草地所納賦稅並減五厘租佃與減一分七月甲戌先是剏提領官田所至是併戸部焉建炎雜記甲集卷十五

body:
  text: 建炎雜記甲集卷八宋李心傳撰雜事宇文肅愍死事建炎初宇文樞宻虛中應詔使北金人留之後以為樞宻使紹興中虛中隂結中原忠義欲竢金主郊天日舉事而使朝廷應之先以蠟書來上秦檜用事遽繳其書遺金人高宗不知之也㑹虛中事亦自泄金族其家株連死者甚廣淳熈中孝宗念其忠死始贈開府儀同三司諡肅愍且為置後其孫紹節令為右司郎中繳還蠟書諡議云尓而或謂未必然且自露耳何文縝建元帥議靖康中何文縝初相金再犯京師康王在河北文縝請以帛書拜王為大元帥淵聖可之文縝既北去降御墨於其家紹興中文縝之弟榘持詣秦丞相乞進于朝秦方主和惡聞其事抑不奏秦檜死榘知萬州乃申建康乞㑹申王府御筆所在秦氏取而還之淳熈十二年洪端明領史院請下隆州索其書編于中興日厯榘子令修通判印州事以聞詔付史館遷令修一秩知印州云朝士投匭免知在故事臣民投匭上書者皆從檢院押出召保乃許自便紹興三年秋地震求直言太常少卿唐恕應詔上封事檢院官以故例待之辛閣學炳時為臺端言有乖禮意請行在職事釐務官上封事者並實封牒送檢皷院投進不在召保知在逐便之限從之大臣奪情服縿故事大臣奪情者服造光幘縿紫袍皂角帯道君惡之政和末始議以入公官不應變服遂以吉服朝然居家猶䘮服也紹興初朱藏一起復右僕射請所服太常遂援政和近事為請而居第則縿服去佩焉議者不以為是趙元鎮用伊川門人趙元鎮初相喜用伊川門下士當時輕薄者遂有伊川三魂之目謂元鎮為尊魂王侍郎居正為强魂以其多忿也謂楊龜山為還魂以其身死而道猶行也時龜山初亡朱内翰震言扵朝因賻甚厚故有還魂之目焉鄭亨仲欲併掌利權建炎中張魏公為宣撫處置使節制川陜京湖十三路便宜黜陟魏公既罷其後去便宜猶于兵民財無所不總故其權常重若財賦舊以都轉運使領之然大抵皆𨽻宣撫司紹興中秦檜既與鄭亨仲有間十五年十一月始命趙侍郎不棄以大府少卿為四川宣撫司總領官盖隂奪其柄亨仲不悟也趙入疆移文宣撫司用平牒亨仲見之愕而怒久之始悟其不𨽻已也十八年宣撫司罷又改為總領四川財賦錢糧盖自為一司迄今不改然自辛已用兵後凡文臣執政官為宣撫使則總領官用申状受約束武臣為宣撫使則抗禮平焉節度使以軍禮見宣撫紹興中鄭亨仲為川陜宣撫副使大㑹諸將于閬州時呉武順璘楊襄毅政郭㳟毅浩皆以節度使來㑹亨仲坐堂上吏賛客亨仲遽興日髙猶不出既而政先執挺謁亨仲乃受之尋與璘浩循堦以客禮見盖璘時以右䕶軍都統制駐武興浩以樞宻院都統制駐漢隂而政在漢中實宣撫使都統制故也十八年始有㫖並稱某州駐劄御前諸軍都統然詣宣威府悉趨庭焉論者以鄭為得體虞并父長者虞并父丞相仕未達嘗調官臨安携所著新唐書以干秦丞相書未上㑹其同舟者竊得本以獻秦并父知之乃更以他書為贄已而竊書者先去疑并父必怨已遇士大夫輒詆之并父還知渠州過夔沈守約丞相為帥問并父以同舟之為人并父稱其美守約屢詰之并父不變守約曰是人毁君不容口君母為過情并父曰渠所長甚多但差好罵耳守約太息稱其長者未㡬守約入参大政白召并父為秘書丞以至大用云陳魯公鎮物紹興末金海陵煬王臨江中外戄懼朝士多遣家為避難計時陳魯公為左相獨鎮之以静人心少安一日邉郡羽書来上趣召輔臣公獨後至中使屢趣之陳行愈益緩上嘗夜出手札欲㪚百官浮海避金公對中使取御札焚之當是時都人將遁去賴陳不為搖動都人乃止北敵退獨公乃與黄通一老家属在城中張魏公薦士隆興初張忠獻公再入為右相上注意甚厚使公條奏人才可用者公奏虞雍公允文陳魏公俊卿汪端明應辰王詹事十朋張尚書闌可備執政劉觀文珙王閣學大寳杜殿院起莘宜即召還胡資政銓可備風憲張舎人孝祥可付事任馮提刑時行馮少卿方可備近臣朝士中林侍郎栗王侍郎秬莫少卿冲可任臺諫皆一時選也時劉王杜三人皆以論事去國故公請召之其後悉為名臣終孝宗朝不顯用者數人而已趙温叔使北趙温叔為舎人使北還入見上問朕何如葛王温叔奏曰臣觀葛王望之不似人君規模氣象不及陛下萬一中原不日可復也臣敢再拜賀上大恱韓子師折金使淳熈中金人有舉進士第一者記其姓名不審奉使來賀正旦自負其辯頗凌慢主人時人韓彦古子師館伴一日金使自謂其廷試賦雲屯一百萬騎日射三十六熊之句以為警䇿子師遽曰一百萬騎僅能得三十六熊何其尠也金使惘然熊射侯也韓不學妄以為熊羆之熊故金使猝無以應然自是辭色頗恭時人亦多韓之敏㨗蘓文忠贈官乾道末蘓文忠特贈太師世或不知其所以盖仁宗時蘓儀甫嘗為翰林學士元祐中以其子容貴贈太師始儀甫嘗㳺金山題詩曰僧依玉鑑光中住人在金鰲背上行至是蜀僧寳印住金山摘其詩名軒為玉鑑又囑張安國大書而刻之張䟦云此詩翰林學士贈太師蘓公所賦也碑成僧摹以遺大璫甘昇一日上過其直廬外望見索觀之意以為文忠也時文忠曽孫季真為給事中他日上更書文忠詩以賜又識其末曰故贈太師蘓軾詩季真拜受賜疑之前白曰先臣紹興初嘗贈資政殿學士未嘗贈太師今䝉聖㤙乞自朝廷行下上愕曰朕記贈太師久矣季真不敢白間為執政言之執政囙奏以為言上始喻金山寺詩乃蘓紳也因即曰如軾名徳昭著亦當贈太師扵是降㫖施行然上實雅敬文忠居常稱子瞻或東坡舎人草制有曰人傳元祐之學家有眉山之書盖詞頭無所慿故但為好語爾保任京官連坐保任京官犯贓連坐舊制也然近嵗未有舉行者淳熈初錢師魏参知政事㑹其所舉者以賄敗上疏自劾詔特䥴三官吏部因以他舉官名聞皆坐降秩紹熈初趙温叔所舉以贓抵罪用故事當削三秩而温叔時為使相若降三秩則應落衮鉞為銀青光祿大夫朝廷難之扵是自衛國公降封益川郡公削其食户二千而已其後周洪道連坐亦自益國公降封滎陽郡公盖用温叔例益大國視郡公為三資衛國故并削封户張敬夫遺表張敬夫帥荆川庚子春疾甚數乞免不許將死自作遺表來上邸吏以庶寮不得上遺表却之上迄不見也其表曰再世䝉㤙一心報國大命至此厥路無由猶有微情不能自已伏望陛下親君子逺小人信任絶一己之偏好惡公天下之見永清四海克鞏丕圖臣死之日猶生之年敬夫之不亂如此所謂古之遺忠矣敬夫卒之四日上聞知其疾病乃拜右文殿修撰奉祠敬夫始以父任為右承務郎平生未嘗乞磨勘上知之其在廣西特進二秩為承事郎故職雖髙終不得任子云王瞻叔與王時亨爭禮自席大光後成都守臣率㢘四川大帥惟本路監司以管轄之故得就㕔所下馬他路則不然為守者率侍從近臣故監司見者必止喝更乘小輿自側門入紹興末王時亨為守王瞻叔為轉運副使將穿㦸吏以故事白止之瞻叔不平他日檄府以某日按見金榖簿書遂傳呼入㦸据設㕔而坐謂典謁吏曰今日轉運副使來㸃檢成都府公事非見制置使也時亨不能語郡守越境省親故事守臣無得越境者王正仲守揚其親居潤才隔一水正仲因乞告省親許之乾道中史丞相守紹興援例省其母于四明明越屬郡也淳熈末耿直之侍郎為四眀守其父年九十矣直之以親病乞視未聽直之用故事謁告歸江隂省親上特許之時有為湖廣總領者其母老請用季春至湖州迎侍上亦許焉孝宗錫類之施每如此奉祀汾隂寳淳熈十四年春有士人聶愿者獲一古印以皇帝駕奉祀汾隂之寳九字為文重十三兩士愿以為真宗西祀所作時呉少保琚為淮東總領以五百千償士愿取其寳獻于朝詔蔵天章閣士愿以其寳生金所鑄償價未足詣御史府訴之蔣世修繼周為中執法命有司覆實且言祖宗遺寳復歸中禁縱使是銅亦當薄償務重大體豈校細微事下工部將作監覆實驗之果銅也乃詔士愿免罪三月己未按汾隂記封金匱用受命寳封石匱用天下同文寳不見于記載故朝論疑之卒不加賞云陳子長築紹熈堰兩淮土沃而多曠土人且耕且種不待耘耔而收其十倍浙民每于秋熟小舟載其家至淮上為淮民穫田主僅收十五他皆為浙人得之以舟載所得而歸有張拐腿者淮東土豪也其家嵗收穀七十萬斛金亮入冦執得之問以江南虛實張不肯言亮臠其兩股無餘終不以告乃舎之後亮退師張亦不死淮民因謂之拐腿云紹熈末陳子長損之提舉淮東常平以淮田多沮洳因築堤數百里堰之得良田數百萬頃事聞錫名紹熈堰子長除直秘閣淮東轉運判官朝廷念淮民至切損其稅建炎雜記甲集卷八

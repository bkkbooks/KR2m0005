body:
  text: 建炎雜記乙集卷一宋李心傳撰上德一壬午内禪志孝宗皇帝以聖德受天命實繇高宗皇帝之睿志素定然始則昭慈聖獻皇后感動上意終則憲聖慈烈皇后宻贊大䇿至於將相士大夫輸忠叶謀共成聖志者盖亦多助而范宗尹趙鼎陳康伯三丞相建明將順皆賴其力尤不可使之無傳也孝宗皇帝太祖七世孫也初太祖少子秦康惠王德芳生英國公惟憲惟憲生新興侯從都從都生華隂侯世將世將生東頭供奉官追封慶國公令譮令譮生秀安僖王子偁仙源類譜秀王舉進士中第靖康末為秀州嘉興縣丞王夫人祥符張氏嘗夣一人擁一羊謂之曰以此為識已而有娠熊克中興小厯建炎元年冬十月戊寅夜生上于青杉閘之官舍王明清揮麈録紅光滿室如日正中玊牒少長訓名伯琮以制詞增入先是高宗皇帝以五月朔即位於南京六月賢妃潘氏生皇子九月賜名封魏國公十月高宗幸維揚三年二月渡江幸杭州三月苖傅劉正彦為變四月朔高宗復辟立魏國公為皇太子五月幸江寜丁亥太子薨諡元懿日厯殯冶成之鐡塔寺周必大二老堂雜記後三日仙井監鄉貢進士李時雨上書乞擇宗室之賢者使視皇太子事俟皇嗣之生退居藩服時雨黨人親子也以父入籍當補官吏部擬將士郎抄未下書奏詔前降級還恩澤指揮更不施行日下押出國門時雨事迹開禧元年被㫖宣付史館四年夏高宗自海道還㑹稽其秋昭慈聖獻皇后亦自江西還行在后嘗感異夢宻為高宗言之高宗大寤此事臣聞之先臣及士大夫所言皆同盖汪應辰早年嘗所聞於趙鼎者㑹宰相范宗尹有造膝之請髙宗又命惠襄靖王令廣選藝祖之後宗子數人育之宫中令廣時以秘閣修撰提舉臨安府洞霄宫也明年改元紹興其夏四月時慈獻升遐而令廣所選宗子皆未當上意五月遂命李時雨知南外宗正事俾至泉南選之日厯㑹上虞丞永嘉婁寅亮上書言今昌陵之後寂寥無聞僅同民庶藝祖在上莫肯顧歆此敵國所以未肯悔禍也望陛下於伯子行内遴選太祖諸孫有賢德者視秩親王以待皇子之生退出藩服高宗讀之大以感歎簽書樞宻院事富直柔又從而薦之有㫖召對其年六月也王明清揮麈錄後七日戊子高宗諭大臣曰昨令時雨選藝祖之後宗子三二歲者得四五人資相皆非岐嶷且令歸家俟至泉南選之右僕射范宗尹曰此陛下萬世之慮高宗曰藝祖以聖武定天下而子孫不得享之遭時多艱零落可憫朕若不取法於仁宗為天下計將何以慰在天之靈同知樞宻院事李囬曰藝祖不以大位私其子發於至誠陛下為天下遠慮合於祖宗實可昭格天命參知政事張守曰堯舜授受皆以其子不肖藝祖諸子不聞失徳而傳位於太宗過堯舜遠甚高宗曰此事亦不難行止是道理所在止令於伯子行中選擇庶幾昭穆順序富直柔曰陛下聖斷超越千古苐恐令李不足以承奉㫖高宗曰但令廣求當自選擇參知政事秦檜曰須擇閨門有禮法者檜為參知政事而奏對在諸臣之後所言止此其人包藏顧望之心已可見矣高宗曰當如此直柔曰宫中有可付託者否高宗曰朕已得之矣若不先擇宫嬪則可慮之事更多日歴是時張賢妃為媫妤憲聖慈烈皇后為才人高宗所擇宫嬪盖才人與媫妤也八月知樞宻院事宣撫處置使張浚念上繼嗣未立宻奏乞明詔大臣講明故事多擇宗室之賢優禮厚飬以為藩屏朱熹撰浚行狀浚時駐軍閬中盖未知朝廷之議也寅亮既對十一月遂除監察御史日厯二年正月高宗還臨安二月寅亮為秦檜所擠而罷夏令李始奉詔選上及宗子伯浩入禁中伯浩豐而澤上清而癯髙宗初愛伯浩忽曰更仔細觀之乃令二人並立有猫過伯浩以足蹴之上拱立如故高宗曰此兒輕易乃爾安能任重邪乃賜伯浩白銀三百兩罷之而育上于張媫妤所時上年六歲矣五月辛未詔秀王赴都堂審察遂特改京官三年二月庚子詔宗室伯琮除和州防禦使賜單名從玊令學士院擬二十字各注意義進入高宗自擇瑗字名之㑹要時學士綦崇禮也後二日壬寅改貴州防禦使三月詔貴州防禦使育在宫中不可與宗室比特給直俸從内東門司供納㑹要時朱勝非為相也四年五月令廣復得秉義郎子彦之子伯玖入宫中年五歲高宗以其聰慧可愛命吳才人毋之日厯附傳丁丑子彦特遷武翼郎而令廣自左中大夫集英殿修撰特轉行在大中大夫知泉州後省以轉官非法封還録黄遂寢其命九月朱勝非罷趙鼎相五年二月鼎轉左僕射而張浚為右僕射浚面謝又以儲貳為言高宗首肯曰宫中見飬藝祖之後二人長者年九歲不久當令就學浚行上狀詞月餘出使江上五月高宗諭鼎令擇日降制除舊名為節度使封國公鼎退與參知政事孟庾同知樞宻院事沈與求議之辛巳鼎奏陛下為宗廟社稷大慮臣謹令有司卜以今月二十六日吉惟陛下裁之幸甚高宗曰可與求曰此盛德事也而陛下斷自聖心行之不疑臣知天祐陛下子孫千億受厯無疆矣高宗曰朕年二十九未有子然國朝自有仁宗皇帝故事今未封王止令建節封國公似乎合宜以朕所見此事甚易而前代帝王多以為難鼎曰自古帝王都以為難而陛下行之甚易此所以未可跂及也然陛下春秋鼎盛而為宗廟社稷大慮如此臣等以是知神靈扶持子孫千億也此事甚大陛下既已見透臣等無復更措一詞不勝幸甚高宗曰藝祖創業肇造王室其勤至矣朕取子字行下子鞠於宫中復加除拜庶幾仰慰藝祖在天之靈庾曰陛下念藝祖創業之難而聖慮及此帝王所難能之事也日厯髙祖又謂鼎曰此子資秉特異儼若神人朕自教之讀書性極强記玉牒鼎先得㫖於行宫門外造書院一區欲令就學至是成髙宗曰只以書院便為資善堂俟除授訖命儒臣為直講翊善悉如資善故事己亥遂降制授保慶軍節度使封建國公以宗正少卿范冲為徽猷閣待制提舉建隆觀兼資善翊善起居郎朱震兼贊讀時學士孫近草建國公制第云眷求屬籍蚤毓宸闈而舍人胡寅草制云朕為宗廟社稷大計不敢私于一身選於屬籍得藝祖七世孫鞠之宫中兹擇剛辰出就外傅斐然集由是人皆曉然知上意也六月己酉建國公出資善堂高宗命見冲震皆設拜宰執得㫖依故事謁見又詔建國公禄賜比皇子日厯冲震皆一時名德老成冲祖禹子尤有家法毎因箋䟽遵以經術仁義之言輙褾袖藏之時一展玩實録七月秀王召對自左宣教郎直秘閣添差通判湖州特遷左朝奉郎秘閣修撰知處州未行改在外宫觀奉賜如郡守日厯十一月浚自江上使還六年正月壬午詔伯玖賜名璩除和州防禦使後四日浚復往荆襄視師既而鼎浚以戰守論議不同十二月鼎為左司諫陳公輔所攻而罷浚獨相自是攻鼎者始以資善藉口矣鼎事實七年正月陳與義參知政事二月以太陽有異詔内外侍從各舉直言極諫之士一人徽猷閣直學士知漳州廖剛應詔言陛下有建國公之封將以承天意而矢大公於天下後世者也然而不遂正名為子者豈有所待邪有所待則是應天之誠未至也願陛下昭告藝祖在天之靈正建國儲君之位布告中外不匿厥指異時雖有則百斯男不復更易則足以逹天意而轉禍為福矣七月以旱詔中外臣民言封事左宣教郎簡州州學教授臨卭黄源應詔言陛下嘗選宗親之賢納之宫中典冊所加已上公矣此誠社稷之至計然而其名未正無以副天下之望臣恐左右前後或懷姦心者朝暮浸潤以行其譖非社稷之福也今天下多故事在他日必得長君非赤子可得而卧治毋后可得而專制也陛下必不得已姑少須之何不使攝居儲貳之位皇嗣之生退居藩服社稷豈不益固九月浚以淮西失師而罷鼎復相八年正月進士李獻燾反正議奏乞擇宗室之賢者使攝儲貳或留守形勝或别出征伐使民無異望三月秦檜復為右僕射陳與義罷參知政事八月御筆璩除節度使封吳國公執政聚議檜謂鼎曰陳去非在政府時已有此意但未及行不知公意如何鼎扣其可否檜不答樞宻副使王庶曰並后匹嫡古以為戒今豈可行也鼎謂檜公嘗言鼎丙辰罷相後議者專以資善堂籍口今當避嫌公專面納此御筆如何檜曰公為首相而檜豈敢專公欲納之當同敷奏也翌日進呈檜無語鼎奏曰今建國公在上名雖未正天下之人知陛下有子矣以前恩數並同皇子又昨幸平江及謁太廟而令建國扈蹕國人見者咨嗟太息此社稷大計蒼生之福也至于外間稱呼之語陛下豈有不聞之耶臣身為上相義當竭忠以報陛下在今日禮數不得不異但以善繫人心而不使之二三其説也高宗曰俱是童稚姑與放行鼎執奏不已高宗乃留御筆曰俟三數月議之明日檜留身奏事後數日參知政事劉大中亦以為言他日鼎留身奏曰昨所納御筆檜與大中有何奏耶高宗曰大中之説與卿一耳十月鼎為檜所擠復丐免高宗問前日所議璩建節事如何鼎又如前所陳並鼎遺事丁巳大中免甲戌鼎罷九年三月制授璩保大軍節度使封國公是月金人歸河南地十年五月金人畔盟京西湖北宣撫使岳鵬舉宻奏今日欲圖恢復必先正國本以安人心然後陛下不常厥居以示不忘復讐之意先是岳侯入對得于資善堂見國公英明俊偉退語家人遂上此奏張戒黙記以岳侯講建儲為紹興七年事而岳侯監鎮江府大軍庫珂作岳侯行實係之此年且辨黙記之誤甚悉今移附此更湏詳考也十一年岳侯為檜所誣以十二月晦賜死大理寺獄日厯十二年正月庚戌詔建國公出就外第加檢校官封郡王令吏禮兩部及太常寺討論祖宗故事申尚書省取㫖庚午張婉儀卒贈賢妃建國公初育于妃所至是吳婉儀收而併視之與璩同處雖一食必均焉紹興聖語丁丑制建國公加檢校少保封普安郡王時年十六制下日者尤納私謂秘書省正字張閘曰普乃並日二字合乎易所謂明兩作離之象殆天授也張閘記聖徳事迹初吏禮部之討論也吏部尚書吳表臣禮部尚書蘇符並兼翊善與禮部侍郎陳俑員外郎方雲翼太常丞丁仲京博士王普主簿蘇籍同奏與秦檜意異己丑詔表臣等討論典禮並不詳具祖宗故事專任己意懷姦附麗並放罷日厯始檜嘗為高宗言趙鼎欲立皇子是待陛下終無子也宜待親子乃立林泉野記所謂附麗盖指鼎也頃嘗以符所議問於其孫知新繫縣事植亦不能知當從吳龜年家問之五月詔普安郡王朝朔望己亥秘書少監秦梓兼資善堂贊讀以璩未出閣故秦檜泥之也普安郡王府别以館伴趙錢周材二人兼教授壬寅上出閣就外第八月和議成顯仁皇太后自五國城來歸上從高宗奉迎于臨平鎮十三年九月乙丑秀王以左朝奉大夫秘閣修撰主管台州崇道觀致仕日厯遂卒於秀州十四年普安郡王納夫人郭氏郭祥符人也㑹秀王喪聞戊寅詔侍從䑓諫集議普安郡王當持何服議者張澄李文秦檜秦熺周三畏王暎劉才紹詹大方張叔獻叚拂操何若潡僉奏照國朝要典嘉祐四年九月詔使臣内殿崇班卒以上遭父母䘮並聽解官行服宗室解官給俸乞依故事庚戌秦檜進呈高宗曰始議飬宗室子今子偁死若不使之持服則非本朝典故宜從其議日厯六月詔秀王許用普安郡王初除節度使贈太子少師令秀州量行應副葬事遂葬湖州城外之箐山㑹要始普安既解官而蘇符以左朝散郎除知遂寜府未上諫官詹大方劾符居論思之地識慮淺暗除其二官㑹要盖指前事也大方遷御史丞遂論責授清遠軍節度副使潮州安置趙鼎輔政累年不恤國事邪謀宻計深不可測與范冲軰咸懷異意以徼无妄之福用心如此不忠孰甚焉九月移鼎吉陽軍安置日厯三年死于貶所十五年二月制加璩檢校少保封恩平郡王出閣就外第號東西府附傳八月初命館職二員並兼普安恩平二王府教授時福州州學教授黄石代還獻書于檜曰上即位十九年儲貳未建安危所繫重大如此公獨不開陳乎不報後七年石調官入都復申前論檜曰君謂檜不省耶時未可耳周必大撰石墓誌有此檜面諭石乃二十二年也十六年四月乙丑普安郡王免喪還舊官實録十七年六月戊午改常徳軍節度使二十二年八月子彦以右武大夫忠州團練使卒恩平解官如前議二十四年夏衢州盗起秦檜遣殿前司將官辛立將千人捕之不以聞上因入侍言之高宗大驚明日以問秦檜檜曰不足煩聖慮故不敢聞俟朝夕盗平則奏矣退而求其故知上言之乃謂上在秀王喪二年不當給俸月除二百緡上白高宗高宗乃自出内帑月如所除給焉晁公遡箕山日記有此但無年月及所遣將姓名今以日厯參攷修入上之英武為檜所惮此其一也不可不載俾後有攷二十五年十月檜疾篤其家秘不以聞謀請熺代上又宻啟之往歲在行在聞士大夫所言如此高宗即日幸其家視疾遂降制勒熺致仕是夕檜薨二十六年閠十月秘閣修撰辛次膺入對論國本末上立改容曰誰可次膺曰知子莫若父上稱善胡銓撰次膺墓誌未幾國子司業兼從正殿説書王大寶因侍經筵宻陳宗社大計上諭以措置已定時相惡之十一月辛卯奏以大寶直敷文閣知温州胡銓撰大寶墓誌二十七年春高宗䇿進士晋原閻安中對曰太子天下之本陛下嘗修祖宗故事累年于兹矣日就月將緝熙光明之學其歴試周知不為不久也而儲位未正嫡長未辨臣愚深恐左右前後之人寖生窺伺漸起黨與間隙一開有悞宗社大計此進退安危之機也願斷自宸𠂻蚤正儲位以係天下之望自秦檜得政士大夫無敢以儲副為言者高宗覧其對而留意之遂擢為第二二十八年冬新除利州路提㸃刑獄范如圭引疾乞奉祠因秦漢胎飬令遂纂至和嘉祐名臣乞選宗室章䟽二十六篇囊封以進且言曰願陛下深考羣言仰師成憲斷以公道無疑無貳則天下幸甚時宗藩並建道路竊竊有異言人或以越職言乃為如圭危之如圭不顧也䟽入高宗感其言朱熹撰如圭墓誌二十九年六月丁酉國子博士史浩對于内殿將退復奏曰小臣冐萬死以畢愚忠普安恩平皆聰明宜擇其賢者浸别異之以係天下之望高宗頷之浩退高宗目送焉翌日命除秘書郎甫四日兼二王府教授史稱大世家九月甲午陳康伯除右僕射面謝因及范如圭所進嘉祐至和章䟽高宗問如圭之意如何康伯曰如圭可謂愛君之至言之不盡故類聚以進呈高宗曰朕久有此意康伯曰宸斷堅决乃可高宗首肯之康伯附傳高宗已深知上之賢孝恐顯仁后意所未欲故遲遲焉紹興聖語㑹后已服藥後六日皇太后崩十二月乙丑端明殿學士提舉萬壽觀兼侍讀張燾告滿還朝奏䟽曰儲貳天下之本自古人主必致重於此其或嗣子未生必取之兄弟之子漢成帝立定陶王是也其或兄弟之子無其人必取之宗室之子以待嗣子之生真宗皇帝是也至于仁宗皇帝其事尤詳矣陛下聖見高明選建二公而子育之亦有年矣然臣聞之傳曰兩貴不能以相事又曰物莫能兩大此天下之常理也願陛下權時之宜斷自淵𠂻稍優其禮加以國封而别異之則天下之心皆有所屬矣高宗愀然曰朕懷此意久矣此事人所難言卿言契合朕心俟開春當議典禮翌日遂以燾為吏部尚書張燾年譜時郁民望為諫官左宣教郎知大冶縣蕭之敏貽書民望以司馬光范鎮事語之民望不能用也周必大撰之敏墓誌有此三十年二月壬子百官以顯仁喪禮畢始純吉服是日宰相湯思退陳康伯樞宻院奏事畢將退高宗留知院事王綸同知院事葉義問諭之曰朕有一事所當施行似不可緩普安郡王甚賢欲與差别卿等可議除少保師相仍封真王衆皆前賀高宗曰朕久有此意深惟載籍之傳並后匹嫡兩政耦國亂之本也朕豈不知此苐恐顯仁皇后意所未欲故遲遲至今思退曰陛下春秋鼎盛上天鍳臨必生聖子為此以係人心不可無也高宗曰此事出於朕意非因臣下建明且顧康伯曰去年卿留奏事朕亦嘗及此事甚無難者卿等宜檢典禮進呈宰執思退留身言適奉聖訓非古帝王所及高宗曰朕覽唐宣宗事群臣有議及儲嗣者輙怒斥去可謂不逹理矣於是上育宫中已三十年天資英明豁逹大度左右未嘗見喜愠之色趨朝奏列進止皆有常度騎乘未嘗妄視平居服御儉約毎以經史自適嘗語府寮曰聲色之事未嘗畧以經意至于珠寶瑰異之物心所不好亦未畜之騎射翰墨皆絶人高宗嘗謂近臣曰卿亦見普安乎近來骨相一變非常人比也玊牒於是張燾力求去高宗留之不可丁卯以燾為資政殿學士致仕年譜戊辰三省樞宻院進呈普安郡王加官移鎮進國名及宣制吉日思退曰少保開府自元豐以來不並入衘更取聖裁高宗曰封真王須開府儀同三司且可除使相思退曰臣等按典禮非至親不封真王今進封則當冠以屬籍如環衛官稱皇姪之類高宗曰可便以為皇子者若此則瑗諸子亦合加恩數卿等可議定進呈又曰更有一事璩亦與少恩數令判大宗正事置司紹興如此則皆定矣思退言立皇子當降詔及遣官告宗廟高宗從之癸酉高宗始服淡黄袍犀帯御垂拱殿思退等奏立皇子恐合依故事改賜名字其名乞留中奏事退御筆付三省瑗可立為皇子改名瑋令學士院降詔日厯遂召學士周麟之至都堂諭㫖草詔進入熊克小厯以為楊椿草詔誤也海陵集有此詔也甲戌内出手詔曰朕荷天祐序承列聖之丕基思所以垂裕於後旦暮不敢康永惟本支之重彊固王室親親尚賢厥有古誼普安郡王瑗藝祖皇帝七世孫也自㓜鞠于宫闈嶷然不羣聰哲端重閲義有立亢於宗藩歴年滋多厥德用茂望實之懿中外所聞朕將考禮正名昭示天下夫立愛之道始于家邦自古帝王以此明人倫而厚風俗者也稽古前憲非朕敢私其以瑗為皇子仍賜名瑋玉牒乙亥召學士楊椿諭㫖鎖院陳良祐撰撰椿墓誌丙子制授皇子寜國節度使開府儀同三司進封建王制既出朝士動容相喜中外大悅丁丑宰執入賀高宗曰昨日宣詔相見人心喜悦三月丙午制授恩平郡王璩開府儀同三司判大宗正事置司紹興府始稱皇姪丁未樞宻院奏事高宗曰璩昨日之除如何王綸對曰陛下春秋鼎盛已為宗社無窮之計今日談笑裁决略無難色高宗曰朕决此計已九年建王所佩玊魚乃置𣙜塲之初令置此玉以偹今日之用舉此即可知矣二王朕育之宫中三十年瑋始育于張媫妤璩乃育于皇后自張之没后收而並視之今日之除后意與朕合實録四月詔建王賜字元環玉牒有此周麟之御書玉堂跋尾云麟之被㫖撰皇子賜字三十一年九月金人入㓂十月朔下詔親征壬子建王以明堂恩改鎮南節度使時兩淮失守廷臣爭陳退避之計上不勝其憤請率師為前驅直講史浩以疾告數日矣聞之亟以晋申生漢惠帝事入示上力言太子不可將兵且曰危難之時父子安可跬步相違事變之來有不由已者唐肅宗靈武之事是已肅宗苐得早為天子數年而使終身不得為忠臣孝子誠可惜也上乃大感悟曰將若之何浩乃為草奏痛自悔過請衛從警蹕以共子職因中宫以奏高宗方疑怒覽之意頓釋問知其奏出於浩詰朝語大臣曰史浩真王府官也史稱大世家既而殿中侍御史吳芾求對乞以上為元帥先往撫師朱熹撰芾墓誌浩復遺大臣書言建王生深宫中平居未嘗與諸將接安能辦此議者又謂主上親征可使王居守浩復以為不可高宗亦欲令上徧識諸將十二月遂扈蹕如建康時方雨雪高宗御氊笠乘馬上亦騎從雨漬朝服畧不少顧而宰相已下多肩輿者趙性之中興遺史三十二年二月高宗還臨安傳位之意已决懲宣和吳敏軰自以為功不以語羣臣中書舍人唐文若獨請對言不宜急速周必大䟦文若帖有此㑹左僕射陳康伯乞去位高宗曰更待三數月康伯喻意不復言既而高宗益倦勅康伯宻贊大議且曰今不正名恐有臣下疑似之心且諸將分屯江上必使之曉然咸知聖意遂草立皇太子手詔以進康伯附傳五月甲子内降詔曰朕以不德躬履艱難荷天地祖宗垂祐之休獲安大位三十有六年憂勞萬機宵旰靡殫屬時多故未能雍容釋負退飬壽康今邉鄙粗寜可遂始志而皇子瑋毓德允成神噐有託朕心庶幾可立為皇太子實録仍改名煜是時呂廣問權禮部侍郎康伯外姻也廣問適以土王祠黄帝而監察御史周必大監祭康伯折簡齋宫宻議典禮廣問見必大因及之必大曰煜字與唐昭宗名同音可乎廣問告康伯亟取㫖改賜名昚御扎今藏周必大家十月賜字元永玉牒先是以望仙橋東秦檜舊第為新宫六月戊辰名曰徳夀宫命内侍張無為領之日歴後數日御筆追崇皇太子所生父中書舍人唐文若既書黄矣因過周必大共歎聖德不可及而疑名稱未安歸白宰相請更黄而堂吏不可文若執不已宰相以聞改稱皇太子本生親周必大省齋文藁尋又詔宗室子偁并妻合行加封令侍從臺諫禮官討論典禮聞奏遂就御史臺議於是翰林學士洪遵等奏欲依國朝封贈宗室近屬例高官大國極其尊崇庶於人情義理皆為宜稱子偁為皇兄贈太師追封王賜諡妻封王夫人甲戌詔皇兄故左朝奉郎大夫秘閣修撰贈太師少師偁加贈太師中書令追封秀王諡安僖妻宜人張氏封王夫人殿中侍御史張震同右正言袁孚共論右僕射朱倬乙亥倬除職奉祠洪遵草制略曰千秋無閥閲切早縁寢意又曰元良天下之本乃覬疇庸日厯震乞報行言章不許無隱集是日高宗内出御札曰朕宅帝位三十有六載荷天之靈宗廟之福邉事寢寜國威益振惟祖宗傳緒之重兢兢焉懼不克任憂勤萬機弗遑暇逸思欲釋去重負以介壽臧蔽自朕心亟决大計皇太子眘賢聖仁孝聞于天下周知世故久繫民心其從東宫付以社稷惟天所相非朕敢私皇太子可即皇帝位朕稱太上皇帝退處德壽宫皇后稱太上皇后一應軍國事並聽嗣君處分朕以澹泊為懷頥神飬志豈不樂哉尚賴文武忠良同德合謀永底于治詔乃洪遵等草也中興玉堂制草丙子高宗行内禪之禮百官班列紫宸殿下有司設黄麾仗五百人太常官樂工百人設而不作先是高宗嘗諭上以傳禪上流涕固辭至是遣中使召上入禁中復加面諭上推遜不受即趨側殿門欲還東宫高宗勉諭再三乃止於是高宗出御紫宸殿百官起居畢左僕射陳康伯知樞宻院事葉義問參知政事汪澈同知樞宻院事黄宗舜陞殿奏陛下超然高蹈有堯舜之舉臣等不勝欽贊第自此不獲日望清光犬馬之情無任依戀因再拜泣下高宗亦為之揮涕曰朕在位三十六年今老且病久欲閒退此事斷在朕意亦非由臣下開陳也卿等宜勉力以輔嗣君康伯等奏皇太子賢聖仁孝天下所知昨聞謙遜太過未肯即御正殿高宗曰朕已再三邀留今在殿後矣上皇入宫百官移班殿門外宣詔畢入班殿庭頃之皇太子服袍履内侍扶掖至御榻前拱手側立不坐奉應官以次稱賀内侍扶掖至于七八乃畧就坐宰相率百寮稱賀上遽興康伯等陞殿奏願陛下即御座正南面以副太上皇付託之意上愀然曰君父之命出于獨斷然此大位懼不克當尚容辭避班退太上皇帝即日駕之德壽宫上服赭袍玊𢃄歩出祥曦殿門冐雨掖輦以行及宫門弗肯止上皇麾謝再三且令左右扶掖以還顧曰吾付託得人斯無憾矣左右皆呼萬歲玉牒百官扈從上皇至德壽宫而歸頃之太上皇后赴德壽宫晁公遡箕山日記詔太上皇帝太上皇后合上尊號令有司集議以聞在内諸司日輪官吏赴德壽宫應奉少有怠慢以大不恭論德壽宫宿衛依皇城門及宫門法實録自是二十六年之間國勢尊安海内康樂孝愛兩盡今古鮮倫唐人所謂一月三朝大明天子之孝問安視膳不改家人之禮者盖實録也廟號孝宗不亦宜哉建炎雜記乙集卷一

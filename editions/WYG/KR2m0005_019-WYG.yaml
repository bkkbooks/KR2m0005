body:
  text: 建炎雜記甲集卷十九宋李心傳撰邊防一靖康建炎紹興大臣和戰守避説靖康中大臣言邉事者為四説李伯紀欲戰何文縝欲守李士美吴元中欲和白䝉享唐欽叟欲去建炎紹興間大臣言邉事者亦為四説李伯紀張徳逺欲戰范覺民趙元鎮欲守黄懋和汪廷俟秦㑹之欲和吕元直朱藏一欲去始上之在南都也河東北軍民猶為朝廷固守其地故伯紀建言遣張所招撫河北而傅亮經制河東然皆未及渡河而伯紀去位黄汪共政因以河為守焉己酉南渡遂不能守河既建偽齊猶以淮北為界其後秦㑹之與烏珠分畫又棄海泗唐鄧和尚原方山及商秦之半紹興末復取之至隆興又棄時執政大臣張魏公獨主戰陳魯公湯慶公史郡王皆主和議故和議遂定十三處功自金人入中原將帥望風奔潰未嘗有敢抗之者建炎三年十二月烏珠自杭州分兵至明州城下浙東制置使張俊拒之小揵四年二月烏珠還過吴江縣浙西宣撫司統制陳思恭以舟師敗之于太湖幾獲烏珠紹興元年十月烏珠親攻和尚原陜西都統制吴玠出竒邀擊大破之烏珠中流矢二僅以身免四年三月令陜西經略使薩里罕犯金平為吴玠所敗十月淮東宣撫使韓世忠敗烏珠游騎于大儀鎮烏珠遂不進六年十月主管殿前司公事楊沂中敗偽齊劉猊於藕塘降殺無遺猊挺身遁十年六月馬軍都虞候劉錡大敗烏珠於順昌烏珠拔寨還東京兩淮遂定十一年二月淮西宣撫使張俊淮北宣撫使楊沂中宣撫判官劉錡大敗烏珠十餘萬衆於拓臯三十一年十月淮南制置使劉錡遣其將員劉琦敗都統軍於髙景山之角林是月浙西副總管李寳敗統軍完顔鄭家奴於密州之唐島斬其守將而去歩司統制官邵宏淵拒敵於真州之胥浦橋獲㨗十一月中書舍人都督府叅贊軍事虞允文以建康統制張振王琪之軍敗金主亮舟師於采石是嵗馬司中軍統制趙樽復蔡州鄂州都統制吴拱拒敵於茨湖統制官王宣拒敵於確山三十年鎮江都統制張子葢解圍海州此皆渡江以來中國之勝㨗可稱者也乾道二年冬蔣子禮執政以明州城下和尚原殺金平大儀鎮順昌皂角林胥浦橋塘島采石蔡州茨湖確山海州為十三處戰功而藕塘不與此捷乃非金人故也二年八月二十四日甲午降㫖建炎三大戰建炎紹興初諸將未嘗與金戰也張俊號為名將然猶曰達蘭善戰其鋒不可當今救楚州併亡無益曲端與羅索戰於白原建炎四年正月杜充與烏珠戰於建康三年十二月劉錫與羅索戰於富平四年九月皆敗焉其他率爾望風奔潰葢未嘗接戰也曲端者本王子尚部曲張魏公收為主將端驟得志而驕白原之敗其氣已沮故富平之役曲端以為難富平之役二事張魏公之使秦蜀也約以治兵三年而後用師進取公甫至秦亭而烏珠犯浙江上浮海東征公聞即將見兵十餘萬人入衛明年春至房陵遇得音聞金騎已退乃還是秋公聞金欲再犯江淮乃議出師以撓其勢曲端壯愍為都統制以士不習戰難之參贊軍事劉彦沖亦以為非計公曰吾豈不知此顧東南方急不得不爾遂合戰於富平然是冬達蘭不能渡江而陜服之師遂為羅索所敗時幕客獨王子髙贊之而吴武安玠為禆將亦以為難而不見聽云時人皆以此咎公特未知其本心爾當富平之役合五路之師四十萬熈河經畧使劉錫為都統制永興帥吴武安玠涇原帥劉忠武珙慶元帥趙觀察哲秦鳯提刑郭恭毅浩皆在行間時哲常請分兵魏公不聽也及敗哲全師而返魏公怒其先退故斬之然哲當復辟時有功在西邉又為名將故魏公誅之當時亦無人以為是烏珠犯浙江建炎末烏珠謀犯浙江上將幸㑹稽三年秋七月先奉孟太后及祖宗神主往豫章閏八月上自建康東往留杜丞相充領行營之衆十餘萬守長江之險又命劉武僖屯池州以為之援而韓蘄王屯京口張忠烈以其兵從上行冬十一月烏珠渡江武僖退屯皇子太后奔䖍州衛兵皆潰祖宗神御後宫美人頗有失者杜充遁而降韓蘄王亦焚鎮江而去十二月烏珠自宗城徑趨臨安上遽航海是嵗除夕金遣偏將鏡士至明州為忠烈所敗四年春金兵再至忠烈引兵遁金遂屠明州及春水將發烏珠乃焚臨安而去韓忠武要之於黄天蕩相持四十八日夏四月烏珠自建康潜鑿小河而去忠武追之金從上江縱火焚其舟師韓大敗是役也江浙荆湖皆為胡人所踐然烏珠亦危幾不得免自是不復過江焉吴玠和尚原之勝仙人關之勝紹興初金陜西選鋒都統羅索死烏珠㑹諸道及女真兵數萬人造浮梁跨渭元年春親攻和尚原吴武安以陜西都統制出竒邀擊大敗之烏珠中流矢二僅以身免獲其麾葢自金入中原其敗衂未嘗如此也三年春二月尼瑪哈在大同府復遣陜西經畧使薩里罕與劉豫子麟襄五路叛兵自商於入寇金州守將王彦棄城走武安收兵保仙人原金遂入梁洋蜀中復大震張魏公猶為宣撫使下令治潼川將士皆憤劉彦沖諫而止金留屯中梁山踰月夏四月始自斜谷去紹興元年秋烏珠敗牛臯李横于牟駝崗自商於謀寇蜀四年春與薩里罕以十萬騎冦仙人關時張公已去武安豫為壘於關側號殺金平嚴兵待之三月朔金攻殺金平武安都統制官吴璘楊政田晟禆將姚仲王喜擊却之金不能支乃引去還屯鳯翔授田土為久留計自是不復冦蜀矣岳飛襄陽之勝襄陽據荆楚上游為蜀門户紹興三年夏偽齊將李成攻陷之鎮撫使李横以軍食不繼率部曲奔豫章時趙忠簡為帥也四年忠簡入秉政議遣岳鵬舉自江西復襄陽簽書樞密院事徐師川難之上不從師川由此罷政其秋遂復襄陽云紹興失河南河南自靖康中首為尼瑪哈所破伊陽人翟進率軍民上山保險建炎初以進為京西制置使守其地二年冬十月進為劇冦楊進所襲墜塹死翟興代之後擢興河南鎮撫使劉豫既立深憚興紹興二年春用其降將楊偉計與金人兵襲山寨興戰死子琮代為鎮撫使久之襄頴皆陷琮孤立力不能敵帥麾下所部突圍而出朝廷始盡失河南焉韓世忠大儀之勝楊存中藕塘之勝自金立偽齊建炎四年秋繼以余覩之叛紹興二年秋由是不復冦江淮紹興四年秋劉豫聞朝廷遣章尚書誼求湖南地乃乞師入寇金主晟命諸將議之尼瑪哈烏珠皆以為難鄂爾坤以為可遂命鄂爾坤及達蘭權左右副元帥提兵應豫又以右都監烏珠嘗過江知地險易使為先鋒於是騎兵自泗攻揚歩兵自楚攻髙郵朱藏一聞之勸上避敵趙忠簡獨曰戰而不捷去未晚也上遂命忠簡代為相而忠簡奏起張忠獻代知樞密院事即日赴江上視師上自幸平江冬十月韓蘄王敗烏珠之前軍於大儀鎮烏珠還泗上㑹天大雨雪軍糧乏絶蕃漢軍皆不願行又聞金主病篤十二月烏珠用其愛將韓嘗計夜引還韓劉二將追擊之俘獲甚衆劉麟僅以身免明年上還臨安擢忠獻為相是夏忠獻既平楊么鋭意大舉動六年春遂以都督行邉揭榜䟽豫僣逆之罪命韓蘄屯楚州以圖睢陽劉安城屯合肥以招北軍張魯王進屯盱眙而楊和王領中軍為後翼又命岳武穆屯襄陽以謀中原武穆遣兵入蔡州焚其積聚軍聲大振秋九月上復幸平江劉豫聞求救於金熈宗亶其伯父領三省四宋國王宗磐難之乃聽豫行遣烏珠提兵黎陽以觀釁時豫以其子淮西王麟為行䑓尚書令遣叛將李成孔彦舟關師古領鄉兵三十萬逼合肥又遣其姪猊東出渦口左廂趙忠簡聞之懼議移盱眙之戍退合肥之師召襄陽之兵東下葢欲専為操江時因劉安城已棄合肥張忠獻自馳至采石止之冬十一月楊和王與劉猊遇於藕塘殺降無遺麟拔寨遁而去獲其糧舟四百艘十一月忠簡罷忠獻獨相明年春三月上幸建康自是金人不敢南而劉相則廢矣建炎雜記甲集卷十九

body:
  text: 建炎雜記甲集卷六宋李心傳撰朝事二道學興廢自熈寧元豐年間河南二程先生始以道學為天下倡二先生少學於汝南周茂叔其後學者翕然宗之二先生死其髙弟門人前有河南朱公挾劉質夫李端伯京兆吕與叔蘇季明上蔡謝顯道延平楊中立建安游定夫河東侯師聖伊川門人後有河南尹彦明張思叔東平馬時中福清王信伯涪陵譙天授中立彦明遭遇靖康建炎紹興之間致位通顯天授入朝於靖康而不合紹興中再召不起後隱清神山中建安胡康侯學春秋於伊川而不及見以楊謝為師友紹興初秦㑹之為亞相引康侯侍經筵一時善類多聚於朝俄為吕元直朱藏一所逐朱吕罷趙元鎮相彦明以布衣入覲講經生學士多召用焉元鎮罷張徳逺獨相陳司諌公輔首上章力排程氏之學以為狂言怪語滛説鄙論鏤榜下郡國切禁之康侯疏言今使學者師孔孟而禁不得從頤顥是入室而閉其户也其後㑹之再得政復尚金陵而洛學廢矣中立傳郡人羅仲素仲素傳郡人李愿中愿中傳新安朱元晦康侯傳其子仁仲仁仲傳廣漢張敬夫乾道淳熈間二人相徃來復以道學為已任學者號曰晦庵先生南軒先生東莱吕伯恭其同志也南軒侍經筵不久而去晦庵屢召不起上賢之久之王丞相淮當國不善晦翁鄭尚書丙始創為道學之目王丞相又擢太府寺丞陳賈為監察御史俾上疏言近日縉紳所謂道學者大率假其名以濟其偽望明詔中外痛革此習每於除授聼納之際考察其人擯斥勿用晦翁遂得辭又數年周洪道為集賢相四方學者稍立於朝㑹晦翁除郎以疾未拜而林侍郎栗劾其欺慢且詆道學之士乃亂臣之首宜加禁絶林雖罷去而士大夫譏貶道學之説迄不可解甚至以朋黨詆之而邪正幾不能辨至紹熈末趙子直當國遂起晦翁侍經筵而其學者益進矣晦翁侍經筵數十日而去位子直貶永州何恭政澹為中執法復上擊道學之章劉樞院徳秀在諫列又申言之於是始有偽學之禁矣先是光宗登極劉徳修為殿中侍御史上疏極言兩議交攻之禍詔下其章而後五年其偽學乃禁學黨五十九人姓名自禁偽學之後劉侍郎珏以故御史免喪入見上言前日之偽黨今又變而為逆黨且何䇿以消之於是自慶元至今以偽學逆黨得罪者凡五十有九人宰執四人趙汝愚右丞相留正少保觀文殿大學士王蘭觀文殿學士知潭州周必大少傅觀文殿大學士待制已上十三人朱熹煥章閣待制兼侍讀薛叔似權吏部侍郎兼樞宻都戸承㫖提舉太史局章頴權兵部侍郎兼侍講鄭湜權刑部侍郎樓鑰權吏部尚書林大中吏部侍郎黄由權禮部尚書黄黼權兵部侍郎何異權禮部侍郎孫逢吉權禮部侍郎餘官三十一人劉光祖起居郎兼侍讀吕祖儉太府寺丞葉適太府卿領淮東財賦楊方秘書郎項安世秘書省校書郎沈有開起居郎曾三聘知郢州㳺仲鴻軍器監主簿吳獵監察御史李祥國子博士楊簡國子祭酒趙汝讜添監右臧差西庫趙汝談前淮西安撫司輸官陳峴秘書省校書郎范仲黼著作郎兼權禮部郎官汪達國子司業孫元卿國子博士袁燮太學博士陳武國子正田澹宗正丞兼權工部郎官黄度右正言張體仁太府卿蔡幼學福建提舉常平茶事黄灝浙西提舉常平茶鹽公事周南池州州學教諭吳柔勝新嘉興府府學教諭李埴校書郎王厚之直顯謨閣江西提㸃刑獄孟浩知湖州趙鞏秘閣修撰知揚州白炎震新通判成都府武臣三人皇甫斌池州都統制范仲仁知金州張致逺江西兵馬鈐轄已上並見於臺諫章疏者士人八人楊宏中周端胡道林仲麟蔣仲徐範並太學生蔡元定吕祖泰慶元三年十二月丁酉知綿州王沇朝辭入見請自今曾係偽學舉薦陞改及舉刑法亷吏自代者並令省部籍記姓名與閒慢差遣事即行黄子由為吏部侍郎建言人主不當待天下以黨與不必置籍以示不廣沇故資政殿學士王曾孫也五年六月己丑擢沇利州路轉運判官時子由權禮部尚書未幾出之張參政巖為殿中中丞侍御史奏子由阿附權臣植立黨與遂降子由雜學士奉祠御筆禁言舊事當黨禍既作上欲消之因降御筆令復給舍臺論奏不必更及舊事務在平正以副朕救偏建中之意時劉德秀為諫長與察官張徳修等上疏言自今舊奸宿惡或滋長不悛臣等不言則誤陛下之進用言之則礙今日之御札若任其敗壊朝事復如前日而後進言則徒有噬臍之悔三者皆無一可望宣下此章播告中外令舊奸知朝廷紀綱尚在不致故肆侈張詔改不必更及舊事所謂不必専及舊事也黄元章為殿中侍御史獨上言治道在黜其首惡而任其賢使才者不失其職而不才者無所憾焉故仁宗嘗曰朕不欲留人過失於心中此聖皇之道也至於前事有合理論列事體有闗國家利害者臣不敢以不正對疏奏元章竟徙他官慶元罷臧否孝宗淳熈中始嚴監司臧否郡守之令既申牧伯部使者數人稽緩之訓時趙温叔守荆州黄中守潭為上所禮特下詔趣之然行之十餘年後士大夫徃徃以人情厚薄為臧否論者頗患其不公慶元四年十一月庚申新知漢陽軍蔣用之朝辭上言稱其偽朝廷是之明年三月甲午右正言陳自强復以為言於是臧否遂罷慶元臧否縣令慶元中張君量守廣西請令監司帥臣各於嵗終以所部縣令分臧否上中下三等合平而為七次春上奏頒之考其政蹟果係臧之最者取㫖陞擢而否之最者亦加黜責其他次第斟酌施行以為懲勸從之時二年六月己丑也然自後未有舉行之者明年君量入為臺諫以至樞庭卒不能行其事更不能行其說云紹興許薦士嘉㤗罷泛舉國朝薦舉之目自京職官至令録其來逺慶元初司馬公始奏設文武十科以舉士其後又有舉將帥亷吏所知合舊陞陟自代等科凡十有一紹熈元年冬又詔監司帥守滿秩造朝陛對之際許薦所部人才一二人如無聼闕文武髙下皆有所拘其後三年間在外被薦者八九朝廷不能盡用但令中書省籍記其姓名而已四年冬言者謂今被薦者猥衆朝廷疑其私而不信病其衆而難從其間縱有賢才不免與僥倖者併乗請條之乃詔帥守監司自今毋得獨員薦士慶元元年十一月又詔諸司薦連銜以聞時章德茂帥興元薦知利州聞中滿叔獻等三人政績有㫖與監司及陞擢差遣胡紘為御史上言叔獻等不聞有過人之才而直以人情之厚獨銜舉薦詔勿行嘉㤗二年三月右正言施康年又言近來士大夫有持亷吏科目及薦章十餘至廟堂但得一學官者又有挾三四薦而得院轄者執政至無以却之請自陞改自代十科外悉行罷去如朝廷聞者特㫖令内外舉薦者並具實迹以聞從之自此舉薦之濫少可革矣元年七月察官鄧友龍請覺察所薦非其人者從之執政子孫任祠官祖宗時執政子孫皆得任内外清望官但不為臺諫兩省耳自蔡京父子共政秦熺繼之由是典制大壊孝宗惡焉淳熈八年八月始詔見任宰執臺諫子孫並與宫觀嶽廟理為資考慶元六年閠二月又詔許用前宰執與狀為職司云姚次韓論讞紹興初陳去非在黄門始申嚴奏讞不當之令其後寖寛慶元中東南有因詈人歐死者而行􅇯之人作何問奏裁姚次韓為御史上言如此是詈人之罪重於殺人三年三月壬寅詔自今有司奏讞死罪不當者論如律裕民五事自紹興初令諸道守臣到官半年陳便民五事既又命給舍看詳其可行者以聞二十六年九月壬子其後寖廢淳熈末復申行之九年十二月戊午慶元時劉仲洪為諫長復請専付檢正都司考覈取其近情合理者以聞二年七月戊子三年四月丙辰復令給舍看詳以白執政而檢正左右司檢詳擬行之然今諸路守臣所上言其無甚可行特姑存故事而已紹興三年二月甲寅初有詔守臣到任半年具便民或邊防五事以聞著為令慶元𦂳要政目五十事慶元五年十月右諫議大夫陳自强勉之上𦂳要政事條目三十門人文薦舉財用科舉軍旅學校風俗爵禄蓄積教化法禁命令陳諍賞罰獄訟任官税賦守農田監司奉天邊備宗禮制奉祖祭祀銓選任相馬政令任將馭邉人荒政請令侍從兩省講讀官進故事日於前項政事條目内選擇一事為題先叙前代帝王施行得失而證以祖宗故事事體所宜斷以已意候其進入編為一書如一句而講一事則再加今日之事體一嵗之間便有三四十事不過二年朝廷之大政講究畢矣疏奏從之已而學士髙文虎炳如又以二十事上之如前請稽古考課勤政選吏威斷救弊卹刑宗廟惠民宗室久任兵制文章奉親厯法茶鹽錢帛常平漕運義倉何自然論薦舉趙子直秉政引用所知多自外徑除館學者何自然為中執法以其廢壊夀皇成法嘗上疏言之元年六月己邜已而有㫖除甲科及經擢用人外須歴知縣有政績者諸司薦舉乃得除職命下自然復言若此用人也有二弊一則其人政事雖無可述而有勢力可宛轉移書遍囑鼎力進奏二則諸司之中茍有强有力者為之主張則他司莫敢違拒寒畯之士無繇可進請詔諸司取實有政績者連銜以聞仍闗御史臺照㑹若有不公許本臺覺察從之元年十一月庚戌自然雖有是言然終不能革嘉泰初察院鄧有龍復奏言自慶元三年至六年在外被薦者無慮千餘人其間或乏亷聲而舉充亷吏或素昧平生而舉充所知或不能文而舉可備著述至於廟堂亦無以處之願詔中外臣僚自今有人則可薦無人亦可闕倘所薦非人當擇其尤者而覺察以聞疏奏從之元年七月丙戌然亦未嘗有覺察者監司郡守至官交割庫金孝宗淳熈中常有詔守臣滿任以見管錢物交後政或次官收訖申戸部置籍代者限一月核實以聞著為令九年正月乙亥時蜀人有為總計及典方面者坐過例饋送各數萬緡皆停官九年正月戊子三月乙未郡守銓量故事諸道守臣皆臨遣淳熈末上以嶺南蜀道遥逺始詔川廣知州軍見居川廣合闕到半年前奏事人及係見闕去處並令詣本路轉運司禀事仰漕臣精加銓量人才委堪任使非昏繆老病之人確實報明申尚書省十年十月庚子然諸道罕嘗舉行紹熈末言者論漕司之權比制司之為輕而責亦不若制司之重權輕則不敢多有所廢黜責輕則不暇詳於顧計州縣不治職此之由請一付之制司權重則雖廢黜之多而有所不憚責重則顧計利害之深而不敢茍且如此則昏老疾病之人不得冐居而州縣無不治矣趙子直始為政遂白行之五年十月辛邜其後行之數年議者不以為當嘉泰元年五月十有一日並赴闕朝辭㑹知台州郭公燮等數人代者皆過滿帥臣劉仲洪因請於朝仍復令制司銓量免奏事焉大抵川陜道逺守臣奏事者多以為勞若帥臣公心一意而無請托喜怒予奪之私則銓量為得嘉泰奏薦嘉泰言者以官冗恩濫請恩娶宗女授官者仍舊法終身止任一子乾道二年六月集議止任一子九年改不作非泛兩府師相不得以郊恩奏門客文學歸正官不許添差極邊初官不許求辟大臣丁憂解官遇覃恩不許遷秩著為令從之元年八月己邜建炎至嘉泰申嚴贓吏之禁自祖宗開基首嚴贓吏之禁重者輒棄市真宗以後稍從寛貸然亦終身不用建炎二年春髙宗復詔贓罪明白者不許堂除及親民差遣犯枉法自盗罪至死者籍其貲二月辛未四年秋詔自今犯贓免死者杖脊流配八月戊子是冬湖口令孫咸坐贓黜𨽻連州上謂輔臣曰祖宗時贓吏有例杖於朝堂者黜而特配者尚為寛典十一月壬子紹興四年秀州黄大本遂决刺焉然髙宗性仁厚但行之數人而止七年秋永嘉令李處亷貸死籍其貲自是為例九月丙戌二十六年秋處守鄒栩犯贓當死栩鄒忠公子也上見其獄蹙額久之曰既贓罪不可貸乃編置吉州九月癸丑隆興二年秋統制官魏尚者盗用所部軍食為錢三千緡獄具孝宗諭湯丞相曰故事當直决湯相曰尚武人不足深責願陛下三令五申上勉存之九月己丑遂降詔禁止十月乙丑其後廣西提刑石享義抵罪始刺配焉淳熈五年上既申保任京官連坐之罰十年夏又詔自今自盗枉法贓罪至死者籍貲决配不以秩位之髙下形勢之輕重朕將一槩施行六月戊戌遂命監司帥臣嵗舉部内亷吏一二人具實迹来上令中書籍記無則闕之六月己未然亦未嘗有决刺者慶元元年倪正父為吏部侍郎建言今之達官貴人贓以萬計監司臺諫按法不過放罷前之行遣既不究實後之辨雪遂得有辭請自今以貪墨聞者雖未欲送獄根勘亦合差官究實懲治庻幾大贓治而小贓懲八月己丑其後亦不克舉行嘉泰二年冬言者又論臣僚贓累鉅萬且載章疏投閒數月便得祠禄請自今皆須二年十一月庚午雖有是言然臺諫所論或得於風聞朝廷察其誣未嘗不扙拭也若究實懲治則賭者無幸免而枉者可以復直矣舊以絹計贓者千三百為一疋後增至二千紹興三年髙宗以絹直髙特下詔增一千九月乾道六年復詔權以四千為一疋三月甲戌迄今遂為定制近嵗堂部用闕渡江以来員多闕少中外乆患之紹興末寺監丞簿學官大理司直樞宻院編修官始皆有待次者乾道五年秋孝宗遂命皆與添差一次自今須見闕乃得除近嵗以來東南郡守率皆待月兩聞五六年蜀中亦三四年由是朝士罕肯丐外而勢要之人多攘闕者淳熈十三年詔自今存留州郡十五闕止差一政令中書籍記以待執事官外補慶元元年又增為三十闕非職事官補外毋得陳乞然廟堂牽於丐請率多借用嘉泰二年夏言者請以嘉興府處台衢嚴信池袁撫江潮漳泰温徽州十五闕令中書再行注籍專待職事官請外如有經營留闕之人令給舍繳駁臺諫論奏從之四月辛邜今監司帥臣亦有待闕者今年辛煥炳知䕫州待除何侍郎異闕而侍左選人用六年闕侍右小使臣用五年半闕云小使臣初用五年二月戊申吏部請用季闕慶元六年閠六月半闕許之嘉泰禁私史頃秦丞相既和議始有私史之禁時李文簡燾嘗以此重得罪秦相死遂弛語言律近嵗私史益多郡國皆録本人競傳之嘉泰二年春言者因奏禁私史且請取李文簡續通鑑長編王季平東都事畧熊子復九朝通畧李柄丁未録及家語傳等書下史官考訂或有禆於公議乞即存留不許刋行其餘悉皆禁絶違者坐之二月甲午文簡所著長編凡九十餘卷孝宗甚重之季平子復皆嘗上其書除職遷官仍史館内以父任監行在都鹽食乾道八年夏上其所編丁未録二百卷自治平四年至靖康元年詔特改京官六月戊戌付國史院然紀載無法學者弗稱焉其秋商人載十六車私書持子復中興小厯九朝通略等書欲渡淮盱眙軍以聞遂命諸道帥憲司察郡邑書坊所鬻書凡事干國體者悉令毁棄七月戊申中興小厯者自建炎初而至紹興之季書雖已成久未嘗進御然其書徃徃疎畧多牴牾非古良史之比也建炎雜記甲集卷六

body:
  text: 建炎雜記甲集政書類一通制之屬提要臣等謹案建炎雜記四十卷宋李心傳撰心傳有建炎以來繫年要録已著録心傳長於史學凡朝章國典多所諳習是書取南渡以後事跡分門編類甲集二十卷分上徳郊廟典禮制作朝事時事故事雜事官制取士財賦兵馬邊防十三門乙集二十卷少郊廟一門而末卷别出邊事亦十三門每門各分子目雖以雜記為名其體例實同㑹要葢與建炎以來繫年要録互相經緯者也周宻齊東野語嘗論所載趙師睪犬吠乃鄭斗所造以報撻武學士之憤許及之曲膝費士寅狗竇亦皆不得志報私讐者撰就醜詆韓侂胄僭逆之類悉無其實云云葢掇拾羣言失真者固亦不免然於高孝光寧四朝禮樂刑政之大以及職官科舉兵農食貨無不該具首尾完贍多有馬端臨文獻通考章俊卿山堂考索及宋史諸志所未載故通考稱為南渡以來野史之最詳者王士禎居易録亦稱其大綱細目粲然悉備為史家之巨擘言宋事者當必於是有徴焉其書在宋有成都辛氏刋本并冠以國史本傳暨宣取繫年要録指揮數通今惟寫本僅存案張端義貴耳三集序稱心傳告以朝野雜記丁戊二集將成則是書尚不止於甲乙二集而書録解題及宋史本傳均未之及殆以晚年所輯書雖成而未出故世不得見歟乾隆四十六年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4a24414f5b2fadb45cf76995f2c3219e0d9b957d5188e1fe493ba33bbd80dd18

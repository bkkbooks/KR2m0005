body:
  text: 建炎雜記甲集卷三宋李心傳撰典禮尊號人主尊號自漢哀帝用方士之說始有之本朝沿唐故事毎遇大禮羣臣必奉寶册加上尊號神宗皇帝聖學髙逺以清虚名無益遂罷之紹興十八年士民曹溥等千餘人請上尊號髙宗不許及遜位孝宗始奉册加號曰光堯夀聖乾道六年上皇將加號時周益公在翰苑請用唐故事皇帝率百官詣徳夀宫再表以請太上乃下誥許之禮文燦然近古所未有其後每因慶典加之至淳熈末年累加光堯夀聖憲天體道性仁誠徳經武緯文紹業興統明謨盛烈凡二十四字孝宗既内禪乃上號曰至尊夀皇聖帝自後不復加光宗在夀康宫亦加聖安夀仁四字遂為奉親之典焉年號髙宗初即位改元建炎以火徳中微故也苖劉之亂以為炎字乃兩火故多盗明年還自海上改五年為紹興久之既與金議和遂不復改三十二年孝宗即位踰年改隆興其説以為務隆興之政及學士草制則合建隆紹興之義非初意矣二年王瞻叔為參知政事言趙諗謀逆嘗欲以隆興紀元令太常丞曾建檢事實以進上愕然明年勅改元乾道乾道盡九年時以為乾元用九之數已極乃改為純熈㝷又易純為淳言欲致淳化雍熈之美也十六年光宗即位將紹淳熈之政遂以紹熈紀元猶隆興意爾而學士草制則又合紹興淳熈為義亦非初意也五年上繼統趙子直為相銳意慶厯元祐故事乃改寧元盡六十而上皇及太皇繼崩中宫去世二皇子不育朝廷嫌因改明年為嘉㤗云總論南廵後禮樂自南廵後庻事草創上祀天維揚始命即京師取祭器法服鹵簿之屬己酉南渡悉為金人所焚紹興元年始作蒼璧黄琮十年明堂始備大樂飲福用金爵十二年將逆大母於臨平始制常行儀衞十三年始復朔日視朝之禮又行孟饗備五輅及建金雞肆赦祠祭始用牲十四年復教坊建宗學作渾天儀十五年初藉田千􅅕及行太廟㑹禮作新祭器十六年始備八寶鑄景鐘建御書院太廟祏室及賜講畢御筵十七年始命太常行園陵御史監視及賜進士聞喜宴十八年始繪配饗功臣像於景靈宫庭之兩壁十九年始復蜡祭及諸陵薦新二十七年始復太廟功臣七祀之祭及諸大祀葢自息兵後將二十年而禮樂始備焉恭謝恭謝自真宗以來每大禮畢輒行之建炎初不講紹興元年明堂畢命同知樞宻院事富季申恭謝越州天慶觀温州守臣恭謝景靈宫十三年郊禮畢上詣景靈宫恭謝時宫始成故也舊太一宫亦恭謝十八年宫成復舉行之自是遂為故事大朝㑹大朝㑹者紹興十二年十月詔來嵗舉行之王望之為禮部侍郎言排辦不及請竢來年冬至既而不果十五年正月朔旦乃克行用黄麾仗三千三百五十八人視東都舊儀損三之一時無大慶殿遂權於崇政殿行之以殿狹輦出房不鳴鞭他如故事是日設宫架樂百官朝服上夀如儀自是一行而止親耕親耕紹興十五年詔舉行以太師秦檜為耕藉使禮官張柄請耕藉使乗金根車先詣壇所從之後檜不敢乘而止明年正月五日上服衮冕親饗先農於東郊牲用少牢配以后稷禮畢易通天冠絳紗袍親詣耕位宫架樂作上親耕九推乃止遂登親耕壇命宰執使相侍從兩省臺諫行五推九推之禮庶人千􅅕焉時太常王湛者又請皇后就禁中親􅁞不果行司農寺主簿宋樸因請令守令以嵗中春出郊勞農至今遂為故事視學視學祖宗以來屢行之紹興十三年國學初建明年三月上幸學祗謁先聖退御敦化堂命禮部侍郎秦熺執經國子司業髙閲講易㤗卦遂幸飬正持志二齋賜閲三品服學官皆遷官諸生授官免解賜帛如故事時朝廷務講彌文故閲以為請承務郎胡寵聞之移書責閱希合語在儒學事中其年秋又用秘書少監楊游操之請幸秘閣召羣臣觀晉唐書畫三代古器賜操三品服省官皆遷官淳熈中孝宗踵髙宗故事視學命禮部侍郎李燾執經祭酒林先朝講大學遂幸秘書省賜省官燕上賦七言律詩坐者皆屬和是為兩朝盛事云大閲大閲者真廟景徳初以契丹將犯塞始行之髙宗建炎中常諭吕忠穆張忠獻二公欲講其禮後以避敵不果行隆興二年五月孝宗將閲武於近郊既涓日矣㑹雨作而止乾道二年十一月始幸白石教塲上登臺親御甲胄指授方畧命前馬歩三司合教為陣戈甲耀日旌旗蔽野師衆歡呼作擊刺而不中節上大悦四年十月又大閱於茅灘時冬日可愛士民觀者如堵權主管殿前司公事王逵因奉觴稱夀上嘉奬之加賜諸軍中金四十鎰錢十餘萬緡淳熈四年十二月又大閲於茅灘十年十一月又大閲於龍山皆用此例燕射燕射祖宗承平時數行之渡江後不講乾道末孝宗嘗諭輔臣留意習射淳熈元年九月遂幸玉津園謀燕射之禮賜皇太子宰執使相侍從正任御宴酒三行樂作上臨軒有司進弓矢上射中太子進酒率羣臣再拜賀次太子及環衛官蕭奪里􅂴射中上再射復中的保信軍節度使開府儀同三司鄭藻起居舍人王卿月亦射中賜太子及藻奪里􅂴卿月襲衣金帶上賦七言詩丞相曾欽道以次屬和上還宫是日隂雨道無纎埃都人聳觀歡動林野禮甫畢雨始作北敵禮物自和敵後金人正旦餽上金酒器六事注碗一盞四盤一色綾羅紗縠三百段馬六匹生辰珠一袋金帶一條衣七對箱一合色綾羅五百叚馬十疋而金主生辰正旦朝廷皆遺金茶器千兩銀酒器萬兩錦繒綺千匹云北使禮節北使至闕先遣伴使賜御筵于班荆館在赤岸去府十五里酒七行翊日登舟至北郭稅亭茶酒畢上馬入餘杭門至都亭驛分位上賜被褥鑼等明日臨安府書送酒食閣門官入位設朝見牓儀投朝見牓子又明日入見伴使至南隔門内上御紫宸殿六参官起居北使見畢退赴客省茶酒遂燕垂拱殿酒五行惟從官得預坐是日賜茶酒名果又明日賜生餼見之二日與伴使偕徃天竺寺燒香上賜沉香乳糖齋筵酒果次至冷泉亭呼猿洞而歸翌日賜内中酒果風藥花􅄳赴守嵗夜筵酒五行用傀儡正月朔旦朝賀禮畢上遣大臣就驛賜御筵中使傳㫖宣勸酒九行三日客省簽賜酒食内中賜酒果遂赴浙江亭觀潮酒七行四日赴玊津園燕射朝廷命諸校善射者假管軍觀察行伴之上賜弓矢酒行樂作伴射官與大使並射弓館伴副使與國信副使並射弩酒九行退五日大燕集英殿尚書郎監察御史已上皆與學士撰致語六日朝辭退賜襲衣金帶大銀器臨安府書送贐儀上復遣執政官就驛賜筵晩赴解換夜筵伴使與北使親勸酬且以衣馬為侑次日上賜龍鳳茶金度合乗馬出北闕門登舟宿赤岸又次日上遣近臣押賜御筵大凡到闕朝見射朝辭宻賜大使共得中金千四百兩副使八百八十兩衣各三襲金帶各三條都管上節皆銀四百兩中下節皆三十兩衣一襲塗金帶副之迄今並循此例奉使出疆賞賚自紹興以來朝廷每遣使徃北境賀生辰正旦使副及三節人從徃還皆遷一官資上中節各十人下節三十人並不許白身使賜裝錢千緡副賜八百緡銀帛各二百匹兩上節銀帛共三十中節二十五下節十五三節人俸外日給五百錢探請俸十八年二月詔錢賞各半若非泛遣使則如舊崇義公崇義公周後也仁宗嘉祐中擇使臣柴詠者封之詠於世宗為從孫熈寧中司馬公為西京留臺請廢詠而立郭氏後王介甫為上言豈可使世宗以得天下之故易其姓乃不行詠傳至曾孫恪為金所殺紹興五年以恪從弟承節叔為右承奉郎襲封崇義公奉周後二十六年夏叔老乃以其子國器嗣封今居衢州毎朝有大禮則入侍祠如故事衍聖公衍聖公孔子後也歴代皆有封元祐中加賜田百頃紹興中衍聖公孔珍避難渡江上以林廟隔絶八年夏以衢州田五頃賜之二十四年珍卒復以其子搢為右承務郎襲爵奉祀事淳熈中入侍祠擢建康守久之妄用庫金貶秩遂不復用焉紹熈初搢累遷至朝散大夫未幾卒四年秋詔以子文逺為承奉郎封衍聖公今其族人間有登進士第者羣臣家廟神板祭器羣臣家廟自慶厯中宋莒公請為之後詔執政官許祀四室然當時大臣獨文潞公甞建於河南私第他未見也大觀四年詔公輔大臣祀五世且以祭器賜之紹興十六年上命有司為秦益公立家廟太常請建私第中門之左一堂五室五世祖居中東二昭西二穆堂餙以黝堊神板長一尺博四寸五分厚五寸八分大書某官某夫人之神座貯以帛囊藏以漆函用神幄嵗四饗用孟月柔日行之具三獻有司言時享用常器常饌上倣政和故事特用制祭器賜之其後外戚呉偉等諸家及將相虞雍公楊和王呉信王皆賜祭器葢自秦益公始列郡拜朔表州郡拜朔表故事惟西南北三京有之建炎二年冦院防撫諭江淮時四方多事故防始請令列郡月朔拜表如三京以示尊君親上之意從之自是遂為永制籠門賜雨具舊羣臣朝殿遇雨開隔門起居紹興中行之又詔從駕遇雨賜雨具景靈宫遇雨或地濕分東西立班皆特恩也百官肩輿故事百官出入皆乗馬建炎初上以維揚磚滑謂大臣曰君臣一體朕不忍使羣臣奔走危地可特許乗轎盖東都舊制惟婦人得乗車其他耆徳大臣或宗室屬近行尊者特㫖許乗肩輿已為異禮靖康末髙宗奉使至磁守宗汝霖以所乗轎進黑漆紫褥而已上猶却之葢京百官不用肩輿所以避至尊也今行在百官非入朝無乘馬者舊在京非宰輔師相親王不得張盖紹興後北使至用之伴使亦然至今以為例教坊教坊今樂也建炎初省紹興十四年復置凡樂工四百有六十人以内侍充鈐轄紹興末復省隆興二年天申節將用樂上夀上謂宰相湯慶公等曰一嵗之間止兩宫誕日外無所用不知作何名色大臣皆言臨時㸃集不必置教坊上曰善乾道後北使至亦用樂毎嵗兩至但呼市人為之孝宗天資恭儉每事如此如入殿無貴賤皆拜惟樂工獨聲喏盖伶倫與軍民之禮不同云建炎雜記甲集卷三

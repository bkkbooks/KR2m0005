body:
  text: 建炎雜記乙集卷八宋李心傳撰朝事三開禧去凶議和日記開禧三年十一月二日戊申御筆韓侂胄久任國柄粗罄勤勞但輕信妄為輙起兵端使南北生靈枉罹凶害令敵勢叵測專以首謀為言不令退避無以繼好息民可罷平章軍國事與在外宫觀陳自强阿附充位不恤國事可罷右丞相日下出國門先是敵人既有縛送首議用兵賊臣之請侂胄怒復欲用兵中外大懼禮部史侍郎彌逺時兼資善堂翌善乃建去凶之議甚秘人無知者久之得密旨乃以吿錢叅政象祖李叅政璧至是皇太子榮王入奏遂有此旨仍命殿前司中軍統制權主管本司公事夏震選兵三百防䕶侂胄别選兵二百守其府門錢叅政欲奏審史侍郎夜往其府趣之李叅政亦言恐事留或泄乃已三日乙亥侂胄入朝至太廟前震呵止之其從者皆散䕶聖歩軍准備將夏挺以帳下親隨三十四人擁侂胄車以出中軍正將鄭發王斌引所部三百執弓鎗刀斧䕶送至玉津園側殛殺之宰執至漏舍震報侂胄已押出錢叅政探懷中堂帖授自强曰有旨丞相罷政自强即上馬二叅政赴延和奏事遂以竄殛侂胄事牒報對境又令殿前司遣長隊五百人赴省前彈壓上欲擢史侍郎樞院固辭乃命錢叅政兼知樞密院事李叅政兼同知樞密院事是日禮部衛尚書涇除御史中丞吏部審侍郎孝友給事中王著作居安除左司諫晩召章直院良能直學士院四日丙子侂胄自强竝罷為醴泉觀察使李叅政進呈改自强提舉洞霄宫特進在外無充觀使者五日丁酉三省以資目偏遺二宣撫使置制十都統吿以上意殿司三將各進五官賜銀百兩士卒官賞有差親隨三十四人各兩資錢四十千官兵三百人各一資錢二十千而震再遷福州觀察使主管殿前司公事是日始責侂胄為和州團練副使郴州安置自强追三官永州居住蘇師旦杖脊刺配吉陽軍行衛中丞章疏也雷給事封還錄黃六日戊寅詔侂胄改送英徳府安置自强責受武太軍節度副使依舊永州居住是日又詔侂胄除名勒送吉陽軍自强送韶州並安置行王司諫章疏也七日己卯史侍郎除禮部尚書中丞給事又論師旦當正典刑詔處斬令廣東憲臣莅其刑是日臨安府申侂胄已行申放詔本府収殮瘞於其家先塋之顯親報慈寺九日辛巳邱同知自通奉大夫提舉臨安府洞霄宫除資政殿學士知建康府十五日丁亥李叅政罷初命除職與郡後二日復降兩官送撫州居住行殿中侍御史章疏也是日衛中丞除簽書樞密院事十六日戊子立榮王為皇太子十二月二日乙巳立資政為江淮制置大使十日癸丑金人䧟隨州二十日辛酉錢叅政為右丞相兼樞密事二十一日壬戌衛簽樞雷給事並叅知政事新除吏部林尚書大中簽書樞密院事二十二日甲子陽太尉次山除使相賜玉帶二十三日乙丑史尚書除同知樞密院嘉定元年正月十二日壬午監登聞檢院王柟自河南通書回持北行省牒赴三省樞密院求函首十五日乙酉詔侍從兩省臺諫集議先七日臺諫已有請詔答從重施行後四日再請御筆以未欲輕從答之十六日丙戌臺諫三請御筆付三省樞密院詳議將上二十二日壬辰史同知遷知樞密院事三月四日癸酉承事郎毛自知降充殿試第五甲仍奪第一人恩例以首論用兵也十九日戊子復秦檜官爵贈諡二十日己丑王柟自軍前再還行在二十一日庚寅詔侍從兩省臺諫赴都堂詳議限一日聞奏蓋柟與敵首議以函首易淮陜侵地故也於是議者皆言和議重事待此而決則姦凶已斃之首又何足惜二十二日辛卯有㫖依奏二十三日壬辰降黃榜下臨安府兩淮荆襄四川曉諭二十四日癸巳宰執資目諭諸路安撫制置等以函首事二十六日乙未臨安府遣東南第三副將尹明斵侂胄棺取其首送江淮制置大使司二十八日丁酉通謝使許在燮朝辭四月十八日丁巳自強責詞過門下倪給事思不書黄十九日戊午自强再責復州團練副使雷州安置籍沒家財六月二日庚午金人歸大散關三日辛未歸隔芽關又歸濛州五日癸酉陳自强卒於廣州許歸𦵏七日己亥衛參政罷行御史中丞章疏也十六日甲申林簽樞薨於位二十四日辛卯史知院兼參知政事七月十六日癸丑江淮大使丘資政除同知樞宻院事十七日甲寅通謝使回入國門八月四日辛未丘同知薨於江陰之里第十四日辛巳禮部婁尚書機除同知樞密院事吏部樓尚書鑰除簽書樞密院事九月二日己亥金國諭成使元顔侃等入見二十二日己未詔以和議成諭天下十月十日丙子錢右相遷五官為特進左丞相史知院拜右丞相雷參政遷知樞密院事兼參知政事婁同知遷參知政事樓簽樞遷同知樞密院事十一月二十二日戊午史右相以内艱免二十七日己亥用皇太子請賜第行在十二月丙寅朔錢左相為觀文殿大學士判福州行監察御史張疏也凡誅奸和敵二事所關甚大而廟謨雄斷四方有不得知今姑識其日月建炎雜記乙集卷八

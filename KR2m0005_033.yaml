body:
  text: 建炎雜記乙集卷十三宋李心傳撰雜事一趙韓王六世小譜忠獻韓王趙普字則平幽州薊縣人曽祖吳國公冀三河令祖趙國公全寶澶州司馬父齊國公逈相州司馬遷居洛陽齊國公生四子長忠獻次貞尚書都官郎中次安易宗正卿次正東頭供奉官忠獻三娶長魏國夫人魏氏生羽林衛大將軍承宗次齊國夫人魏氏生昭宣使神州團練使贈中書令承煦次陳國夫人和氏後唐宰相凝之女也生二女皆度為道士承宗娶長樂郡主髙氏蓋太祖甥女也無嗣承煦字景陽初娶仙源郡夫人孟氏蜀主昶之女繼延康郡夫人孟氏昶子滕國公元哲之女生子從約字元禮為東上閣門使象州防禦使贈建寧軍節度使娶曹氏秦武會王彬之女封周安郡夫人從約十四子長思齊左藏庫使榮州刺史贈華州觀察使思齊生希魯宜州觀察使贈太保希魯生環字子偉事髙宗為蘄州防禦使知閣門事後更名述述子演早卒演子溢溢子謙叔事孝宗為武德大夫文州刺史權知閣門事從約中子思明為引進使有女適户部侍郎范坦思聰閣門通事舍人娶宋氏武安軍節度使守約女思復武經大夫榮州刺史娶錢氏吳越王孫女思恭崇儀使娶馮氏知樞密院事京之女思文左藏庫副使子希傑奉議郎知秀州孫圭武翼大夫知茂州思禮內殿承制子武節郎希詔娶向氏安康郡王宗回女封樂平郡夫人思靜國子博士思行武功大夫榮州刺史娶徐王向經女欽聖憲肅皇后之妹也子希仲衛尉等官凡韓王子孫之顯達者盡於是矣紹興七年朝廷録勳賢官其六世諸孫洪等十二人洪乾道末仕至修武郎知緩陽縣而死歸資為盜所掠其女流落行乞於蜀中嘉定三年六月辛酉過吾鄉因得觀其世譜如右故托其大槩書之以補史闕渡江後名將皆西北人渡江後將帥韓世忠綏德軍人曲端鎮戎軍人吳玠吳璘郭浩德順軍人張俊劉錡王􅊅秦州人楊惟忠李顯忠環州全淵階州人馬廣熙州人楊政涇州人皆西人也劉光世保大軍人楊存中代州人趙密太原人苗傳隆德人嶽飛相州人王彥懷州人皆北人也諸將中惟張韓楊之官最貴其諸子悉在行都張之子子顔子正皆為次對雜學士楊之子禊為列曹侍郎倓至執政韓之子彥直彥質彥古皆為户部尚書嶽之子霖起於流落亦為兵部侍郎無復世將之風矣惟吳郭居近塞尚餘將種云吳玠福不逮吳璘吳襄烈珙本吳涪王玠庶弟也父扆為軍校娶劉氏生子玠璘既而其家婢生珙劉氏悍而妬扆憚之命珙名為已子然珙為人頗類玠屢歷行陳亦得軍士心晚與璘子挺同為管軍節度使而玠官止使相珙止節制使璘官至太傅封新安郡王挺亦至太尉古人言智將不如福將玠璘近之矣奉議郎李荀老太宰邦彥猶子也娶璘中女能道其家事如此云其後挺子曦以叛誅璘之他子孫皆廢徙朝廷念玠保蜀之功特免連坐焉趙開山改姓開山趙者沂州土豪也初姓趙名開山紹興末金亮苛虐人心不附開山因聚衆山澤間為盜及金亮入冦朝廷遣李寶入膠西開山引兵自城陽會之因姓開山趙示欲開趙氏中興之業也既而葛王立趙隨寶歸朝纍官武略大夫英華刺史乾道庚寅南郊當任子自言今已姓開不可使父無子孫繼後乞將男天鍚一名許從趙姓蔭補以繼父趙整之後詔特許之一家兩姓自昔所未有也劉李二忠定得諡本末夀皇時前朝舊臣多得賜諡往往官未至而請諡之蔡君謨之類是也淳熙庚子劉元城家請諡上謂大臣曰元祐黨籍中朕幾不記此人趙溫叔曰黨籍從官以蘇軾為首安世乃第二人也今其語録尚傳於世乃諡忠定戊申歲李伯紀家請諡上偶未省宰相周子充為上言其平生大略上言曰益廣才疏其張浚之徒與於是亦諡忠定二事乃趙周二公親言之何道夫恬於進取何耕道夫德陽人嘗為省試榜首知名士也恬於進取登第三十年始為倉部郎官遷右曹兼諸竂吏院國子司業遂為祭酒兩學之士甚重之道夫每退輒徑歸杜門未嘗造請淡如也淳熙七年四月二十二日禮部齊集侍郎慶會罷或謂道夫得之已報行矣部吏亦掃閣待其來既而中止或曰道夫雅為趙丞相所敬然不甚親之方進呈乃以鄉國之嫌為解或曰蜀人有與之異趣者摘其早年之文為王忭密言之故不果用明年春遷祕書監其秋溫叔罷相道夫亦求去上諭大臣曰趙雄罷政而蜀士一空然太薄惡不可執政因諭上旨道夫迄不肯留乃除知潼川府比行兩學之士送之關外前所未有也溫叔之罷也蜀人為所引者往往被逐獨道夫不染物議從容而去時人稱之道夫當任子先官其兄之子及其死時其三子者德方德固德彥俱未出仕以後並登進士科云李知幾豪邁李石字知幾資中人進士高第蜀人號為方舟先生者也紹興末為太學録右學生芝草生于學宫人方為賀知幾獨以為兵兆由是坐斥乾道中自沉黎召為都官郎中後復論去趙溫叔其鄉人也驟貴知幾以晚輩視之不與通書久之起守眉州除成都路轉運判官到官十日罷未幾溫叔秉政自是不復起矣溫叔免相王季海代之知幾與季海有學官之舊自書近詩數十以寄筆勢欹傾殆不可辨季海甚憐之方議除官而知幾死矣知幾為人豪邁然亦𥚹急為小漕日有石監庫者入謁知幾視其刺大怒典謁吏以石監庫稱之乃已及罷去成都有十還之謠石監庫還姓其一也在眉山日郡博士欲戲之因命題云豫擊石拊石百獸率舞知幾語之曰君乃欲痛箠石令畜輩喜悅邪聞者以為善謔虞丞相去國恩數之盛虞丞相再撫蜀夀皇以詩送之曰一德如公豈合間聊分西面欲憂寬不辭論道虛台席暫假宣威築將壇風教已興三蜀靜干戈載戢萬方安歸來尚想終霖雨未許鄉人衣錦看其恩數之盛自渡江以來宰相去國所未有也又用故事賜家廟五室祭器除其子公亮直祕閣而給其使費俊者亦除閣門祗候蓋非常典云宣徽副使歐陽公集古録跋康約言碑云約言嘗為宣徽北院副使以此見唐時南北院宣徽各有副也按唐德宗末年趙殷衡為宣徽院副使已見於史中不待康碑而可知也范季才五代史正誤有未當者范季才五代史記正誤甚為詳博但其間亦有辨之未當如李琪傳稱其所私吏當得試官琪改試為守帝大怒季才按通鑑稱琪改攝為守且謂以試為守持輕重之差何以竄逐以攝為守則是以無官為有官所以帝未欲深謫也季才但見今職事官以行守試分職錢多少故謂持輕重之差不知未改官制前自有一種試銜如云試校書郎試將作監主簿之類皆撰一人也若守監簿即京官矣季才自於典故未熟率意而言舊史本不誤也昔人著書多或差誤昔人著書首尾多不相照雖資治通鑑亦或未免此病大抵編集非出一手故也姑以一事論之漢景帝四年其中皆以冬十月日食今通鑑並書於夏秋之後蓋編緝者自本志中摘出而不思漢初以十月為歲首故誤係之歲末耳近歲吕伯恭最為知古陳君舉亦知古今伯恭親作大事記君舉親作建隆編世號精密余嘗考之皆不免差誤亦隨事辨之矣朱文公通鑑綱目條貫至善今草本行於世者於唐肅宗朝直脫二年之事亦由門人綴緝前後不相顧也又自唐武德八年以後至於天祐之季甲子並差考求其故蓋通鑑以歲名書之而文公門人大抵多忽史學不熟歲名故有此誤余因諸生有問亦為正之矣然則該貫古今亦非可薄之事但不至喪志可也蜀帥聘幣不入私家者三人近歲蜀帥聘幣而不入私家者趙子直德老楊嗣勳三人而已子直以賙細民之焚室者德老將去聚宗室之九縣者而分餉之嗣勳併迓新之任而具其不有焉近例蜀帥代歸輒以修城為名取買舟錢數萬計及嗣勳召還從省司取四千緡而已先是陳端仁為帥馮廷式為成都漕端仁有聘幣廷式例以元物易封而報之端仁大恨至用他事劾廷式於朝夀皇知之而不信也近歲吳德夫入蜀聞李仲衍之節甚敬之比德夫入城而仲衍首却其餽德夫請不已乃面授分帑吏而後答書焉德夫不平由此二人稍有隙廷式名憲晉州人淳熙末卒於司農卿總理四川財賦傅睦修史舉代嘉泰初朝廷以中興史未成召傅景仁龍學於泉南起陸務觀華文於既老皆以京祠專領史事已而景仁除僉書樞密院事老病不能拜力辭乃以為資政殿學士出守時務觀年且八十復引年遂以次對領祕書監俄復致仕朝廷命二公舉可代者務觀薦京西轉運判官李伯珍大異景仁薦新除蘷州路提點刑獄李璧遂召伯珍為祕書監遷中書舍人右諫議大夫而季章為祕書少監遷宗正少卿直舍人院以至執政不復領史事矣龔頤正續稽古録龔頤正字養正和州歷陽人曽祖原尚兵部侍郎頤正本名敦頤少舉進士不第用洪丞相門客恩為不理選限登仕郎嘗著符祐本末三十卷又撰元祐黨籍三百九人列傳所佚者六人而已洪內翰領史院薦於朝初授下州文學旋補迪功郎監潭州南嶽廟光宗受禪改今名用薦者主管吏部架閣文字遷大社令宗正寺主簿頤正著續稽古録盛言托胄定策之勳由是擢兼資善堂小學教授遷樞密院編修官嘉泰元年秋詔以頤正學問該博賜進士出身兼實録院檢討官付以三朝史事是冬遷祕書丞未踰月卒及托胄死有詔毁其續稽古録焉諸司屬官理當通判嘉泰三年忽有旨諸司屬官係京官者理當通判時張伯子同知之弟孝仲為京西安撫司幹辦公事即除知成州明年擢提點利州路刑獄未幾虞雍公之孫易簡亦自福建漕幕擢守大寧蓋用此例御筆嚴監司互送之禁嘉泰三年上御筆嚴監司互送之禁然逺方自如四年夏馬使彭輅至成都制使謝源明茶使趙善宣留連踰兩月自入境迎迓以至折俎贈行以楮幣錦綵書籍藥物計之而所得幾萬緡而謝趙所得亦稱也蓋諸路互送惟建康成都最厚諸司每會集一分計三百八十千成都三司互送則一飲之費計三千四百餘緡建康六司乃倍之而鄰路監帥司尚不與是年六月趙漕自成都運判除四川茶馬時趙攝事已久朝廷本以省將迎之費茶漕並置司成都城中而去送迎迓公用水腳之費各司為數千緡舊無所謂壓境錢者謝用光始創之趙並不離城中而亦受壓境錢兹又可笑也建康所謂六司者帥漕總賦武騎二司帥而主管行宫大內鑰匙官者與焉每歲遇留守按行殿中官者輒置酒自居主席而坐留守於賔位陳正獻公為留守斥去之其後范致能來遄復其舊莎衣道人莎衣道人者姓何氏淮陽軍胊山人也祖執禮仕至朝議大夫道人避亂渡江舉進士不中紹興末始來平江一日自外歸倏若狂者身衣白襴晝則扣門乞食夜則止於天慶觀之門外久之衣益弊則以莎緝之嘗遊妙嚴寺臨池見影豁然大悟人無貴賤問以休咎無不奇中世號莎衣道人孝宗聞其名召之不至賜號通神先生為築菴居之賜衣數襲道人皆不受道俗強邀入菴大笑而出復於故處平江好事者日珍饌餉之每食於通衢逮飽即去光宗即位又召復不至周南卿廷䇿所謂特遣王人聘問妖民於數百里之外者此也慶元六年道人卒於平江陳應求正北使書儀自渡江後北史往來皆傳其國之御名廟諱而本朝止傳帝名又北使與館客往來文牒皆以花字代書名隆興再和未之有改乾道二年冬陳應求初執政會金賀正旦之使者至應求以故事押宴使者致私覿其狀花書而不名應求却之掌儀懼白應求恐生事應求使語之曰今日豈當用辛巳以前故事邪使者詞屈乃問應求爵里甚悉而易狀書名紹興元年重明節黃文叔以王府翊善奉詔接伴八月十九日至旴𣅿文叔問掌儀田願髙宗何以稱帝名而不稱廟諱願云自祔廟後元未理會文叔遂遣願等持廟諱御名三紙以往北使副視之云前無此例願答云此乃二十七朔之外第一番講禮帝名廟諱各有分别往返久之北使副乃謂願云為我謝使副所言極是當理非不曉得止為來時不曽得朝省指揮止依得册子上行難以擅専切望相諒文叔乃已既而北使引接來傳彼國名諱自旻以下至於其父恭稱廟諱者凡六人旻晟宗堯亶雍允恭文叔歸而奏其事乞後遣使人力議改正蓋隆興更成之時廟堂亟於弭兵僅能正其大體而交際之文或未暇議蓋不止一二也舊例宰執親為金使除館且以三衙衛士給役乾道元年虞并父執政始革之又歲賜金使金銀器皿文思院造成先令工部長二臨視版曹繼之次赴都亭驛中使點集復賫詣宰執編閲然後進呈淳熙十二年李永叔昌圖為工部侍郎言不足以瀆至尊於是止令赴都堂驗視張詔使金驟用淳熙中張詔君卿守歷陽被旨交聘一日金人持所繪祐獻二陵象至館中皆北帝之服君卿嘗識列聖御容心知其試已也即鄉之再拜館客有問之君卿曰詔雖不識其人但見龍鳯之姿天日之表疑北朝祖宗也敢不下拜敵無語孝宗聞而大喜之由此驟用京仲逺將命執禮思陵之喪北人來弔京仲遠以中書門下省檢正諸房公事充報謝使步軍司計議官劉端仁副之仲遠至汴京北人有例賜宴仲逺辭樂彼不從相持凡十日竟撤樂乃赴上甚器之及還朝上諭大臣曰鏜此節可嘉尋常人多言節義須遇事乃見及進呈遷秩上曰鏜專對可嘉當轉兩官端仁亦比類周子充等言不必問轉官在聖意除擢可也上曰只依例轉官便與除擢上又曰此事全是京鏜若劉端仁所謂因人成事者鏜則毛遂也鏜除侍從端仁亦當稍旌别可令密院進擬除環衛官於是詔京鏜將命執禮可嘉為朝請郎權工部侍郎劉端仁為修武郎左驍騎郎將而武經大夫畿第二將國信所通事田願亦遷武節大夫十五年六月壬辰也四十日蜀帥趙子直以疾求去上諭大臣曰汝愚召赴行在京鏜人才磊落可除待制四川子直聞之謂人曰鏜望輕資淺豈可當此方面由是兩人有隙仲遠當時所立如此張通古能詩聰慧北人張通古者紹興八年以行臺侍郎來使通古稍能詩其還也燕人周歸正襟與通古舊知奏乞送至境上通古至安豐贈詩為别曰良人輕一别奄忽易春秋明月望不見白雲徒自愁征鴻悲北渡江水奈東流會話知何日如今已白頭通古性聰慧秦檜嘗以胡邦衡封事示之一覽即能誦奉使入北境車子數舊例南使入北境金遣伴使來迓正副使以下至三節人皆乘馬其後以南人不習其馬乃益以車子使去來乘之副使各一車上中節各四車下節三十二人共五車每車以馬騾十餘曳之又發白軍四百人護送所至縣令皆迎迓於境上至開封乃賜御宴真定又賜之常使至燕京寓於來遠驛若泛然之使則居寧遠驛焉愛王之叛愛王葛王孫也始允恭既早世葛王愛其兄越王欲立之既而不果金主立愛王遂謀叛為其妻父布薩琦所告事覺乃以放牧會寧府為名居上京以叛明昌六年三月丁酉也金主三召之不至因結契丹韃靼蒙國以叛取慈嶽等州時越王在咸平契丹檄金人請立之為帝金主徙王於慶陽五月丁酉賜王死誅其家人八十餘人惟越王在焉至今為金國患布薩琦即承安四年來賀上生辰者明昌六年本朝慶元元年承安來賀生辰慶元六年作此録後數年乃有年記虜中事者以允恭之子愛王為鄗王按允恭乃原王之父淳熙十六年三月密劄下沿邊諸州避其名諱甚詳悉若璟之鄗王實以為甚誤也建炎雜記乙集卷十三

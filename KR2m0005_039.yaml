body:
  text: 建炎雜記乙集卷十九宋李心傳撰邉防二女真南徙金國五世八君本末金國自完顔昊建國稱帝至今主珣凡五世八君而始衰金國者在契丹之東北長白山之下鴨綠水之源盖古肅慎氏之地其國在漢代稱挹婁南北之間稱勿吉隋唐時稱靺鞨五代女真祖宗時嘗通問後臣属於遼完顔之始祖哲伯者新羅人自新羅奔女真女真諸部推為首領七傳至昊而始大所謂阿固達也建中靖國元年遼主天祚立淫虐不道阿固達叛之政和四年八月用兵連年奪遼之地太平重和元年八月阿固達始稱帝以其水生金故號大金改元輔國嵗次戊戌蔡京童貫聞之募人泛海往使約夹攻遼人以燕地歸我宣和四年冬童貫伐燕為遼人所敗其十二月阿固達入燕五年春王黼與金人約嵗賂金帛五十萬疋两貸一百萬緡而請薊六州之地阿固達許之其五月乙丑阿固達卒年五十六在位六年諡曰武元皇帝廟號太祖阿固達有八子不立立其弟晟所謂武竒邁也晟立改元天㑹元年癸夘七年春遼天祚為金人所得十二月遂冦京師靖康元年朝廷割河東北三鎮與之盟而歸其地再入遂䧟京師紹興四年冬晟卒年六十一在位一十一年諡曰文烈皇帝廟號太宗有子八人不立而立阿固達之孫亶盖阿固達諸子之可見者其長曰梁宋國王宗秀小名固世領三省事次曰許景王宗傑即引兵䧟京師者斡哩雅布也晟之世為右副元帥所謂二太子次曰宋王宗幹亮之父也後追號曰徳宗次曰宗俊阿固達嫡子不及封後其子亶立追號景宣皇帝次曰晋王宗輔小名鄂爾坤亶之世為右副元帥後其子褎王立改名為宗堯號曰懿宗次曰梁國王宗弼即引兵渡江䧟二浙者謂之烏珠也亶之世為中書左丞相兼侍中都元帥職所謂四太子也次曰曺國王景敏亶之世都元帥亮簒立殺之武竒邁之長子宋國王宗盤亶之世領三省事為所殺次曰兖國王宗雋小名富勒呼次曰虞王宗英滕王宗偉以上三人亦為亶所殺次曰沂王宗賢亶時為左丞相次曰衛王宗義亮時為大宗正事次曰代王宗懿亮時為東京留守次曰晋國王宗本亮時為太傅領三省事以上四人並為亮所殺阿固達初起兵皆以宗族近親為將相主兵者晋國王宗維盖阿固達從兄之子其初曰劾閡乃阿固達伯父所謂國相尼雅滿也晟之世為左副元帥亶之世領三省事其主謀之曰陳王希尹亦阿固達之䟽族於属為子所謂几室也亶之世為左丞相誅死又其次魯國王昌乃阿固達之從弟所謂達蘭也亶之世為左副元帥誅死又其次為羅索晟之世為諸路陕西選鋒都統曰薩里罕亶之世為左副元帥誅死皆女真人不知其属族之逺近自亶之立尼雅滿首罷兵柄憤悒而亡几室達蘭薩里罕以次受誅而昊晟子孫𠞰戮殆盡亶初立猶天㑹之號至戊午始改天眷辛酉改皇統盡九年而為其從弟左丞相岐王亮所弑紹興十九年十二月丁巳年三十一在位十五年追廢為東昬王亮死乃諡曰武靈皇帝廟號閔宗久之又改諡考成皇帝曰熈宗亮亦昊之孫而宋王宗幹之子也初年改天徳元年己巳癸酉改真元其春徙居燕京號曰中都丙子改正隆盡六年亮乃引兵南冦國人不堪其虐以十月丁未共立其從弟東京留守葛王褎為帝諸将聞之弑亮於揚州鎮之龜山寺紹興三十一年十一月乙未年四十在位十二年追廢為海陵王諡曰煬褎亦昊孫晋王宗輔之子也既立改大定元年辛巳大定之四年復與本朝議和紹熈元年春更名雍雍有子七長曰越王允升次曰允恭太子蚤死於淳熈十二年夏所謂顯宗也璟立追尊之次曰鄭王允蹈於次為第六璟之世為武定軍莭度使誅死次曰衛王允濟於次為第七允恭二子長曰豐王珣次曰原王璟璟嫡子也雍以為太孫大盡二十九日雍卒紹熈十六年正月癸巳年六十八在位二十九年號曰世宗為人仁厚不用兵北人謂之小堯舜璟立庚戌改明昌丙辰改承安辛酉改泰和泰和之六年南北交兵又十有二年而璟卒嘉定元年十一月丙辰也年四十一在位二十年號曰章宗初璟之立也越王鄭王皆有不平語璟召鄭王殺之越王有二子長曰愛王趙妃所生越王亦為璟所殺慶元元年五月璟死無子而雍之諸子允濟在璟所嬖内侍李黄門者傳璟遺令與尚書右丞相薩哈勒共立之愛王時在中都允濟疑其為變囚之貞定拜薩哈勒太師領三省事封申王明年改元大安元年己巳壬申改重慶癸酉改至寜璟之在位也允濟被命往靖州受黑韃靼進奉見其王特黙津桀傲不遜恐為邉患欲歸白璟除之㑹璟病卒大安三年辛未本朝嘉定四年春三月韃靼入貢允濟遣重兵分屯山後欲就進塲襲殺之然後引兵入㑹金之糺軍有詣韃靼告其事者韃靼疑未信言者再至韃靼入伺之得其寔遂遷延不進秋七月十八日丁酉夜韃靼軍猝至與金人戰于灰河凡三百勝負未分特黙津選精騎三千馳突金軍金軍亂特黙津自以大軍乗之允濟急命西京留守赫舍哩執中領大兵迎敵於大勝甸執中者老将也知兵書善戰自允濟之立心常不服至是不肯力戰冷觀之遂大敗執中以百騎奔還允濟怒罷之韃兵至翠屏口金大敗九月十四日攻奉聖州後二日破之進軍野狐嶺允濟再遣兵迎敵以車為陣又敗十月韃兵至普縣距燕京八十里崇慶二年本朝嘉定五年正月韃兵至居庸關左将軍完顔福海棄關遁允濟素鄙吝士不用命允濟議以細兵五千自衛奔南京開封也㑹細軍五百人自相激厲誓死迎敵殺韃兵數百韃兵不敢進關所俘鄉民皆北軍有機警號鄉兵有二十萬韃靼懼遂歛兵而退至寜元年本朝嘉定六年秋七月韃兵復至山後都元帥完顔福海迎敵而敗允濟黜之八月起赫舍哩執中為右副元帥将武藝軍三千復往迎敵二十日戊子發燕京先是左副元帥南平者迎合允濟之意沮格軍賞衆共怒之執中因人心之憤欲廢允濟遂囬軍以誅南平為名二十四日壬辰軍至東華門外召南平計事手刄殺之宫中聞變門皆不開執中召細軍大将全夀語之曰吾此特誅亂臣耳非有叛意也俄而細軍俱来救駕夀諭止之衆惮執中威名無敢動者獨關中大漢軍統完顔善羊引所部五百人至皆為武藝所殺執中以善羊驍勇召其福海令招之善羊大呼父母老賊欲叛朝廷何謂䧏之復力戰自旦至午殺數十人身中數矢而死軍民相殺流血滿地執中遂進入東華門允濟遣其子蒋玉持詔書投于門下募能殺執中者除大興尹世襲千户軍民無應者執中欲縱火焚門將軍合住啟之執中引兵入宫侍衛皆散走進至大安殿允濟望見遥呼曰聖主令臣何往曰歸舊府耳允濟入後宫邀其后俱出后留之曰出則被殺矣執中見其不至遣兵就執之併其妻子囚於舊府遂召豐王珣之長子譚札木以御寳符二十六日甲午夜執中遣内侍李監擊殺允濟於其府九月九日丙午豊王至燕京執中率百官拜於道遂立為帝改元真祐䧏允濟為東海郡侯拜執中太師都元帥領三省事封澤王韃兵至紫荆關距燕京二百里執中欲其兵南至涿易乃聚兵擊之韃靼敗二百里執中至西欲渡橋執中方病足乗車督戰韃兵大敗翌日再戰執中瘡甚不能出遣左監軍髙乞以糺軍五千拒之失期不至執中欲斬之珣以其有功諭令免死執中益其兵令出曰勝則贖敗則誅之無赦髙乞出戰自旦至晚忽北風大起吹石揚沙不能舉目韃兵乗風縦火馳擊之髙乞軍大潰自度必為所殺遂引糺軍圍執中府突入其卧内殺之退詣應天門待罪十月十五日辛亥珣以髙乞掌兵權不敢加罪盡收從執中弑逆之人殺之於是韃靼留其大酋薩木哈圍燕京自引兵狥河東北山東諸郡真祐二年本朝之嘉定七年也韃靼已破中原九十餘郡復兵于燕京金主珣厚賂特黙津以允濟第四女小姐姐者妻之又遣左丞相都元帥完顔福興為質韃靼乃歸河南路統軍布薩齊勤者奏乞徙都開封珣從之命参知政事胥鼎為沿路排䪺使其霍王從彛者諫曰祖宗山陵宗廟社稷百司庶府皆在燕京豈宜棄之而去珣曰燕京乏粮不能辦用朝廷百官諸軍令暫往南京俟一二年間粮儲豐足復歸未晚也從彛乞自督運不從從彛憂憤成疾而死五月十日甲戌也十八日壬午金主發燕京出麗澤門自涿保州中山府而南至真定留㡬月復自大名路由新衙州渡河以至開封肆赦境内秋八月韃兵復圍燕京分兵下中原州郡又遣使至開封索犒金銀等物珣皆與之明年五月二日辛酉韃兵大破燕京都元帥完顔福興自剄死有户部令史郭忠者蔚州人率山後軍民擊韃靼逐之金人後名其軍為花帽軍金人自阿固達稱帝至是九十八年而失國焉两河既為韃靼所據山東畔之金人東阻河西阻潼關地勢益蹙遂有南窺淮漢之謀兵端復起矣近傳金人南遷錄事􅊖差誤盖南人偽為今不取建炎雜記乙集卷十九

body:
  text: 建炎雜記乙集卷十六宋李心傳撰官制二乾道正丞相官名本末虞雍公獨久上眷禮極厚既又以梁叔子靖重欲遂相之而無其端㑹易三省官名乃議以僕射之名不正欲采用漢舊制改為左右丞相令學士禮官對論時乾道七年十二月辛酉也先是已有㫖依舊制服靴祖宗時百官服靴徽宗將釋廢乃易靴為履以示禁異服之漸虞公不樂曰近已易履為靴今又易相名與外國奚辨蓋為金人詳定官制已改左右僕射為尚書左右丞相故也有司知其意不遽上至八年正月戊寅僅條具厯代宰相官稱申尚書省禁中即聞之翌日遣中使至學士院細問其事學士周子充以其事奏後二十日御筆付院云尚書左右僕射可依漢制改作左右丞相學士院降詔子充草詔以進後二日付外施行二月乙丑也後五日上自德夀宫還日已晡召子充對選德殿上微有酒所袖出御筆云比來一二大臣同心輔政夙夜匪懈漸革茍且之風以副綜核之意深可嘉尚今因除授宜示褒典虞允文可特進左丞相梁克家可正奉大夫右丞相賜茶畢日已暮矣遂自復道秉燭歸院辛亥百官集文德殿初謂改易相名耳雖虞公亦以為然及雙制出在庭愕然先是子充嘗奏並命二相而遷官或三或四更取聖裁上曰特進一官即少保所以允文三官議者疑學士有所抑揚而不知上自有㫖也後數月虞公罷相乃除少保節度使則知聖意先已定矣是月臺諫官皆坐論張說罷去而蕭果卿自察院升副端三月甲戌也果卿方以疾告後二十日甲子始入謝比對首論前嵗浙西夏潦秋旱江湖淮南嵗比不登民多流離今正陽之月天多沉隂寒氣慘栗是謂常寒側身修行兹其時矣漢時災異䇿免三公以此上雖嘉果卿稱職周子充作果卿墓志載聖語云卿所論甚當可謂稱職而待虞公素厚乃戒果卿毋納副本虞公聞之上章求去即出北關門待罪家屬亦乘舟之仁和館是日即行翌日凡再宣押虞公力丐免上許之已而中悔復賜御扎云早來面諭以卿堅辭欲令卿典近藩措置邉防聞卿有歸蜀之論殊失朕懷今已堅留卿相位無復固辭以體至懷又翌日再押赴都堂治事於是御筆除果卿直祕閣湖南提刑其月十一日己酉也制略曰之敏剛方不撓質直而明造膝之詞有犯無隱正人去國豈朕所欲哉是時李秀叔林景度為舍人恐是秀叔行劉焞文潜時為國子司業兼權臨安少尹或謂文潜實草是疏以授果卿故果卿去御史之十九日文潜亦出為江西轉運判官蓋以此也其年九月虞公復以蘇李真侍御有言力求去因請任入關之事遂除以四川宣撫使焉大臣去位不除職國朝大臣自仁宗以後其去位未有不得職名者雖臺諫交章論列亦必除職補郡而後徐罰之典加焉乾道初葉子昻魏南夫並相㑹冬祀大雷於是二人並守本官罷非常制也淳熙初有詔宰執侍從非有功不除職其年葉夢鍚以言免相遂守通奉大夫知建寧府紹熙初王謙仲為樞密使又用何自然章降一官放罷凡此者皆非常制紹興至開禧督府廢置本末國朝故事大臣統兵者率稱宣撫使韓子華為首相猶然渡江後諸大將官既髙皆為宣撫使此名益輕於是宰相統兵則稱都督自吕元直始也元直始以都督江淮兩浙荆湖軍事為名開府江上過平江而守臣席大光有所關白始覺為右相秦㑹之所傾其後軍潰引疾求去乃命還朝遙領而孟富文以參知政事權同都督治軍建康久之去權字同都督之名自富文始也元直富文繼罷朱藏一獨相以元樞趙元鎮有人望忌之乃奏除川陜宣撫處置使元鎮乃與吳玠同使名為嫌遂改川陕都督荆襄諸軍事既而張德逺以敗劉猊之功同相乃並兼都督諸路軍馬元鎮尋去位德逺以淮西軍潰而貶併其府罷之德逺先以行府為名往來視師及上幸建康則督府在內德逺貶元鎮㑹之復相共議還臨安而兵亦寢矣逮金亮闞江諸將皆敗始議以右相漢章為都督漢章辭乃命葉審言以元樞督視江淮軍馬督視之名自審言始也孝宗即位德逺以樞密使為江淮都督汪眀逺以參知政事為荆襄督視方城失守明逺得罪德逺併督之符離失律德逺罷歸而金又冦江乃以左相湯進之為都督進之憚行遂命故將楊存中同都督軍馬用富文故事也既而兩淮皆陷進之益懼乃除存中都督而命王曕叔以參知政事為督視瞻叔亦固辭上大怒遂與進之相繼而罷開禧用兵鄧伯允薛象先以宣撫使抵罪乃外除丘宗卿簽樞督視軍馬宗卿與托胄不協再閲月而免張肖翁以元樞代之不勝任奉祠去數月吳曦反復命李季章以參知政事督視四川軍馬既而有裂土之議又罷行自是不復除都督矣倪正甫鄒景初論皇子不當贈師傅嘉定元年閏四月皇子薨詔吏部太常寺討論贈官典故吏部引國朝㑹要元豐四年鄆王倜政和三年漢王椿故事贈太師尚書令追封肅王王上第八子也倪正父時以禮部尚書兼給事中引治平二年王禹玊等議皇子以師傅名官於禮未安乞止贈尚書令詔從之余謂吏部太常寺固失之而正父所奏亦未盡也乾道中省三省官長易以左右丞相則所謂尚書令者蓋無此名矣乾道二年孝宗少子恪贈淮康軍節度使開府儀同三司追封邵王此事且最為得體而議禮者皆近不及之蓋弗深考耳三年十一月皇子靖王復有維垣之贈鄒景初給事言子為父師於禮不順然前是諸皇子或已贈太師矣景初俄以親老求去遂除次對守泉州云趙善俊乞文階去左右字祖宗未改官制前以官寄祿然因唐舊典分别流品甚詳不相混淆有出身無出身及進士上名賢良方正曽任館閣省府之類遷轉皆不同犯贓及流外納粟尤不可使汙於仕流蓋不待分左右也元豐官制始行一之然猶有一官而分左右者徒以少優進士出身而已至元祐中遂自金紫光祿大夫至承務郎皆以有出身無出身分左右則稍復祖宗之舊而不盡也至犯贓罪則併去左右二字論者尤以為當然龜山先生與門人言則謂沮人為善之路其所見益逺也紹聖以後以其出於元祐故事復去之紹興初方務行元祐故事左右字之制亦復行又下逮於選階而流品稍别矣淳熙改元趙善俊建言以為本范純仁偏蔽之論請復省去從之元年三月戊子降㫖蓋時方尚武善俊迎合而言非公論也善俊成王仲榮曽孫中進士第以左朝奉大夫直龍圖閣知襄陽府入對後十餘日又以前任事特轉一官及死周洪道為墓志偹載其事謂自是無裏言蓋薄之也元豐乾道武臣正任員數多寡元豐初節度觀察使才八員防禦團練使副使共二十員而宗室不與焉乾道初節度觀察使至四十員防禦使至遙郡僅二百員而宗室亦不與焉趙德莊彥端權尚右郎官嘗請裁酌後不行德莊以元年八月建請建隆至元祐選人升改舉主沿革選人升改國初無定制建隆二年命翰林學士文班常參官曽任幕職州縣官者各舉堪為幕職令録一人職令用舉主自此始開寶三年四月命翰林學士及文班升朝官等各於現任前任藩郡幕職州縣官中可舉堪為升朝官一人選人用舉主改官自此始乾德二年六月詔侍從卿監郎官各於京官幕職州縣內舉堪為通判者一人又在此前今專記舉京朝官事始然自建隆至淳化二十餘年舉京官朝官之敕才五下固無冗濫之失也至道二年閏七月有司言諸州闕監當京朝官共五十餘員乃命左丞李至等八十四人各舉州縣官廉恪有吏幹者一人景德元年八月以幕職資序人少命常參官二人共舉州縣官一人充幕職大中祥符三年正月詔內外所舉幕職州縣官並須經三任六考限受薦自此始五年六月詔自今在京常參官二員共舉幕職州縣官一員充京官者聼舉主用兩員自此始景德元年八月止是一時指揮天禧元年五月敕兩省五品已上嵗許舉京朝官五人升朝官許舉三人薦舉限員自此始天聖七年十二月詔轉運使發運使副使不限人數是月用判流內銓吕夷簡言升朝官因事降充監當者不得舉官及知縣朝臣不得舉所統攝處幕職曹官蓋前此內外升朝官皆得舉京官故也二年十月中書言郡臣舉幕職州縣官充朝官者侯舉主及五人即以名聞庶懲濫進舉主用五員自此始三年六月又用監察御史李該言今轉運至諸州通判並舉本部幕職州縣官餘升朝官未經通判已上既差遣者不在舉官之限所舉之人須是在任舉主內但有轉運制置發運提㸃刑獄勸農使二人便與依例施行若止一人即更候常參官二人保舉並與磨勘非通判以上不得舉官非現任屬吏不得受薦及舉主須用職司皆自此始熙寧初常平使者得薦吏如提轉乃罷通判舉官元祐初暫復之俄廢自是薦舉之法益密而冗濫日盛矣隆興至淳熙立改官員數祖宗以來選人改官亦無定額元祐中孫莘老為吏部侍郎始定嵗百員為額後亦不行紹興後多不過九十員少或五十員二十年八十八人二十五年六十八人三十年七十四人三十二年五十八人捕盜及職事官皆不在數三十二年孝宗登基其年遂至一百一十三員言者患之請為之限隆興元年春詔吏部開具三年舉過員數措置立額取㫖三月己酉降㫖其夏遂詔以三十員為額內將十員充厯任十二考限减舉主改官人數如不足並聼闕四月己丑降㫖未幾中書言今方七月止闕二員若積纍數年必多留滯乃詔吏部且依常年放行恭照格法裁减薦員開具申省七月戊申降㫖於是議者請舉官補發之數毋得出一年之限而諸部長及少卿等各舉員數分上下半年薦舉仍於七十員額內量添二十員若減舉官之數乞以七十員為額許之二月乙巳降㫖尋又詔增十員引見拜職事改官共六十五員四川換給十五員而特㫖改官不在其數四月癸巳降㫖自是不復改然四川舉官之數一嵗毋慮百五十員而磨勘之額僅及其半有溢額者謂之待班朝廷知之或因事降㫖特僣一班不為定制迄今嘉定六年有待十一年班者若南士之入蜀者則舉薦既盈遂歸于南班引見故無留滯積壓云爾隆興至嘉泰積考改官沿革隆興初張子公為同知樞密院事首論薦舉改官請求貨賄之弊乞取紹興以來每嵗改官酌中之數立為定額凡在選者量其年勞以次遷改嵗終考核不得過所定之數而關升者亦如之所有薦章權行寢罷庶幾銓約均平而在選者人人有京秩之望其有以卓然之才被不次之升者不在此限詔侍從臺諫詳議申尚書省隆興元年二月壬申議者以為自太祖以來皆有薦舉之制今若患其奔競遂盡除之何異因饐而廢食于是學士承㫖洪景嚴給舍金彥行劉共父張貞甫周子充共議乞嚴舉主連坐之法不許首免量其罪之輕重而停秩任辛巳李中丞時為臺諫長議以為宜取選人九考十考者與減主員數事下吏部既而凌尚書景夏奏乞將選人考法行從之八月甲申降㫖自是通以百員為額後又不行乾道三年周表卿權吏部尚書言其太濫乞每嵗薦舉人一百人監賞以三人四川換給二十人立為定額其所立員額如嵗中不足聽闕如員數有溢出許於次年施行仍理為次年之額捕盜功賞改官人不在此限從之六月己亥降㫖是冬起居舍人黃仲秉建言四川見管六十一郡每嵗止得改官二十人東南共𬋩一百二十九郡每嵗却得百人除管職事官之外外路教授磨勘十餘員外其多寡不均灼然可見緣此東南至今止七十餘員而四川七月內已滿二十員之額豈無留滯之歎照定元祐隆興員數之額四川係在內之數今來創立防限將四川置之額外未見其可望通以百二十人為額並以鈔上日為先後之序上又從之十月辛亥降㫖七年冬虞雍公為相建言吏部供到今年改官員數已溢三十餘人詔令引見放行改官今後更不限定年額十月甲辰降㫖自虞公去位上則復嚴升改之法淳熙四年引見改官八十二員捕盜十二員五年引見八十八員捕盜十二員六年五十七員捕盜十一員七年春周益公為吏部尚書因請六年為額詔侍從同議王仲行為兵部尚書與同列共奏以三年絶長補短言之嵗不下百員今十二考以上無贓私罪者減舉主一員三月己酉降㫖繼而遂以八十員為改官嵗額內十員充十二考減主舉改官人數如不足並聽闕四月己丑降㫖蓋參用張辛二老之說也未數月中書門下省言薦舉改官今方七月止闕二員若積纍年數必致拘礙乃命吏部且依常年放行仍措置合行裁减員數申省取㫖七月戊申降㫖尋遂以百員為額八月甲申降㫖內吏部引見八十員四川換給二十員乾道初黃仲秉為起居舍人為上言以郡計之東南約三郡而改官者二人四川約六郡而改官者二人多寡不均灼然乃命通以百二十人為額焉乾道三年十月降㫖及虞丞相當國始奏不復限定年乾道七年十月甲辰而覺其太濫有七十員為額之令淳熙七年二月己巳降㫖俄又增為八十員內引見並職事官共六十五員換給十五員七年四月癸巳降㫖而捕盜八員在六十五員之內如不足即以薦舉改官人補凑七年十一月己亥得㫖後數年復有㫖職事官改官許在歲額八十員之外十三年三月丁酉得㫖進士一任回磨勘及歸正官循改者亦如之十五年十二月庚午得㫖歸正官循至承直郎後歷五考即改宣教郎自是引見者稍寬而換給獨狹矣慶元末費戒甫為左選侍郎又請歷十五考以上無贓私罪犯者得免職司舉主一員慶元六年十月癸巳得㫖嘉泰中李景和為正言又請選人曽歷監當獄官縣令各三考餘官三考無贓私罪犯者不拘有無京削許就磨勘三年二月降㫖吏部引見以八員四川換給以三員為額於是東南應格者木升等四人川路應格者蹇似之等二人而已明年言者論其太濫謂使其律已奉公䆒心職業則歷官十二考所事監司郡守何啻四五十人豈無一為之動心者姑以今嵗之應斯格者觀之大略可見詔吏部長二詳議時吏部又得應格者余圭一員黃子由適兼尚書乃奏乞歷上件三任通成十二考止用常員舉主三員若係舉主關升人更减一員四年五月甲申得㫖開禧初言者又指其僥幸乞令侍從兩省臺諫官集議議者乃乞堅守孝宗立定八十員之額其嘉泰以後積考减員等指揮更不施行開禧元年五月乙巳得㫖識者謂薦舉改官法未嘗不善也患在乎士大夫以私意汨之耳開禧末季仲衍為益部刑獄使者有舊將之子以職司狀為請仲衍厚待之將行語之曰興宗昔以職事受之先公今不敢忘然舉賢王事也非報恩之物有貴人移書以子壻相託者仲衍報之曰令壻奉公守法雖微命戒亦將舉之如其不然有所未可嘉定初余弟仲貫甫自著廷補郡將行面白諸公貴人乞勿薦士諸公皆從之真景元繼除江東副漕朝辭入見又以劄子面諭之余謂士大夫人人如仲衍景元則公道少伸而奔競之風庶幾乎息矣若夫通番舶納賄賂又罪之至大者故不復論刑寺得舉外任人改官禮部國子監長二得舉諸州教授改京官舊制也嘉泰元年十一月言者以為大理評事止用舉主三員又評事中亦有以改官舉削者常有是事余乞倣此例令刑部長二大理卿少得通舉諸路提刑司檢法官從之四川舉削倍改官之類四川改官薦牘以今嘉定四年計之當得一百六十五紙帥臣監司八十紙制司大使十一紙總領賦六紙茶馬司共五紙三路安撫司每司兩年共三紙成都潼川提刑各五紙利路提刑五紙關外一紙䕫路提刑三紙四路常平司每司兩年共三紙成都潼川路轉運司各六紙內嵗終不除副使者半利路運判每兩年又得關外三紙䕫路運判兩年三紙又嵗終不除副使三紙四路提舉司每司年年一紙前執政六紙費大資安大資知州八縣已上二郡每年各舉二員通計四紙潼川成都七縣至四縣二十四郡每二年各舉三員通一年計三十六紙謂金卭達綿雅合已蓬忠眉隆果資榮叙閬利州隆慶元興遂寧嘉定崇慶廣安軍三縣已下三十一郡每年各舉一員通全年計三十一紙謂瀘䕫彭渠昌普洋成鳳涪沔簡隆階開萬施黔珍威茂黎文西和州重慶府大寧監石泉永康懷安梁山南平軍無縣處三郡每年亦各舉一員通全年計三紙長寧大安軍富順監以五紙一員嵗舉改官約計三十一員而職司稱焉大使十一四路提舉共十九自淳熙七年有詔四川換給紙十五員總而計之是舉削不收使者大半紹熙二年九月置帥京仲逺以京官知縣闕人為詞奏乞增放散員數朝廷難之然自後非特覃恩或制司奏請則必遞䟎一年開禧三年吳德夫為宣諭使又請侍班人不候改官一面注擬從之後三年議者以為不然乃復舊制前宰執嵗舉京官多非所知祖宗之制前宰執嵗得舉選人為京官者五員淳熙間减二員既得遍舉諸路故有力者競趨之大抵多非所知洪景伯罷政家居二十餘年所舉殆八十人有管珍者為樂平丞既得舉矣偶文書至邸稽期數日書吏為揩改奏檢實日以就之景伯即劾珍罔上具言惟宰執有舉無刺目擊巨蠧吞聲喑默其辭切極疏入詔珍降兩資舉狀令吏部退還或謂珍曰故被此劾番人能誦言之且誦吞聲喑默之詞未知果何如也自慶元嘉泰後前宰執舉削乃專以待政府言路之求類多不職所舉人甚至空名剡牘以遺之非祖宗之遺意矣選人三考外零日不許受京削舊法歷任三考以上者許薦舉改官即循至修職郎雖未及三考亦聽薦舉其後勢要子弟之初官者率以零日受薦寒素者患之淳熙十四年慶夀覃恩舉天下迪功郎無不循資者其年八月蜀帥趙子直建言舊法聽三考薦舉改官者皆以三考為一任舉其成數而言今於三考之外未罷其零日內輒敢並緣干請已非法意今又該遇覃恩盡行補轉若一併許於二考之外聽舉改官切恐干進之徒與夫勢要皆預得為他日計而孤寒安分亷耻自持者欲脫選調愈不可得欲望將選人一例許於第二任方得薦舉改官庶幾仕進公平不妨寒俊之路未幾光宗即位乃舉行之又詔未成考之人不以罪去者於後任凑成三考聽舉改官初任未成考者勿聽以著為令乾道淳熙裁損任子法沿革附乾道初朝廷欲損任子之數有請正郎隔三郊乃奏者有請立限員者有請正郎惟初郊及致仕各許奏一人者議久不决二年春王伯庠初除殿中侍御史乃為畫一狀以奏一曰正郎遇郊有出身人奏上州文學無出身人奏下州文學應奏文學者將來改官日並改次等合入官二曰帶職員郎有出身人蒞事十五年初遇郊及再遇合許奏一人無出身人蒞事及二十年止許初郊奏一人俟至即如上法三曰中散大夫以上有出身人奏將仕郎無出身人奏上州文學四曰侍從官有出身人子孫奏承務郎期親將仕郎大功以下文學無出身人遞减一等致仕恩澤又遞减一等五曰宰執子孫奏依現行法期親登仕郎大功以下文學六曰又選依此參酌其官至使相者依舊法止奏武階詔三省集議再具條式將上取㫖尋又令臺諫共同集議其年六月始有㫖使相䕃補依祖宗舊法七色補官人止令奏一子餘不盡行也余謂伯庠此議亦頗得之但權幸貴游皆所不便耳所謂七色補官者宗室女夫一也戚里女夫及捧香二也異姓恩澤三也陳亡人女夫四也上書獻頌文理可采五也隨奉使補官六也給减七也始議以止當祿及其身不許更冒世賞若轉至合奏薦官候將來致仕日與一名恩澤已嘗奏薦者不與既行之矣九年七月又用吏部尚書李秀叔議應文臣帶職員郎及武翼大夫以上生前未嘗奏薦者與致仕恩一名即與嘗奏薦而被䕃人身亡者許再乞應朝奏武翼郎以上補受及三十年者亦與一名淳熙四年二月韓無咎為吏部尚書又乞非貶補授人許生前奏薦一名所謂使相奏補文武臣各隨本色者淳熙五年十一月因曽覿有請遂授曺價向宗良例降㫖不行四年四月覿已有此請龔實之持不行其六月實之貶至是行下先是張說在宥府已詔武臣嘗任執政者許奏文資乾道九年十一月朔降㫖已而數視執政者亦得之蓋戚里宗王與夫攀附之臣皆爭以文資祿其子不可復正矣淳熙十年二月辛丑又從侍從臺諫集議應文武臣致仕遺表恩澤並三分减一焉宰相使相共八人前宰相七人執政六人前執政五人見任尚書三人侍從二人宰執不帶職者依本官雜藝出身不許任子紹興初有伶人胡永年者積官至武功大夫遇郊乞任子趙子直為吏部尚書奏永年樂藝出身難以任子望立為定法今後似此雜藝之人補授不許奏補從之三年三月己亥余謂此等事非遇子直則他人必且放行遂為弊法矣但永年本伶倫而官極正使前後遷補乃無論列之人亦未可曉嘉定四選總數嘉定癸酉春仲貫補兼考功郎官四選缺無迭攝之員是嵗四選名籍共三萬八千八百六十四員尚在六七八九品名籍案京朝官以上二千三百九十一員有出身九百七十五員大致仕補官五百二十九員員遺表補官九十二員禮薦奏補官六百二十三奉表補官五十二員補推恩補官五十員門客補官一十一員特受文學官一十一員攝官補官一員襲封補官二員宗室過禮補官一十四員納粟補官三員三省補官八員尚右三千八百六十六員奏補一千六百八十員武舉七十七員千宗室四百單五員軍班并揀欣軍功人一一百八十五員歸明歸正五十六員雜流非泛吏職二百六十員侍左一萬七千六員有出身四千三百二十一員官奏薦六千三百六十六員百童子科二十八員攝二十八員宗子該恩五六十員十恩科五千六十三員十進納四百一九員流外一百六五員侍右參部使臣一萬五千六百單一員奏補七千七百一十八員軍宗室二千九百一十四員班七百五十九員女軍功八百四十七員恩宗女夫三百單八員陳亡夫六十九員陳亡澤二百五十三員管武舉四百十五員員后妃親屬一百八十五員主進奉二百五十五獲賊五十四員吏職一千三百二十一員進納五百單二員而使臣之從軍與未參選者不與冗官可知矣咸平至嘉定侍右員數多寡今之侍右侍郎即祖宗時判三班院也咸平以前三班院員止三百或不及天禧後至二千四百餘員熙寧後至一萬五千六百九十餘員而宗室七百七十餘員不與焉視天禧之間蓋已五倍矣以出入籍校之熙寧八年入籍者四百八十有餘其死亡退職者不過二百此所以嵗增而不已也政和官制以秉義郎易東西頭供奉官忠訓忠翊郎易左右侍禁成忠保義郎易左右班殿直此以上謂之三班其下及有奉職借職則以承節承信郎易之今侍右名籍至一萬五千六百餘視元豐又增五分之一蓋三嵗一郊奏補至千七百人而其他入流者不與焉此所以猥并而不可止也川秦茶馬二司分合川秦榷牧自元豐以來雖各有兩司秦司𣙜茶秦司買馬川司𣙜茶川司買馬大抵川秦皆止選一使蓋摘山市駿非相通不可也紹興初陜西失守李子公為使乃奏合四司為一司以省官吏如是者六十八年矣有吳揔者武順之第四子初補京秩乾道中自都官郎官易帶御器械年三十餘為池州都統制每妄殺人孝宗知之命復易文淳熙中以敷文閣待制提舉茶馬坐黎州變故降為集英殿修撰奉祠久之復命出守稍遷寶文閣待制知瀘州慶元嘉泰之間揔食祠祿居漢中而從子吳曦為殿副二人不相能揔每丐任使曦數隂沮之揔無以為䇿時胡直閣大成為茶馬司盡核諸場額外之茶且損蕃商中馬之直舊例買馬必四尺四寸以上及大成損馬直而馬至益希所市四尺一寸而已其至軍中斃者益衆朝廷苦之揔一日與殿司取馬統制官彭輅謀納賂於蘇師旦且說之曰馬政積弊如此非西人諳其利病者不能更張莫若復委吳次對師旦然之命下後省駁之乃詔總與郡朝論方難其選一日輅與師旦語因及之輅自言世西人今西蕃多善馬持茗司損其直故以駑駘入市誠以善價招之當可得師旦喜曰無踰公者矣翌日召輅至韓府平原見之立語少須又翌日遂有分司之命大略以為茶馬司所發綱馬全不及格積弊極深宜有更革自今差文武臣各一員令三省樞密院條具來上嘉泰三年八月丁未也後四日遂命直祕閣知瀘州王大過與輅分領之大過置司成都輅置司興元府方總之受堂帖也即日以秦司屬官印視事于其宅又以迓吏稍緩私遣衛前軍二人至成都府捕胥長以來自紹熙末茶使視事皆申知制司總以身為從官用故事不復關白謝用光怒㑹得邸吏罷報即追還迓人械所遣二卒還軍中總大沮然猶得知潼州府云時義烈廟初成總身至興元以謁廟為名與曦樂飲結歡而去輅至司所市馬終不及格則以深蕃道梗難以猝致而為詞焉輅果之子後為殿嵓后妃王主奏薦格渡江後后妃之家奏薦每遇大禮聖節生辰皇太后家推恩四人皇后二人親王公主諸妃遇大禮各奏二人昭儀至才人各一名內命婦誕育推恩格內命婦誕育皇子女推恩者皇子生媫妤以上三人美人才人各二人皇子裹頭出閣妃五人媫妤以上三人美人才人各二人公主生一品二品二人其餘一名上頭出降一品四人媫妤以上二人美人才人各一名非次進封者推恩二人美人才人各一名嘉定二年楊皇后已正位詔用奏薦三年十月生皇子特與四名蓋以事體增重故也宗室封女之制凡宗室封女之制使相女封淑人莭度使碩人觀察使令人團練使恭人遙郡團練使宜人大將軍安人凡宗女郡主至安人身亡皆任子孫一人淑人以下未有子食祿者惟聽任所生子凡郡縣主兩遇郊皆推任子恩郡主四人縣主一名郡主得奏期以上親縣主止奏子孫妃主親王所奏親屬凡妃主許奏緦麻親之子從一品許奏緦麻親才人許奏小功以上親親王婦之有服親及有婦親之夫皆許奏內命婦非遇大禮雖諸妃親屬止受承印郎內命婦封贈凡內命婦封贈妃三代媫妤以上二代美人才人一代職事官改官法職事官改官法樞密院編修官祕書省正字太學博士兩學正録到任實厯一年通理前任四考並自陳改京官郎未滿就改一等差遣者凑及一年聽通理勑令所刪定官有出身四考無出身五考從本所保奏與改合入官大理寺直評事共職滿二年通厯任五考有改官舉主三員者亦聽舊法評事改官帶行職任及補外例得添倅諸州紹熙初沈評事槐始與堂除知縣二年九月十五日後又不行慶元末李持直國柄復以近制出宰金壇五年五月二十三日自是皆作邑矣開禧末李侍郎諶有請乃命以二年為任諶巨野人漢老之子用李季章薦至侍從今以集英殿修撰知廣州云舉閣門祗侯二事凡舉閣門祗侯之制諸路監司郡守及州黔轄已上許嵗舉所部亷幹有方略善弓馬經兩任親民無遺闕及曾厯邉任者一員郡守仍員郎正使或右武郎及帶職升朝官以上乃得慶舉淳熙新制也諸舉充閣門祇候用舉主七人內一員職司侍右試孫吳兵書大義五道通時務邉防策一道文義稍通二百字以上送馬軍司候弓馬合格取裁宗室鎖㕔出身轉官例凡宗室鎖㕔得出身者京官進一官選人比類循資無官應舉得出身者補修職郎即濮秀二王下子孫中進士舉者特更轉一官選人歷任有負犯者改官增舉考諸選人改京官歷任嘗有負犯者公罪一犯徒兩犯杖四犯笞並加一考私罪笞亦加一考仍增舉主一員杖以上加二考增舉主二員或職司一員即舉主考苐及格而以事論罷者雖降資亦不理逮闕並改次等合入官進納授官人升改名田之制凡進納授官人升改名田之制歷任六考有舉主四員與移注歷任十考有改官舉主七員與磨勘郎因獲盜應循從事郎以上者具奏降等與使臣其因軍功捕盜得改官酬奬如不願換使臣比類循資至承直郎止稱軍功者謂親冒矢石或獲級或傷重及戰退賊衆解圍其運糧守城進築隘郡夫之類郎因軍功捕盜而轉至升朝非軍功捕盜而轉至大夫者聽免差科科配如官户吏職補官至從政郎止凡吏職年滿依法補授將仕郎後有恩賞者許循修職郎用考第關升至從政郎止其不因年勞非泛補授者未得注擬具元補依奏裁慶元䕃補新格慶元䕃補新格使相以下十人執政官太尉八人文官大中大夫以上及侍御史武臣節度承宣觀察使六人文臣中散大夫以上武臣防禦團練使及橫行四人文臣帶職朝郎以上武臣正使三人致仕遺表文臣前宰相見任三少使相共八人曾任三少使相七人曽任執政官六人大中大夫以上二人武臣使相已上八人節度使六人承宣使五人觀察使四人文臣中大夫武臣防禦使已下並不得推遺表恩先是紹興初中書舍人趙思誠嘗上任子限員之議詔從官討論申省淳熙九年八月庚子始用廷臣集議行之既而從之有身前已奏六人而身後推恩為吏部所格者開禧末議者有請乃詔致仕遺表恩澤在限員之外若非泛恩澤則蓋不許云謂監司帥臣遇覃恩及泛使出疆之類七色補官人奏薦法凡非泛補官者舊制員郎以上官皆得任子乾道末始詔員郎副使以上補授及三十年以上者聽官本宗緦麻以上親一名帶職員郎已上入官十五年正使已上入官二十年並係親民資序者遇大禮聽䕃補一名止其致仕郎不在䕃補之限如己任而被任人身亡者俟致仕日聽䕃子孫一名其大中大夫觀察使已上不拘此令九年七月詔㫖也非泛補官者謂臣僚凑補異姓緦麻已上親及嘗得解人娶宗室女補文資之類諸縣推法司舊制諸縣不置推法司吏受賕鬻獄得以自肆紹興間議者始請萬户以下縣各置刑案推吏兩名五千户已下一名專一承勘公事不許差出及兼他案仍免諸色科數事件月給視州推吏减三之一委令佐選擇有行止無過犯諳曉勘鞠人充一年為界即因鞠受財並行重法元年七月庚午敕然諸縣多不奉行朝廷聞之乃勒令請領重祿如不受者勒停所屬不幫支者從例受制書而為抵罪四年二月己亥都督批狀慶元初又詔諸縣編録司亦行重祿仍令縣主吏舉有行止不犯賘私罪小吏三兩人就司習學遇闕縣聞州委官試習學人斷案一道刑名五件取稍通者充及三年檢閲並無差失升一等名次主吏有闕得先補之著為令元年五月戊戌日降敕自降㫖後及今近二十年矣未嘗有行之者取士開禧召試制科兩臺諫論三秀才自李仲信後制科無合格者又三十餘年有何致者字子一永康青城人祖耆仲字子固淳熙初嘗為部使者知名士也致少有才為郡守陳纘嗣功館客纘入為司農丞薦致于劉仲洪尚書所仲洪亦喜之時李季章為禮部侍郎劉師文為工部侍郎仲洪率二人以制科薦于朝有㫖召試㑹同薦者吳郡滕晟東陽杜福遭憂不赴召須服闋並召致躁急欲先得試屢懇季章以為狂笑不顧致更禱纘纘即以仲洪意為蘇師旦言之托胄不得已於仲洪為降內批如所請後二日權中書舍人易元章繳還致大憾乃以劄子白廟堂謂言詞多取憎疾必觸報罷乞請已降召試指揮且謗元章此時鄧伯允方為侍御史俄而以元章除右司諫伯允先為修注以嘗論謝子肅外補憾之不忘及除御史欲奏奪子肅二子出身元章亦恨致因及之伯允曰司諫始入言路而亟讐一布衣何示人以不廣不若更論二謝如致事及罷得論之明白相繼求對元章論二謝駁放伯允論致進卷詆誣伊尹罷致亦登托胄之門伯允無以為罪故摘致進論中言伊尹始行堯舜之道而終為天下開陵犯之端之語以此激之時人謂臺諫共彈三秀才蓋指此也辛未嵗致以吳德夫再召鄭景紹正言論之乃勒令歸鄉增修所學焉易元章以開禧元年八月十四日對鄭伯允以其月之十九日而對鄭景紹奏以嘉定四年五月二日下殿試不避親國朝之制發解進士及省試皆置别頭場以待舉人之避親者自緦已上親及大功已上婚姻之家皆牒送惟上殿閣試則雖父兄為試官亦不避蓋以為别試之故也開禧元年撿詳毛憲為考官其子自知以迎合用兵冠多士韓托胄既敗乃用言者奏奪憲次對而降自知為第五甲末名孝宗議令輔臣考南省上名試卷而中止故事南省開院後以上十人試卷修寫成冊進上行之久矣淳熙辛丑歲上命王仲行尚書知舉鄭少嘉侍郎黃德潤侍御同知既入院矣或謂鄭黃皆閩人恐有私上乃議令貢院取三十名前卷子於揭榜前五日付輔臣考校然未出命也居數日宰相趙溫叔因審其事且言如必欲行則早令試院知之上曰朕亦有少疑更欲與卿等議之溫叔覺上意已變即奏云臣等亦深疑之未敢遽奏恐有避事之嫌陛下既選任知舉三人又令臣等考校則是三知舉不足信矣况文有不可知者臣等受恩至重今日固當盡忠考校但恐此例一開後來宰執有挾者得以容其姦上曰朕亦思之不可開此門姑已之後旬日乃命開院日將上二十人真卷先次進入㑹仲行䇿題中有太上皇帝匹馬渡江之語上不樂以諭輔臣時臨安已鏤板行之亟命毁板仲行不自安請外數月出知紹興淳熙議復四川類省試所减額省試舊以四十人取一名隆興初建劍宣鼎洪五州進士三舉實到場者以覃恩免解有㫖增省額至百人遂皆以十七人取一人而四川類省試則十六人取一名後不復改淳熙十五年范東叔仲藝為右司郎中議以蜀去天日逺士惟科舉一路非有學校他岐進也且隆興省額蜀人初不預今乃例减名額非是當復故時留仲正自成都召還為參知政事意亦主之知政共議曰上改用十五人取一名有成說矣東叔喜遍為禮曺給舍臺諫諸人言之亦無異議㑹宇文子英價以兵部尚書兼侍讀當夜直上以其蜀人也以所議告之子英不知其由遽對曰類省十六人視南省已優矣尚何議翌日執政奏其事上曰朕已為宇文價言之毋庸爾諸公乃退蓋用東叔之議則類試每舉當增省額七八人子英率意而言遂不可復東叔深以為恨四川類試榜首恩數差降事始趙莊叔張安國本末相似自渡江後四川類試榜首若不赴大對例得兩使職官蓋優之也丁卯嵗何祕舉道夫為榜首其答蜀人材䇿歷論蜀人難進易退之莭有髙視天下而竊笑之語時秦丞相方沮張魏公見而惡之遂降㫖類試第一人不赴殿試賜進士出身者為道夫故也庚午嵗張閣學貞甫為榜首答君臣䇿極其贊美秦丞相喜諭主司於三名外處之由是貞甫唱名第四而趙舍人莊叔自七八名外上親擢為第一人其實莊叔廷䇿實甚阿時引趙普雷德驤故事且有欲誅異議之人之語上第以其首句君臣父子之間天下真情之所在謂有古文氣也甲戌嵗張舍人安國答䇿遂有一德大臣之言乃擢第一一德大臣乃辛未嵗周益公試䇿中語也然莊叔安國既登第獨不附秦安國幾為所殺由是見重於當時焉孝宗議權免奏薦及罷特奏名孝宗初受禪以官冗恩濫思有以革之乃議定制百官已任子者遇郊恩權免奏薦開賢良科令中外普薦而罷特奏名手詔左諫議大夫王之望殿中侍御史尹穡右正言朝公武參酌來上隆興二年七月庚寅也既而瞻叔言陛下即位未久恩澤未遍此二事關於士大夫者甚衆望少寬之不已則宜立奏薦限員踰數者許回授罷門客親戚漕司之試止移鄰州如是則省額可减百十人此救弊之䇿也子止亦乞增損制舉薦員朝官年七十未致仕則住䕃子疏奏乃詔年七十嵗人遇郊不許奏子俄又詔未奏者許奏一名逮淳熙九年八月始立奏薦限員其後特奏名又以三人而取一皆略如上㫖然恩濫未大减也必也盡以手詔之䇿行之官曹其少清乎特奏名冗濫特奏名進士舊二人而取一淳熙初議者以為冗濫尤甚請裁莭之詔吏部同給舍詳議於是尚書程泰之給事中王仲行舍人陳叔晋等奏乞三人取一人其不入四等人舊許納敕冉試今止許一試舊免解人有故不入試者理為一舉今不理舊潜藩五路舉人及久在學校充職事人並升甲今止升名奏可六年三月也其後朝廷每有慶霈則前後不中選者盡取而官之往往千數百人充塞仕路遂成熟例不可復减矣女神童自置童子科以來未有女童應試者淳熙元年夏女童林幼玉求試中書後省挑試所誦經書四十三件並通四月辛酉詔特封儒人太學生校定新制京都舊法太學生外舍二千人校定百人內舍三百人校定三十人仍分優平二等優等冉赴舍試又入優等則徑自學官之恩數與進士第一人等所謂釋褐狀元也若平等則謂之一優一平例得免省直赴殿試其次先免解後免省仍並有升甲恩例紹興間復興太學有主權立內舍百人為額嵗終校定每十人校一人十五年二月二十七日㫖是時外舍千人上舍三十人而已慶元開禧兩放混補外舍生增至千四百人本監乃乞增內舍生百二十人為額許之開禧元年四月二十五日雷季仲為祭酒又請每嵗校定增為二十二人亦許之二年正月十三日㫖舊法自外舍升內舍者雖有校定必公試合格乃許升補蓋私試皆學官自考公試則降敕差官故也嘉定中表和叔掌學政奏乞每嵗中取外舍生校最優者一人升補內舍又從之是升舍之法愈寬矣淳熙武舉授官新格武舉補官舊法榜首保義郎沿江巡檢不入承莭郎沿邉巡檢縣尉等第二名以下承節郎沿江巡檢縣尉不入承信郎等淳熙二年始比文士恩數榜首補秉義郎堂除以上或諸軍計議官第二名保議郎諸路帥司准偹將領一任回轉忠翊郎不隔磨勘以比文士改合入官第四第五名承節郎兵馬監押二任回轉保義郎不隔磨勘以比文士循文林郎餘人如舊是嵗五月有忠訓郎張世奕者自言武舉出身乞從軍許之七年三月遂立法願從軍人令樞密院銓量畢依新法補官榜首差三衙或江上諸軍同正將第二第三名同副將第四名以下同准備將不願從軍或雖願從軍而其才不應選者並依乾道八年以前舊法八年四月庚戌又詔武舉人從軍如有已見利便許赴主帥陳述遇有過犯合加罪責申樞密院取㫖蓋不盡用階級之制且使無箠楚之辱也五月丙戌又詔武舉從軍人許先令參部出給例歷仍用六考關升資序既有言此徒往往自髙不親軍旅九年五月丙子有㫖自令職事勤恪者從主帥保奏升差懈惰者按劾然同將官初無待次即日可上又每二考輒復升差則非末名之士從軍不十年而同統制矣至於三名以上補轉秉義郎或忠翊郎者或改換文資則遂為京者恩數與進士第一人等又失之僥幸也其後議者以為言乃詔武舉人毋得鎖試既又不行然自淳熙以來武舉人亦未有卓然可稱者建炎雜記乙集卷十六

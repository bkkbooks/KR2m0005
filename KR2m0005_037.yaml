body:
  text: 建炎雜記乙集卷十七宋李心傳撰財賦廣西鹽法廣西鈔鹽之法詹體仁所請也體仁嘗謂廣西漕官般鹽之法有未便者故欲以客鈔易之及入為起居郎乃薦浙西安撫使幹辦公事胡庭直令往廣東西與帥漕及西路提舉等司詳議鹽法淳熈九年二月庚戌也其冬庭直使還與廣西運判兼提鹽王正已廣東提舉常平茶鹽林析共奏官賣之法甚為害民客鈔誠為利便而庭直又自言二廣須行客鈔之便通以九十萬緡為額廣東十萬籮一百斤為一籮正鈔錢五十萬緡廣西十萬籮正鈔錢四十萬緡及廣西行官賣法而廣東除去通入廣東之數二萬五千籮耳惟廣西不立額故令所賣為一十萬五千餘籮不産鹽十六州賣七萬五千八百餘籮産鹽五州賣一萬八千四百餘籮安海外四州賣五千五百餘籮五前任漕臣梁世又剏賣淹造鹽一萬五千百餘籮皆科抑也今通行額鈔廣東可九萬籮廣西可六萬籮仍増收漕計存留鹽本改指通貨兩路可得二十八萬餘緡十五萬緡兩路増收漕計錢六萬餘緡兩路存留鹽本改指通貨錢三萬緡改東路存留鹽本錢二萬一千緡東路九萬籮内有西客指請東鹽者以二萬籮為率毎籮依東客改指西鹽例納通貨錢七百文計上件一萬八百緡東鹽六萬籮上毎斤增收西路漕計錢二文二分計上件合西路正鈔錢三十萬緡為五十八萬緡可充廣西漕司一嵗之用既而漕司又言此舊行鈔法之時有増支錢十八萬緡未有補足庭直乃奏乞廣東為十萬籮廣西八萬籮詔吏部尚書鄭少融與給舍施聖與宇文子英葛楚輔及體仁詳議議者皆以為可於是檢正官王成之都司陳安行謝務本王吉老擬定如庭直所乞十萬八萬籮之數仍嚴私販之法重官鬻之禁既命南庫户部廣西帥憲司湖廣總領所嵗共損二十萬緡以補廣西漕計之闕户部合得廣東鹽司錢一萬二千餘緡改赴西漕之南庫撥償免西漕錢三萬緡令户部科降廣西舍起鄂州大軍錢十萬緡免起解令總所合通融正廣西詔發廣東鄂州大軍錢二萬五千餘緡令廣東於鈔錢内起解廣西憲帥司合得錢七千緡並免樁一廣西漕司一年雜支錢三萬緡令節省萬又出祠牒㑹子四十萬緡貸漕司為嵗計之用㑹子二十五萬緡度牒三百道計十五萬緡詔可其年十二月乙亥也後數日擢庭直太府寺丞又有數日廣東提舉鹽事司行其法明年正月體仁亦除吏部侍郎四月詔以體仁陳奏二廣利害深知民瘼除武英殿修撰知静江府旋遷敷文閣待制十五年三月又詔以體仁宣勞累載陞敷文閣直學士廣西窮逺自乾道以来鹽法更變不常凡商人之稍有資財者皆遷徙而去商販既不通官般又罷而軍食遂闕廣東提鹽韓壁首陳其不便事下安撫司十年十月戊子日庭直時以陞本路運判兼提鹽司二人初不為之變也久之又併廣東西鹽事為一司十二年十二月甲子通以十六萬五千籮為額廣東九萬五千廣西七萬體仁尋奏言累年詔賣之數通不盈十三四萬籮乞減為十五萬仍罷通貨錢以便商販從之十三年九月乙巳盖自行鈔法五六年間州縣率以鈔抑售於民其為害愈甚於官般之日人甚苦之其秋胡子逺為侍御史首論廣東鹽鈔為民深害皆由議之附下罔上文過遂非固位患失甘心害民以至於此乞行鐫黜正其欺罔之罪上諭以當先易帥臣徐議鐫黜三省擬用頋彦膚公上曰負荷不得可别選人樞宻院黄徳潤留仲至繼奏事上曰廣西帥湏得平心人為之庶㡬不至輕易改法如賈逵平穏可用近有㣲疾潘景珪有才亦穏卿等更與丞相議之既而賈潘皆以母老辭議久不决子逺亦上疏言之周丞相乃奏以應孟明知静江府召體仁赴行在上因言廣西鹽法利害相侔如侍從中有人亦主客鈔仲至曰臣久在廣中偹知利害事關西路若經改法即両路紛紛湏且因其弊而救之上曰今除孟明與議之為代朕當親札與之止可舉偏補弊未可輕易改法時九月甲寅也子逺冄奏乞寝體仁召命上賜親札云已差應孟明詳䆒利害事寔以聞所以不令朝辭正恐奪於䑓臣議論使之掣肘不能平心䖏事若鹽鈔果害於民議之豈得輕恕乎孟明至官首奏本路見今以鈔鹽抑勒民户流毒一方且都鹽司不支本錢鹽丁散走入户多有請鈔而未得鹽者又人户以産業抵當請鹽鈔亦有已業既盡借荒田砧基以充要約者不若復舊法漕司官般官賣以觧愁怨十六年正月壬寅進呈上謂大臣曰始議此行事時先遣胡庭直徃體仁非不詳審徃往止是符同議之之説今為所誤宜令孟明條具更改如人户有未支鈔鹽湏令盡數支還今不可復失信於民丙午詔體仁予在外宫殿從所請也先是朱晞顔除廣西小漕入辭上諭㑹同孟明審䆒鹽法利害晞顔奏今鈔以客為名寔無客商乃彊税産之家使之承認至於破産而後止况静江官般之時毎斤百文自變為客鈔毎斤百三十文尚何使民之有利子逺乃見上乞重黜體仁乃從兩司所奏依舊法行下丙辰詔體仁落職學士罷宫祠送袁州安置擢知瓊州王光祖為都提舉廣南路鹽事同帥漕二司一面措置毋致再有科抑之弊仍截撥本路諸州應起湖廣嵗計錢十五萬緡補助今年之用除髙雷化欽亷五州賣二分鹽外令官般官賣亷州鹽毎斤二十二文主户月賣三斤客户二斤寡婦一斤半雷州鹽毎斤三十二文毎年主户一丁食鹽十二斤客户减半化州吴州縣鹽毎斤三十文石城縣鹽三十五文石就縣三十八文毎斤主户一丁食鹽二文電白縣四十文信宜縣四十五文欽州鹽毎斤四十五文上户月賣二斤中二斤下户一斤半餘鹽令東路漕司嵗賣七萬五千籮充上供紹熈元年冬用廣西提刑吴宗旦之請額損五州鹽直鹽數又用廣東提舉劉烜文之請减鈔鹽一萬籮戸部奏如是則暗失經費六萬三千餘緡然光宗不之靳也二年秋廣東復言六萬五千籮猶有未售者乃又减五十籮盖廣東湖恵南恩三州既自産鹽而官復般賣由是往往計口抑售於民自紹熈以後朝廷暗損經費十萬緡而科抑少减矣四川石脚井眉之彭山丹稜嘉定之洪雅等縣皆有石脚井筒其實硝也在多悦者謂之山門彭山者謂之瑞應此二井尤盛然必得隆榮諸井之鹵對煉而後可成鹽隆榮諸井煎鹽既成其水之尤苦冽者棄之不用煉而成餅食之者得泄利之疾官未𣙜鹽時小民或私煎求利元豐三年立法禁止崇寜初張天覺為尚書右丞建遣成都府路常平司勾當公事乃居體兼措置兩川俾之鹽𣙜天覺罷尚書省言丹稜洪雅等縣多有石脚苦鹽不堪食用乞依元豐法禁人開煉併罷居體従之三年十一月戊寅也紹興中瑞應郷民户始有盗販鹵餅拌和硝石煎成小鹽低價以售者有司因為拘𣙜凡三十六井嵗輸官錢萬七千餘緡既而總領所以為不便言於朝復行棧閉而以其課額均於隣近嘉榮隆簡四州之井户謂之石脚錢紹熈二十四年也及嘉定五年多悦之民有犯法私煉者州既抵罪制置大使聞之即遣秉義郎新䕫州路兵馬都監楊仲端往山門措置其年九月也自後月得小鹽一萬五千斤皆不用引鈔徑行發賣嵗費息錢一萬九千二百緡然鹽既苦惡不可食率以抑售市居之人盗煎私販者因亦肆行官不敢問議者謂元豐立法者参知政事蔡確也崇寜禁止右僕射蔡京也財用流通可以大有為而京確所不為則失之矣東南收兌㑹子自曽欽道為版書欲急見理財之效始與提領㑹子庫官陳彌祚李若水共議依川錢引例立畧毎界一千萬緡兩界相沓行之乆矣其後毎界増為八千一百萬緡至第七界又増為二千三百二十三萬緡開禧用兵又依四川例亦以三界通而行之第十三界累増至四千七百五十八萬九百餘緡民間折閲滋甚嘉定庚午春第十一界㑹子當滿朝廷先期命刑部曽尚書煥等置局拘換於是與其寮奏言第十一界㑹子為三千六百三十三萬六千二百三十六貫八百文乞鬻爵及出賣沒官并諸色名件拘回舊㑹許之嘉定二年五月甲寅降㫖所謂名件凡九一曰打套乳香錢約一百六十萬餘緡謂𣙜貨務見在㪚乳香十六萬七千七百餘斤可打一百萬二十套毎套價减錢一百文作一貫六百文二曰出賣諸路沒官田價錢約一百二十二萬餘緡謂户部具列諸路未賣官田計價錢一百二十二萬七千四百三十六貫九百文限三月許人户以第十一界㑹子永買也三曰出賣告勑綾紙補帖一千四百道計價錢四百四十萬緡謂廸功郎告毎道一萬貫承信郎告八千貫進武校尉綾紙四千貫進義校尉綾紙三千貫以上四色各降一百道上州文學勑毎道八千貫助教告毎道五百貫已上二色各降二百道進武校尉帖毎道二千貫不理選限將仕郎綾牒一千貫已上二色各降三百道四曰左右選轉官循資告九百四十道約計價錢三百三萬餘緡謂宣教郎轉通直郎一官計七千貫承務郎至宣教郎毎官五千貫已上二色共降一百道訓武郎轉武翼郎一萬貫修武郎轉訓武郎五千貫已上二色共降四十道選人循資毎員三千貫共降四百道承莭郎已上轉官毎官四千貫承信郎轉承莭三千貫已上二色共降四百道五曰封贈冠帔勑誥六百道計價錢二十八萬緡謂生封安人誥毎道一千貫孺人誥八百貫已上二色各降一百道冠帔勑一百貫已上降二百道贈父母廸功郎承信郎各五百貫已上二色共降一百道追封孺人三百貫已上降一百道六曰紫衣師號帖三百道價錢三萬緡毎帖二百貫七曰副尉减年公拘三百道計價錢六萬緡毎年一百貫八曰拘摧諸路已降未賣誥勑錢兩項共計一千四百一十餘萬緡開禧二年四月五月兩次抛降四搃領所官誥綾紙勑帖二千八百道計一千一百四十萬貫内湖廣申巳賣三十萬五千貫淮西申巳賣一萬貫其所收錢亦不曾起發諸路州軍元抛降六百九十八道計三百五十九萬一千貫已起八十四萬五千九百二十五貫五百文已上兩項通計上項錢今仰将已賣錢盡數起發如寔有未賣誥牒等仰盡數􅌳申尚書省九曰臣僚奏薦綾紙未見數承務保義郎已上五千貫通事承莭郎已上三千貫又禁銅錢毋岀都城於是行在㑹子毎千為錢七百諸路州縣纔得其半云朝廷知其壅積遂廢十一十六兩界而以十四界新㑹収之壬申之冬王釡為湖廣總領亦請以度牒茶引两色収兊第五界舊㑹毎度牒一道價錢五百緡官賣價八百緍又貼搽茶引一千五百緡許収價仍限一月然京湖二十一州相去遥逺而止置三塲収兑小民聞知後人情洶洶市中局肆皆怨嗟盈路劉徳秀為制置使以為不便㑹總所以第六界新㑹五萬緡令江陵軍民之兌㑹者以舊楮二而易其一徳修復自出府庫之蔵聽軍民以一楮半而易其一又懇于朝得新楮十萬緡蜀中収兑舊㑹凡用坐庫黄金二萬兩白金九十七萬兩故能収千六百七十萬緡而民不甚病湖廣則無之此其所以用茶引也余嘗考紹興之初東南餉軍皆用見緡是時僭偽縱横冦盗充斥軍費多矣然未聞有錢乏之患自紹興末年錢䖏和剏行在㑹子於時王珏亦用之於湖北諸州今未六十年而公私之見緡存者至少盖楮劵盛行而銅貨積而不用是以日泄而日耗也論其咎端自兩人始至于曽欽道沮孝宗收換之䇿以貽後来不可救之患尤可歎也後生不知源流本末故詳識之四川收兌九十界錢引本末嘉定元年冬四川總領所收兌九十界錢引元年十一月二日先是四川錢引以二年為界毎界書放之數止于一百二十五萬崇寜後陕西邉事起泛印增多而引法壊大觀間盡罷之仍詔以天聖書放之數為凖建炎初張魏公出使復以便宜増印自後因循不至嘉泰末兩界書放凡五千三百餘萬緡通三界所書放視天聖祖額至六十四倍逮嘉定初毎緡止直錢四百已下議者患之總領財賦陳逢孺乃與僚属議出庫筦金銀度牒與民收回半界金每兩六十緡銀每兩六緡二百度牒每道一千二百緡度軍官所藏可直一千三百萬議論凡數月至是忽行下諸州聽民間以舊引輸官課及赴利州市金銀期以嵗終官司毋得受榜出民大驚先是總領所嵗受諸州縣金銀例多虧因下其補虧之數乃以錢引折納今項收支而庫管金銀虧下如故民間頗知其事又四川諸州去總領所逺者至千數百里而期限已迫往来或不及且受給之際吏縁為奸折閲已甚於是單丁弱客皆不敢行一引之值僅售百錢咨嗟怨泣其聲載道後旬制置使吳德夫乃揭榜除收兑一千三百萬引外其餘三界依舊通行使用又檄總領所分取金銀就成都置塲收兑舊引民心稍定時宣撫司方與總領所比故移書東南以為德夫沮壊其事論者亦但謂錢弊專屬總計臺制司無所預繇是不直德夫云四川收兑九十一界錢引本末制司科并户官資鈔陳逢孺既收錢引半界而引直僅為鐵錢五百有竒若闗外用銅錢每引止直百七十二錢而已制置大使安觀文患之庚午春議欲復收半界提舉茶馬張東父名震龍㳺人嘗為軍器監首出馬價剰錢一百萬緡為助大制司益以二百萬緡既而遂欲盡收九十一界錢引二千九百萬緡其千二百萬緡合諸司之力餘七百萬緡令民間引毎百引貼納三十引收兑逢孺謂三年三兑失信於民且貼頭太多民有折閲之患不如量力止毁九十三界新引千二百萬緡如此即止餘兩界通行公私皆受其利安公怒即榜諭軍民以為九十一界錢引係前宣撫程私増印五百萬道所以錢引價低軍民皆受其弊今使司措置與茶馬兩司收鑒五百萬外餘二千四百餘萬合係總領所以新引收兑自七月十七日以起如支軍人折估並合以新引支遣如欲支舊引即合支貼頭錢所有九十一界錢引自十月以去斷不行檄使至逢孺堅持不行安公益怒六月辛酉逢孺愠即以印付属官稱疾申大制司乞致仕先是誅曦之嵗副宣司遣官剗刷四路錢物得五百萬緡以助總所贍軍已三年矣至是或言講和罷兵減汰之後用度日省總所嵗計已是有餘當還制司元日所寄五百萬緡以備對鑿參議官毛伯玉名濮瀘州人時新除路提刑等調䕶久之卒兑九十一界二千九百餘萬緡其一千二百萬緡以茶馬司羨餘人夫空名官告總所樁管度牒金銀對鑿餘以九十三界收兑又創造九十四界錢引五百萬緡以收程東老所増之數應民間輸納者毎引百貼納八千盖二司之説竝行然總領所收兑舊引皆以金銀品搭率用新引七分金銀三分銀色下而秤虧官吏因以為利其實毎舊引百帖納二十引乃得之應民間已用舊引輸官者總領所復却還令兑新引卒不能守其初約也所謂大制司二百萬緡者其年以三路鹽井户月額毎三萬斤科賣不理選限將仕郎一道計值千緡三路十七州共賣一千道計直百萬緡其年則以給賣没官鹽井舊民户没官之井自建炎以来依坊塲法召人買除引息土産税錢外量増課息嘉定元年逢孺乃従總領所令民為永業得錢十萬緡至是大司以為計司過於求酬未當直再召人實封投買又得錢近百萬緡初不令悉輸舊引子官以充對周文人後潼川劉師文侍郎申明後令自十二月以後盡輸新引盖自元年三年兩收舊引凡二百五十萬緡有竒而引直遂復如故向使計司非有樁積金銀之富又安能收此濫而不行之劵乎今四川諸郡歲輸黄金千五百兩銀六十萬餘兩而總所大率有收無支堂計者謹視而善藏之則子母相權引法終不壊矣故詳志之四川總領所小㑹子東南㑹子有四品自一貫至二百盖便於轉用也川錢引則分一貫及五百而已丁卯嵗陳逢孺以用不足始創小㑹子楊端明為制帥深不樂之西川皆不用吳德夫代鎮蜀與逢孺厚下令官民悉許流轉州縣所備場賦輸悉不肯受由是不敢行後但以其五萬緡收兑舊引於劒外諸州已而亦廢是時宣撫司又為金銀㑹子後亦不行四川行當五大錢事始嘉定元年十一月庚子四川初行當五大錢時陳逢孺總領財賦患四川錢引増多乃即利州鑄大錢以權其弊三年夏制置大使欲盡收舊引乃又鑄於卭州焉利州紹興監錢以聖宋重寶為文其背鑄利一二字又篆五字卭州惠民監錢以嘉定重寶為文其背鑄西引二字又篆五字兩監共鑄三十萬貫其科例並同當三錢時議者恐其利厚盜鑄者多而總領所方患引直之低則曰縱有盜鑄錢輕則引重是吾欲也方錢之未行也眉人有里居待次者又欲創一監於眉州論者以為丹稜雖產鐵嵗額不多而本郡又無薪炭眉山之人亦以為不便上下騷然數月乃罷由是止鑄於利卭二監焉紹興至淳熙東南鬻官産本末紹興末黄擇之仁榮守永嘉始建鬻官田之議至乾道初為錢七百萬緡而未售者不及四分之一二年十一月户部奏已賣到五百四十萬貫未賣者一百六十萬貫朝廷仍併營田賣之兩浙漕副周宗言本路營田已佃者九十二萬六千餘畆若鬻之懼失租課四川總領所亦以不便為言乃詔除四川外盡行出賣二年六月後又詔没官田產除兩淮湖北勿賣外江浙閩廣湖南八路以田計者六百四十二萬畆有竒以地計者二萬一千畝有竒以屋計者八千四百間有竒共估錢五百十六萬餘緡遂命將作監丞折知常往浙西司農寺丞葉翥往浙東元年五月監登聞檢院張孝賁往浙東主管官誥院周嗣武往江西措置是年四月始限一季繼展一年至淳熙初已折封者僅一百六十三萬餘緡而直之未輸者猶四之一其鬻者尚三百五十二萬餘緡元年六年户部具到盖估價之初豪民大姓請嘱官吏相為欺隠其已賣者皆輕立價貫上色之産也而中下之産估價反髙是以不售於是言者以為不若且令元佃之家著業納租一嵗之間猶可得米數萬石從之尋命諸路權住賣三年二月後數嵗復用軍器監主簿陳杞言併營田沙田出賣浙西淮東江西三路元括到沙田凡三百八十萬餘畝議者多以為未可未幾浙西提舉王尚之言平江一郡已有當賣田十萬四千餘畝嵗收租二萬石有竒乞别部拘催或遇歉嵗得以接濟從之六年十月久之言者又謂盡鬻官田以為常平水旱之備十四年六月事雖施行後亦不究也大抵十二年間所鬻官田實不過七百萬王得和括關外營田關外營田始於鄭亨仲階成西和鳳金洋州興元府皆有之而洋之西鄉為最其初因兵火後民多失業故募人使耕之量收租利而已休兵日久墾闢嵗增營田之家懼官之增賦也每三四嵗則率投狀退佃而賂總所之吏使蠲其租在紹興中嵗課十二萬斛有竒乾道末損為十萬至嘉泰初纔八萬斛而已隆州學官張均子和尚為西鄉主簿知其本末即與王得和言之得和分遣官屬八人按行且揭榜諸州縣大畧云營田户所侵官田甚多若按行畆目增立税租所有當數十倍今不欲擾民仰民户自陳増墾之數山田畆收二升陸田四升水田六升而止下戸懼皆以實告獨豪民大姓則宻賂行遣胥吏以為無侵給公據與之由是有鬻公據之謗矣諸大姓既不喜郭子明心欲害其事鳳守某人者大將之弟郭氏之壻也遂激而成之子明亟降榜撫定至欲調兵時官属行營田者凡半嵗費總所錢萬餘緡州縣供億又倍得和始議可增三十萬斛及是所増纔八千斛而麥居多焉未及秋成得和罷去陳日華代之盡返其舊額顆粒不收關外經量劍外諸州之田紹興以来久為諸大将吴郭田塲及勢家豪民所擅賦入甚薄議者欲正之而不得其柄吴氏既破安觀文為宣撫副使乃盡經量之金州守臣宋子欽曰此州瘡痍甫廖邉民恐不可盡其利官一入境将散而之四方矣於是除金州外凡興元府洋沔階成西和鳳州太安天水軍二十縣經量之數大抵増多而亦㣲有所損舊九郡家業凡一千一百五十七萬九千餘緡二稅十四萬五千六百餘石夏秋後錢十五萬七千餘緡及是經量撫司命别上中下三等以定田之髙下分三等而為九則以鈞賦之重輕而所委官吏務于増多未嘗行厯鄉社躬親履畆往往强令有田之家増認租數而民始怨矣増虧相補視舊籍凡増家業錢二百二十九萬七千餘緡二稅三萬五千八百餘石役錢三萬五千餘緡安公辭制置大使表中所謂田廬之均一有倫盖指此也其後代者劉師文言上件所増初非田土之廣袤亦非户口之繁滋於民有害於公無益乞盡行除免諫官應武緯之亦以為言於是盡復其故焉龔實之㸃三總所錢物錢良臣以太府少卿為淮東總領龔實之秉政聞戸部嵗撥淮東贍軍錢六百九十萬緡而本所嵗用六百十五萬緡而已因奏户部員外郎馬大同著作佐郎何萬年軍器少監耿延年分往昇潤鄂三總司㸃磨物錢時淳熈三年九月壬子也㑹良臣以用不足言于朝乞借撥實之奏今所委官一就驅磨而近習者恐賕賄事覺極力救之實之不顧十二月方奏總所侵盗大軍錢粮累數十萬實之奏下其事於有司次日御批令具折既又改為契勘俄中㫖令良臣赴闕奏事明年正月除起居郎六月除中書舎人又明年四月除給事中六月除簽書樞宻院事其為舎人實之去位纔十二日也英州之禍預有力焉延年時已遷将作監萬年遷著作郎坐實之黨罷去延年六月丙戌罷萬六月甲午罷盖延年嘗言湖廣總所錢物有别庫歴所收已行改正故與萬年並遷而大同無所舉覺二人既黜之兩月大同乃自宻院檢詳文字遷右司員外郎翺翔累年然後補外盖三司總苞苴賄賂根株盤結其来已久非一日故也孫大雅獻拘催上供錢物格乾道初有孫大雅者知秀州以發姦摘伏除直秘閣未踰月大雅又奏書一編凡四卷名曰川郡拘催上供錢物格大畧言本郡上供嵗為六十八萬四千緡有竒其窠名有九有嵗入者有季入者有月入者臣皆釐為月入即以所置之籍於次月之旦考其未足者催焉且加討於其吏而次月補矣由是而有拖欠者臣則未之見也此即漢之大司農掌諸錢榖金帛貨郡國四時所上曰旦見錢榖簿其逋未畢各具别之之意臣所領郡元年上供錢六十八萬緡已並入於大農更無拖欠敢昧死以獻二年正月癸酉也奏入詔孫大雅之奏漢上計之法朕謂可行於今令侍從䑓諌参考古制進呈㑹殿中侍御史張之綱以憂去而右司諫汪綃補外於是監察御史張敦實劉貢言漢雖有郡國上計之制而武帝言十餘年之間一受計于帝郡三受計于方嶽或以三月或以十二月至宣帝黄龍詔書有云上計簿文具而已則在西漢已不能無弊矣况今䏻盡革其偽乎光武中興嵗在正月旦臨軒受賀而属郡計吏皆在列言属郡計吏則逺者多方在東漢未必皆至况今日川廣之逺其能使如朝畢至乎莫若嵗終令户部盡取天下川郡一嵗之計已足未足虧少虧多之數依常平收支户口租税之例並皆造冊正月進呈丞相選一人考覈而名其殿最事下户部權户部侍郎曽懐言諸路州軍逺近不一若取㑹齊足儧造亦恐後時乞令各州具合法上供錢帛粮斛數目嵗終造冊正月遣人投進仍立式行下從之其年三月丁未識者謂䑓臣所奏可謂仁言若上計之法果行則公私急廹久矣夀皇卒不施用盖以此矣慶元㑹計錄慶元㑹計錄者始用殿中侍御史姚愈達請命金部郎中趙師炳户部郎官楊文炳編集三年三月書成紹興至淳熈四川宣撫司錢帛數鄭亨仲為四川宣撫副使時本司有随軍激賞撫養降賜四庫其數夥趙徳夫不棄来總計欲盡取之亨仲不與由是有隙及亨仲得罪本司樁坐錢至五千萬詔分撥赴行在餘命總領所拘收乾道三年五月吴信王薨六月復宣撫九月虞丞相入蜀宣撫司随軍撫養二庫見在錢引八千九萬緡金五千三百两銀一萬一千兩帛八千五百匹皆有竒此紹興末吳信王為宣撫使時所儲之數也五年三月虞丞相召七月己巳王公明為樞使入蜀两庫見在錢一百二十四萬緡随軍庫一百五萬橅養庫十九萬金八千一百两随軍庫七千八百八十餘两橅養庫二千六百餘兩銀一萬五千兩随軍庫四萬九千餘兩撫養庫二千六百餘兩帛四千三百匹並随軍庫亦有竒八年九月王公明召十月癸亥離司两庫見在錢六百八十九萬緡随軍六百七十七萬緡撫養一十萬金一萬兩随軍庫九千六百六十兩撫養庫三百四十兩銀五萬一千兩随軍庫四萬九千七百兩撫養庫一千三百兩絹一千八百疋並随軍庫亦有竒然随軍庫管朝廷封樁度牒錢四百四十萬緡又有未償茶馬司買馬錢四十七萬餘緡則兩庫寔二百一萬緡也是嵗宣撫司迓虞丞相支遣及造器物共用金三百兩銀六千五百兩而錢帛不與焉十二月晦虞丞相至興元兩庫見在錢六百八十三萬随軍庫六百七十二萬四千緡撫養庫九萬六千緡金八千二百兩随軍庫七千八百四十両撫養庫三百六十兩銀四萬六千兩随軍庫四萬四千五百兩撫養庫一千五百兩帛四千六百疋亦有竒淳熈元年二月癸酉虞丞相薨兩庫見在錢七百四十三萬緡随軍庫七百三十七萬二千緡撫養庫六萬三千緡金八千二百兩銀一萬六千兩細數目乾道九年十二月綵帛二萬三千四百疋随軍庫二萬二千四百二十疋撫養庫九百八十疋亦有竒盖増虞公所携度牒直一百五萬視王公明時减五十萬而無負茶司錢宣撫司可用之錢大率二百萬緡爾是年三月丙申鄭仲一出使七月丁亥仲一復為叅知政事應本司見在銀錢物帛總領官趙和仲公説盡數拘收令頂樁管仍令湖廣總所遣属官一員同本官紐計除措八月庚午又命宗正丞李叔玠珪兼權户部郎官徃興元拘催宣撫司錢物赴行在虞公之将沒也奏言拘籍到總領所積年嵗用外金錢七百九十餘萬緡合本司所積為一千二百六十餘萬緡故命取焉十二月壬午復置宣撫司以樞宻沈徳之為使見拘收本司但於錢物軍器等依舊歸還尋又詔應于舊属軍中塲務並還諸軍宣撫司毋得取命下沈樞大不樂時湯朝美為右司諌復奏罷宣撫司二年六月庚戌從之於是吴挺已為興州都統制置使利源多為所擅前後二十年財帛不勝計矣四川樁管物錢祖宗時蜀中上供正賦之外惟有三路絹網三十萬疋布網七十萬疋毎疋為直三百文而茶鹽酒皆未有管𣙜是上供之外一嵗供於他方僅三十萬緡也絹直九萬布直二十一萬自元豐𣙜茶嵗為百市馬以赴中都而所出已三倍於祖宗之世矣炎興以後關陕之兵轉而入蜀嵗用率三千萬緡則民力大屈然猶有可諉者曰兵以衛民亦蜀用也而養兵之外又有竭澤者焉樓仲耀宣諭陕西於四川無預也乃取蜀中金四千兩銀二十一萬五千兩絹八千疋錢九萬緡錢引一百萬其歸也遂以為激賞庫之獻此其一也紹引九年八月丁夘行府歸来鄭亨仲之罷宣副也諸庫之儲近五千萬制置司僅留二十萬緡餘分撥赴行在者不知其數此其二也十八年五月甲申指揮王瞻叔之括白契也得凡四千餘萬緡而蜀中大擾沈徳和言於朝初命總領所樁管既而吴挺乞撥其若干買進馬隆興二年十二月丙申指揮又撥一百五十五萬緡赴南庫乾道元年五月辛亥指揮又撥五十萬緡併赴湖廣乾道元年十月己丑指揮最後曽欽道又乞撥所餘二百六十五萬餘緡赴西庫乾道二年三月壬寅指揮而蜀中不復得一錢矣此其三也實銀初書四川總領所所拘収白契税錢四百餘萬于内支撥令吴挺買馬次書于見管三百八十餘萬貫内撥一百五十萬赴南庫次書湖廣總領司馬綽奏已承指揮取撥四川白契錢一百五十萬貫乞更撥五十萬從之最後乃書曽懐言白契錢已支使起發外有二百六十五萬餘貫乞盡數起發以此計之前後總為六百十五萬緡而買馬錢不預與元橋管數不合今細考湖廣一百五十萬恐即是南庫改撥窠名而司馬綽續乞五十萬疑雖得㫖而未曽起發盖二次實起過四百一十五萬餘緡耳所謂三百餘萬緡者疑是初令吴挺取撥二十萬買馬先豁此數後来不曽取撥故猶餘二百六十五萬也虞雍公之薨也宣撫司樁積及拘到總所嵗用外錢共為一千六百二十萬八百三十餘萬樁錢積七百九十餘拘到初遣户部郎官丹稜李珪叔玠奉使起發淳熈元年庚午指揮叔玠持不可上頗難之㑹復置宣撫司事得暫止十二月辛巳既而宣撫再罷乃命總領所樁管二年六月辛酉指揮淳熈初龔實之丞相事始奏損四川緡錢之贍湖廣者四十七萬緡以减酒課三年六月既又暫損其餘一百十九萬緡者凡五年以為邉備四年二月自是計所樁積稍充光宗登極又因劉徳修少監有請冄損三年之出凡四百六萬八千緡毎年一百三十五萬又與淳熈四年之數不同當考對减鹽酒重額錢即此錢也淳熈十六年四月己巳指揮然四路常嵗實發止六十萬緡而已又以買發物價計之折閲中半僅為三十萬緡楊嗣勛時總蜀計又樽節三十萬緡以益之自紹熈癸丑以後對减九十萬緡之數以為常迄開禧丙寅凡十有四年蜀人霑减放之恩無慮一千二百六十餘萬光宗之施博矣四川宣總司抗衡四川計司舊属宣撫司節制鄭亨仲在蜀久知秦㑹之惡其專始命趙徳夫以少卿為之自是二司抗衡開禧用兵程松吴曦並為宣撫韓侂胄急於成功遂有節制財賦指揮且許按劾於是計司拱手及安觀文為宣撫薦陳逢孺總賦逢孺事之甚謹時蜀計空虚而軍費日夥宣司為之移屯减戍運粟括財計司實賴其力後以兊引事稍有違言逢孺不敢劾也王少監釡子益代陳總計先請于朝尚書省勘㑹軍政財賦各專任責權臣前䧏節制財賦指揮合行釐正於是二司始悟未數月二人交章乃論專恣因以子益為湖廣總領四川總制司争鬻鹽井王子益之總計也制置大使奏乞减三路兵籍以八萬一千人為額有闕乞招填額然兵籍舊人八萬九千人曦亂後僅存七萬餘人雖云减額八千若盡招填補實増萬人矣㑹朝廷泛行下三衛江上及四川諸軍覈寔議填虚額遂止三路官井舊法令人承煎自軍興後總領所已依官田法召人投買得錢數十萬緡大使司以為未及價復買之又得錢百萬緡入制司激賞庫王子益以為失信檄止之大使司乃以總計所負制司廣恵倉米三十萬石言之於朝子益議遂格嘉泰補糴關外樁積粮斛關上積粮八百餘萬斛然陳陳相因庾吏率全其局鑰相以授受至可食者則無㡬嘉泰甲子正月有言此境増戍積粮者朝廷下制置司遣官盤量且令除其腐敗折閲之數所有累界官吏失㸃檢之罪並槩豁免時陳日華曄總賦遂䧏度牒三萬五千道下總所收糴補填焉四川宣撫司科對糴米丁夘十二月宣府副使司檄東西路漕司各糴米二十萬斛䕫路漕司十萬斛制置司抱認於成都府糴十萬斛並遣官運送沔州制司属官見之皆忿曰我北司也乃為若市米耶楊端明曰理不可拒第徐為之圖可耳時宣撫司方科民户對糴米乃報以抱認六萬斛其半本府坐倉其半九縣對糴既而楊公召歸事亦遂已對糴米者紹興初有之休兵後罷去盖毎民户下乃税産一石則科糴亦一石此所謂之對糴焉兵馬沔州十軍分正副兩司事始沔州諸軍自昔為天下最盖御前諸軍惟蜀中有關陕之舊而武興之衆至六萬人分為十軍其間摧鋒踏白二軍又沔軍之最勁者也自淳熈以後不除副都統制郭子明為帥朝廷始用王大節曦至罷之曦誅安觀文奏復此官以授李好義命下而好義已死既乃用王喜為之盖王喜專兵宣司欲殺其權故也始朝廷命宣諭使吴徳夫来議分十軍以属两将俄喜罷去宣司将移司益昌方以李貴自衛乃奏副都統制自河池移司利州貴自中軍統制官陞充副都統制未行副宣撫移知興元府復命貴為興元都統制而蘄州防禦使諸邦寜代之邦寜本楊巨源所結約者明年夏利州諸軍因教罷忽出城刈民麥彌亘三十里殆無孑遺因遣邦寜急出弹壓杖殺為首者數人總領官陳逢孺大驚命大軍倉人以官麥五斗貸之衆乃定安聞之乃遣使逮邦寜數其罪䧏為沔州中軍統制遂以知天水軍張威代之嘉定三年正月是也自是沔司事權稍殺矣丘宗卿創淮西定武軍始淮南两漕司招輯邉民號鎮淮軍多至十餘萬人日給錢米悉視郊用所費甚廣既不㸃湼漫無統紀久之廪給不繼公私剽刼嘉定改元丘宗卿復為江淮大使朝廷慮鎮淮或生他變遣宗正丞楮叔度奉使措置且就令商度宗卿乃先随雄淮所分屯𨽻逐州守臣節制尋奏以淮東人數少領師漕任貴揀汰除願歸農外僅存八千餘人剰其半充郊用以補鎮江大軍數及武鋒軍闕額淮西人頗衆合六萬餘人乃委制司属官陳師文同漕臣張頴揀刺二萬六千餘人充御前定武軍分為六軍各置統制自是月省錢二十八萬緡米三萬四千餘石而定武亦成軍伍淮西頗賴其力焉黎雅嘉定土丁廪給成都路南邉黎雅嘉定三郡皆有土丁更畨上塞守把邉地多者數千人淳熈中留丞相帥蜀議者奏取黎雅二州民共依利路義士法措置乃與總領財賦馮憲廷籍共議遣本司幹辦公事馮震武傳之往二州籍之州選二千人分上次等上等六百為㸃集之丁依諸州軍弓手例月給錢三千五百次等一千四百為居守之丁依龍州弓箭手例月給錢二千二百皆以五十人為一隊擇有物力材幹者為一隊長月給各倍之教頭以下差减毎一隊教頭一名月増支千五百隊司一名急脚一名月各増之若備居守者遇冬就鄉教閲五日備㸃集者月教於鄉冬則從守臣㸃集教閲毋過半月為給賞等八斗弓二石五斗弩遇團結仍給口糧計月給及教閱除戒之費為錢十萬引上等月給五萬四百引次等月給三萬六百引教閱賞給修治器械等共約一萬引茶馬司出三萬制置司總領所各二萬提刑司轉運司暨黎州各半之奏可時淳熈已九年矣未㡬提刑梁總以匱乏告遂損其三之二自淳熈十四年以後减作三千引開禧末髙吟帥貶楊端明為安撫使復遣兵馬鈐轄劉忠亮權安撫司幹辦公事李嘉木更選雅州三縣並居邉寔之丁以逺近為率分三等毎季分給凡把截将士上丁三千三十二中丁千四百四十三嵗用錢三萬六千一百六十四引米四十石五里内把截將十人十里内二人二十四丁里内一人毎季給米一石錢三引五里上一千六百七人毎人季給錢三引中丁七百四十五人并十里内上丁五百五人毎人季給二引十里内中丁三百四十人二十里上丁九百二十人毎人季給一引中二十里内中丁二百八十四人毎人季給一引自黎雅土丁剏支月給團結教習往往就緒而嘉定土丁五千餘人則未有以給之也利店之役李季允為提刑乃白制置大使司欲如軍兵衣賜例給以疋布計其直為一萬二千引大使司命取之帥漕府憲四司自嘉定五年為始安撫提刑轉運司嘉定府各司嵗認三千引其後漕臣趙師嵓應副一年帥臣黄伯庸未嘗應副也㑹虚恨蠻入塞提刑楊伯昌乃於犍為峨眉二邑土丁中擇其少壮者二千人團結教閲援黎雅末等土丁例月支食錢一引嵗為二萬四千引大使司給其半就以多悦胡心井鹽息禆之又命帥漕憲三司均給其半舊提刑司有備邉四十萬開禧末宣撫副使遣属官根括餘羡盡取之其後季允自崇慶改除携其羡緡及本司所措置積成十萬安邉司結局大使司奏取其四之一以賞軍及是所存纔七萬餘緡而不得擅用伯昌以為請事下户部户部乞下制置司契勘寔在乃令安撫等司觧撥應付毋令缺誤嘉定七年六月丁巳從之自是三郡土丁月廪始均一矣凡嘉定土丁之目峨眉縣七寨揀中一千人中鎮寨五百五十人東蠻溪口寨黄茒平寨銅山寨毎寨各百人羅忽寨東蠻溪寨涇口昆材寨五十人犍為縣十二堡寨揀中亦千人平戎新堡四十五人因平戎舊堡一百人利店榮丁賴休川四寨各百人人威寜寨九十人寨籠鳩堡六十人研籠蓬堡五十四永開堡白崖各十人三賴四十六人皆提刑印給公據分四十隊毎隊五十人置教頭旗頭隊司各一人隊丁四十七人官給旗幟隊為一號又創教塲二十四其在峨眉者十二中鎮寨塲教八隊教銅山寨東蠻溪口寨塲各二隊寨黄苑平寨昆材寨東蠻溪寨涇口寨羅忽寨及中鎮之峯子溪月峯山黄苑平寨之堋材塲文教一隊在犍為者十三平戎舊堡榮丁賴因休川威寜寨塲各二隊利店白崖寨籠蓬永開籠鳩堡利店北寨三賴研塲各教一隊選官軍精技藝者教之從其土俗用木弓木弩長槍蠻牌自十月為始日令赴教塲三八日上寨合教春秋大閲毎縣各摘數百人上府同官軍教閲徃来之費官為計日給之提刑親臨按試其藝出衆者優加犒賞遷補名目嵗冬十月給布袍一事月給食錢一千平居各𨽻本寨寨将如一寨有警諸寨㸃集應之所集人丁臨時聼部轄官節制始伯昌團結土丁或者議其無益及後教成可用居半焉黎州揀丁土義勇黎州揀丁土義勇皆淳熈間所創揀丁者係土丁之有籍者也在乾道間團結至五千一百三十有五人淳熈八年守臣龔摠被㫖措置擇其上者三千一百二十人以雄邉義勇為名分東南正西三邉千四百人使之閲習武藝守把邉面九年五月得㫖本州措置未㡬言者乞黎雅二郡土丁依利路義勇土格法措置詔三郡各選二千人留丞相為制置使乞黎州増八百人雅州増四百人奏入不許淳熈十二年二月二十六日自是係籍之丁頓减矣其始立法也上丁六百人月給錢三千五百次丁一千四百月給錢一千其上丁不及百人而請給亦不時得嘉定三年守臣何惪彦既至官乃核寔丁籍擇其少壮者千四百四十人為揀丁正西邉八百四十人東南邉六百零一人毎十人為甲十甲為隊選有物力才幹為鄉里所推者統之又取其餘四千二百九人謂之衍丁東南邉二千一百一十一人正西邉二百五十四人西邉一千六百六十四人若有邉事則揀丁任防捍之責衍丁守䕶鄉井而已土義勇者劉丞相所剏也淳熈十二年二月二十六日得㫖不加刺湼募土人為之凡二百人月給錢七引自制置司支䧏紹熈間鄱陽王聞禮為守始命湼臂如成都西義勇之法惪彦至止又増招二百人月増米三斗錢通舊為八引稍减更戍之兵而邉備亦飭矣瀘州長寜軍勝兵夷義軍瀘州長寜軍勝兵者政和末所剏而瀘叙州長寜軍夷義軍者元豐間所團結也始自大中祥符二年秋嘉眉戎瀘州都廵檢司孫正辭被命討江安夷冦以北兵不諳山川道路因㸃集鄉丁目曰白苕子弟給兵器使為鄉導事平皆錫錢罷歸皇祐元年秋始令子弟抽㸃随軍者日給粮米又令主户名下差撥子弟人數最多者權立主户充指揮使等名目以統之時三邑子弟之籍搃三千三百六十有三人而合江獨有藥箭弩手百餘人毎軍行有賴其力三年冬始立子弟賞格毎捕斬夷賊一人給錢三緡五年夏用知梓州吕士龍奏又令瀘州江安教藥弩手各百人自是三邑皆有藥弩手至和二年用轉運司錢中孚奏始令子弟同官軍把守諸邉寨五寨共八百五十人既而又慮妨其農業治平元年乃命權放一半遇有警則盡調之熈寜九年夏有知南溪縣史敏孫者言瀘州疆界濶逺地皆沃壌徃年因邉事浸多棄而不耕今淯夷已平可募人耕墾給為永業漸教武偹詔以付經制夷事熊本然未有定説也元豐二年遂命依㸃義軍法團結十九族夷人三千八百九十五人為夷義軍凡年十八以上皆刺之遇勾集把隘則日支錢米五年令戎州買馬配之始時轉運司言収到州夷人山地一萬餘曲鼻地一萬八千五百三畆除林箐外約下種七千五百四十三石合出納課租一萬六千八百九十九石乞召人租佃而瀘南沿邉安撫使王光祖恐夷人生事乞就給付投䧏夷人佃食許之元豐五年得㫖六年詔瀘南沿邉諸寨子弟㢘丁之家編入保甲教閲仍不妨子弟差使七年又團結新復羅始黨一帶夷族一萬五千六百六十人為夷義軍自是戎瀘二州夷義軍之籍至二萬六百三人嵗於農隙按試量行犒設元祐二年罷犒設政和末趙遹為轉運使既平晏夷乃言得其膏腴之地乞倣陕西弓箭手法召募瀘戎州長寜軍土夫子弟給田兵手以實邉防俾代官軍守禦奏可六年閏正月也其三月又安撫使孫羲叟奏分田以授䧏羗使與土丁雜䖏遹始度其地人給百畆可募兵三千七百有餘其餘根括並邉逃田之𨽻于官者止可贍三千刺乃奏奪邉民所市夷田以益之又奏所招凡二千七百人長寜軍樂共城各五百梅洞水盧寨政和堡各三百武寜寨板橋梅嶺石蘆堡二百其虚實不可攷也七年又調青山史君寨子弟徃錦州捍禦夷賊失利是嵗更名土丁子弟為勝兵而子弟之名廢矣宣和二年又詔聮義軍為保伍既而瀘叙諸州皆以為不便罷之淳熈八年瀘州五城寨勝兵之籍搃七百五十有四人視政和纔三之一所受水陸田舍千頃樂共城二百八十頃十政和堡二百二十五頃四博望寨一百八十一頃六畆楊賴堡一百六十頃板橋一百五十頃而水田纔四之一焉至開禧間勝兵所受之田又止為四百四十四頃而牛之係於籍者三百而羸馬之係于籍者五十而弱皆莫知其虚寔也李伯和放散忠義民兵自開禧用師淮㐮之間忠義民兵有名籍于官者甚衆合錢米計之用嵗約有六十緡而養一軍其視正軍之費無㡬矣嘉定冄和首議遣丘宗卿為江淮制置大使先已汰雄淮軍五六萬然民兵未盡去也何自然繼之次第散遣二年四月戊辰自然言本司近放散于瀘濠州忠義二萬五百八十六人各令歸業雖所費為錢三十二萬七千餘緡米六千餘石毎嵗却省錢二百十三萬餘緡米一十一萬三千餘石人人望闕謝恩歡呼而去有田之人預於江南經營牛種其無田者多入城市開張店業此乃本司幹辦公事徐剪體國任事之力望賜推賞詔剪特遷一官權知濠州事其年六月辛夘而京湖制置大使李伯和亦言昨有剏招軍之額團結忠義自休兵之後依舊支請所費廪給已經分委官属前往放散開落可許二萬六千二百一十三人詔奨諭之未㡬沿淮賊盗剽刼滋起言者乃謂此皆前日放散之人則所謂歡呼而去者殆樂而去為盗耳請罷剪攝郡追所遷官七月癸巳従之是時所在揀汰民兵既無所歸後多散而為盗伯和命毎郡擇其豪首一人授以兵官使之弹壓由是其黨帖然江淮川蜀諸司所措置皆莫之及也王徳和郭果争軍中闕額人請給徳和减馬料附四川之大軍獨武興為多耳自乾道休兵之後而将佐多闕員者計司因其闕員遂不復放行故爾請給紹興中吴武穆挺為帥而楊嗣勲總計吴挺屢以為言而嗣勲但以竢商量囬荅之及冄請則以本所乏用必更竢措畫為詞毎用一書而往返時則又閲數月之久矣乃遣其属官一員直往軍中面議之自始差至還司時又已半嵗矣乃戒司遣其官属未得報聘卒不得要領而歸耳因相持久之遂已及王徳和總賦遂移文詰難欲除其額數故郭太尉果乃言於朝徳和卒生此計而罷先是關外諸軍廪賜既薄惟馬軍中所請馬料毎石估七千而麥毎石止直四千而已軍士反資其嬴以自給故有馬養人之論徳和曰馬所食者料耳未嘗食錢也吾詎知其他耶命以正色給之由是戍卒叛去未㡬陳日華代徳和悉復其故云關外諸軍多私役闗外諸軍多為諸将私役者其間軍士有因食貧而為手技者則又有拘而使之者否則計日而責其工直以故士日益貧宋子欽之金州子欽眉山人嘉定二年以通直郎知金州遇嵗杪有軍士夜掲民居之楮鏹者蜀人遇嵗除則以紙鏹徧貼于門扉之上謂之門户錢為廂廵所縛子欽怪而問之曰某粗能抄紙本将日責抄紙若干張未嘗給其直也計無所從出故至是耳子欽憐而釋之金州惟西門一軍頗富盖其壁壘在崇崗之上家有荒田始鋤之以植菜久而知其利也則更之粟麥􅍓年既久墾植益勤遂以足食乃知屯田為大利之事耳然要在使其樂為之耳都統劾制置使擅興四川關外三大軍自宣撫司廢後得㫖聽制置莭制由紹興丁夘至于淳熈庚子凡四十有四年矣乃㑹黎邉有警胡長文為制置使乃調錦梓大軍二千合内郡禁軍為四千五百付于成延光並髙晃討之二人因輕出而敗長文又調劍閬利州大軍三千往援之吴挺為興州都統制大怒宻劾制司調兵非計乞正延光髙晃之罪長文竟罷制置使其年九月也議者謂長文措置失當誠可加罪但非吴挺所當劾者也及紹興壬子瀘卒張信作亂殺其安撫使時京仲逺帥蜀調潼川所屯御前後軍數百往討之而興元都統制復劾仲逺擅發兵樞宻院葛楚輔陳叔進胡子逺進呈得㫖令西北之兵權莭制必寄之于宣制司而朝廷事計當然今軍帥狃於陵夷反謂制司擅興用兵乃違戾至此豈不大失本意乞下戎司具析仍責令遵守舊制三屯頗嚴惮焉宗卿所謂狃于陵夷盖專指挺也諸軍陞差審擇沿革初葛楚輔在樞院奏請江上諸軍陞差總制官至准備将者自主帥觧三人赴總領官選擇一人申樞宻院事既行諸将皆不以為便慶元初有㫖自今陞差並委主帥選擇今總領或屯駐守臣審覈保明申樞宻院紹熈指揮勿行先㫖在于紹熈四年正月乙酉後㫖在于慶元三年三月之戊午也安子文一軍政金亮之求釁也楊元老乞以四川制置使王剛中或興川都統制吴璘為大帥於是除璘宣撫使命剛中移司利州同措置軍事務然軍事進止皆决於璘時亨拱手而已及開禧用兵程松為制置使吴曦為興州都統制松前執政乃命為宣撫使而曦副之松移司興元東軍三萬属焉曦進屯河池西軍六萬属焉西軍出入曦得自專松無所關與及安子文為宣撫副使欲鑒前弊進退大將如呼小兒自是都統制不得自專而軍政始一矣論者韙之建炎雜記乙集卷十七

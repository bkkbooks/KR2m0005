body:
  text: 建炎雜記乙集卷十一宋李心傳撰時事三誅曦將士共轉三十萬官資復四川將士兵轉四萬五千餘官資附誅曦功賞自王喜已下凡四百二十人有由副使建節者有由白身援員郎者又三路全軍約七萬人喝轉或三官資或五官資入隊人五官資不入隊人三官資大抵共約轉三十萬官資錫賚不計也復四川功賞自王喜李好義張林凡一萬三千六百四十六人共轉四萬五千八百九十五官資王喜河池四千六百七十人共轉二萬三千八百官資李好義西和一千一百九十四人共轉七千八十三官資惠永鳯州三千五百三十四人共轉七千一百二十六官資張林成州一千九百九十六人共轉三千三百五十二官資劉昌國階州八百三十四人共轉四千五百三十四官資以余所聞河池成州皆敵人自去鳯州則忠義人取之階州不取可得一時推恩大率如此余又嘗見李御帶好古實録入偽官人才一百三十六人而據楊通判君玉所書則君玉與楊用朋李松之徒正在長史廳伺候告捷日子申又他之則實偽官人蓋不滿百三十一人矣自諸軍喝報功賞之歲增支總領所錢物約七百八十萬緡而喝犒不與焉誅曦犒師銀帛數誅曦犒師共用金七千兩金盤盞一副金帶五條金束帶一條並宣撫司支銀六十一萬七千七百七十三兩六千一百七十五兩宣撫司支六十一萬二千五百五十五兩總領所支絹六十一萬六千九百二十四匹四千三百一十五匹宣撫司支六十一萬二千九百六匹總領所支錢八萬二百五十引三千引朝旨支七萬七千二百五十引宣撫司支金帥言李季章等四人可信張肖翁之督視江淮軍馬也遣蕭山丞方信孺往河南行省求和北帥布薩揆即十一駙馬也許納南使且禮遣之信孺既行揆復使人諭之曰已奏朝廷更得安宣撫與西元帥一書乃善托胄以書遺安觀文諭旨安公難之久之乃作書如所云且餉以藥物縑幣西帥起緘却餽而令鳯翔府路都統使完顏昱作書以來大略言當聽命于行省而已時朝廷遣三使入北一通謝二告哀三賀生辰敵亦遣迓使來已過泗州矣復却回之曰皇帝聖旨南使中惟李璧吳琚一朱致和李大性四人言語可信當遣來議事今所遣小使且還琚一隆慈之弟位至少師節度使致和嘗以右司郎中出賀庚申正旦未還道除司農少卿俄引年除直龍圖閣主管雲臺觀大性字伯和南昌人嘗為户部侍郎琚與致和時皆已死金又欲朝廷割地損禮由是不諧云李季章所知多佳士李季章參知政事以劄子薦蜀士有時望者凡十二人於朝廷乞召擢守二四人黎州楊伯昌子謨石泉張伯顧隆慶何叔堅德固瀘倅張子和鈞而點伯昌子和二人京官四人興元教授黃子駿申之遂寧人青神楊浩然洪雙流人選入四人漢州學官詹子能久中卭州人眉州學書張習之押潼川人余弟仲貫甫亦與焉餘京官人志記選後點子駿子能二人得旨皆召未行托胄敗季章謫子駿病且死三人俱不敢前制帥楊嗣勳再請于朝然後促召時伯顧以衛清淑薦仲貫甫以嗣勳薦亦有召察之命浩然後為黃伯庸所薦不得召董仁父入蜀將上習之節守于朝乞召察權監歷守長寧唐安垂除部使者告老而去年才五十四云季章所知多佳士此其選也淳熙至嘉定蜀帥薦士總記蜀帥例得薦士其始胡長文所薦如吕周輔范致能所薦如胡子遠亦不過一二人皆幕中之士蓋以蜀去天日遠士非大帥薦揚無由自進頃嵗趙溫叔初入樞府楊嗣勳為吏部侍郎李季章參知政事皆嘗特薦士三人或四人吳曦平後朝論以蜀士在朝者少又特召四人此外郡守已非常有朝迹及進士三人莫非帥臣所薦召矣初長文之守蜀也首薦吕周輔章德茂二人可用而召周輔一人其後留仲至為之遂薦黃文叔馮傳之李君亮費戒甫范文叔等五士論者翕然以為當詔召文叔傳之餘俟滿秩與升等差遣仲至執政趙子直繼之獨薦劉德修子直去京仲逺為代薦費戒甫遊子正仲鴻南充人時知仲江縣又薦劉仲洪張子良伯源仁夀人進士廷試第三人而仲洪子良皆幕客也陳子長右司損之藉縣人為華陽宰仲至意屬之而不與薦由是格不下會潼川漕趙靜之善譽亦薦張子長于朝將有命召或曰前是大帥所薦不行而今以一路監司所薦召之恐傷事體時王燕望少監奭潼川人子長同榜進士第二人為成都石室教授乃降旨併召二人若曰自以進士髙第召之非繇外薦也其後丘宗卿未及薦而罷去趙德老為帥京仲逺當國乃薦其客馮叔常履臨卭人時為崇慶府教授及李季允楊濟道濟青城人時為隆州教授凡三人德老復以所厚王齊卿已嚴道人終國子録參之皆得召去自是遂有歲薦之名矣袁起巖所薦宇文挺臣時知隆州相里公擇寅安仁人知新眉州范少才子張雙流人時知飛鳥縣令太常丞束州提刑趙全道大全潼川人時為簡州教授終太常丞知眉州張公甫興祖眉人時為普州教授陳叔達遇孫仁夀人時為潼川路提刑司檢法官凡六人朝廷不能盡召乃詔挺臣公擇俟秩滿赴行在奏事少才全道俟終更赴朝堂審察公甫叔達俟滿日特轉一官自是歲薦有不召者矣劉仲洪為人固非長者然所薦劉師文甲渤海人寓居達州今寶謨閣直學士張伯修從祖江源人新知靈泉縣終將作少監宋正仲德之晉源人嘗為太常丞今為潮北提刑李仲衍興宗洛陽人寓居酆都終國子博士四人俱時望謝用先所薦費思甫士戣廣都人時知重慶府張東甫震龍湖人時知彭州張公甫時為制置司幹辦公事扈叔誼仲榮江源人時僉書大安軍判官􅈦公事許子然沆瀘州人時為合州教授凡五人思甫乃參政戒甫之族叔誼與戒甫連姻思甫以嫌除直祕閣餘人皆召察焉程東老在蜀最無足云而所薦陳蓬孺李仲衍薛章緩龍遊人時為宣撫司幹辦公事范少約子該雙流人時自武學諭丁憂張義立方資楊人類省試第一人時為普州教授楊叔禹汝明清神人進士甲科時為成都推官皆知名東老時為先撫制置使乃盡召之楊嗣勛薦豫弟仲貫甫及程叔達趙信道希昔宗室寓居合州而又申言程東老李季章所薦不敢行者六士范少約楊叔禹張義立楊伯昌張子和詹子能於是有旨趣行蓋九人也安子文方為宣副同時薦八士章疏上會其間逢守社慶長源昌元人以上偽表為中執法所劾竄臨賀繇是報聞久之乃獨召宇文字仁聞仲雙流人今為大理司直蓋挺臣力也吳德夫為制帥薦李仲可嗣聞依政人知雅州何仲弼德彥綿竹人通判成都府度周卿正巴州人知華陽縣何從叔應龍昌元人西川僉判劉思恭靖之陽安人監成都糧料院李思行鳴鳳陽安人絳州教授何季皆類試第一人思恭德修子仲弼已選知黎州四人皆召仲可得旨與監司差遣俟命一年有餘乃除利路轉運判官周卿嘗謁朱晦翁于建陽從之彌月德修每為之延譽德夫又力薦之乃進一官曾君錫舍人論之命遂寢明年子文改除制置大使乃薦崇慶李季允幕客趙公開希濬寓居石盤嚴道楊叔正泰之青神人普州學官張益父已之遂寧人成都帥屬王才臣俊卿廬陵人凡五人季允厯官館學纍為藩帥部使者不當在歲薦之列叔正少徑直為楊嗣勳所知方吳曦亂時嗣勳與其父書有令嗣拂袖徑去真名父之子輔所以不欲與聞其去想蒙悉察之語子文得其墨本為繳進益父嘉定元年進士今尚初官同時廷試第一人前省元未召也才臣喜為詩以江西帥使者特薦得官不繇科目且非蜀士議者以為非前此章上數月乃召季允與别議差遣公開增一秩叔正益父召察才臣俟終更與升等差遣會成都提刑林與之以不應副利店事與帥臣黃伯庸異論召去乃命季允為本路提刑特免避産業云潔已字與之永嘉人祖待聘紹興給事中於是伯庸以得旨咨訪四蜀吏治亦薦士三人曰何仲弼楊浩然洪虞子詔剛簡浩然雙流人故為德修諸人客時通判潼川府子韶雍公孫屢舉進士時知永康軍朝論以一路帥未嘗有薦士者疑之伯庸移書執政援前旨為詞仲弼先已召會朝士多知子韶乃降旨浩然秩滿與升等州郡子韶令赴都堂審察自嘉定以來蜀之宣撫安撫制置三司皆得薦士亦非常制云四川大制司結局沔州自誅曦後王喜王鉞薛九齡皆以宣撫司便宜之命為都統制己巳之秋王大才始以荆鄂都統制改除入蜀大才過漢中自以嘗權招撫使不欲與大使講階墀之禮安大使不從大才憾焉先是戊辰之冬金主璟卒無子其秋季父衛王允濟立允濟嘗使韃靼不為其酋特默津所禮憤之及允濟立特默津始叛辛未之秋朝廷遣余郎中嶸北使賀所謂萬秋節者而燕京已為韃靼所逼不暇延使者余郎中至涿州而還癸酉之秋允濟為其臣赫舍哩執中所弒璟之庶兄鄷王珣代立董舍人居誼為賀生辰使至沃州而還繼而賀登位使真舍人德秀正旦使李舍人垕繼抵盱眙敵不克迓議者言金有內難議論紛然朝廷聞之以御札賜大使及大才令益謹守備毋啓邊釁有迪功郎提舉皂郊博易鋪務兼大使司簽廳何九齡者廣安鬻爵人也據結忠義人謀取秦州未發前八日金先知以檄至秦州詰問丙寅除夕九齡遂率沔州中軍統制強德等以所部夜襲秦州甲戌正月朔旦敗焉十六日壬午大才執九齡及諸將等七人斬之以其事聞于朝且檄報鳯翔都統使仍關牒川陜西路監帥司又遣人往廣安捕九齡之子世昌亦斬之會大使司奏大才為宣撫使設意傾陷今邊報不一或有緩急必致悮事二月十九日甲寅詔大才特降一官三月二日丁卯大使除同知樞密院事不日起發赴院治事新成都路安撫董侍郎君誼除四州制置使疾速前去之任知潼川府劉侍郎甲除利路安撫使時暫權制置司職事限一日起發皆未受命也會大使司遣使臣李大亨王頤往皂郊逮大才所遣秦州打話人赴興元問狀四日己巳過沔州市大才執大亨斬之縱頤歸報後二日辛未乃以悖語至大使司武功大夫福州觀察使充沔州駐劄御前諸軍都統制兼知沔州王大才今具相公不顧法令非理劄下大才事日開具下項一人謀大才與金人同謀不軌一人謀大才與金人私通書信一人謀大才於廣安軍殺何九齡之子世昌一人謀大才將兵劫掠到銀七十二錠金一百五兩已納在大才宅庫一興元都統李太尉密與大才下書虞侯孫儀言説稱相公已尉差下二千五百人要得親來沔州將大才殺害二相公日來不時差使強橫小人以追人為名前來門首厲聲叫閙呼來庭下將大才百端屑瀆靡所不言此何禮耶未有敗壞朝廷紀綱法令端自相公為始伏乞鈞照右大才照得禮樂征伐自天子出非人臣可得而專不謂相公同何九齡擅開兵端引惹邊事關係國家利害至重而又不遵宸翰約束其所賜御札詔墨未乾輒敢反亂朝廷何所不為所有何九齡已從條法誅斬了當獨相公未蒙朝廷施行如何反將忠臣義士入謀以不赦之罪公然形於紙筆以快私意天下恐無此理可見相公包藏禍心欺罔君父蔑視朝廷不恤人言略無忌憚未審相公端用幾日前來沔州作亂乞賜明文行下容大才道左祗候公參謹具申制置相公敢望鈞慈憫念朝廷勿以天自萬里以為可欺況惡業貫盈恐造物不與善後特未可保伏乞鈞照開正識眼曲賜看詳嘉定七年三月初六日八日癸酉大使得之即疏辨申朝廷且檄四路帥臣監司委究其實十一日丙子董侍郎至石首縣被制置使之命而十七日壬午大使被同知之命同日劉侍郎亦被權司之命而二十五日辛卯乃借用潼川府觀察之印交割制置司職事徑之興元四月十九日癸丑安同知發興元申乞以剗賣盤井錢三十萬緡充沿路喝犒諸軍之用不待報遂行五月十八日壬午金主珣為韃靼所迫渡河而居汴京至六月二十日癸丑同知自廣安起行順水而赴行在至八月十六日戊申安同知除觀文殿學士而知潭州二十一日癸丑安同知方行至廣德軍乃得邸報二十五日丁巳始還至于黃池鎮知被新除之命因上疏力辭優詔不允乃遣官賫結局進册赴行在蓋自丁卯二月一日值吳曦誅安公遂權宣撫使至甲戊四月十九日癸丑而制置大使司乃結罷凡共六千六百有一旬有八日云爾於是制置使還成都而未結其興元之帥臣仍依當時兩淮之舊例乃兼節制御前軍馬之事所以邊關有警稍得以與聞其政者也大才貪庸無比凶悖喪心而制置使既不得其柄乃反倚重焉大負朝廷臨遣之意矣建炎雜記乙集卷十一

body:
  text: 建炎雜記乙集卷九宋李心傳撰時事史文惠以論儲副受知史文惠初為學官以論儲副受知高皇遂諭大臣令除官職且曰此乃是一人才也後四日又兼二王府教授及阜陵封建王文惠為王上章乞扈從視師奏疏語在阜陵繼統事中髙皇知其奏出於公語大臣曰此真王府官矣未幾阜陵受禪文惠自宗正少卿不半年而拜相蓋本朝所未有也孝宗初政命相多不以次孝宗初政命相多不以次史文惠自宗正少卿再閲月而執政又五閲月而為相相四閲月而罷洪文惠自太常少卿九閲月而執政又五閲月而罷焉魏文節自宗正少卿期年而執政又九閲月而相相未一年而罷惟史公以師傳之舊去十四年而再相相八閲月而罷洪魏二公皆一補郡而退景伯閒居鄱陽凡十六年南夫閒居四明凡十二年不復再召矣張虞二丞相賜諡本末阜陵初受禪首任張魏公以經略中原禮貌之隆羣公莫及嘗書聖主得賢臣頌以賜又親書其生辰而祀之禁中每有所疑必先詣欽夫示不敢面詰其尊禮如此及符離師潰上眷頓衰免相西歸薨餘于恤典無加贈諡不講後四年公之門人陳應求入相明年春二月乃白贈公太師賜諡初議忠正既而以不可為稱乃諡忠獻焉其年虞雍公入相始以恢復自任上厚眷之獨相且二年乃乞撫西師為入關之計上親作詩送之恩禮尤盛虞公抵漢中未踰年而沒上以屢趣師期而不應甚銜之凡宣撫使飾終之典一切不用後四年門人趙溫叔入相數為上言虞某有志恢復不幸死不及事嘗為臣言吾老矣功名當以相付子勉之㑹上幸白石閲軍溫叔因奏昨日大閲十萬之軍一一少壯上曰前此虞相行揀汰之法今方見成效只如采石一事亦自奇絶明年夏月溫叔因奏事從容言允文薨已久未有以易其名者惟陛下哀矜上沉思良久曰丞相允文所薦後來皆朕自擢用溫叔曰臣東蜀一布衣未十年而待罪宰相非陛下親擢安得至此然不遇允文臣何由見陛下上曰卿可謂不背本矣今欲何如可具以進溫叔退而擬入曰虞允文采石之功未經顯賞久在相位實著勳勞可特贈太師賜諡忠肅上以筆抹久在相位實著勳勞八字又改云虞允文舊於采石有勞未曽顯録并易太師為太傅行下上嘗謂大臣朝廷降旨揮如士人作文須字字鍛鍊乃可故從前批降多經筆削云趙溫叔探賾金情乾道庚寅歲冬十月金國主遣金吾衛上將軍兵部尚書耶律子敬來賀㑹慶節起居舍人趙雄假翰林學士充館伴使丁卯引見戊辰上夀庚午花宴癸酉入辭乙亥發行在溫叔與子敬竝馬自驛中同行子敬望吳山曰好一帶山溫叔云聞燕京萬歲山極佳不減京南否謂東京子敬云與南京一般溫叔云萬歲山乃天生基址或但人力所致耶子敬云皆人作也溫叔云聞燕京宫苑壯麗子敬云極壯麗溫叔云周回有幾里子敬云只宫室自有二十餘里見在歲時亦嘗修造溫叔云盛哉子敬云內翰異時來奉使可以恣看溫叔云甚願再相見又云北邊此時想極寒子敬云寒甚不可忍溫叔云此時正宜畋獵子敬云北邊此時正是畋獵時節溫叔云大金皇帝亦嘗出獵否子敬云一年須兩三度出獵溫叔云一度出獵用幾日子敬云往往亦須旬日或二十日一月不定溫叔云頗聞北邉多名鷹獵狗子敬云此間有否溫叔云此有然亦難得極好者子敬云北邊亦自難得好者好只禁中有之溫叔又云大金皇帝有幾箇皇子子敬云多有七箇溫叔云聞說越王甚英武子敬云然勇猛可畏溫叔云越王是長否子敬云是二子敬云昨日押筵鄭樞密簽書樞密院事否溫叔云是也子敬云此間樞密使至簽書樞密院是文官是武官溫叔云舊制文武通除子敬云本朝則專用武臣溫叔云大金宰相今何姓子敬云兩人皆姓赫舍哩溫叔云又有尚書令者行宰相事否子敬云在宰相之上溫叔云大金今尚書令何姓子敬云姓李溫叔云聞是貴戚子敬云是外戚溫叔云今年幾何子敬云六十餘溫叔云大金今宰相年幾何子敬云年甚少一員五十餘一員四十餘子敬又曰內翰貴鄉只在此間否溫叔云在四川中子敬云遼遠溫叔云亦不過數千里子敬云從襄陽來否溫叔云是也子敬云川中聞說民間殷富溫叔云有富者有貧者溫叔云尚書仙鄉子敬云在北京舊日大遼所謂中京者溫叔云去燕京逺近子敬云二千餘里直向鄉北邊溫叔云去黃龍府逺近云甚近才五七百里溫叔云見說大金皇帝每歲避暑常巡幸雲中雲中是何處子敬云是西京溫叔云西京北京宫苑亦皆壯麗否子敬云皆不減南京見今諸處亦不住修蓋本朝法嚴修蓋滅裂有司得重罪舊例館客者寒暄之外勞問而已至溫叔始探賾金中事宜以奏上甚喜之傅安道不見曽覿傅自得安道忠肅公察之子也以父死事得官嘗應宏博科已上復下紹興末年秦丞相死凡告訐者皆抵罪而安道為仇人所攻坐嘗體究趙表之事除名融州安置孝宗立陳文公正獻二公連辨其枉入為尚書郎乾道九年春除直祕閣福建路轉運副使安道喜吏事工文章而性復高簡其仕於閩中也曽覿為副總管內交甚至安道時其亡也往之及為郎而覿以節鉞奉內祠安道不見也將使閩郡㑹其郡之武憲召歸安道往謁之延諸便室則覿及從官數人在焉時方置酒安道引一巵辭腹疾而退於是學士承旨王日嚴亦以入直辭諸人皆有赧色覿大不樂淳熙初上記其才召使守臨安既而中止伯夀伯成其子也孝宗趣虞丞相出師恢復虞丞相再為宣威上用李伯紀故事御正衙親酌巵酒賜之俾即殿門乘馬持節而出都人以為寵始期以某日㑹于河南既而上密詔趣師其虞公言軍需未備上浸不樂又明年上遣二介持御禮賜之戒以面付介至而虞公薨數日矣其屬官湯朝美告虞公之子公亮欲啓之其子不敢遂已莫知何所言也公亮字祖豫以父任為奉議郎直祕閣終身不出仕孝宗奬鄭自明魏元履淳熙初上用湯朝美之議召宰執侍從補外非有功不除職名三年夏朝美既斥鄭自明以學官轉對論宰執侍從不當尚功上曰朕但欲激令趨事功耳自明曰近臣以論思獻納為職安得有功可論上曰亦豈無可見者自明曰若爾臣恐自此生事欺罔結納之人却㑹得陛下職名上默然三月五日癸酉自朝美之說行近臣無敢請外者其後竟不能行但於除職時批旨略叙其勞能如升改舉詞之類淳熙末卒去之自明名鑑三山人早有聲二年秋舍選高第陳應求以其子妻之解褐為國子正明年入對上謂大臣曰鑑議論甚切直觀其所言似出於肝膽非矯僞為之者因看鑑劄子頗思魏掞之卿等知鑑為人如何大臣因將順上㫖上曰且與召試館職及對策其間言比有任宫觀人輒入國門未嘗朝見徑得州而去者有犯贓人初復官即得帥幕者上覽之以語輔臣遂各鐫罷上因問鑑議論甚切直當除何官龔實之曰故事學官召試多除正字上曰鑑策中所言或是或非大抵剴切不易得朕喜其盡言更不復問今可除校書郎賞其盡言其年七月也四年春遷著作佐郎五年春兼史院編修官其夏遷著作郎秋出知台州自明在班行號敢言然竟以是不能久居中而出及除天台未上偶散步於所居之門忽巨木仆焉壓而死士大夫甚傷悼之晦庵先生非素隱晦庵先生非素隱者也欲行道而未得其方也紹興己卯之秋高宗聞其賢已有命召蓋陳魯公初執政薦之也時同召者四人韓無咎尚書為建安宰得㫖候終更乃入而先生與徐敦立吕仁甫皆當即赴何司諫溥乃言徐吕皆部侍者宜令滿任意實欲以見沮先生因援三人例乞俟嶽祠滿日赴行在㑹劉忠肅新除御史籍溪胡先生赴祕書省正字先生以詩寄之曰先生去上藝香閣閣老新俄豸角冠忠肅嘗兼權中書舍人留取幽人卧空谷一川風月要人看又曰甕牖忩前翠竹屛晚來相對靜儀刑浮雲一任閒舒卷萬古青山只是青時三十年五月矣五峯胡先生初未識先生聞之和其詩曰幽人偏愛青山好為是青山青不老山中出雲洗太虛一洗塵埃山更好五峯又語其學者南軒張先生曰觀此章知其能有進特其言有體而無用故為是詩以針警之言先生則未之見也孝宗復召一辭而至先生之欲得君以行其道意可見矣及對垂拱殿前論講學復讎二事又論諫諍之途尚壅佞幸之勢方張民力已殫國用未節是時湯丞相方大倡和議深不樂之除武學博士待次癸未秋也乾道乙酉促就次既至而洪丞相力主和議與所論不合復請嶽祠而歸丁亥之冬陳魏公行丞相事劉忠肅在樞密乃奏除樞密院編修官待次五年魏公獨相促就職者三將行矣而聞魏元履以論曽覿事去國先生遂至未幾丁內艱六年冬胡忠簡在經筵以詩人薦與王民瞻同召先生終不起七年冬虞雍公當國復召先生以素論不同力辭者四九年春梁鄭公獨相復申前命先生又辭鄭公進呈因奏先生屢召不起宜蒙褒録執政俱稱之或奏曰熹學問該通但泥於所守差少通耳比時曽欽道參政事張說為樞長沈得之鄭仲一簽樞未知或者何人也上曰士大夫讀書當通世務然熹安貧樂道恬退可特改宣教郎主管台州崇道觀其年五月也先生又四辭迄淳熙元年六月而後受一年夏龔莊敏以首參行丞相上諭欲奬用廉退以勵風俗莊敏以先生名進上曰記得其人屢辭官此人所共知今可與除一官於是除祕書郎其年六月戊申也先生復再辭且遺莊敏手書其言專及一時權幸書未達而羣小已先乘間讒謗矣俄內批付莊敏以虛名之士恐壞朝廷翌日莊敏論奏再三上默然由是先生迄不拜命五年春史魏復相首務進賢以先生屢召不赴也必欲起至始議除中都官趙衛公時為參知政事謂史公言不若以外郡處之待之出於至誠彼自無詞然其出必多言姑安以待之可也乃除之南康軍見次史公必欲先生之出又降㫖不許辭免便道之官俟終更入奏事仍命南趣遣牙吏史公既勉先生以君臣之義又俾館職吕伯恭作書勸之先生再辭不許乃上是時年四十有九矣七年夏先生應詔上封事上未察怒甚曰是以我為妄也趙丞相詭辭救解上從之始上素疾虛名之士惡言清濁流本非先生也而小人因是為讒上每與大臣言之輒動容變色丞相因從容言於上曰欺世盜名陛下惡之是也雖然上疾之愈甚則下譽之愈衆以天子之貴而切切焉反與之角若惟恐不能勝者無乃適所以高之乎不若因其長而用之彼漸當事任則能否自露繆僞自乖虛名敗矣何仰勞聖慮若擯而不用則徒令以不遇藉口耳上以為然八年夏乃除先生提舉江西常平茶鹽公事待四年關趙丞相之口辨能回人主多此類也未行以救荒功例加直祕閣浙東大饑移使浙東辭職名不許請奏事許之十月庚午對延和殿復論近習權勢日重致陛下德業日壞紀綱日隳言極苦切上不以為忤也㑹先生劾台守不法王丞相庇之章十上始罷而去除先生江西提刑又易江東又例以救荒功權直徽猷閣江西乃填台守之闕江東則墳墓在焉時九年秋以先生引嫌求免未報吏部鄭尚書丙與台守善有以道學詆先生監察御史賈因論近日搢紳有所謂道學者大率假其名以濟其為願考察其人擯斥勿用蓋附時宰意專指先生也先有旨以先生纍乞奉祠差主管台州崇道觀時十年春以十四年復除江西提刑待次先生辭不許十五年夏王丞相罷周益公獨相趣先生入奉事先生見上力陳天理人欲之辨因論便嬖側媚之徒深被腹心之寄柔邪庸繆之輩久竊廊廟之權皆天理未見人欲未盡之故上欣納曰久不見卿浙東之事朕自知之今當處卿以清要不復勞卿州縣時六月壬申也翌日癸酉除兵部郎官先生方以足疾辭而省吏以印至先生不受適本部林侍郎栗前數日與先生論易不合退慚其徒因劾先生欺慢且言竊程張之緒餘浮誕之宗主謂之道學治世所當禁絶乞賜停罷先生聞之亦丐免丙子進呈上曰林栗似過當益公曰熹上殿之日足疾未瘳勉强登對上曰亦見其跛曳仍令依舊職名江西提刑仍令吏部將改官後不曽磨勘日月一併給還時距大禮才數十日上欲先生遷朝郎以祿其子也博士葉正則聞之首上疏與林辨胡文靖時為侍御史因論林執拗不通喜同好異無事而指學者為黨此最人之所惡聞者乃出林知泉州其年七月己未也先生亦再辭新命八月甲子朔招除直寶文閣主管西京嵩山崇福宫俄再召入再辭十五年十二月壬午除主管太乙宫兼崇政殿說書蓋上禪意已決欲留遺嗣君也先生未聞命時已上封事言輔翼太子選任大臣振舉綱維變化風俗愛養民力修明軍政六事而首之以天下之本在人主之心蓋自上躬以至于儲嗣宰輔守令將帥宦官宫妾凡所當言無不傾盡自敵已下受之有不能堪者孝宗曽不恤也十六年春正月甲寅除祕閣修撰復奉祠先生再辭職名光宗褒許除知漳州亦再辭而後受期年以子喪求去復除修撰奉祠未數月除湖南轉運副使三年除知靜江府皆不赴四年趙忠定在樞府除知潭州再辭不許五年春始之鎮上即位之翌日以其官召辭除煥章閣待制侍講又三辭不許則乞以修撰充說書上親劄不許然其在講筵亦才十五日也既罷之二日除寶文閣待制知江陵府辭至再仍舊謝提舉南京鴻慶宫先生建議廟議不合乞追還待制者再詔次對之職除授已久與廟議初不相關又以擅議山陵乞免帶舊職者一詔答以無罪可待繼又乞致仕者再答以辭職謝事非朕優賢之意皆不許最後言昨者職名止許暫受權帶以為入侍之階申省之詞極為詳備今已罷講官不當復帶侍從職名朝廷不能奪許免待制仍舊祕閣修撰宫觀慶元元年十二月丙子中書傅舍人伯夀行詞大遜如慢小遜如僞等語既而先生又申乞討論疏封錫服封贈蔭補磨勘選宫等事併行改正監察沈御史繼祖遂劾先生不忠不孝不仁不義不公等十罪二年十二月落職罷祠四年十二月引年告老許之六年三月甲子先生殁于考亭年七十一嘉泰二年除華文閣待制嘉定元年賜諡曰文繼又贈寶文閣直學士先生殁十餘年行狀未有屬筆者若其嘉言善行則海隅出日士人盡已知之今特取史官所書諸家所記先生難進易退之大節㑹萃於此後有學者因得以求先生之志焉孫嵓老樊允南恬退孫松夀字嵓老郫縣人力學登紹興五年進士第歷官州縣至乾道初猶未改秩剛方廉潔不求人知環堵蕭然衣食僅給淡如也居官決事多用經術嘗守漢嘉甚有惠愛淳熙三年除利州路轉運判官嵓老時年六十六即引疾乞致仕朝廷不許嵓老與江源樊漢廣允南嘗知青神縣寬大長者兼有能名乾道九年除知雅州候吏及門即日挂冠不赴時年才五十六也范致能入蜀引上皇慶夀節并薦于朝有旨召赴行在允南仍落致仕二人固辭不起蜀人高之何耕道夫所謂賦賢哉二大夫詩者是也趙溫叔時在樞府因為上言嵓老之賢四年五月詔得轉一官賜三品服依舊宫官嵓老復告老許之允南尋卒趙子直入蜀復奏嵓老挂官勇退已二十年內行素飭終始不渝乞賜褒表以勵風俗詔除直祕閣紹興二年二月庚申也嵓老素清約晚而彌壯然亦喜從釋氏游日拜佛以百數未嘗少倦年九十餘乃卒蜀人號為牧齊先生季后王仲信其子壻也史文惠薦十五人史文惠自經筵將告歸於小官中薦江浙之士十五人有旨並令赴都堂審察與內外升擢差遣一時選也所薦乃薛象先鄞縣簿楊敬叔新紹興司户陸子靜新崇安簿石應之新無為軍教授陳益之新寧國府教授葉正則新鄂州推官袁和叔新江陰尉趙靜之添差常州通判張子智前撫州教授後皆擢用之其不至通顯者六人而已趙善譽察州風采蜀中潼遂二郡例以執政侍從要官為守由是禮部與節度使者鈞敵淳熙末除察院詡以朝議大夫直徽猷閣守遂寧詡蒲城人號徐鐵面踐揚雖久乃乏廉聲部使者以其嘗為御史憚之㑹善譽自大理寺丞出為小漕初入境過遂寧徐攜具出城迎勞典謁吏白當下馬善譽不從抑俾循如别郡之禮徐大慚沮郡人聞之爭投牒訟其過趙劾諸朝王丞相與徐厚格其章趙聞之復以章徑聞且叙前章不達之故上問大臣季海曰善譽年少察州風采方振詡老成前輩不能曲意奉承是以有此臣等方議所以處之未敢遽奏非有他也上曰然則當奈何季海曰監司舉按故當少選之欲移詡南方一郡上曰善遂移知泉州溫陵大藩與浦城接壤富厚甲於東南實遷之也往歲朱晦菴在浙東劾台守唐使友與正章數上王相即從與正江西提刑正與此類丁未成都火淳熙丁未夏五月成都大火所燔七千家府有棊盤市俗言孔明八陳營也居民櫛比一燎無遺時趙子直為帥守盡出公錢貸民而豫其貧者未數月自錦江而北繩引棊市巷陌一新洞達疏明無復向來之舊矣火之始作也子直奏所焚千八百家章德茂為吏部侍郎言於上曰蜀人有以書抵朝士者云火作自某所至某所延燒幾萬家災亦甚矣事出不測於政何傷忠實如汝愚不盡數以聞何也上乃命子直將的實被火人户數目賑濟錢米開具以聞先是府城之東有千金堰溉民田十七萬畝編竹籠石歲事修築役十一萬六千餘夫率用民錢二萬三千緡有其米三千斛士人李良仲時知叙州論其勞費欲易以石子直以為然乃議官出錢十萬緡米三萬石以給其役而俾民分五歲輸之或謂作堤捍水水決堤潰則十萬緡皆為虛費矣前人之智非不及此也子直鋭為之㑹上以旱故避殿減膳命侍從臺諫兩省卿監郎官館職陳闕政十月丙午七日萬元亨為司農少卿應詔上言成都之火於守臣何害聞蜀帥乃欲撤百年之堰以從一已之規模民情易搖當以靜和好作為者可得而持哉當以厚化善惡太明則無所措矣輔臣奏事次上出文字一紙示之乃録元亨封事中所云也上又曰章森說成都火災甚大又云事出偶爾於政何傷凡文字意要相應不當如此乃命子直審度經久利便及其因依費用錢物聞奏於是詔下十日矣後五日陳子榮大諫入對併論二事以為汝愚所奏與臣僚所論言燒數目大段不侔汝愚於先後之間必不敢自為同異假使巧為之辭以塞詔旨則又重欺罔之罪而况撤堰築堤之役既出汝愚亦必妄以興利為言孰肯究思後害以自沮其言二者使其自行開具士論不敢以為然望詔本路監司從實體究以聞被火之家則必取見的實築堤之役則必指陳利害盡公體國毋得徇情庶幾逺方事機無所壅蔽子榮素不樂善類者也故因事改之上方眷子直然重違子榮翊日有旨令監司同趙汝愚從實開具奏聞七月二十一日辛酉是時梁卿總為小漕吳卿宗旦提㸃刑獄吳趙與余皆世舊他日余偶過吳卿所治密以奏意問之吳卿曰火事未免為之回互苐云所燔主户近二千而僦居之家則以萬計易堰為堤乃李宗丞諫議劉祕書從而和之決不可耳劉德循時義為添差催官子直聞之殊不懌奏上㑹子榮以憂去是年九月事遂已子直因力求去上自塘遞封還奏牘批其尾云遺火修堰事朕已察其浮言卿宜安職以寬顧憂時張德象守漢嘉為政苛急宜之與之連姻㑹德象除轉運判官子直奏其罪坐鐫免宜之以不按刺併罷十五年十月十五及子直得政元亨年六十餘即告老遂守本官致仕未幾子直得罪宜之自龍舒召為右史再遷刑部侍郎直學士院德象自祠官中起為監察御史纍遷吏部尚書元亨以何自然之言起為江東副漕使召還為工部侍郎蓋自成都以來未嘗有此火也子直在蜀中有威風得大體然書事貴直見柴與之作子直行狀具言火事頗枝梧失實故備其本末俾後有考云與之行狀云兩司迫於臺臣風㫖各躬履衢陌視之迄如公奏蓋二司回互云爾非其實也行狀又有云上曰近撲沙坑火半日僅焚二百餘家不可比成都四晝夜焚萬餘户此必王渥所為蓋汝愚近嘗言其受老馬事不實以史考之此年六月二十日寶五山失火撲沙坑又臣寮有云延燒雖未得實數然無連七百家則成都之火亦不在二百家矣所謂延燒萬家乃章德茂封事德茂漢州人得其實何况王渥之渾言也私家文字惟據支吾如此建炎雜記乙集卷九

body:
  text: 建炎雜記乙集卷十宋李心傳撰時事二趙子直丘宗卿楊嗣勛不欲吳氏世襲虞丞相既没朝廷復命吳挺為興州御前諸軍都統制兼知興州充利西安撫使凡十九年矣紹興五年夏卒於軍於是楊嗣勛總領財賦先事白朝廷乞擇重臣鎮蜀乃以丘宗卿為制置使宗卿未入蜀而聞挺病甚恐其軍五六萬人緩急無所屬乃見大臣籌之故事帥臣闕以轉運使權至是楊虞仲少逸為利漕宗卿欲重其事乃乞令嗣勲往興州攝帥上許焉以為朝臣出使非制閫所當令不欲行而宗卿以聖㫖移文嗣勛重傷其意即請少逸權州事而已遥領安撫使未㡬即以印送少逸就權人以為得體先是吳之季歳聞外郡盗賊縱橫皆縱而不治少逸至未久遂捕其尤者悉誅之邊人悉服挺之死也光宗已屬疾不之信趙子直在樞院用丘楊之議更遣張昭代之人服其遠識利帥東西分合利路自建炎置帥或在益昌或在漢中未嘗分東西也紹興十四年鄭亨仲為宣撫副使時吳武順璘在興州楊襄毅政在興元郭恭毅浩在漢陽欲令三帥一體乃奏分利州為東西兩路東路至興元西路至興州而浩兼金房開達安撫使遥制䕫路及京西三郡乾道初金州并属東路而守臣但兼管内安撫司元年夏武順改判興元朝廷以其遥制西路軍馬為不便乃權合東西為一路以吳為安撫司而東帥王權改知洋州兼管内安撫司公事吳薨不改淳熙元年吳武穆為興州統帥李叔永守興州㑹湯朝美乞分利州東西及金襄荆廬楊為七路各置文武二司叔永方申明間而朝美得罪事遂寢五年復分利州為兩路以挺帥西路兼知興州紹興五年夏挺卒張昭代之復合為一路而昭但兼知興州過興元章徳茂侍郎為帥議損其禮昭知之即聲言已辭免兼郡不復入衘遂抗禮分庭而去蓋趙子直丘宗卿共議本以削武興之勢而論者或以為關外四郡既属興元戎司不能令緩急恐失事機㑹詔遣閒卒出境而知西和州王季明繫之趙資政徳老為制帥奏罷季明慶元二年秋復分東西兩路六年秋郭杲代為帥嘉泰四年秋吳曦繼之開禧中北伐又以曦兼四川宣撫副司比曦之反凡所出偽命皆以宣撫司號令行之由是川蜀一切禀承無敢異者故知子直宗卿削武興之權其慮甚逺猶得祖宗遺意如徳老所見特淺耳趙徳老説郭果定䇿趙子直初議定策遣中郎將范仲壬吿殿帥郭果仲壬初以時事艱難吿之不應又以忠義動之又不應仲壬不得已屛人起立具以西府意達之又不應仲壬乃還子直知不可遂請趙徳老尚書往見果論指徳老謂果曰彦逾與樞密第能謀之耳太尉為國虎臣此事專在太尉果未及言徳老變色責之曰太尉所慮者百口之家耳彦逾盡誠以相吿而太尉了不見答即鹵府有問何以復之邪子明徐曰致意樞密領鈞旨事然後定其後策勲首拜子明節度使徳老有怨言乃亦除端明殿學士金字牌雌黃青字牌黑漆紅字牌近歳郵置之最速者莫若金字牌逓凡赦書及軍機要功則用之仍自内侍省遣撥自行在至成都率十八日而至蓋日行四百餘里乾道末有旨令樞密院置軍期急速文字牌雌黃青字日行三百五十里八年十月十三日指揮淳熙二年尚書省又置𦂳急文字牌亦如之然率與常逓混淆故行移稽緩紹興末趙子直作樞院乃改作黒漆紅字牌奏委逐路提舉官催督歳終較其遲速最甚以議賞罰四年十月二日指揮明年尚書省亦踵行之仍命逐州通判俱出入界日時狀申省五年五月二十三日指揮久之稽緩復如故余在成都見制帥楊端明有命召以丁卯歳十一月二十九日降旨而戊辰正月末旬方被受是日行纔百餘里耳紹興末丘宗卿為蜀帥始剏擺鋪以健歩四十人為歳増給錢八千餘緡月以初三十八兩遣平安報至行在率一日而達蜀去朝廷逺始時四川事朝廷多不盡知自剏擺逓以來蜀中動搖靡所不聞凡宗卿劾疏中所言皆擺逓之報也自後私書叢委每逓至百數由是往來稍踰期自成都而東猶不過月自行在而西或三十五六日云嘉泰開邊事始嘉泰三年冬敵中盜起増戍積糧又焚襄陽蓋懼朝廷乗其隙也朝廷聞其事即起張肖翁參政帥淮東程東老樞密帥淮西蓋以肖翁楊州人東老池州人欲使䕶郷井也又起丘宗卿侍郎守四明以防海道起辛㓜安大卿帥浙東時武帥鄭挺在襄陽邊釁開懼不能任力求去乃召還行在既又轉一官知婺州於是文臣無肯行者遂以李燮為荆鄂副都統制兼知襄陽燮與其兄弟爽言世將家皆為戎帥時東老父喪未免力辭改命廣帥薛象先侍郎而象先不行留提舉佑神樂遂命宇文挺臣侍郎代之辟置參機皆非常制又徙㓜安以次對守京口起趙徳老資政守四明山許深甫知院守金陵深甫不欲行乃命宗卿以直學士院代典論其開邊蓋自此始李季章論邱宗卿不當罷督府丘宗卿之罷江淮督視也命由中出執政不知之李季章在都堂争之侂胄不納季章曰凡舉大事未論行事之是非先觀人心之向背丘宗卿有人望奈何去之侂胄變色曰方今天下只有一丘宗卿因拂衣而起葉正則不肯草出師詔韓侂胄將舉兵先以葉正則直學士院蓋欲藉其名使草出師詔也正則喻其意堅辭至三四不受於是用李璧草之葉正則云正則既辭又欲命魯鴻父漸以少蓬權直院鴻父亦辭遂止董鎮言楊侍郎未肯通情武興之亂時人記錄者有新舊安西樓記安觀文自撰靖蜀編宣撫司准備差遣胡酋仲編耆定録長沙板行不得姓名海濵漁父記聞漁父板行楊巨源自叙書上劉閣學者楊巨源事迹益昌士人撰楊巨源𫝊武臣季珙𫝊李好義誅曦本末李好古自記復四州本末李好古自記實入偽官人數李好古自記李好義行狀白子申撰平蜀實録楊君玉撰新沔見聞録不得姓字切齒録土人任光旦編固陵録李直院季凡編毛氏寓録茶馬司幹辦公事毛方平撰公議榜成都府學士人撰佚罰録朝奉郎趙公庀𫝊而士大夫之在新沔者又或有日録辨汙等書最後西陲泰定録乃盡採而輯之取舍是非一從公論其本末亦粗備矣然必見於簡牘者然後登載故雖時人所傳其事甚播者有未之及焉曦之遺諸貴人書也楊尚書獨深止之曦不悦再與費資政書畧云成都侍郎獨不相察使曦不從權濟難就其和議北人深入何以為記相公可為問之葢費公所荅曦書其詞猶婉而楊公之書其語甚切故也余在田里見四路行移獨成都安撫一司不去開禧之號時二月初矣十六州六十縣各大墨榜一印榜凡六十其後董鎮誅啟篋成都得遺議書稿有云楊侍郎未肯通情云安觀文誅曦勢順淳熙末安觀文為文州漕官有薦於吳挺者檄兼𨽻西安撫司僉㕔時彭人蘇熙之為安撫司幹辦公事以文墨自許視傍人如無也挺之館客有李姓者挺子旰之外姻也德夀宫慶典李為之草表以賀表文中有揚命二字既行矣熙之一日挾尚書以進謂挺曰導揚末命此顧命中語奈何用之挺大驚追之不及由是李與旰皆恨之未㡬趙德老来蜀總計舊例西帥遣屬官一員徃迓則計使舉以京秩熙之既為旰李所憾乃共薦安公代之德老見之甚喜他日従容謂曰太尉統衆六萬得毋例有虚籍者乎安公不敢盡言則曰某所若干某所若干以實論之可五萬三四千人耳居數月德老以書来曰太尉忠誠如此盍若損六千人之虛籍寛四川之重賦不亦可乎挺得書謂人曰趙少卿入蜀尚初至安得知吾虚實此必安公告之耳乃大怒旰李共為解遂己未㡬安秩滿入都因為請代挺記其前事欲拒之旰李乃言曰使其果有是勢當自疑今調此官以来可諒其無他也安公為人警敏凡事盡力挺更喜之為之延譽於諸司改秩而去及曦為殿帥安通判知隆慶府又遷知大安軍比軍興首辟隨軍轉運旋以救荒有績復遷一官為朝奉大夫逮其稱王即除丞相長史都省事俄楊李之議合安公遂決䇿誅之葢居之不疑之地操可致之資其勢順也天之佑宋夫豈偶然哉蜀士立功立節次第武興之變立功者安觀文為之主楊巨源李好義倡率忠義次之李貴手斬逆賊又次之若李好古安癸仲楊君玉季申辰張林朱邦寧之徒協謀舉事又其次也立節者陳待制咸為之首史次秦塗其目避偽次之大安軍軍學教授李國柱傅興宗棄郡而去又次之若王釜總領所主管文字李道𫝊蓬州州學教授皆不受逆曦之招又其次也楊泰之羅江縣丞鄧性善犍為縣尉程遇孫知丹稜縣安之源龍㳺縣令文俱眉州司户叅軍宋子欽金州都統司計議官劉端友總領所措置糴買劉翊之興道縣丞劉靖之監成都府粮料院楊汝明成都府觀察推官張方普州州學教授宋大酉昭化縣主簿楊修年簡州州學教授梁梓修州司理㕘軍詹久中漢州州學教授晁子儀知綿竹縣錢元儒眉州司法叅軍龎坤載台山縣尉張權監德陽縣商税鄧諫従新知懷安軍袁柱新知隆州楊鼎年知萬州改差制置司叅議官李莊知梁山軍改差知雅州程公説前卭州州學教授避偽去官又其次也以上立節之士共三十人文俱以上五人係致仕者張權以上十四人係見在去官袁柱以上二人係不赴新任李莊以上二人係不候人替程公説係不到部死節者一人權大安軍楊震仲始終不奉偽命者一人成都帥臣楊端明也其餘拒偽命歸朝如劉侍郎甲李校書皇稱疾不視事如李侍郎寅仲等尚多有之時曦以季凡持異議諭偽帥禄祁令殺之㑹其已去乃得免建炎雜記乙集卷十

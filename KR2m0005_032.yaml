body:
  text: 建炎雜記乙集卷十二宋李心傳撰故事親筆與御筆内批不同本朝御筆御製皆非必人主親御翰墨也祖宗時禁中處分事付外者謂之内批崇觀後謂之御筆其後或以内夫人代之近世所謂御寳批者或上批或内省夫人代批皆用御寳又有所謂親筆者則上親書押字不必用寳至於御製文字亦或命近臣視草焉神宗祭狄青文中丞滕達道所作也張寔録語以為親製髙宗追廢王安石配享詔舍人胡明中所作也張侍講跋此詔所謂荆舒禍本可不懲乎謂誤為親製也孝宗撰夀皇聖政錄序祕監陳君舉所作也此文今見致和堂止齋集中但人不知爾選人不十年入相陳勉之丙辰年自南昌丞除太學錄癸亥春拜右祕閣修撰不十年入相本朝所有獨范覺民與勉之而已覺民六年勉之八年將相四十以下建節者將相四十以下建節者李君錫顯忠年三十岳鵬舉飛三十二楊正甫存中三十五張魏公浚三十六吳寳臣總三十七吳唐卿璘三十八吳晉卿玠三十九韓世忠良臣及吳曦皆年四十使相以上封國例故事使相以上封國公者先小國經恩陞次國又經恩陞大國孝宗初政張忠獻以特進國公拜少傅江淮宣撫使封魏國公官爵皆進二等蓋殊命也近歳史丞相以勅局進書恩自永國經恩封魯國公亦異數中興異姓七王中興異姓七王自張俊始先是韓世忠以咸安郡王奉朝請其没也追封通義郡王而已久之俊死有司奏如前例上謂其有和敵功與世忠相去萬萬遂特封循王乾道初楊存中死追封蘄春郡王其家意不滿又封和王明年吳璘死以為熟例追封信王世忠之子彦古令統制官張青訟其父功乞追贈孝宗觀之陳宰相應求曰張俊楊存中已封王則於世忠似有不足前此失於無人建請若聖意行之亦足以勸有功而厲將士遂封蘄王紹興初吴拱為騎帥始訢父玠有保蜀功而爵不稱乃封涪王開禧用兵韓侂胄欲風厲諸將因劉光世之孫伯震有請封光世鄜王既而又封岳鵬舉為鄂王中興諸將止是畢為王矣后家封王者祖宗以來后家封王者自元豐間曹氏始時官制初行曹濟陽自中書令改開府儀同三司神宗以為慊於志故以異姓王易之也其後髙氏不得封向氏二王宗回宗良鄭氏一王紳至中興後后家得封者吳氏二王孟氏韋氏郭氏韓氏楊氏一王然曹向韋郭皆以元舅鄭以后父封獨孟信安以弟外兄韓平以中宫贈其祖皆異禮也近楊永以后凡得封亦異數也中興以來后家建節者自建隆以來母后中宫之建節者極少如杜審進曹佾皆晩歳始得之宣仁垂簾十年高公繪止為承宣使符觀後乃有向宗回兄弟鄭紳父子中興七十年后家建節者凡二十有二人吳氏七人益蓋琚瓌珽璹珵韓氏四人侂胄邈同郷韋氏四人淵謙讜邢氏李氏各二人邢煥孝楊孝友孝純孝孟氏鄭氏郭氏夏氏謝氏楊氏各一人忠厚藻師禹執忠淵次山建炎迄嘉定中臺司不至兩地者十一人建炎至嘉定除御史中丞凡四十人自顏夷仲至今章達之率皆柄用之其中間不過兩地者十有一人而已然或以久病辛炳姚愈或以論事失措蔣世珍謝國昌或與宰輔不合王賔周秘常同廖剛或以吿訐勾龍行父或以敗事鄧伯凡皆因有故而去其以常伯善罷者惟羅龍學汝檝一人若詹端明大方者雖以工部尚書出臺而旋入宻府云近臣舉察官事始紹興癸丑右相朱藏一以内艱去位高宗手禮賜學士沈必先綦處原以三院御史阿附時宰令二人共舉察官於是以李元叔長民應詔元叔嘗為校書令奉祠去久之通判漳州遂召還為監察御史而曽任鄭三御史皆罷此中興後近臣舉察官之始也御史臺彈奏格御史臺彈奏格舊無有淳熙初柴叔瓌瑾為殿中侍御史奏言本臺覺察彈劾事件前後累降指揮經今歳久名件數多文辭繁冗又有止存事目别無可考恐奉行致有牴牾乞下勅令所逐一刪修成法各隨事宜以六察所掌分門别類檄申朝廷取㫖降下本臺遵守仍令刑部鏤板頒降中外單虁時以户部侍郎兼勅局詳定被㫖編冩成冊送臺審覆㑹謝廓然新除殿中侍御史與其寮審覆凡三百五條選奏乞以彈奏格為名行下從之四年七月丙午也紹熙元年二月劉徳修為御史又摘其有關於中外臣竂握兵將帥后戚内侍與夫禮樂訛雜譏諷及奢僣之事各凡有二十餘條以奏上乞付下報行令知謹恪上從之任子賜出身祖宗以來兩制二史必以進士登科人為之其後有以才選者例賜進士出身雖徐司川吕君人亦然重科目也乾道初王嘉叟秬為左司員外郎㑹右史胡元質長文在吿上命嘉叟權右史仍攝西掖執政言嘉叟無出身上曰時暫無傷也其後韓無咎元吉為左司郎中而舍人林景度機出迓北客上復命無咎無咎以門䕃入仕辭不許時王能甫之奇為兵部侍郎張南軒為左司員外郎繼除侍講亦不賜出身用吕元明吳傳正例也已而有為上言南軒譏能甫不學不當在講筵者上怒南軒俄以事去未㡬蘇季真嶠除左史遂復賜出身余謂得人如無咎欽夫豈復當以任子登科為間雖不必守祖宗之舊可也是時有右文林郎王天覺者知真符縣代還以聚斂擊刺之術因左右以見其所獻之書有云人才可用不必限有無資格出身如擢王炎炎誠可用不必賜出身賜出身則猶有所拘也其迎合類此既而改京秩除樞密院編修官兼檢討文字俄為副端徐彥才所論遂逐去議者快之言官詞臣論宗室入館人數本朝宗室入館者五人自乾道五年趙忠定始其後趙從道侍郎趙大本舍人皆嘗為之開禧末趙汝談除正字言者論列以謂中興後宗室入館者纔二人汝愚以大魁彦中以詞科然後得之而不及從道蓋失於考詳也從道名師訓安定郡王令盪孫紹興甲戌嵗登科乾道壬辰冬始以近臣薦召為太常寺主簿明年夏除秘書郎未兩月遷起居舍人其冬權工部侍郎甲午秋引疾丐祠除敷文閣待制履歴如此言路乃不知何也嘉定之初趙履常崇憲入館蔡行之當制亦云中興後宗室入館者凡三人又誤矣學士舍人當兄弟除官制不應避紹興初王剛中為中書舍人其弟居修除太常丞引嫌乞改命官草制自是為例余嘗以故事考之學士舍人當弟兄除官制皆不應避錢惟演使相麻其從兄希白所草也曽子宣右僕射麻其弟子開所行也若謂一時宣鎻亶為異數則元豐官制初行子開除吏部郎中子固時為中書舍人行詞亦不避考南豐類藁而可見也不知引避起自何時館職不入局故事楊禊子寛和王存中長子也其父久掌殿巖既補以京秩紹興二十四年又奏乞令與其弟倓子靖並特赴殿試高宗勉從之蓋是年秦塤為省舉頭故效之也二十七年正月禊除少蓬士論甚駭既供職館閣之士不入局者三日時唐立夫為秘書郎黃通老王時亨為著作佐郎季元衡陳文仲為校書郎胡周伯張安國林少穎汪明逺葉伯益為正字大抵多名人也胡廷聞之亟徙禊宗正少卿而以劉文孺代之物論乃息禊後遷工部侍郎倓淳熙中執政檢騐格目檢騐格目者淳熙初鄭興裔所創也始時檢騐之法甚備其後郡縣玩弛或不即委官或所委官不即至即至亦不親視甚則以不堪檢覆吿由是吏姦得肆寃不明獄訟滋熾興裔為浙西提㸃刑獄乃創為格目排立字號分界属縣遇有吿殺之人者即以格目三本付所委官凡吿人及所委官属行吏姓名受狀承牒及到騐所時日廨舍去檢所近遠傷損痕數命致因由所知悉書填之一申所属州縣一付被害之家一申本司又言於朝乞下刑部鏤板頒之諸路提刑司准此從之遂著為令元年五月十七日也興裔之先平陽人後徙開封曽祖紳以后父貴宣和末為太師平樂郡王諡禧靖祖冀寧海軍節度使諡榮恭世父藻事高宗久在上閣再為大使官至師相封榮國公諡端靖興裔初名興宗早以后澤入官乾道中為江東兵馬鈐轄嘗論建康都統及馬軍行司擇帥未善孝宗韙之復武臣提刑擢使閩部移浙東又移浙西再使金因避金諱改賜今名淳熙初除樞密院副都承㫖在職十年歴知廬揚明州皆有政蹟慶元五年吿老轉武泰軍節度使致仕卒諡忠肅子挺嘗以黄州團練使歴帥淮㐮兩道損抗皆有位於朝而損登進士甲科蓋世族中所未有宣相詔使稱謂不典元樞呼樞使自張浚始諸州倅呼府判自陸寘始皆見於㑹要日厯舊制密院官亦止以樞密為稱紹興中張浚為使其親吏以俊父名密請於朝有㫖呼樞使自是為例宣和中陸寘以宦者王通薦通守四明避其名更稱府判紹興初始稱稍行於浙路今遂為天下通稱不可易矣宣撫使呼宣相自童貫始近安子文為四川宣撫副使得㫖恩數視執政士大夫鄙俗者亦稱宣相蓋務為崇重而不考其始焉近歳召客以例呼為詔使余在成都見錢伯同丞相與制帥楊端明手書亦然按朱忠靖閒居錄宣和間大閹李彦按行京西始呼詔使蓋唐敕使之稱今以稱士大夫誤矣莫粹中轉官最速近歳轉官最速者莫舍人粹中子純慶元二年進士是歳七月補承事郎而嘉泰三年陞官已為中大夫出身凡七考共轉十六官通為五十八年磨勘其間限員之數日月不與焉若子任細轉則為七十年磨勘是歳明堂請任子吏部以庶官入仕未及十五年此格不下蓋宣和間此法嘗立者自中興以來未有之也陳勉之以慶元二年六月改官至開禧三年遷特進實歴十二考共轉二十四官自其後執政無序遷法姑以待積年之勞計凡用一百二十四年磨勘亦宰輔中所未有若子任細轉則為一百三十五年宰職贈官例故事從征亡殁皆贈四官執政五官樞密使六官宰相七官若特進以上一官而已嘉泰末周益公以少傅贈太師蓋異數也嘉定以後錢伯同樓大防宇文挺臣張肖翁之徒皆例贈公少傅過乎厚矣費戒甫嘗為執政官至諫議大夫乃止以銀青光禄大夫吿第實贈四官是又少殺矣按祖宗之時而贈䘏之典多出特㫖不專用例蓋考其勲徳之大小而分隆殺焉此勸懲之意也奉常畢大事例遷儀曹朱時敏師古眉山人也淳熙末為太常少卿王季海喜其謹厚欲用為從官而不敢薦二年半不遷數請外季海留之其妻樂安郡夫人任氏賢婦人也以為不可師古力求去一日方坐寅清堂有老吏密言曰徳夀宫服藥可知之否師古顰蹙曰知之奈何吏曰少卿奚去之果師古不語既而得小寵知潼川府尤延之代為少卿視事一日而宣遺詔祔廟四日除禮部侍郎師古乃悟余因考紹興七年吳正仲二十九年宋斐皆以大䘮禮畢除儀曹貳卿老吏習知之故以微言留師古耳刺史以上無階級法太祖階級法諸禁軍將校有帶遥郡者許以客禮見自餘一階一級全歸伏事之義時橫行諸使尚未有遥郡之名此文指禁軍指揮使帶防團刺史者耳近歳李伯和尚書為京湖制置使管軍節度使王喜橫挺下拜於庭下僣也余嘗記王公明以元樞為四川宣撫使都統制初叅謁拜副階上典謁吏賛相公答拜次統制官拜庭下亦如之次立椅子前受統領官拜正將以下乃坐受焉余謂統制官以上官至正任刺史者當以客禮見管軍則合開寳五年之制矣從官典藩於制司不用申狀謝用光自工部尚書論罷久之以大中大夫知虁州移興元府時劉仲洪為蜀帥故事嘗任侍從官於制置司申狀止書檢不繫銜用光至興元始用申狀吏以閻才元故事白不從嘉泰二年用光就除制帥趙全叔以華文閣待制代之吏以申狀呈全叔曰我從官也何乃爾吏以用光近例全叔不樂於是楊嗣勲以敷文閣直學士知潼川府何同叔自前禮部侍郎起為虁路安撫使全叔即檄二公詢之二公皆不報全叔不得已遂復用申狀焉從官書檢不繫銜紹興十九年旨也諸路倚郭二縣數諸路州府治二縣者凡十有二東京開封府治開封祥符行在臨安府治錢塘仁和京兆府治長安萬年成都府治成都華陽平江府治吳長洲建康府治上元江寧紹興府治山陰㑹稽隆興府治南康新建福州治閩侯官廣州治南海番禺湖州治烏程歸安雅州治歸信京城建炎雜記乙集卷十二

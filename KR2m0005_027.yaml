body:
  text: 建炎雜記乙集卷七宋李心傳撰朝事二淳熙改元本用純字乾道癸已歳冬至日上祀南郊肆赦改明年元為純熙既宣制矣後六日甲辰中書門下省言若合淳化雍熙言之當用淳熙字庶㡬仰體主上取法祖宗之意從之是時先人在虞雍公宣威幕府勅制初下衆未有言先人語雍公曰以周頌考之時純熙矣是用大介此武王克商事也豈今日所當用宜密以奏雍公從之奏未達聞而朝廷已更之矣夀皇命從官議擇監司郡守淳熙初孝宗嘗賜侍從官手詔曰凡監司郡守欲盡加精選但恐才能應選者少而資格合人者多如此則又有淹滯之嘆二者當如何卿等可議定來上趙溫叔為禮部尚書兼給事中與同列上議請擇第二任知縣以上有課績者許其作郡其初任通判以上許其作監司第二任通判以上許其作職司庶㡬資格稍寛人法並用其或資任雖高才能無取者自依近制或卑錄或處以叅議通判自無淹滯之嘆侍從臺諫兩省皆天子之職擢以自助者若令於知縣資序以上歳薦堪充郡守者若干人於通判資序以上序薦堪充監司者若干人仍用漢朝雜舉之制明言有何政績有何才術或共為一奏或各為之三省詳加察焉有闕則以次除授否則置之縱未盡善焉蓋亦十得六七矣或有請托容私仍望檢照前後薦舉條令嚴為之法詔令侍從臺諫兩省官叅照資序差格不以内外雜舉監司郡守各五人保舉官及五員以上列銜共奏明言所舉人有何政績才術堪任何等監司帥府大小州郡差遣聽上下半年奏舉中書省置籍三省更加考察㫖初進呈上曰薦舉本欲得人又恐干求請托即長奔競之風龔實之等奏天下事未有無弊雖三代良法久亦不免於弊今陛下既欲精選監司郡守非薦舉何由知之上曰若令雜舉則須衆論僉允庶㡬近公况又經中書考察而後除授亦足以見朕於人材博采遴選如此非茍然也遂降是命三年四月戊寅降㫖然自溫叔為侍從以至兼政前後六年亦卒不能行其言云史文㑹以直諫去隆興初龍大淵除樞密都承㫖劉汝一為諫長累疏論其漏禁中語上不樂汝一以此罷諫議大夫又罷工部侍郎又罷建寧府又罷祠而史丞相適以與張魏公和戰之議不同力請免相然當時之論以為避大淵權勢而去也故王元龜既為諫長為上言史浩以龍大淵避權引去大淵之勢遂昂葢史公為相纔百餘日耳汝一之罷建寧也實自内批出給舍黃通老馬徳駿封還錄黃上大怒再批劉度黨附欺罔可依已降放罷指揮施行時二年春矣後二十餘日通老亦坐繳駮修吉等賜田指揮放罷自是史公不召者凡十三年及淳熙再相適樞密承旨王抃建議以殿歩二司軍多虛籍請各募三千人充之已而殿前司輒捕市人城中騷動號呼滿道被掠者多斬指以示不可用軍人怙衆因奪民財史公聞知即飛奏釋所捕而執軍民之讙呶者送詔獄上聞有旨目下詔降奉軍節度使殿前都指揮使王友直為武寧軍承宣使而命抃暫權殿前司公事五年十月二十五日乙卯也獄既上有旨皆從軍法施行時十一月七日丙寅矣史公見上曰此未得其平當原其情而别其輕重上曰如之何則可史公曰諸軍掠人奪貨以至於鬨則始釁者軍人也固當以軍法從事若市人陸慶童特與之抗鬬耳可同罰乎且民有常刑惡可一律行軍法哉必不得已流之可也上大怒不可史公曰陛下惟懼軍人怨咨故欲一其罪以安之夫民不得其平其言亦不畏等死死國可乎是豈軍人語上愈怒曰然則比朕於秦二世也執政皆失色流汗史公復進曰自古民怨其上者多矣時日曷喪予及汝皆亡豈惟秦時為然上拂袖而入趙溫叔時為参知政事退奏疏曰招軍一事區處獨斷輕重緩急無不得宜推此以往恢復不足辦也臣不勝心誠悦服之至然適聞聖諭推軍人之最重者明正典刑固當如此然不知以何者為重乎若以拖拽為重則彼曰本為國家招軍也必將有詞臣聞昨有軍人入保正家傷人掠財縱火焚薪又逼亂其婦女宜推其尤者肆諸市朝則以刼掠得罪誰敢不從至於百姓之凌踐軍人者亦不可不兼行為政不可偏適聞聖論詳矣奏入上甚悦乃詔陸慶童本非被拖拽人輙用柴棒助謝六三敺打軍人扇皷百姓陸慶童與軍人秦忠楊忠並令大理寺依軍法施行其餘作閙軍人令殿前司斟酌輕重從軍制施行見禁百姓竝日下疎放謝六三令臨安府從杖罪斷遣王友直再降㝠州觀察使信州居住先是史公以衰病免且面薦溫叔自代上慰留之時六月二十四日也九月史公復請候過㑹慶節去位是月十九日上留溫叔面諭之已呼溫叔為丞相矣比陸慶童斷㫖下乃上章稱疾求罷八日丁卯以後洋街趙密故第賜史公是日神勇軍統制官孫安祖策選鋒權統制官牛遇馬軍統領官常丙以下至正副准備將三十一人追停降罷有差而工部侍郎廉知臨安府趙磻老以失於彈壓又不能収捕首先聚衆作閙之人亦放罷後三日送饒州居住史公既押入不肯視印溫叔偕執政王秀海錢師魏就其閣見之史公逡巡不肯居住位溫叔乃入奏乞遣中使到堂宣諭史公堅求去十五日甲戌拜少傅節度使復以京祠兼侍讀後三日溫叔乃越次拜右相云葉正則論林黃中襲為學道之目以廢正人淳熙十五年六月丙子三省進呈兵部侍郎林栗奏臣伏見已降指揮朱熹除兵部郎官日下供職而熹乃敢自陳私計非便只欲回就江西提刑已受省劄不復赴部供職四司郎官􅈦印記不肯収受推出門外令長送貳㕔長緣貳㕔不合管郎官㕔印記且再令送還仍加鐫諭既能出入宫門上殿奏事并偏詣宰執臺諫即乗轎入部供職良不為難兼官司印記難以棄擲在外慮有遺失其朱熹堅執不從臣為貳卿不能率屬致其偃蹇拒違君命實負慚懼所有印記無所歸著不免令四司人吏抱守終夕至於達旦熹本無學術徒竊張載程頤之緒餘以為浮誕宗主謂之道學妄自推尊所至輙攜門生十數人習為春秋戰國之態妄希孔孟歴聘之風繩以治世之法則亂臣之首所宜禁絶也蓋熹邀索高價妄意要津傲睨累日不肯供職其作偽有不可掩者陛下愛惜名器久次當遷郎官者只令兼權其視郎選亦不輕矣而熹乃輕之兵部郎官本係與宗正計衡兼權以熹之故移計衡於都官而以兵部處熹所以待熹亦不薄矣而乃薄之臣竊惟職制者朝廷之紀綱熹既除兵部在臣合有統攝乞將熹新舊任指揮竝且停罷先是朱文公既除兵部郎官以脚疾發動申尚書省乞假痊安日供職故林有是劾及進呈上謂其過當而大臣畏林之强莫敢深論太常博士葉適獨上封事辨之大畧以為考栗之辭始未參驗無一實者至於其中謂之道學一語則無實最甚蓋自昔小人殘害良善率有指名或以為好名或以為立異或以為植黨近忽創為道學之目鄭丙唱之陳賈和之居要路者密相付授見士大夫有稍務潔修粗能操守輙以道學之名歸之始如喫菜是魔景跡犯敗之類往日王淮表裏臺諫陰廢正人蓋用此術栗為侍從就其寡淺無以達陛下之徳意志慮孚信於下而更襲陳賈鄭丙密相付授之説以道學為罪文致語言逐去一熹固未甚害苐恐自此遊辭無實讒口橫生善良受禍無所不有伏願陛下正紀綱之所在絶欺罔於既形摧抑暴橫以扶善類奮發剛斷以慰公言國家之本孰大於此於是胡侍御晋臣乃劾林罷之林為人清介而性褊忿乾道中為太常少卿六年正月五日以北使來賀正旦當宴紫宸殿㑹左相陳正獻公之從兄為浮屠者死前一日訃至陳公以狀申尚書省乞依條式假又入劄子乞免赴大宴御筆批依繼而右相虞雍公為陳公言先太師之喪僧兄既以浮屠氏之教絶服矣今反為之報又欲廢朝廷大明㑹之禮其可乎若情所不免只可於私家易服致祭不作歌樂少間不免奏取聖裁及進呈畢虞公且奏上乃諭陳公令赴宴而林與陳公有連不以為是宴罷之夕遂以書責陳公失禮陳公即引疾在吿上奏待罪虞公亦上奏劾林詭正沽名乞明寘典刑以為不靖者之戒乃除直寳文閣知湖州建炎雜記乙集卷七

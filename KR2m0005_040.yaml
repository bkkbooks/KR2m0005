body:
  text: 建炎雜記乙集卷二十宋李心傳撰邉關事西夏扣關西夏十六傳本末夏國者其先拓跋氏也有思恭者唐僖宗時為夏州偏將後以兵破黃巢功賜姓李氏拜夏州節度使思恭死弟思諫代後梁時思諌死軍中立其子彛昌為留後因而命之彛昌後見殺軍中推其族父仁福為莭度使封朔方王唐明宗時仁福死彛超立明宗遣人伐之圍之百餘日不克乃復以為莭度使彛超死弟彛與立國初遣使入貢太祖厚待之特以為定難軍莭度使封西平王傳子光睿孫繼筠繼捧太宗太平興國中繼捧與其部族不咸表獻夏綏銀宥四州之地其弟繼遷不從居銀州以叛七年夏朝廷不能討乃用趙中令計復以繼捧為莭度使賜姓名趙保忠端拱元年夏繼遷為銀州觀察使賜姓名趙保吉淳化二年秋既而二人合謀以叛遂命將俘保忠以歸淳化五年春繼遷尋進陷靈州真宗初立以陕西困弊之久赦繼遷罪至道五年將繼遷除定難軍莭度使繼遷死子德明立遂封德明西平王嵗賜茶絹銀共六萬斤匹兩是年十一月冬夏人之勢自此始盛仁宗寶元初德明之子元昊取西凉七州之地僣號稱帝寶元元年冬陕西沿邉屢覆大將朝廷卒用韓魏公范文正公計冊元昊為夏國主增嵗賜茶絹二十五萬慶厯四年冬元昊死子諒祚秉常秉之子乾順繼立蓋前後叛服不常而神宗始用師于西方厯哲宗徽宗遂漸奪其橫山之地傍取熙河湟鄯以制之西夏既衰而關陕亦困矣比金人渝盟乾順首與之合裂取陕西沿邉諸城寨靖康元年冬及金歸關河地而乾順遣招撫使王樞至寨下李世輔執之獻紹興九年五月二十七日李世甫至鳳翔即顯忠也乾順俄死六月三日其子仁者立朝廷命樞密行府與之通書六月四日省關也樓仲輝時以簽書樞密院事出使謂宜用且縱樞還使未須遣設今秋出沒决可支吾七月十七日奏詔從其請七月二十七日指揮而羌人悖慢至欲與朝廷為兄弟國九年三月其後吳璘為宣撫使進兵取三路遣間詰之凡六七往終不報已而與金人合奪我㑹州紹興三十三年久之虞丞相撫蜀與其權臣任德敬結約甚密王公明冉使遂以䗶書遺德敬約以夾攻㑹德敬伏誅羌人得而土之范致能出疆金人因以責我乾道六年其反覆不可信如此初金人既併遼地乾順事之甚謹金人踵遼人故事冊為夏國王嵗時入貢逮今百年矣嘉定二年夏人始為韃靼所攻遣使求援金主允濟新立不能救韃靼至興元而返夏人恨之金人亦為韃靼所擾勢益衰夏國遂叛改元光定時辛未春矣光定之四年其左樞密使吐蕃路都招討使萬慶義勇者令蕃僧减波把波賫䗶書二丸至西和州之岩昌寨欲與本朝合從而為犄角以恢復故疆蕃兵總管傅翊得而上之時嘉定七年七月也董仁父初入蜀不之報由是敵訊中絶韃靼欵塞䝉國本末韃靼之先與女真同種蓋皆靺鞨之後也其國在元魏齊周之時稱物吉至隋靺鞨也在長安東北六千里東瀕海離為數十部部有黑水白山等名白山本臣髙麗唐滅髙麗其遺人迸入渤海惟黑水完疆及渤海盛靺鞨皆役屬之後為奚契丹所攻部族分散其居混同江之上者曰女真混同江即鴨緑水也乃黑水遺種也其居隂山者自號為韃靼唐末五代常通中國太祖太宗朝各冉入貢皆取道靈武而來及繼遷叛命遂絶不通因為契丹所服役神宗嘗欲自青唐假道以招之然卒不能達也韃靼之人皆鹵裂善戰其近漢地者謂之熟韃靼尚能種秋穄以平底瓦釡煮而食之其逺者謂之生韃靼止以射獵為生無器甲矢用骨鏃而已蓋以地不産鐡故也契丹雖通其和市而鐡禁甚嚴及金人得河東廢夾賜錢執劉豫又廢鐡錢由是秦晋鐡錢皆歸韃靼得之遂大作軍器而國以益强方金人盛時韃靼嵗時入貢金人置東北招討使以統𨽻之魏王既立韃靼特默津始叛自稱成吉思皇帝山東河西皆為所踐而不能有也嘉定七年正月九日甲戌夜三鼓濠州鍾離縣北岸吳圍鋪有三騎度淮而南水陸巡檢梁實問所由三人者出文書一囊絹畫地圗一册云韃靼王子成吉思遣來納地請兵翌日守臣知之遣效用統領李興等以本州不奉朝㫖不敢受諭遣之又翌日遇諸廟壇遂即以木筏送之而去先是有楊安兒者李全之婦翁也見金人政亂起兵叛之踐蹂山後數郡依山負海時出時入韃靼既圍燕京不能下乃分兵狥山東地諸盜往往應之韃兵至濟南遣三十七騎護三人者而來又以三百兵送之過邳州奪舟渡河而西既為所却路絶不得歸匿虹縣之白虎湖中後三日縣遣人捕送泗州或謂三人者其一則韃靼通事其一則所虜金人莫州同知其一則漢兒也因此遣邉吏查執後有似此者即驅而去之違者從軍法且上其事於朝時特默津者實已彊大然但居其故地乃在於燕雲置行省而命其大臣薩木哈領之所謂大帥國王者也其大將曰哈布爾又有䝉古國者在于女真之東北唐謂之䝉古部金人謂之䝉古也亦謂之萌骨人不啖火食夜中䏻視物以鮫魚皮為甲可以捍流矢自紹興初始叛都元帥宗弼用兵連年宗弼即烏珠所謂四太子者卒不能討但分兵據守其要害乃反厚賂之其酋亦僣稱祖元皇帝至金亮之時與韃靼並為邉患其來亦久矣䝉人既侵金國得其漢兒婦女而妻妾之自是生子不全類䝉人而漸有火食至是韃靼乃自號大䝉古國其邉吏因以䝉韃稱之然二夷居止以東西為界兩方相望凡數千里不知何以合為一名也蓋金國盛時置東北招討司以捍禦䝉古髙麗西南招討司以統𨽻韃靼西夏乃䝉古所據蓋武竒邁創之業有二十七團寨而韃靼之境東接臨潢府西與夏國為鄰南拒靜州北抵大人國無城池屋宇可居但為氊帳擇便利水草而即居焉不知耕織製皮為裘以牛羊為糧食人皆狡獪堅忍嗜殺不知嵗月以草青一度為一嵗亦無文字每調發軍馬即結草為約如使人傳達急於星火或破木為契上刻數劃各將其半遇發軍以木契合同為驗所謂生韃靼也又有白黑之别今特默津乃黑韃靼也而與白韃靼皆臣屬於金人每嵗其王自至金界貢賦之場親進奏金人亦量行答賜不使入其境也金主璟之明昌元年庚戌本朝紹熙元年白韃靼王者乃攝叔之弟殺其兄而自稱王其攝叔之子白波斯方二嵗金人取歸其國養于黑水千户家泰和七年丁卯本朝開禧三年春攝叔至環州進貢金乘其無備醉而殺之復立白波斯為王遂遣還國始白波斯在黑水千户家見其女悅之至是欲娶之為妻璟不從白波斯怨怒叛歸黑韃靼以此黑韃靼益强漸併諸侯之地遂起兵攻河西諸路不數年而河西州郡悉為所破又虜夏國之僞公主而去夏人反臣事之大安三年春辛未本朝嘉定四年韃靼王特默津入貢金主允濟將襲之事覺其秋韃靼始叛崇慶二年春癸酉本朝嘉定六年遂犯燕京其秋允濟殺死此以上之事詳見女真南徙事中韃靼王特默津留大酋薩木哈圍守燕京自將所降楊伯遇劉伯林漢軍四十六都統同韃靼大軍分為二路攻取河北河東及山東諸州郡伯遇者蔚州吏伯寧者集寧縣射士也是時中原之兵皆遷往各處山後一帶防禦無兵可守悉遷鄉民為兵在土城守禦韃靼盡驅其家屬來攻父子兄弟往往遙相呼認由是人無固志所至郡邑皆一鼓而下自貞祐元年冬貞祐元年即崇慶之二年至寧之元年也十一月至二年春正月凡破九十餘郡所破無不殘滅兩河山東數千里人民殺戮者幾盡所有金帛子女牛羊馬畜皆席卷而去其焚燬屋廬而城郭亦丘墟矣惟是大名真定青鄆邳海沃順通州有兵堅守未能即破二月復還燕京韃靼糧乏燕京軍民餓死十四五而金主珣遣人議和特默津欲得其公主及護駕將軍十人細軍百人從公主童男女各五百綵繡衣三千件御馬三千匹其金銀珠玊等甚衆又請左丞相完顔福興為質珣乃遣人來選女時公主見在七人惟允濟少女小姐姐最秀遂以豫之又令珣鄉其國遙拜珣不敢拒又以薩木哈圍燕京之久未嘗鹵掠欲得犒軍金帛珣亦從之韃靼遂歸居庸關在燕京之北一百一十里路狹隘守兵數萬欲俟韃兵歸而擊之其完顔福興在軍中傳金主命已與韃靼議和不許擅出兵於是無敢動者韃靼過關取所虜山東兩河少壯男女數十萬皆殺之遂引歸其年三月也五月金主珣遷都汴京韃人聞之怒曰既和而遷是有疑心而不釋憾特以講和為疑我之計耳秋八月復引兵攻中原州縣冬燕京之糾軍叛與韃靼共圍燕京三年春乙亥本朝嘉定八年東平之援兵五萬直至長安次遇韃軍不戰而潰大名之兵八萬至固安亦潰散惟真定之兵四萬合保涿援兵一萬而至施風寨乃與韃兵戰凡二百戰糧絶而敗自是內外不通其五月燕京破山東羣盜大起楊安兒者本淄州之皮匠也金主璟太和間殺人亡命為盜於太行有衆千餘璟招降之貸死流于上京及韃靼入冦金人命為副統軍令招必勝軍三千人以迎敵軍大敗而竄往山東聚衆金人討之安兒與其徒數人入海為舟師所殺又有郝人者名儀以貞祐二年春甲戌本朝嘉定七年據山東叛僣號大齊改元順天金人遣花帽軍生擒之而磔於開封市又有劉二姐者亦名盜也其女劉小姐亦聚衆數萬人皆為花帽軍所破秋韃兵自從河東渡河而攻潼關不䏻下乃由嵩山小路趨汝州如遇山澗輒以鐡搶相鎖連接為橋以渡之于是潼關失守金主乃急招花帽軍於山東至十月韃兵忽至杏花營而距汴京止隔二十里花帽軍擊敗之至韃兵復取潼關自三門武津乘河氷合布灰引兵而渡自是不復出矣金主乃命平章政事胥鼎為大帥專守關隘然陕西諸州間亦有為所破者惟有燕南雄霸數州乃是三關舊地唐樂深沮韃兵不䏻入金將張甫張進二人據信安軍以守之北距燕山百八十里又有遼東宣撫使蕭萬奴者本遼東人乘女真之亂自立為帝據遼東七路欲引兵併燕代晋魏而有之韃人雖強不能破也然韃人貪婪初無逺略既破兩河赤地千里人煙斷絶燕京宫室雄麗為古今之冠韃人見之驚畏不敢仰視既而斥為亂兵所焚火延月餘不滅其所積貨財初無所用至以銀為馬槽金為酒甕大者重數千兩其俗鄙陋無君臣之别薩木哈所居至用金飾龍牀足踏金杌子奢僣如此而徴督不已燕人患之金主珣南遷之後纍遣使詣韃中求和雖未聽從而賂遺不絶特默津憐其意欲許之而薩木哈耻於無功堅持不可特默津謂曰譬如圍場中獐鹿吾已取之矣獨餘一死汝纍年不能取盍遂捨之薩木哈不從遣人諭金主曰汝欲議和可去帝號稱臣當封汝為王而金國之羣臣亦不從有言於珣願以死雪國耻者珣亦為之感憤也逺事不可盡知姑志其略特默津北人書來以為特默津薩木哈山東人或以為名摩㬋羅以為名合謀理未知孰是又云韃靼所遣渡淮三人其一乃河北張三深士人也建炎雜記乙集卷二十

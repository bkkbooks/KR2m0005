body:
  text: 建炎雜記甲集卷十八宋李心傳撰兵馬三衛廢復國朝舊制殿前侍衛馬步三衛禁旅合十餘萬人宣和間僅存三萬而已京城之破多死於敵建炎元年秋其騎帥郭仲荀自以敵逼京城糧儲告竭遂率餘兵赴行在其冬上將航海避敵而衛士張寶等不肯行因吕元直入朝率仲荀出語不遜上怒誅十七人於明州申時行門外盡廢其班明年春土至台州兵衛寡弱惟中間統制官辛永宗有衆數千而吕元直之新軍將姚端衆獨盛上皆優遇之四月上還會稽乃選中軍五百人入直殿嚴悉烏合之衆時趙元鎮初秉政因為上言祖宗於兵政最為留意今諸將合兵總衆不𨽻三衛則兵政已壞獨衛兵髣佛舊制亦掃蕩不存是因咽而廢食也上悟尋復舊制然衛兵不滿三千識者病其單弱數以為言紹興二年秋詔三衛措置而已上謂輔臣曰一衛士所給可贍三四兵朕命楊沂中治神武中軍此皆宿衛兵也遂命沂中兼提舉宿衛親兵五年冬廢神武中軍𨽻殿前司以沂中主管殿前司公事十二月庚子又以都督府兵分𨽻三衛是月庚子七年夏復合馬司餘軍及八字軍為六軍十二將命信叔主之四月丙申而解承宣潛典步軍如故自是三衛始復八字軍八字軍者河北土人也建炎初王觀察彥為河北制置使聚兵太行山皆涅其面曰誓殺金敵不負趙王故號八字軍二年冬十月癸亥上命御營統制范瓊往山東擊金瓊謂彥與俱已而彥以疾留其州瓊遂並將其兵而去三年秋七月丁亥瓊誅復以其兵還彥時彥乃御前統制也後十三日張忠獻以宣撫處置使發行在上命彥將八字軍隨之公至蜀以彥守金州紹興三年春薩里罕入冦彥兵大敗遂走逹州四年移鎮襄陽府六年五月己卯召為行營前護副軍都統制以部八字軍萬人赴行在時解承宣潛典馬軍司事與彥不叶兩軍之士交鬭於道衢中外洶洶七年正月張忠獻獨相乃為胡丞公給事言兩罷之而以劉信叔領軍司事併王解兩軍屬之十年春二年癸丑以信叔東京留守將八字軍而行其年六月大敗烏珠於順昌十一年三月復還姑孰七月信叔罷為京南帥其衆復還臨安今侍衛馬軍皆其子孫乎御前諸軍御前諸軍者本髙宗所收諸將部曲也祖宗內外諸軍惟廂禁二色而已禁軍皆𨽻三衛而更戍於外廂軍者所在有之以守臣節制若禁軍在邉上則文臣為經略使者統之武臣但為總管熙寧間內外禁旅合五十九萬人神宗將有事於四夷乃置三百大將其法甚備崇觀後朝廷取其闕額之數以上供故闕而不補者幾年軍興以來所存無幾上在元帥府始招潰卒郡盜以為五軍後又得王淵楊惟忠等河北之兵建炎元年五月以為御營五軍然猶未大盛也三年四月又更置御前五軍而劉光世所領西軍則謂之巡衛軍在五軍之外是嵗又改為神武五軍紹興元年十二月又改為行營四護軍張浚稱前軍韓世忠稱後軍嶽飛稱左軍劉光世稱右軍併楊沂中中軍右殿前所司吳玠軍如故七年八月光世軍叛降於齊於是川陜軍更以護軍為號十一年四月三宣撫司罷乃改為部曲稱其州駐劄御前諸軍十八年川陜軍亦如之其軍皆不𨽻三衛由是御前軍又在禁軍之外矣御前軍者雖帥臣不可得自逹於朝廷禁兵但令供厮役習為故常廂軍將官雖存而無職事但以為武臣差遣而已愚謂不若併禁軍於廂籍而改御前軍為禁軍所在以帥臣節制之而都統官為之副庶幾兵權出於一而緩急皆可以責成如此則合祖宗制兵之意矣三衛創軍本末三衛諸軍殿前司則本辛永宗中軍部曲而益以他軍也其馬軍司本王彥之部曲而益以解潛劉錡田晟之軍也其步軍司本顔漸部曲而益以他軍也自紹興五年至七年規模始定然其馬步二司不能敵殿司之半故楊存中權勢獨盛乾道七年春虞中肅為丞相騎軍屯於建康以為出師之漸號馬行司識者不以為然然上下重遷訖不能正也紹興內外大軍數紹興初內外大軍凡十九萬四千餘而川陜不與宿衛神武右軍中軍七萬二千八百張浚將左軍楊沂中中軍江東劉光世淮東韓世忠江襄嶽飛湖南王􅊛四軍共十二萬一千六百是年冬併神武中軍𨽻殿前司而右軍如故五年春王􅊛罷遂以其軍一萬五千𨽻韓世忠七年秋劉光世之兵降偽齊其將王德以所部八千人歸張浚由是三衛之外但有韓張嶽三軍今鎮江大軍韓氏部曲也建康大軍張氏部曲也鄂州大軍嶽氏部曲也惟荆南江池皆紹興末新創荆南則劉信叔所招效用而頗以鄂軍益之江池軍則三衛之疲弱者而江州一軍又雜以江西茶盜近嵗皇甫固為帥始訓齊之故東南惟以潤升鄂三軍為根本乾道內外大軍數乾道三年江上四川大軍數額總四十一萬八千人殿前司七萬三千人乾道元年七月十三日降旨馬軍司三萬乾道二年正月二十六日詔以二萬八千人為額六年正月十五日李舜舉乞增二千人從之步軍司二萬一千人乾道二年正月二十六日降旨建康都統司五萬人池州都統司一萬二千人并乾道二年二月二日因淮東總領楊倓申請降旨鎮江府都統司四萬七千人乾道二年十月十一日降旨江州都統司一萬人乾道四年十月十四日苖定乞排置軍將之額楚州武鋒軍一萬一千乾道九年四月十五日因節約陳乞招填降旨平江府許浦七千人乾道二年十月十三日降旨鄂州都統司四萬九千人乾道二年十月九日降旨後又增至五萬九千人荆南都統司二萬人乾道二年十一月四日降旨興州都統司六萬人興元都統司一萬七千人金州都統司一萬一千人并乾道三年正月二十四日降旨其後諸軍增損不常大都不過減四十餘萬合錢糧衣賜約二百緡可養一兵是歲費錢已八千萬緡宜民力之困矣淳熙甲辰周益公在樞院以荆鄂二帥勢均力敵首尾觀望乃合為一司鄂為正荆為副焉關外軍馬錢數興州興元府金州三都統司兵本曲端吳玠關師古之徒關西部曲也端死師古繼叛其部曲皆玠所有王庶劉子羽繼在興元招召流散粗成軍伍子羽罷玠并將之其後盧立之為宣撫副尚有兵三萬立之死亦為玠所并合是三者為兵共七萬人玠死胡丞公命其弟璘以二萬人守興州楊政以二萬人守興元郭浩以八千人守興州而玠之中部選鋒二萬人分屯仙人關內外其後璘又得之故三大將之兵惟興州偏重者此也自休兵後三大將之兵就糧七十郡興成皆鳯文龍利閬金洋綿房西和州太安軍興元隆慶潼州府至乾道末有名籍凡九萬七千三百三十八人馬一萬三千一百四十二匹都統制至準備將共二百八十人歲用錢一千七十八萬七千一百四十二緡通糴糧為緡凡二千三百八十五萬有奇帛羅絹綾紬布六十一萬八千七百七十匹糧一百五十八萬七千六百七十三斛八斗料二十五萬一千一百四十斛此淳熙中數四川廂禁民兵數成都飛山軍威將強兵四川廂軍二萬九百七十二人禁軍二萬七千九百九十二人土兵一千八百三十六人已上係官軍義士二萬六百五十二人興元府興洋州太安軍保勝軍忠勝軍忠勇軍階成西和鳯弓箭手西和階良家子共六千三百九十九人已上係民兵保甲五萬五千一百七十人關外四州凡民優恤之制忠勝軍免家業錢一百五十千至二百千止一家雙名則更免五十千忠勇軍則階州免家業馬軍二百三十千步軍一百七十千成州免稅賦馬軍二頃半步軍二頃西和鳯州皆租馬軍六石九斗八升步軍五石六斗六升其更戍則月給糧人七斗有半惟忠勇軍更戌保勝軍亦免家業自千至五五千弓箭手則給官田馬軍二頃半步軍二頃此其大較也大率西蜀大軍廂禁軍民兵保甲總二十三萬三百六十四人仰給縣官者十四萬餘人此乾道之籍也淳熙以後土丁亦有仰給者别出於後成都禁軍謂飛仙軍驕懦最甚紹興末王時亨為制師取會四川禁軍之籍二萬九千餘人除利夔兩路禁軍分戌沿邊城塞外東西路一萬九千人內揀到五千五百七十三人謂之威強將兵時吳璘步兵遂調此四千人往仙人關捍禦三十二年秋也事平復罷利路義士忠義士人梁洋義士者紹興初王敏節庶為興元帥以富平之役兵卒單弱乃籍興元諸縣良家子弟號曰義士縣令為軍正而尉副之守臣提舉每丁免家業三百緡合梁洋太安三郡至萬三千餘人軍勢大振紹興二十一年洋守宋萃者建炎義士所免家業皆軍在不充義士之家科役偏重秦檜方守和議罷之二十八年大將姚仲奏復行於梁洋太安巴蓬五郡得二萬一千餘人三十一年散關之戰驅之使在官軍之前其人勇健善戰亦屢有功明年改彥功原姚仲攻鞏州皆擁正軍被重甲以自衛獨驅義士衣楮先登為敵人所拒殱焉僅存六千餘人乾道元年宣撫使吳璘以巴蓬義士怯弱除其籍言者以義士勞役明年併梁洋太安三郡罷之大將王權乞存留不聽三年虞忠肅為宣撫使復籍三郡之丁得二萬九千九百餘人結成隊伍因參酌陜西弓箭手之舊為義士専法一百四十二條來上詔頒行之其制今存然邊民之勇悍者或無常産又自名為忠義人多以販鹽為生嘯聚邉境勢出義士之上乾道七年夏王能甫為吏部侍郎乞量加優恤然後嚴行禁止事雖不在宣撫司然無益也今忠義人關外四州為尤盛之奇奏以七年四月十二日丙寅下興元良家子興元府良家子者紹興四年吳玠為宣撫副使時所創也其始招兩河關陜流寓及陳亡兵將子弟驍勇雄健不能自存者為之月給衣糧比強弓手五十人為一隊帥臣郭浩揚改為並以備中軍使喚休兵後其數浸微乾道六年王能甫為帥始復招之凡人材及五尺二寸弓力九斗通百將傳將條練弓馬者乃選有官人著司月給米麥各一石帥司緡錢十五千為官人緡錢減三之一依義士専法𨽻安撫司御前統兵官不得預能甫罷去王公明以宣撫使治興元以為良家子舊屬帳前抽還宣撫使淳熙初宣撫使廢復歸安撫司其籍可二百人嵗費錢二萬四千緡米麥四千八百石而實無所用但為安撫司執手旗從物而已安撫使財賦急迫乃奏於都統司中分清酒務之息以贍之然酒息錢實備他用又私置鹽店六所及收諸浸渡併鹽稅紹熙末楊嗣勳申嚴鹽法奏言本府自有義士廂禁軍良家子無所損益乞罷鹽店而以良家子𨽻都統司從之五年二月八日庚子降旨紹興末虞并甫為川陜宣諭使又嘗於襄陽招來汝蔡唐鄧之人為御前忠義效用二十二年三月十六日壬子降旨得二千八百餘人吳璘為四川宣撫司以德順連官軍寡弱又取御筆於關外四州乃以主客抽丁每户有三丁以上取一五丁以上取兩並刺充御前中軍敢勇三十二年十一月十三日乙巳施行令下人皆驚擾會有詔棄德順遂罷之二事亦蜀中民兵雖不成軍姑附於此荆鄂義勇民兵京西湖北義勇義士荆鄂義勇民兵者紹興末所創也金亮冦江淮之日詔淮漢等郡籍民為兵時修撰賈觱守荆南乃請籍民為義勇其法取於主戶之雙丁十户為甲五甲為團甲團皆有長又擇邑豪為總首嵗當農隙教以武事而官給其糧至乾道間舉七縣之籍主客佃户凡四萬二千餘户計十萬餘丁除當差役人外得義勇八千四百十九人王公明為帥奏言調集團教之際使之自備食用如不能辦乞截留本府苖米四萬石漕司應副錢二萬緡乃從都統司假甲三千弓矢旗幟官為造給從之時有四年矣六年春帥臣劉供甫又條上京西湖北兩路兵民事乞為義勇者並免科役及身丁四等户仍免充保正長五等户及免三分稅役每七十五人為一隊遇教閲日以營兵屯田之榖食之以供其費奏可仍以甲萬副豫之三千副四川宣撫撥到二千副已支京西五千副令戰州都統司朝廷發下舊甲五千副於遇戰日應副淳熙初張欽夫為帥益修其政義勇增多至萬五百人分為五軍又分五部欽夫教閲遂弛後四年趙溫叔為帥復舉行之又增收三千三百人通舊有一萬三千八百餘人時十一年冬矣當觱初籍義勇時武昌令薛季宣亦求得故陜西湖北弓箭手保甲法五家為保二保為甲六甲為隊據地行利便則為總不限以鄉總首領焉總皆有射圃而其幟亦隨總而别其色至今猶存紹興四年冬王謙仲為安撫使奏乞本路有義勇知縣及知州兼提舉縣令兼軍正從之蘄州七縣主客户六萬六千六百三十二口三十一萬四千八百九十四而民兵之總為一萬五千二百有一人是荆鄂二州率四五家有一人為兵也聞軍民兵之籍舊為三千四百人或號義勇或號強壯乾道元年冬守臣程逖代還乞蠲其役使朝廷悉令放散及馮忠嘉為守會朝廷復修義勇之政忠嘉乃因舊籍增補三百人又籍户馬四百為馬軍分六隊孝宗大喜詔總領所嵗以馬料千石給之而擢忠嘉直祕閣時七年春計嶽州義勇之籍四千四百九十九人以紹興初計之四邑保甲五凡九百三十五甲人計二萬八千五百九十三人是為五甲出亦兵也是時湖北諸郡皆有之而信陽軍有義勇又有義士惟澧州石門慈利二邑未嘗敢籍紹興末王正功為守始并籍焉章德茂帥湖南又乞義勇之應差保正長者以家業錢多寡為限限外之數與官編户輪流科差從之忠嘉汝州人用民兵事遂除淮南轉運判官専一教免淮西保甲觱擇州人子耆慶元中為成都府路轉運判官季宣子士龍溫州人父徽紹興初嘗為右吏其父子皆有名於當世淮南萬弩手山水寨民兵淮南萬弩手者經始於紹興之季使朝廷命籍民為兵淮南乃選丁壯涅其靣目民駭而逃杜萃老為殿中侍御史為上言敵未至而先驅吾民非計也令民兵上聽郡縣節制征役無出鄉從之淮民乃定張魏公再起又增招之後亦廢弛乾道五年冬上命措置兩淮官田徐子寅領其事復以神徑軍為名於是淮東之籍千四百淮西之籍千六百始議淮南籍真州置寨子寅奏每路可各增二千但聚而養之則不便上問其故子寅曰今人給錢米嵗用約二十五萬緡每人日支錢一百米三升招集之費又須五萬緡激賞犒勞之費亦如之異時財用不給未免放散則失信於民如淮西封疆濶逺聚而教之民尤以為不便上曰財非所惜擾則勿行子寅因請即就鄉社教閲從之時六年春矣明年夏淮西帥臣趙善後因奏乞復取所散神徑軍一千八百三十一人赴廬州仍舊軍額每八月下旬聚教二月上旬放散亦從之此即公所招萬弩手也乾道元年放令歸耕是時萬弩手之家已有旨損三百畝稅賦矣乾道三年淮西帥胡枋奏請至是復令興民兵一體教閲焉民兵者於山水寨保伍中取之三丁籍一亦名義兵嵗以農隙取教官給口糧自十月教人曰給錢至正月終散白米二升乾道四年冬所創也七年秋又詔本名丁錢皆蠲之八年冬諭曰以其擾民止命教一月而罷淳熙初上又命子寅往淮東措置子寅上其數山水寨民兵凡二萬六千九百八十萬弩手凡一千四百四十五明年秋遂命淮西提舉常平茶鹽張宗元與子寅分路提督宗元奏每郡以土豪見任官一員統轄月增給每人三十千諸郡自十月下旬為始赴帥司教閲二月淮西五郡凡費錢十六萬緡米三萬餘石淮東亦倣此惟光黃豪楚安豐盱眙七郡則但就本州教閲其犒設錢減半焉士元者安豐人與子寅皆敢為誕謾時又有許子中胡與可二人亦有耕屯之䇿見用淮人為之語曰徐協恭許子中胡元功三人鼎足立説脫空協恭元功子寅與可之字也實録乾道六年正月戊辰詔徐子寅措置官田招集人種髙郵軍五兵委有勞效除駕部員外郎四月詔子寅往來措置是月丁未右朝奉郎新知髙郵軍徐子寅改知恭州依舊措置淮西官田萬五千二百頃閏五月丙戌詔子寅收集流移墾種官田兵民皆舉趾無懈是年以徐子寅屯田委有勞效除直祕閣臣寮上言許子中所奏墾田未經激賞司農寺常駭觀聽乞頒賫新命上曰當承辦措置淮西鹽酒事許子中進對奏請修器具鼓鑄上曰一從卿言癸酉進呈計畫上並從之尋又詔子中胡與可與國軍甲戌子寅朝辭上曰更且勉力七月辛巳詔知和州九月庚寅子中知舒州十月戊午子寅職事修舉除直祕閣在拜郊前二十日此即三人鼎足時也是時朝議紛然嵗更月改費用繁多迄無成效久之上亦厭其事自淳熙七年以後並令在家習武事以聞遂命守令官按閲之不復聚教矣湖北土兵刀弩手湖北辰沅靖澧州刀弩手者自政和七年始募土丁為之授以間散而居邉境教以武藝其𨽻於籍者至九千餘人沅州四千一百辰州三千四百五十十澧州一千四百七十六靖州九百三靖康初全軍調發往河東援太原為金人所陷僅存一千五百人建炎三年亟罷之紹興六年冬王子尚為帥張直柔觷守鼎言於朝遂命招三千五百人為額沅州千五百辰州一千靖澧各五百淳熙三年楊太尉倓為荆南帥上命楊修其政令八月戊子已而知辰州尹機代還請命有司括田招募人給例物五千春秋閲教犒賜如禁軍例上即擢機湖北提點刑獄使與之同措置然刀弩手舊田諸郡已收為省計機迫使募之往往無田可給但虛立姓名以應命又土人多憚點集甚患苦之會李仁父出守武陵力言其不便乞廢舊額事下諸司張欽夫為安撫使頗以仁父為是會未幾卒後馬大同繼之欲換以土軍時辛幼安新除澧副亦各具所見議不合於仁父言當用提刑司凡差官點定一千三百七十六人之數增募為一千五百人沅州增二十澧州十一人為七百為辰州增二十五州增人為五百五澧州增七十二人二百五十靖六人為二百欽夫以為多減恐不成行列欲用見數委提刑躬行檢點俟有田沒官始令招足元額仁父復為言如此則提舉刀弩手司又當復置而欲冒賞者必至橫沒民田為害滋大不若以見點數為準専委守臣摩以歲月令招合額仍同欽夫連銜具奏上從之而仁父已為大同所攻奉祠歸矣黎雅土丁嘉定威茂土丁黎雅州土丁者集沿邉農人火甲户為之蓋唐雄邉子弟之遺法舊為行陳軍伍但以甲頭總之祖宗以來弛酒禁免征役凡優恤之者無所不用其至黎州自乾道七年邉釁之後始置寨將押隊旗頭之類略為軍制每嵗農隙時官給口食教之以武事舊制之千人庶有用也淳熙三年祿粹父直閣為守請倍其數又以等級籍其少壯者月給以錢九年春言者下黎州别立優恤土丁之目守臣龔總始奏以五十二人為一隊每邉二十隊計一千四十人三邉共三千一百二十人置教場四十九所是時三邉土丁之籍實為五千一百二十六人而東南邉防托卭川一千七百八十七西南邉防托吐蕃青羌等侯一千三百九十一正西邉防托五部落一千九百四十凡上等一千五百九十九人嵗費錢三萬八千三百七十緡有竒每人月給二千嵗總四萬一千五百七十四緡遇閏年量加而戍兵不與議者言土丁粗有軍律統紀且熟夷人情偽地形險阻其實可用為鄉道守邉境言者乃乞將黎雅二州永利路義士法措置劉丞相為制置使遣屬官馮傳之往二州共計各州選二千人上等六百為點集之丁月給錢三百五十次等一千四百為居守之丁月給錢一千兩郡嵗費錢共八萬七千六百緡而教閲之費不與焉時淳熙十年以十二月冬留公又奏乞增黎州次丁八百雅州次丁五百上以其費廣難之嘉定土丁者惟峨眉犍為二縣有焉自淳熙以來峨眉八寨之籍一千四百八十犍為五寨之籍二百七十官既無以給之而又多為寨官所尅剝紹興十三年有言鑄錢轄司者謂宜教識而優恤之時方諱兵迄不能用也威茂州亦有土丁各州二百威州之丁月給米三斗驍健可用夷人亦畏之茂州之丁半市人無月給半有為夷人庸耕者蓋二郡皆半入夷腹中省地茂州每各教閲則土兵悉從夷人假衣甲器械以為用事已復歸殊為文具龍州寨子弓箭手龍州寨子弓箭手者熙寧間有團結也分戍漁溪濁水乾坡三寨共一千六百十三人蓋推排附近有物力稅户為之每夫月給錢一千三寨仍撥住十六鋪防捍月一替而文州亦有鄉兵義士分守關隘即有緩急土豪得以拘集焉湖南鄉社湖南鄉社者舊有之領於鄉之豪酋或曰彈壓或曰緝捕大者所統數百家小者三二百自長沙以及連道興韶而彬桂宜章尤盛乾道七年春知衡州王琰者言湖南八郡三丁取一可得民兵一萬五千人帥臣沈德和不可乃止淳熙七年春言者奏鄉社之擾請盡罷之事下安撫司已而帥臣辛幼安言鄉社皆雜處深山窮谷中其間虛實狡詐或有之但不可一切盡罷之今欲擇其首領使大者不過五十家小者減半屬之巡尉而統之縣令所有兵器官為之印押焉上從之廣西土丁廣東保伍廣西土丁舊有之熙寧立法一年縣教一年州教元祐間以其擾罷之紹聖末復為之仍令逐縣以都管指揮均作三畨自十一月至正月終每輪教一畨即有科需私役並究違例之罪龍興初以髙藤雷容盜起二年春詔州縣教閲並令暫罷兩月以十二月作兩畨分教先是東西兩路並有土保丁一户一名土丁則父子兄弟盡在其數土豪號為統率者總屬焉遇有盜賊則追胥竭作然州縣或反科役民民甚苦之乾道二年春殿中侍御史張之綱請一切罷放上許焉既而知潯州朱師孟又言之是年秋復命巴宜欽州籍定土丁姓年甲至五十嵗即揀汰别選户丁承替每春秋農隙於逐鄉各置教場如法教習明年秋龔實之為廣東提刑司奏乞令州縣團結保伍防守鄉井淳熙三年冬張欽夫為廣西帥復請申保伍之令而信其賞罰上皆許焉蓋二廣封疆濶逺姦盜孔多非保伍土丁無能遏之於其始也蘷路義兵施黔敢勇義兵夔路義軍者紹興末邉事也有帥守李師顔於蘷州三縣保甲中選置立賞罰之格分上下軍名色團結上軍包家業二百緡下軍半之始議摘諸州禁軍時朝子西守梁山為言蘷有萬山其鄉之民勇壯伉健過於正軍乃損租賦以募之元額三千四百餘人李既去遂為文具慶元中毋丘恪厚鄉為帥請於朝選其壯者以二千人為額人免家業二百緡本户不敷則許免及親戚之殷賑者盡與蠲除仍涅其臂以防逃匿之弊巫山縣亦二千人雲安五百皆以縣令為軍正獨奉節之兵春秋同大軍合教有刀弩有弓箭手而鎗手居多焉蓋蘷路自恭涪忠萬四州外皆有義軍每州或數千人此外又有施黔勇敢及思遵義田楊等族家丁皆驍健可用然但能出入於上下溪谷林木之間耳所恃偏架木弩及藥矢之類非正兵之比也瀘南夷義軍沿邉勝兵瀘南夷者義軍也瀘叔長寧沿邉諸堡寨皆有之每郡多至四五千人夷軍夷族也義者民兵也又有勝兵其實皆土丁之類福建保伍福建保伍者鄉村自相團結為立宅户而為首領所以備盜也閩中人素勇悍在熙寧間有槍杖手五十餘人建炎初嘗用之紹興後廢建炎元年八月又用張誠伯言置諸路忠義巡壯其制甚備紹興初言者以為擾民遂罷惟福建獨存殿前司左翼軍殿前司左翼軍者本陳敏周虎臣家丁也紹興十五年薛待制弼為閩帥時劇賊管天下者剽掠郡邑薛命提轄李貴討之為管生得薛前守有忠郎石城陳敏武翼郎開封周虎臣各有家丁數百人皆驍健善戰乃奉敏為汀漳巡檢虎臣本路將官即選二人家丁千人日給錢米責以捕盜謂之竒兵於是處梅草冦不復入境盜悉平十八年八月遂改竒兵謂之殿前左翼軍即以敏為統制留戍其地後以時招填增倍其數今屯皂州殿前司推鋒軍殿前司推鋒軍者舊以廣東多盜使統制官韓京戍梅循以彈壓紹興末移其半三千人戍荆渚隆興二年王宣鍾玉作亂復命推鋒其半今存凡三千四百人分屯廣東諸州縣鎮共二十處湖南飛虎軍湖南飛虎軍者潭州土軍也淳熙四年春樞密院言江西南多盜諸郡廂禁軍單弱乞令諸路帥司各選人配𨽻如置一軍並以敢勇為名以一千人為額其後帥臣王佐吕企中以為亡命之徒恐聚集作過遂不行七年辛幼安為談帥始募一千八百人訓練之其冬賜名遙𨽻軍司十一月八日降旨十年夏改𨽻御前江陵軍從副都統郭杲請也五月十日降旨明年趙衛公為帥奏乞移其軍屯江陵周益公在樞院以為小人重遷恐生變不可趙公力請迄不行飛虎軍並以步名嵗用錢七萬八千貫糧斛二萬四千石徭人弭盜司闕額錢糧支用者也益公云湖南湖北近年來多有聲息厭惡不籍此軍者先見也京西湖北神徑軍淮東強勇軍京西湖北神徑軍者淮東強勇軍皆帥司兵也數各有千人而湖北有騎軍三百乃淮東錢之望所創成都府義勇軍雄邉軍成都府義勇軍者淳熙末趙子直帥蜀時創也其始黎州皆以西兵出戍即有邉事則調綿子所駐大軍討之地逺不時至淳熙初范致能為帥言所教成都禁卒謂之飛仙軍者今已可用乃命五百人往戍之及胡長文為帥又摘西路並邉九郡禁卒千人駐於成都以代西兵出戍謂之雄邉軍時五年冬也然西州之卒皆怯懦而不可用青羌入寇或潰或死遂廢之十二年春留仲至始采衆論用黎州土丁二百謂之防邉義軍月以錢七千給焉十四年子直又招西人五百屯於成都俾之更戍亦謂之義勇故黎人有西義勇土義勇之名云是人皆驍勇善鬭非雄邉之比也平江許浦水軍江隂左翼推鋒延祥江上水軍平江許浦水軍者本明州定海縣水軍也舊𨽻沿海制置司防托海道乾道中改𨽻殿前司以三千人為額五年冬又改御前水軍八年春併歸許浦鎮置副都統制統之淳熙四年冬詔以七千人為額五年秋又增額五百人江隂水軍舊自泉州調發乾道三年陳正獻在樞院以其勞費奏留屯二千人於江隂軍而沿海制置司又别屯千人逮淳熙末纍增四千人分三將此外左翼軍亦有水軍三千人推鋒軍三千人福州延祥寨千人而鎮江建康府池江鄂州御前許帥亦各有水軍多者數千人少者千餘人其後殿司又有澉浦水軍而淮隂靖安唐灣采石諸水軍則皆在御前之後神徑神武忠勇忠鋭忠武軍神徑神武忠勇忠鋭忠武軍者孝宗時旋創之後亦廢始張忠獻公為江淮宣撫使以為楚之人才自古可用乘其大擾之後當收以為兵乃奏置御前萬弩營募淮南北之民十八已上四十五已下不涅臂面屯於建康五人為保兩保為甲十甲為隊有功同賞有罪同罰擢陳敏於廢困之中以為統制敏感激圖報未幾成軍凡一萬八千人隆興初賜名神徑𨽻都督府嵗費錢二百萬緡魏公罷錢處和出使言逃亡者計七千人湯丞相以費國用為言遂不復補神武軍者四川宣府所遺護衛兵也𨽻殿前司乾道二年秋初立軍名忠勇軍者隆興中所創在福建江東西浙東諸州招募屯於行在命李顯忠子師民等統之靈璧之役遣𨽻都督府二年春併入步軍忠鋭軍者乾道四年所置選諸路禁軍土兵之少壯者命將以冬月訓習之上親閲試於內事已遂遣之忠武軍者乾道八年春所置選兩浙諸州土兵弓箭手為之其秋又起二浙揀中廂軍亦謂之忠勇軍以帶御器械劉沂為本軍統制凡皆不必書聊備其始末赤心忠毅忠順強勇義勝軍赤心忠毅忠順強勇義勝軍等皆歸明人也赤心軍者宣和中來歸之士以燕人王鈞甫馬柔吉領之二人皆文臣後從苗劉作亂誅死忠毅軍者紹興末歸正人也隆興二年夏上詔於石頭城置柵以處北人之降者賜名忠毅拜降將蕭琦為都統制命建康都統王彥以北軍千人豫之又名鎮江歸為忠順命都統劉寶以七百人豫蕭鷓巴彥言歸正人不可聚為一所今已散在諸軍又北人常疑有發還之意若聚以付琦為不便鷓巴謂寶曰此曹心不可保恐緩急執我北去我只乞馬軍千人將之上聞乃命蕭琦將南北軍各半王瞻叔為宣諭使以為不可卒豫南軍由是二軍徒有其名旋亦罷去今北人皆散𨽻軍中乾道間上嘗欲選千人赴行在以效士為名置一寨以備使令命未出而中止強勇軍者淮南安撫使所籍紹興末歸正人也義勝軍者四川宣撫使所籍歸正人契丹女真非漢兒也二軍各數百給用如效用義勝始有五百屯洋州紹興乙卯金人來索盡豫之今之義勝軍乃辛巳以後來歸之人也諸軍效用效用者諸軍皆有之不涅其面廪賜厚於正軍建炎間其數猶少紹興七八年後則漸衆矣紹興末虞并甫為川陜宣諭使招效用一千餘人京西二百八十人四川七百七十七人月給錢五千米給五斗又先給例物三縑王瞻叔代之以為厚薄不均遂撥入正軍以填缺額隆興初并甫為湖北京西制置使復招效用上以其多費欲勿招用張魏公為上言艱難之時非優與請給不可招募興國初年事體不同湯進之仍請招七八軍兵三分效用上從之自是招軍皆以三七分為準川秦買馬嵗收茶帛數川秦馬舊有二萬匹乾道間川秦買馬之額嵗買一萬一千九百匹有竒川司六千黎叔文長寧南平五州軍秦司五千九百岩昌寨百峰貼五千一峽八百益粹利三路漕司嵗應副博馬綢絹十萬四千匹成都路五萬潼川路三萬三千利路二萬餘成都利州路十一州産茶二千一百二萬斤其詳見茶事中茶馬所收大較若此其後文州改𨽻秦司而川司增珍州之額共為四千八百九十六黎州三千敘寧軍三百九州八百南平軍四百長寧六百珍州二百三十秦司六千一百二十岩昌寨三千九州千五百峯貼百二十文峽寨七百合兩司為萬有一千十有六匹此慶元初之額也嘉靖末川司五場又增為五千一百九十六匹秦司三場增為七千七百九十八匹合兩司為萬有二千九百九十四匹然纍嵗所市多不及額焉蓋祖宗時市馬分而為二其一曰戰馬生於西邉強壯濶大可備戰陳今岩昌峯貼峽文州所産是也其二曰羈縻馬每綱五十匹其間良細不過三五匹中等十餘匹餘皆下不可服乘守者貪於賞格以多為貴起綱逺來或道路失調甚至僅皮骨茶馬司以其將斃者責付諸路鬻之至則隨死而計綱赴江上者又為押綱卒校竊其芻粟道斃者相望焉成都府馬務每年排發江上諸軍馬五十八綱每綱食米錢計二百貫共一萬一千六百貫用三員每員六百貫共一千八百貫加以押馬官之費共三萬一千八百貫興元府馬務每年撥發三衛馬一百十二綱所費稱此卒未嘗如數蓋茶馬司靳吝錢帛蕃蠻馬至多不即償故也或謂守倅兵官及市馬司下屬皆有激賞而惟主管官無之故至此舊蠻中馬髙下良駑各有定價紹興中張松為黎倅欲馬益額以俸賞髙其直以市之自是夷人得欲無厭愈肆邀索癸巳馬政之後功部川蠻邀功趙彥博始以細茶錦與之至今夷人常以馬博茶錦不堪籍口淳熙中龔總為黎守又與功蠻設度於倅廳之副階犒以酒食夷人益肆稍不如欲則詆訶官吏牽馬出場岩昌馬舊止三千淳熙始增其數慶元中既金人為蒙國所侵冀之北土遂失己未嵗乃於洮州置場買馬由是馬至於秦司者差罕云廣馬廣馬者建炎末廣西提舉綱丁李棫始請市戰馬赴行在四年戊午月紹興初𨽻經略司三年春即雍州置司提舉正月壬午市於羅殿自杞大理諸蠻未幾廢買馬司以帥臣領其事七年胡待制舜陟為帥嵗中市馬二千四百匹詔賞之其後馬益精嵗黃金五鎰中金二百五十鎰錦四百端綺四百匹廉州鹽二百萬斤而得馬千五百匹馬必四尺二寸以上乃市之其直為銀四十兩每髙一寸增銀十兩有至六七十兩者土人云其尤駔駿者在其出處或博黃金二十兩日行四百里但官價有定數不能致此耳然自杞諸蕃本自無馬蓋又市之南詔南詔今大理國也去自杞國可二十程而自杞至雍州橫山寨二十二程橫山寨至靜江府又二十餘程羅殿國又逺自杞十程乾道九年冬有大理人李觀音得等二十二人至橫山求市馬知雍州姚恪盛陳金帛誇詡之其人大喜出一文書稱利貞二年十二月約來年以馬來換所須文選五經國語三史初學記及醫釋等書恪厚犒遣之而不敢奏也會宜州溪洞巡檢常恭者赴闕持南丹州莫延甚表乞就宜州北之橫山市馬可省三十程産馬地至南丹十程南丹至靜江十三程張説在樞院以其表聞李壽翁時為檢詳文字為説言雍逺宜近人孰不知前於其塗彼其無意況今莫氏方橫乃欲為之除道而擅以立市之饒誤以小吏妄作將啓邉釁請論如法説不聽命從義郎李宗彥以提點綱馬驛程往宜州措置九年十二月甲戌既而説罷政樞密院乃奏宗彥等所言邉方不便罷之淳熙元年秋也説以八月罷政密院以十月奏罷宜州買馬帥臣范致能因劾常恭之罪下吏削籍流竄焉廣馬例以五十匹為一綱每年遇三十綱許以推賞然官吏為姦博馬銀多雜以銅蠻人交易每握臂釧撲銀一兩而以為準鹽百斤為畚朘減至六十所贏皆官吏共蝕之蠻知覺不肯以良馬來所市率多老馬病駑且不能登數致能為之約束太守至鎔釧撲增足鹽畚逮其去官之嵗市馬乃六十綱前此未有也淳熙二年嶺南自産小駟直十千餘緡與淮湖所出無異大理西戎接壤故多馬馬雖互市於廣南其實猶西馬也蓋馬喜髙寒非炎方所利淳熙二年秋占城國王遺瓊州守臣書遣六百人海舟三十艘至海南買馬上命帥臣張敬夫作書諭以中國馬未嘗出外夷人乃去安南亦不産馬故以象拒戰焉淮馬淮馬者隆興初張魏公為江淮都督嘗即淮上市之魏公以為朝廷嵗於川廣市戰馬每匹不下三四百千而又道逺多斃今淮馬每匹通不滿二百千且軍中即日可得上從之都督府廢乃止然淮馬矮小實不可用者故取諸廣者此耳乾道以後又詔於淮郡市馬於是多有越淮盜馬來售者又奉議郎曽昭守濠州至以其馬起綱赴行在北人以為言淮西帥臣趙善俊奏其事大臣欲下令還之孝宗以為得體乃諭善俊執死罪囚付昭令斬之曰此盜馬者也於是一綱已至御馬院命濠州以死損報而次綱未至者皆遣還之昭坐追三官放罷自是不復買淮馬云曽昭以乾道七年三月二十四日戊戌行遣此事嘗見親筆處分史不能詳也三衛諸軍取馬數舊於川秦市馬赴樞密院而道斃者多紹興二十四年冬始命撥秦馬付三衛命小校往取之三司取馬再嵗一往互用精甲四千四百人州縣頗憚其費二十七年秋又詔川馬不得赴行在分𨽻江上諸軍鎮江建康荆鄂等各七百五十江池軍各五百殿前二千五百馬步司各千而以川馬之良者二百進御紹興十九年春所定也綱馬皆陸路凡川秦綱馬皆遵陸路乾道初吳信王璘為宣撫使始議以為綱勞費又均房一帶乃歷峻嶺亂石之間馬傷其蹄道斃者多請以舟載馬而東元年五月丙寅上命夔路造舟與之張真父帥夔力言其不可以為每綱三舟舟安馬十八匹用梢水一百二十人每船梢公三十四人水手六人自夔至歸往返半月程下程水三日上水四十二日雇食錢九百緡每人雇錢二百食日錢三百以嵗額一百三十五綱計之度用錢十二萬一千五百緡而起蓋為馬驛及一行官兵批支草料不與焉一州如此其十州可類推又每郡且約造十五綱之舟循環津載凡為三萬五千緡每舟費八百緡而一舟十五綱往返勢必腐敗來嵗又當改作況十郡之舟應用水手萬二千人每舟以千二百人循環往來津載方不積厭每州批支三日料計二千八百二十石每匹日支大麥八升粟草四十五萬七千五百斤每匹日支十三斤自利至峽十一州嵗費約二百緡又且出産不敷決難樁辦大臣進呈九月丁卯上曰第令造舟與璘他日有損壞者軍自修之其他皆吳璘自辦其事遂行洪聖錫時在成都亦言其不便不聽始議馬舟至鄂州登陸樞密汪明逺乞令諸軍以馬舟泛大江而下上曰大江風濤或作即數日不可行自鄂州遵陸可也元年十一月辛酉未幾璘條上馬綱畫一復以芻秣等事委茶司及沿流諸郡明逺以為不可是月辛未而又請修歸峽棧道宰相洪景伯曰歸峽道路險峻人猶不可行馬豈可行也乃命至荆南遵陸十二月庚寅於是璘已俾三衛取馬軍士貼舟而東上聞之諭大臣曰如此即空舟如何得回遂更命璘措置三年二月庚辰璘奏已出本司錢七萬五千緡付合州造馬船二百每隻約物料人工食費四百五十貫錢引綱三船可載一綱五百料船可載二十匹七百料船可載二十五匹自利州至峽州計二十八程利至閬閬至果果至合皆日可到今各計四日程合至恭恭至浩浩至忠忠至萬萬至夔皆一日或日半可到至今各計兩日程夔至歸歸至峽各計三十程每五十綱日支料二百石通計五千六百石已支錢一萬二千二百緡果州以上每石兩貫合州以下每石一貫五百今並支兩貫五十綱募梢火八百人每綱梢火二舟各八益以牽馬人一千二百五十人每綱二十五人及遂州所産回船軍兵二百五十人每綱五人除軍兵外梢火雇錢為二萬緡利閬果夔工各二貫火兒半之谷恭涪忠歸五州梢工各二貫五百文火兒一萬五貫五百文如今所發來五十綱西馬比陸路無死損阻滯川馬亦依此撥發奏可二月丁亥於是大臣因為上言恐璘亦疑水路有未盡善上不以為然明年春夔路轉運司主管文字潼川任續至行在上言今造舟已畢土役事罷山程灘險利害相當在所不論惟欲撥陸路之芻秣以免沿流之煩費輟四路之軍兵以免篙梢之追擾四路廂禁軍數目不少若各輟五千人於沿流十郡充水軍其衣糧令元來處科撥馬綱行則迎送舟船馬綱住則訓習水戰莫此為便上大善之下制置司撥廂禁軍共三千五百人如所請三月甲子時真父已去王龜齡代之與漕臣查元章皆力論其擾人而不聽也有知歸州周允升者傳會璘説言本郡舟船草料皆已辦集即擢為夔州轉運判官而任續亦除知涪州又易恭州使監送峽江湍險軍士素不諳習一遇灘磧人馬覆溺於是驅沿流之民為之操舟所賫衣糧為之劫奪所過雞犬為之一空未幾璘薨虞并父代為宣撫使奏言水路至荆南三千餘里一旦風阻行船不得或至三五日馬失餽飼乞自金州舟行五驛至淨口遵陸行至均州上從之三年十月甲子後月餘言者又奏馬綱所至騷擾江村而商販米斛之舟尤被其毒況水路馬數較之陸行存亡相若而於糴場大有妨礙乃詔川路馬船日下廢罷十一月己巳蓋自璘請建之利夔兩路沿江十餘郡之被其害者三載而後得免云廣中鹽易馬廣馬之良者赴三衛而其他則付建康鎮江府池鄂太平州軍中皆有常數舊以廣西十州民運鹽至橫山寨民甚苦之紹興十九年逮陳璹為經略使始以官錢募小校運送若鹽無缺失則使部良馬至行在以酬之至今為例孳生監牧自渡江以來無復國馬紹興二十年冬始命三省樞密院措置馬鹽十月辛卯後置於饒州以守倅領之擇官田為牧地復置官提舉俄亦廢四年又置監於臨安之餘杭及南蕩四月丙午十九年夏詔馬五百匹為一監一牡為四監監分四郡嵗産駒三分如斃二分已上有賞罰上嘗謂大臣曰議者言南地不宜牧馬朕昨自措置養馬今方二三年已得馬數百矣十三年五月癸亥先是川路所置馬嵗付鎮江軍中牧養十九年春上以未見孳生之數遂分送江上諸軍仍立賞罰正月庚戌後又置監於郢鄂之間牡千牝倍十有餘年才生三十駒而又不可用乃已故國之戰馬悉仰於川秦廣三邉馬也御前軍器所器中物料所書斤重價直等附元豐官制置軍器監以掌戎器之政令又有御前軍器所之役兵有萬全軍匠三千七百人東西作坊工匠五千人紹興初役兵才千人而已久之增至千六百餘人於諸道增差二千九百餘人除本劵外日增給百七十錢月斗半米於是內庫造作纍年兵械山積而諸軍亦各除戎器二十六年詔見役工匠宜減免江浙福建諸州所發物料皆蠲之二月甲戌有司尋奏物料以三分為率減一分工匠以二千人雜役兵以五百人為額舊時軍器所得専逹建炎中嘗以大閹董慤提舉未踰年即罷之紹興五年春始𨽻工部三月戊午後復以中人典領其調度程品工部軍器監有不得預聞者三十年秋黃通老為侍郎為上言非祖宗建官正名之意請得𨽻屬稽考之詔依條檢察七月庚子孝宗受禪之十四日紹興三十二年七月己丑有旨增置提點官一員後五日以內省都知李綽為之改稱提舉又七日詔御前軍器所専𨽻提舉其𨽻工部等指揮勿行張真父時為御史力論其不然且言軍器所不治令工部按劾措置可也工部不職罪之可也今使內侍掌之則它日吏部有銓量之弊户部有財賦之弊以至兵部軍政之施刑部獄訟之繁亦將盡以中官典領之邪繼又論近日大小飛蝗地震皆小人紊政之象其不可有四上乃命仍𨽻工部七月庚申綽怒丐免乃復選皇臣代之八月庚午今軍器所拋降諸道木羽箭動輒數百萬枝黃牛皮亦數十萬張其他所需稱此郡邑多以煩民凡事軍器所造甲每副用甲葉一千八百二十五約重五十斤分四等披膊葉重二錢六分凡五百四斤甲身葉重四錢七分三百二十二斤腿裙葉重四錢半六百七十九斤頭鍪葉重二錢半三百十一斤頭鍪眉宇共重二斤十二兩皮綿結頭事件重五斤十二兩五錢一分紹興四年正月乙丑軍器所定直凡軍中造提刀一費錢二千三百弓一費二千七百手箭一費七十四弩箭一費錢六千五應鼓一費六千五百披膊一副費錢三十八千二百兵幕一座費錢六十九千八百朱馬甲一副費錢四十千一百朱馬甲當胸一副費錢十七千三百皆有竒紹興三年六月丁亥神武軍所定直凡弓甲物料荆湖福建浙西四路諸州軍計數赴殿司及沿江諸軍製造溫鍪等八州計數赴馬司江台等八州計數赴步司惟明信等九州弓甲隆興慶元府贛撫袁信州臨江興國南安軍升宣等七州建康寧國府太建昌平荺衢州廣德軍紹興府甲皆造成赴內軍器庫而諸道羽箭亦皆造成紹興二十九年夏郡國多以乏人匠為言遂命計料輸之惟荆州軍及信州造箭如故四月己酉木羽弩箭者不用羽創自乾道中又有尅敵弓韓蘄王所創自紹興中至今不廢四川作院自休兵之後有旨命成都潼川遂寧府及嘉卭資渠共七州自作院日造甲興元府興閬城州大安軍仙人關六處作院日造神臂弓甲皮氊其器械山積今並屬總領所給之有軍庫馬弓弩弓多至數十萬箭數百萬枝舟師戰車東南沮洳非用武之地故多以舟師勝建炎四年春陳思恭窘烏珠於太湖紹興三十一年冬節使斬鄭嘉努於石臼島虞應公敗完顔亮於采石磯皆舟師也今沿江諸軍咸有棹船士每按試中流上下如飛北人駭愕紹興二年有布衣王大智者獻戰車式上乃命其為樞密院計議官明年車雖成而不可用也遂罷之至二十九年夏殿前司統制官陳敏復上戰車之議上乃謂大臣曰其車制雖古然而用各有宜況其物料最多南方所無也姑令三帥議之或免武臣有一得之歎耳其後卒不能行議者謂春秋時申公使吳教之乘車由是始大其法故曰或以為可用於今日不知古時以兵車交戰者也今金人専尚鐡騎而吾欲以戰車用之誠未見其可也按靖康末樞密院將官劉浩者在於河北募兵創造戰車其法有左右角前後拒各式册載卒二十五人每車計百人而宗汝霖戰車者十有一人執器械輔車者四十有四人每車計五十五人如李伯紀戰車之法兩竿雙輪上設皮蘺以捍矢石下施鐡裙以衛人足旁施鐡索聮絡可為營四人推竿以運車一人登車以發矢二十人執器械夾之兩旁每車計用二十五人法皆不同但不知王大智所陳其戰車之法又不知何如者也開禧初中郎將厲仲方者歷陽守而仲方本書生嘗造戰車并九牛弩未及用而罷去周虎繼之或謂虎用其戰車乃敗敵於清水鎮然不知其詳何如也建炎雜記甲集卷十八

body:
  text: 建炎雜記甲集卷十一宋李心傳撰官制二宣撫使宣撫使祖宗時不常置有軍旅大事則命執政大臣為之纍朝但除向文簡范文正富文忠文忠烈韓獻肅五人仁宗征儂智髙以狄青為宣撫使武臣為宣撫使自此始熙寧末神宗命郭逵討交趾逵前執政然但以招討使為名惜之也建炎三年張魏公以知樞密院事為宣撫處置使其後杜丞相周仲弼孟富文趙元鎮虞并父王公明鄭仲一沈得之輩皆自二府出為之虞公始以元樞除資政殿大學士矣止恐未足為重后二日乃復帶知樞密院事焉若前宰相為宣撫者則自渡江以後亦止除李伯紀吕元直朱藏一三人紹興元年劉光世以使相宣撫淮南武臣非執政而為宣撫使自此始二年李大發以端明殿學士為壽州等宣撫使文臣非執政而為宣撫使自此始然紹興至嘉泰武臣止劉光世韓世忠張俊吳玠嶽飛吳璘六人從官止大發王伯召二人蓋重之也紹興末詔以楊存中為江淮宣撫使劉恭父不書録黃遂寢其命時又詔虞并甫以兵部尚書為湖北京西宣撫副使會存中命格于是復改川陜宣諭使而存中措置兩淮焉宣撫處置使宣撫處置使舊無有張魏公始為之其行移於六曹寺監帥司皆用劄子而六曹於宣司用申狀紹興四年趙忠簡使川陜六年韓忠武使京東淮東皆帶處置字入銜然忠簡後不行而韓在山陽特隆其名而已非魏公處置之比也故事大臣為宣撫使者于三省樞密院皆用申狀若建都督府則止用關而已隆興初魏公以少傅為江淮宣撫使頃之拜樞密使都督江淮軍馬及符離師潰內外紛然公上表待罪上曰罷樞密使宰相陳魯公曰如此則是罷政乃降特進復為宣撫使陳正獻公時參贊軍事言於孝宗曰降官示罰自古所有今雖張浚自請然人情觀望徒使號令不行請復正其名上不從周元持時為侍御史亦言官爵者人臣一已之私其人有罪隨即貶降則可也若都督之名則國家用人之權柄豈亦行遞减上納其言遂復督府之名矣凡前兩府及從官為宣撫使於六部用申狀總領所用公牒監帥司及所部郡縣用劄子云魏公為江淮宣撫使申明行移除三省樞密院外並用劄子蓋以少傅劄六部也宣撫副使宣撫副使舊時有之建炎二年周仲弼宣撫兩浙以郭太尉仲荀副之武臣為宣撫自此始其後福建韓世忠川陜吳玠皆有此授紹興二年張忠獻既被讒將召歸先為置副命王伯召盧立之為之文臣為宣撫自此始其後邵澤民踵為之然但帶權字紹興中胡丞公鄭亨仲在川陜嶽鵬舉在荆襄楊存中在淮此皆不置宣撫使而數人者第以副使為名蓋靳之也久之鵬舉落副字其餘則否宣撫判官宣撫判官昔熙寧初韓康公使陜李邦直以知制誥為判官實上幕也紹興中劉彥冲嘗受張魏公便宜之命為宣撫判其後張宗元吕祉亦為之十年楊和王以太尉為淮北宣撫副使劉信叔以節度使為判官二帥禮抗權均猶轉運副使判官之比非復熙寧之制矣宣撫使官屬宣撫使官屬昔張魏公出使張通夫深以端明殿學士程純老庶以寶文閣學士王子尚庶以龍圖閣待制並為謀議官劉彥冲子羽以徽猷閣待制為參贊軍事趙應祥開以祕閣修撰為隨軍轉運使傅彥濟馮元通康國以尚書幹辦公事皆非常制也紹興四年始著令參謀事提㸃刑獄參議視轉運判官機幹在知州通判之上至今不改招討司招討司古官也熙寧間始命郭宣徽一人建炎四年李成圍江州詔以張循王為招討使于江西位在宣撫使下制置使之上著為令紹興五年以嶽鵬舉為湖北襄陽招討使鵬舉請州縣官不法害民者許移罷從之十年烏珠犯三京以韓張嶽三帥兼河南河北招討使三十一年海陵南牧以吳璘劉錡成閔吳拱李顯忠兼陜西河東北京東西招討使蓋遙領其地非張嶽之比也隆興元年以顯忠為淮南京畿京東河北招討使邵宏淵副之未領職即罷招撫使招撫處置使招撫使古未有淳化末李順據成都趙景肅昌言以參知政事為川陜招撫使後不復置建炎初李伯紀奏以張龍圗所為河北招撫使所益都人嘗為監察御史喜言兵汪廷俊等惡之未及出師而廢紹興十年金復攻河南地制以劉雍公光世為三京招撫處置使以援劉錡㑹烏珠敗去乃駐軍太平州踰年復罷三十一年孝宗即位以成閔張子益李顯忠三大將為湖北京西淮東西招撫使子益死劉寶代之及和議成乃罷制置大使制置大使古未有紹興三年趙忠簡始為江西制置大使其後席大光帥潭益李伯紀帥江西吳元直帥湖南皆領之大光在成都得㫖位宣撫副使上凡監司不法許舉按八年李大法為江西帥以前執政亦帶安撫制置大使是嵗大光以憂去胡丞公自給事中代之始去大字至今不改制置使制置使自熙豐後多以武臣為之建炎元年郭太尉仲荀制置東南盜賊請監帥司並聽節制許之其後王襄閔淵劉武僖光世韓忠武世忠張忠烈俊嶽武穆飛吳武安玠關毅勇師古劉忠武錡皆為制置使掌兵事建炎末議者令帥臣悉帶制置使張達為江州帥以便宜竭取屬郡之財上聞之詔除用兵聽依便宜餘悉禁止其他刑獄財賦事歸之監司焉三年八月辛亥十一月辛亥詔㫖四年遂罷制置使之名惟統兵官如故自休兵後獨成都守臣帶四川安撫制置使掌節制御前軍馬官員升改於散類省試舉人銓量郡守舉避邉州守二其權略視宣撫司惟財計茶馬不與又有沿海制置使以明州守領之然其職止肅清海道節制水軍非四川之比也宣諭制置使宣諭制置使舊無有紹興元年上以江淖冦盜多貢賦不繼乃命孟富文以户部尚書充江東西湖南宣諭制置使理財治盜富文未行而秉政遂以為福建宣撫使焉宣諭使宣諭使舊有之以宣諭德意為職而已不與軍事渡江後所遣尤數紹興二年冬分遣御史五人宣諭東南諸路觀風問俗平反獄訟宣布德意踰年乃還六年又遣范右司真方宣諭川陜九年又遣方察院廷實宣諭三京皆使者職也時李察院寀被㫖宣諭江西乃專督捕盜遂罷為廣西提刑是年新復陜西詔仲輝以簽書樞密院事往永興宣諭鄭亨仲以祕書少監為參謀豫衛卒千人又因制置移屯等事宣諭之權自此重矣十一年鄭亨仲宣諭川陜始建使名得與邊事三十一年江中丞徹宣諭京西湖北撫勞將士體訪事宜三十二年虞雍公宣諭川陜乃專招軍買馬其年王瞻叔代之亦參軍政蓋自鄭亨仲後其權任直宣撫之亞焉撫諭使撫諭使建炎元年以路公弼耿伯順為京城撫諭副使始建使名四年以中書舍人李正民為江浙湖南撫諭使且令按察官吏能否伸理民間屈抑紹興元年以吏部侍郎傅寂卿為淮東撫諭使採訪民間利病及措置營田等事後不復置建炎初又命御史馬伸等八人撫諭東南兩河川陜三年命吏部郎中方聞撫諭淮東紹興二年命吏部郎中周隨亨駕部員外郎李願二人撫諭川陜皆不帶使字其餘如建炎末周文若太博勞使李成賜以器幣紹興初胡丞公察院督捕閩盜亦皆以撫諭司為名云鎮撫使鎮撫使舊無有建炎四年上自海道還㑹稽時江湖荆浙皆為金人所蹂而群盜連衡以據州郡大者至十餘萬朝廷不能制范覺民為參知政事謂此皆烏合之衆急之則併死以拒官軍莫若析地以處之盜有所歸則可以漸制乃言於上請稍復藩鎮之制少與之地而專付以權擇人久住以屏王室羣臣多以為不可覺民曰今諸郡為盜據者已十數曷若朝廷為之使恩有所歸上亦决意行文其五月覺民為僕射是月甲子覺民請以淮南京東西湖南北諸路並分為鎮除茶鹽之利仍歸朝廷置官提舉外他監司並罷上供財賦權免三年餘聽帥臣移用更不從朝廷應副遇軍興聽從便宜仍許世襲上曰便令世襲恐太重當俟其别立大功然後許之時劇盜李成在舒蘄桑仲在襄鄧郭仲威在維揚薛慶在高郵皆即以為鎮撫使其後河南翟興山陽趙立厯陽劉蒞東海李彥先與薛慶皆戰死而淮寧馮長寧以地降劉豫紹興初諸鎮或亡或死遂不復除久之但餘荆南解潜而已五年趙元鎮相召潜主管馬軍遂罷鎮撫使之有聲者文臣惟陳規武臣惟嶽飛蓋王彥解潜李橫耳發運使發運使祖宗盛時有之置司真州嵗漕江湖粟六百萬斛以贍中都渡江後江湖冦盜多發運使苐職糴買而已紹興二年正月遂罷發運司以其錢帛赴行在八年起居舍人勾龍如淵建言户部非生財之地請置諸路水陸度支轉運等使置司蘇杭户部侍郎李彌遜因請復置發運司别給糴本錢數百萬緡廣行儲積分毫不得取供近用以待恢復之需徽猷閣待制程邁為江淮京浙閩廣經制發運使專掌糴事邁入辭上疏言唐劉晏為九使財賦悉歸於一國朝始分為二而三司使居中發運使居外相為表裡今租庸分於轉運司常平分於提舉司鹽鐡分於茶鹽司以至鼓鑄則有坑冶司平凖則有市易司總之以户部而發運司徒有其名因辭不行上不許已右諫議大夫李誼請令檢察營田市易等事俾總陸路而制其盈虛亦不行苐令和糴而已其冬李泰發秉政以為虛靡廩祿請罷發運而復常平九年正月遂廢發運司以户部侍郎梁汝嘉為經制使乾道六年虞丞相當國三月奏復發運司以户部侍郎史正志為淮浙京湖淮廣福建等路都大發運使朝論不以為宜汪聖錫黃通老二尚書言之尤力執政皆不之聽然正志實無能為但峻督諸司州郡多取美財而已其年十二月正志以奏課誕謾貶乃復廢發運使焉經制使經制使者宣和間陳亨伯資政始以大漕兼之亨伯創比較酒務及以公家出納錢糧取其贏以佐用度其後翁端朝中丞為之紹興初與發運俱罷九年正月復置以户部侍郎梁汝嘉為使司農少卿霍蠡為判官以檢察內外失陷錢糧舉催未到綱運措置糴買總領常平為職未幾曽諫議統言其無益而多費遂省之十三年八月上諭大臣曰今漕司各掌一路有無不能相通可倣發運署都轉運使一員通掌諸路糶糴選其中曉財榖者為之上雖有是言然亦不克久也紹興中又有總制司以執政官領其事先是經制司既廢諸路貢賦或不時至五年閏二月孟富文以參知政事提領措置財用富文請以總制司為名許之其職略視經制司七月富文罷詔沈忠敏與求權領六年三月忠敏罷政詔總制司候除報政日取㫖既而不除後二年乃復置經制發運使凡二司錢榖本末語在財賦事建炎初又以馬忠為河北經制使王燮傅亮為河東經制副使名雖同然實掌兵事云都轉運使都轉運使渡江後惟四川有之明受元年三月始以黃右司槩有四川水陸制置發運司署司遂寧府未行而反正遂除兵部侍郎明年張魏公出使川陜其趙應祥為隨軍轉運使專一總領財賦應祥言總領財賦於四路漕計或不相關當正其名使知有所統屬張公是之紹興六年冬遂除應祥都轉運使後又知副使或判官十五年省都轉運司以其事歸宣撫用亨仲請也其年十月江侍御渤言制軍給食通而為一雖察院户部不得而專於是復置總領矣紹興二年十月嘗置江湖等九路都轉運使置司湖州未幾即廢之總領諸路財賦總領財賦古無其官靖康末高宗以大元帥駐軍濟州命隨軍轉運使梁楊祖總領措置財用然未以名官也建炎末張魏公趙應祥總領四川財賦始置所繫銜總領之官自此始其后大軍在江上間遣版曹或大府司農少卿調其錢糧皆暫以總領為名而四川改置都轉運司故總領又廢紹興十一年諸將既罷兵乃置三總領以朝臣為之皆帶專一報發御前軍馬文字蓋又使之與聞軍政不獨饋餉而已凡鎮江諸軍錢糧𨽻淮東總領治鎮江建康池州諸軍錢糧𨽻淮西總領治建康鄂州荆南江州諸軍錢糧𨽻湖廣總領治鄂州其序位在轉運副使之上十五年復置四川總領治和州天下凡四總領矣乾道七年併淮東總領皆仰朝廷以有發運使之故也未幾復舊然東南三總領皆仰朝廷科撥獨四川總領專管利源即有軍興朝廷亦不問其故趙應祥𣙜鹽酒而王瞻叔括田契以佐軍需云館職為總領諸路總領故事皆帶在內金榖官若太府司農卿少丞户部列曹郎中員外郎之類淳熙中趙溫叔用宇文郎中子震為淮東總領時宇文尚為館職以未歷郡不可除郎乃命著作郎兼權金部郎官為之以館職領錢糧非舊典也當時皆以為是提㸃鑄錢提㸃坑冶鑄錢公事自咸平初有之渡江後屢罷屢復語在財賦事中乾道六年併事於發運司罷遂復之淳熙五年又加都大二字於提㸃之上以倣川秦之茶馬又置提㸃江淮鐡冶鑄錢公事以淮西漕臣為之武臣提刑武臣提刑祖宗以來有之後罷去建炎元年以盜賊未衰復之然但管促殺而已四年又罷之乾道六年五月復置諸路各一員皆選公廉曉習法令民事之人如無聽闕大臣乞依故事加同字不從於是武憲橫於四方至有六曹尚書典藩而被按者淳熙末上知其不便遂不復除朝臣一人而已提舉常平茶鹽提舉常平官自熙寧初置元祐紹聖間罷復不常建炎元年五月復罷二年八月復諸道常平官還其糴本自青苗錢不取外常平免役之政皆掌之九年置經制司改常平官為經制某路幹辦常平等公事未幾經制司罷復為常平官久之復置提舉東南以茶鹽司兼領四川以提刑司兼領仍别置官吏及嵗舉升改員然常平錢皆取以贍軍今特掌義倉及水利役法賑濟諸項役使等事而已自此無復平糴之政矣安撫使安撫使舊號帥臣祖宗時惟陜西河東北三路及益廣桂有之建炎初李伯紀建言諸道皆帶安撫使而廣東西仍舊制加經略二字其制今存然兵事皆屬都統民政皆屬諸司安撫特虛名而已又有管內安撫者自軍興以來有之蓋諸將在邉假使名以為重事定以廢今金均黎楚等數州以極邉得存又有廣西安撫都監雍州守臣兼帶瓊管安撫都監瓊州守臣兼帶外此舊俱不帶去馬步軍都總管馬步軍都總管祖宗大帥職也舊名都部置避英宗諱改之三路帥臣得兼事權甚重以武臣為之副今江浙淮廣京湖利路帥臣皆帶都總管但存虛名而其副特以處貴族親戚及其離軍之人無可釐之務蓋以厚祿優之非復祖宗之制矣兵馬都鈐轄兵馬都鈐轄祖宗時不常置成都大邑也帥臣苐帶兵馬鈐轄而兩武臣之為鈐轄者與鈞禮熙寧茂夷之變蔡仲逺自渭入蜀始以都鈐轄為名蔡下令兩鈐轄循階神宗不樂遂罷歸於是馮當世以前執政來為安撫使而都鈐轄之名不等矣建炎末宣撫使始命立之復帶都字後益瀘廣桂五州牧皆以都鈐轄為稱而江西贑州以多盜其守臣亦帶江西兵馬銓轄至於武臣為路鈐者亦無尺籍伍符然每嵗猶往諸州按閲特存故事而已間有得㫖葺治軍器或訓練禁軍者則仍帶入銜云諸軍都統制諸軍都統制古無其官宣和間西南用兵大將或三四人不相統一故即其中拔一人為都統制以總之兵罷則如故建炎元年五月既置御營司遂擢王襄愍淵為都統制統制名官自此始其後神武五軍及川陜宣撫司都督府樞密院皆有之紹興初諸大將官既尊悉號宣撫司其將佐則謂之統制官去都字十一年三大將兵罷乃擢其偏裨為御前諸軍都統制自太尉至諸司使副皆得為之惟官至師相則帶領都統制職事十八年川陜三大將亦如故今興元江陵建康鎮江府與金鄂江池州及平江許浦水軍皆除都統制恩數略視三衙權任在帥臣之右焉官卑者亦止稱副都統制副都統制副都統制紹興七年始置後省乾道三年五月荆南都統制王宣久病上恐其不起且方邉報不一乃除員琦為副使同管軍欲俟宣疾愈改授已而諭輔臣曰朕欲今後江上諸軍各置副都統一員令兼領軍事豈惟諸將他日統師亦使主將有顧忌不敢專擅妄作大臣皆曰善上因欲令軍中自推遷葉子昂丞相言不可上悟曰極善當自朝廷除人不然即似唐籓鎮大臣又言都副統制禮數宜有隆殺且為條約將上上曰如此庶幾他日不致爭權越禮誤國家事遂行之然興州自吳挺亡久未嘗除人蓋重之也其他軍數少者都副統師亦不並除云統制統領官統制統領官三衙及御前軍將佐也祖宗時禁兵但以路分州都監等領之神宗用兵始置百三十將是在鈐轄路分之外矣渡江後大將軍又有統制同統制副同統制統領同統領副統領等其外又有正將副將凖備將之名皆偏裨也舊制凖備將而自主帥升差仍先申樞密院審察乾道七年建康都統制王寵罷乃升差將佐數百人代者王友直言於朝二月庚申有詔訓練官部隊將而下軍中一面出差仍申朝廷照㑹紹熙四年正月乙酉詔江上諸將升差統制至凖備將者令主帥解發三人赴總領所選擇一名事既行諸將皆不以為便慶元三年二月戊午詔令升差並委主帥選擇令總領或屯軍處守臣審核保明申密院紹熙㫖揮勿行自是主帥之權復重矣建炎雜記甲集卷十一

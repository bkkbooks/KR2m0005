body:
  text: 建炎雜記甲集卷十一宋李心傳撰官制二宣撫使宣撫使祖宗時不常置有軍旅大事則命執政大臣爲之累朝但除向文簡范文正富文忠文忠烈韓獻肅五人仁宗征儂智髙以狄青爲宣撫使武臣為宣撫使自此始熈寧末神宗命郭逵討交趾逵前執政然但以招討使爲名惜之也建炎三年張魏公以知樞宻院事為宣撫䖏置使其後杜丞相周仲弼孟富文趙元鎮虞并父王公明鄭仲一沈得之軰皆自二府出爲之虞公始以元樞除資政殿大學士矣止恐未足為重后二日乃復帶知樞宻院事焉若前宰相爲宣撫者則自渡江以後亦止除李伯紀吕元直朱藏一三人紹興元年劉光世以使相宣撫淮南武臣非執政而為宣撫使自此始二年李大發以端明殿學士爲壽州等宣撫使文臣非執政而為宣撫使自此始然紹興至嘉㤗武臣止劉光世韓世忠張俊呉玠岳飛呉璘六人從官止大發王伯召二人葢重之也紹興末詔以楊存中爲江淮宣撫使劉恭父不書錄黄遂寢其命時又詔虞并甫以兵部尚書為湖北京西宣撫副使會存中命格于是復改川陜宣諭使而存中措置兩淮焉宣撫處置使宣撫處置使舊無有張魏公始爲之其行移於六曹寺監帥司皆用劄子而六曹於宣司用申狀紹興四年趙忠簡使川陜六年韓忠武使京東淮東皆帶處置字入銜然忠簡後不行而韓在山陽特隆其名而已非魏公處置之比也故事大臣爲宣撫使者于三省樞宻院皆用申狀若建都督府則止用關而已隆興初魏公以少傅為江淮宣撫使頃之拜樞宻使都督江淮軍馬及符離師潰内外紛然公上表待罪上曰罷樞宻使宰相陳魯公曰如此則是罷政乃降特進復爲宣撫使陳正獻公時參賛軍事言於孝宗曰降官示罰自古所有今雖張浚自請然人情觀望徒使號令不行請復正其名上不從周元持時爲侍御史亦言官爵者人臣一已之私其人有罪隨即貶降則可也若都督之名則國家用人之權柄豈亦行逓减上納其言遂復督府之名矣凡前兩府及從官爲宣撫使於六部用申狀總領所用公牒監帥司及所部郡縣用劄子云魏公爲江淮宣撫使申明行移除三省樞宻院外並用劄子葢以少傅劄六部也宣撫副使宣撫副使舊時有之建炎二年周仲弼宣撫兩浙以郭太尉仲荀副之武臣爲宣撫自此始其後福建韓世忠川陜呉玠皆有此授紹興二年張忠獻既被讒將召歸先爲置副命王伯召盧立之爲之文臣為宣撫自此始其後邵澤民踵爲之然但帶權字紹興中胡丞公鄭亨仲在川陜岳鵬舉在荆襄楊存中在淮此皆不置宣撫使而數人者第以副使爲名葢靳之也久之鵬舉落副字其餘則否宣撫判官宣撫判官昔熈寧初韓康公使陜李邦直以知制誥爲判官實上幙也紹興中劉彦冲嘗受張魏公便宜之命爲宣撫判其後張宗元吕祉亦為之十年楊和王以太尉爲淮北宣撫副使劉信叔以節度使爲判官二帥禮抗權均猶轉運副使判官之比非復熈寧之制矣宣撫使官屬宣撫使官屬昔張魏公出使張通夫深以端明殿學士程純老庶以寶文閣學士王子尚庶以龍圖閣待制並爲謀議官劉彦冲子羽以徽猷閣待制爲參賛軍事趙應祥開以秘閣修撰爲隨軍轉運使傅彦濟馮元通康國以尚書幹辦公事皆非常制也紹興四年始着令參謀事提㸃刑獄參議視轉運判官機幹在知州通判之上至今不改招討司招討司古官也熈寧間始命郭宣徽一人建炎四年李成圍江州詔以張循王爲招討使于江西位在宣撫使下制置使之上著為令紹興五年以岳鵬舉為湖北襄陽招討使鵬舉請州縣官不法害民者許移罷從之十年烏珠犯三京以韓張岳三帥兼河南河北招討使三十一年海陵南牧以呉璘劉錡成閔呉拱李顯忠兼陜西河東北京東西招討使葢遙領其地非張岳之比也隆興元年以顯忠為淮南京畿京東河北招討使邵宏淵副之未領職即罷招撫使招撫處置使招撫使古未有淳化末李順據成都趙景肅昌言以參知政事爲川陜招撫使後不復置建炎初李伯紀奏以張龍圗所為河北招撫使所益都人嘗爲監察御史喜言兵汪廷俊等惡之未及出師而廢紹興十年金復攻河南地制以劉雍公光世為三京招撫處置使以援劉錡㑹烏珠敗去乃駐軍太平州踰年復罷三十一年孝宗即位以成閔張子益李顯忠三大將爲湖北京西淮東西招撫使子益死劉寶代之及和議成乃罷制置大使制置大使古未有紹興三年趙忠簡始為江西制置大使其後席大光帥潭益李伯紀帥江西呉元直帥湖南皆領之大光在成都得㫖位宣撫副使上凡監司不法許舉按八年李大法爲江西帥以前執政亦帶安撫制置大使是嵗大光以憂去胡丞公自給事中代之始去大字至今不改制置使制置使自熈豐後多以武臣為之建炎元年郭太尉仲荀制置東南盗賊請監帥司並聽節制許之其後王襄閔淵劉武僖光世韓忠武世忠張忠烈俊岳武穆飛呉武安玠關毅勇師古劉忠武錡皆爲制置使掌兵事建炎末議者令帥臣悉帶制置使張達為江州帥以便宜竭取屬郡之財上聞之詔除用兵聽依便宜餘悉禁止其他刑獄財賦事歸之監司焉三年八月辛亥十一月辛亥詔㫖四年遂罷制置使之名惟統兵官如故自休兵後獨成都守臣帶四川安撫制置使掌節制御前軍馬官員陞改於散類省試舉人銓量郡守舉避邉州守貳其權略視宣撫司惟財計茶馬不與又有沿海制置使以明州守領之然其職止肅清海道節制水軍非四川之比也宣諭制置使宣諭制置使舊無有紹興元年上以江淖冦盗多貢賦不繼乃命孟富文以户部尚書充江東西湖南宣諭制置使理財治盗富文未行而秉政遂以為福建宣撫使焉宣諭使宣諭使舊有之以宣諭徳意為職而已不與軍事渡江後所遣尤數紹興二年冬分遣御史五人宣諭東南諸路觀風問俗平反獄訟宣布徳意踰年乃還六年又遣范右司真方宣諭川陜九年又遣方察院廷實宣諭三京皆使者職也時李察院寀被㫖宣諭江西乃專督捕盗遂罷為廣西提刑是年新復陜西詔仲輝以簽書樞宻院事徃永興宣諭鄭亨仲以秘書少監為參謀予衛卒千人又因制置移屯等事宣諭之權自此重矣十一年鄭亨仲宣諭川陜始建使名得與邊事三十一年江中丞澈宣諭京西湖北撫勞將士體訪事宜三十二年虞雍公宣諭川陜乃專招軍買馬其年王瞻叔代之亦參軍政葢自鄭亨仲後其權任直宣撫之亞焉撫諭使撫諭使建炎元年以路公弼耿伯順為京城撫諭副使始建使名四年以中書舎人李正民為江浙湖南撫諭使且令按察官吏能否伸理民間屈抑紹興元年以吏部侍郎傅寂卿為淮東撫諭使採訪民間利病及措置營田等事後不復置建炎初又命御史馬伸等八人撫諭東南兩河川陜三年命吏部郎中方聞撫諭淮東紹興二年命吏部郎中周隨亨駕部員外郎李愿二人撫諭川陜皆不帶使字其餘如建炎末周文若太博勞使李成賜以器幣紹興初胡丞公察院督捕閩盗亦皆以撫諭司爲名云鎮撫使鎮撫使舊無有建炎四年上自海道還㑹稽時江湖荆浙皆爲金人所蹂而群盗連衡以據州郡大者至十餘萬朝廷不能制范覺民為參知政事謂此皆烏合之衆急之則併死以拒官軍莫若析地以處之盗有所歸則可以漸制乃言於上請稍復藩鎮之制少與之地而專付以權擇人久住以屏王室羣臣多以為不可覺民曰今諸郡為盗據者已十數曷若朝廷為之使㤙有所歸上亦决意行文其五月覺民為僕射是月甲子覺民請以淮南京東西湖南北諸路並分為鎮除茶鹽之利仍歸朝廷置官提舉外他監司並罷上供財賦權免三年餘聽帥臣移用更不從朝廷應副遇軍興聽從便宜仍許世襲上曰便令世襲恐太重當俟其别立大功然後許之時劇盜李成在舒蘄桑仲在襄鄧郭仲威在維揚薛慶在高郵皆即以爲鎮撫使其後河南翟興山陽趙立厯陽劉莅東海李彦先與薛慶皆戰死而淮寧馮長寧以地降劉豫紹興初諸鎮或亡或死遂不復除久之但餘荆南解潜而已五年趙元鎮相召潜主管馬軍遂罷鎮撫使之有聲者文臣惟陳規武臣惟岳飛葢王彦解潜李横耳發運使發運使祖宗盛時有之置司真州嵗漕江湖粟六百萬斛以贍中都渡江後江湖冦盗多發運使苐職糴買而已紹興二年正月遂罷發運司以其錢帛赴行在八年起居舎人勾龍如淵建言户部非生財之地請置諸路水陸度支轉運等使置司蘓杭户部侍郎李彌遜因請復置發運司别給糴本錢數百萬緡廣行儲積分毫不得取供近用以待恢復之需徽猷閣待制程邁爲江淮京浙閩廣經制發運使專掌糴事邁入辭上疏言唐劉晏為九使財賦悉歸於一國朝始分爲二而三司使居中發運使居外相爲表裡今租庸分於轉運司常平分於提舉司鹽鐡分於茶鹽司以至鼓鑄則有坑冶司平凖則有市易司總之以户部而發運司徒有其名因辤不行上不許已右諫議大夫李誼請令檢察營田市易等事俾總陸路而制其盈虛亦不行苐令和糴而已其冬李㤗發秉政以爲虛靡廩祿請罷發運而復常平九年正月遂廢發運司以户部侍郎梁汝嘉爲經制使乾道六年虞丞相當國三月奏復發運司以户部侍郎史正志爲淮浙京湖淮廣福建等路都大發運使朝論不以爲宜汪聖錫黄通老二尚書言之尤力執政皆不之聽然正志寔無能爲但峻督諸司州郡多取美財而已其年十二月正志以奏課誕謾貶乃復廢發運使焉經制使經制使者宣和間陳亨伯資政始以大漕兼之亨伯創比較酒務及以公家出納錢糧取其贏以佐用度其後翁端朝中丞爲之紹興初與發運俱罷九年正月復置以户部侍郎梁汝嘉爲使司農少卿霍蠡爲判官以檢察内外失䧟錢糧舉催未到綱運措置糴買總領常平爲職未㡬曽諫議統言其無益而多費遂省之十三年八月上諭大臣曰今漕司各掌一路有無不能相通可倣發運署都轉運使一員通掌諸路糶糴選其中曉財榖者爲之上雖有是言然亦不克久也紹興中又有總制司以執政官領其事先是經制司既廢諸路貢賦或不時至五年閏二月孟富文以參知政事提領措置財用富文請以總制司爲名許之其職畧視經制司七月富文罷詔沈忠敏與求權領六年三月忠敏罷政詔總制司候除報政日取㫖既而不除後二年乃復置經制發運使凡二司錢榖本末語在財賦事建炎初又以馬忠爲河北經制使王爕傅亮爲河東經制副使名雖同然實掌兵事云都轉運使都轉運使渡江後惟四川有之明受元年三月始以黄右司槩有四川水陸制置發運司署司遂寧府未行而反正遂除兵部侍郎明年張魏公出使川陜其趙應祥爲隨軍轉運使專一總領財賦應祥言總領財賦於四路漕計或不相關當正其名使知有所統屬張公是之紹興六年冬遂除應祥都轉運使後又知副使或判官十五年省都轉運司以其事歸宣撫用亨仲請也其年十月江侍御渤言制軍給食通而爲一雖察院户部不得而專於是復置總領矣紹興二年十月嘗置江湖等九路都轉運使置司湖州未幾即廢之總領諸路財賦總領財賦古無其官靖康末高宗以大元帥駐軍濟州命隨軍轉運使梁楊祖總領措置財用然未以名官也建炎末張魏公趙應祥總領四川財賦始置所繋銜總領之官自此始其后大軍在江上間遣版曹或大府司農少卿調其錢糧皆暫以總領爲名而四川改置都轉運司故總領又廢紹興十一年諸將既罷兵乃置三總領以朝臣爲之皆帶專一報發御前軍馬文字葢又使之與聞軍政不獨饋餉而已凡鎮江諸軍錢糧𨽻淮東總領治鎮江建康池州諸軍錢糧𨽻淮西總領治建康鄂州荆南江州諸軍錢糧𨽻湖廣總領治鄂州其序位在轉運副使之上十五年復置四川總領治和州天下凡四總領矣乾道七年併淮東總領皆仰朝廷以有發運使之故也未㡬復舊然東南三總領皆仰朝廷科撥獨四川總領專管利源即有軍興朝廷亦不問其故趙應祥𣙜鹽酒而王瞻叔括田契以佐軍需云館職爲總領諸路總領故事皆帶在内金榖官若太府司農卿少丞户部列曹郎中員外郎之類淳熈中趙温叔用宇文郎中子震爲淮東總領時宇文尚爲館職以未歴郡不可除郎乃命著作郎兼權金部郎官爲之以館職領錢糧非舊典也當時皆以爲是提㸃鑄錢提㸃坑冶鑄錢公事自咸平初有之渡江後屢罷屢復語在財賦事中乾道六年併事於發運司罷遂復之淳熈五年又加都大二字於提㸃之上以倣川秦之茶馬又置提㸃江淮鐡冶鑄錢公事以淮西漕臣爲之武臣提刑武臣提刑祖宗以來有之後罷去建炎元年以盗賊未衰復之然但管促殺而已四年又罷之乾道六年五月復置諸路各一員皆選公㢘曉習法令民事之人如無聽闕大臣乞依故事加同字不從於是武憲横於四方至有六曹尚書典藩而被按者淳熈末上知其不便遂不復除朝臣一人而已提舉常平茶鹽提舉常平官自熈寧初置元祐紹聖間罷復不常建炎元年五月復罷二年八月復諸道常平官還其糴本自青苗錢不取外常平免役之政皆掌之九年置經制司改常平官爲經制某路幹辦常平等公事未㡬經制司罷復爲常平官久之復置提舉東南以茶鹽司兼領四川以提刑司兼領仍别置官吏及嵗舉陞改員然常平錢皆取以贍軍今特掌義倉及水利役法賑濟諸項役使等事而已自此無復平糴之政矣安撫使安撫使舊號帥臣祖宗時惟陜西河東北三路及益廣桂有之建炎初李伯紀建言諸道皆帶安撫使而廣東西仍舊制加經畧二字其制今存然兵事皆屬都統民政皆屬諸司安撫特虛名而已又有管内安撫者自軍興以來有之葢諸將在邉假使名以爲重事定以廢今金均黎楚等數州以極邉得存又有廣西安撫都監邕州守臣兼帶瓊管安撫都監瓊州守臣兼帶外此舊俱不帶去馬歩軍都總管馬歩軍都總管祖宗大帥職也舊名都部置避英宗諱改之三路帥臣得兼事權甚重以武臣爲之副今江浙淮廣京湖利路帥臣皆帶都總管但存虛名而其副特以處貴族親戚及其離軍之人無可釐之務葢以厚祿優之非復祖宗之制矣兵馬都鈐轄兵馬都鈐轄祖宗時不常置成都大邑也帥臣苐帶兵馬鈐轄而兩武臣之爲鈐轄者與鈞禮熈寧茂夷之變蔡仲逺自渭入蜀始以都鈐轄爲名蔡下令兩鈐轄循堦神宗不樂遂罷歸於是馮當世以前執政來爲安撫使而都鈐轄之名不等矣建炎末宣撫使始命立之復帶都字後益瀘廣桂五州牧皆以都鈐轄爲稱而江西贑州以多盗其守臣亦帶江西兵馬銓轄至於武臣爲路鈐者亦無尺籍伍符然每嵗猶徃諸州按閲特存故事而已間有得㫖葺治軍器或訓練禁軍者則仍帶入銜云諸軍都統制諸軍都統制古無其官宣和間西南用兵大將或三四人不相統一故即其中㧞一人爲都統制以總之兵罷則如故建炎元年五月既置御營司遂擢王襄愍淵爲都統制統制名官自此始其後神武五軍及川陜宣撫司都督府樞宻院皆有之紹興初諸大將官既尊悉號宣撫司其將佐則謂之統制官去都字十一年三大將兵罷乃擢其偏裨爲御前諸軍都統制自太尉至諸司使副皆得爲之惟官至師相則帶領都統制職事十八年川陜三大將亦如故今興元江陵建康鎮江府與金鄂江池州及平江許浦水軍皆除都統制㤙數畧視三衙權任在帥臣之右焉官卑者亦止稱副都統制副都統制副都統制紹興七年始置後省乾道三年五月荆南都統制王宣久病上恐其不起且方邉報不一乃除員琦爲副使同管軍欲俟宣疾愈改授已而諭輔臣曰朕欲今後江上諸軍各置副都統一員令兼領軍事豈惟諸將他日統師亦使主將有頋忌不敢專擅妄作大臣皆曰善上因欲令軍中自推遷葉子昂丞相言不可上悟曰極善當自朝廷除人不然即似唐籓鎮大臣又言都副統制禮數宜有隆殺且爲條約將上上曰如此庶㡬他日不致爭權越禮誤國家事遂行之然興州自呉挺亡久未嘗除人葢重之也其他軍數少者都副統師亦不並除云統制統領官統制統領官三衙及御前軍將佐也祖宗時禁兵但以路分州都監等領之神宗用兵始置百三十將是在鈐轄路分之外矣渡江後大將軍又有統制同統制副同統制統領同統領副統領等其外又有正將副將凖備將之名皆偏裨也舊制凖備將而自主帥陞差仍先申樞宻院審察乾道七年建康都統制王寵罷乃陞差將佐數百人代者王友直言於朝二月庚申有詔訓練官部隊將而下軍中一面出差仍申朝廷照㑹紹熈四年正月乙酉詔江上諸將陞差統制至凖備將者令主帥解發三人赴總領所選擇一名事既行諸將皆不以爲便慶元三年二月戊午詔令陞差並委主帥選擇令總領或屯軍處守臣審覈保明申宻院紹熈㫖揮勿行自是主帥之權復重矣建炎雜記甲集卷十一

body:
  text: 建炎雜記甲集卷七宋李心傳撰時事張魏公誅范瓊范瓊者山東人靖康初斡里雅布入寇瓊以萬人勤王拜京城都巡檢使二帝北狩張邦昌僣立瓊實與其謀以此遷神龍衙四廂都指揮使髙宗即位釋其罪以為御營平寇前將軍明年冬俾將兵北伐瓊至平敵方盛遂自淮西間道移江東日以聲色自奉又轉而之江西苖劉既誅吕安老為諫官首奏其罪且有取瓊之䇿時陳待制戩為監察御史奉詔召瓊入朝瓊陳兵以待剝人以懼之陳不為動徐謂瓊曰將軍不見苖劉之事乎願熟計之乃引兵趨行在既至未肻釋兵因奏乞貸管軍左言等朋附苖劉之罪又言招盜賊十九萬人皆願聽臣節制上駭而怒於是吕忠穆為相張忠獻在樞密忠獻奏瓊大逆不道罪惡貫盈今釋不誅他日必有王敦蘇峻之患上許之吕公奏曰臣與瓊舊有嫌不敢獨任其事願付張浚劉彥冲彥冲時權樞密院檢校忠獻退召彥冲謀之夜鎖吏於府中使為榜劄敕書皆備明日朝退乃遣神武右軍都統制張浚以千人渡江若捕他盜者使其帶甲以來因召御營副使劉光世及瓊赴都堂計事瓊從兵溢途巷意氣自如食已忠獻等相顧未發彥冲坐廡下恐事覺遽取寫敕黃昏詣前揖瓊下謂曰有敕將軍可詣大理置對瓊眙愕失措彥冲已揭榜疏其罪狀於省門浚使光世出撫其衆曰所誅者止瓊耳若等固天子自將之兵也衆投刃曰諾即分其兵𨽻神武五軍械瓊送棘寺後五日有詔賜死中外快之先是國威不立諸大將多偃蹇不恭及瓊就誅始知有國法矣處州義役德興義役乾道中范文穆成大知處州言松陽縣民輸金買田以助役戶為三千三百畝有竒按此役次以名聞官不煩差科可至一二十年者請命諸縣通行之事下戶部看詳蓋江浙民久病差役催科往往破家竭産用是良民畏憚後爭訟囂然故文穆以為言然事未下也及文穆為中書舍人復言處州六邑義役已成可以風示四方美化請命守臣胡沂以其規約來上從之乾道七年正月淳熙初知州事陳孺還朝乃言民間貧富不均今止據成規差役爭訟不已請依舊法以物力資次差募事常平司三年二月已而用言者請命郡太守務在其必行有能率先量與推賞六年正月又言請有罰以禁其沮敗六年二月許之於是知常州李結請捐官田豫民以充其義役自於兩浙為始乃先以本州未經佃户官田二十餘萬畝均給義役事下版曹給舍義役乃命結措置以聞六年正月而卒不能行久之慶之布衣上書申言義役事甚詳八年十二月詔知州事季翔修義役事翔因請民田百畝毋問其官民併僧道皆出田二畝以助保正長官為置坫基簿而子孫毋得覬覦此法一成可為數百年之利也上許焉然官民僧道既出丁役錢又取其田以助其役者是謂再役也或有議者乃舉一人經御史臺訴其擾十年六月翔不以為然其執政王魯公等皆是翔請時蔣尚書繼周為右正言因力論其擾民請罷翔令兩浙見行十五年冬十月也先是我先君子為饒州德興宰奉詔舉行義役事乃令民以田之多寡而為役之久近如多者役二年少者不過役三月又自三等以上各户賦輸皆與之期不以委之保正至則隨手給鈔即賫民一錢用是稅節賦時以後為恥而保正長官之役亦為之爭先而所不辭也邑人繪先君之象祠焉太府寺丞浮梁程宏圖為之記今有二十年矣其義役規約故在當有能舉行之者云建炎雜記甲集卷七

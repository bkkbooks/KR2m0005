body:
  text: 建炎雜記甲集卷十三宋李心傳撰取士選舉學校飲酒制科制科自紹聖初廢紹興元年春正月詔復賢良方正能直言極諫科有司講求舊制每科場年命中丞給舍諫大夫學士待制三人舉一人不拘已仕未仕命官仍以不曽犯贓私罪人充先具詞業繳進䇿論共五十篇送兩省侍從參考分三等文理優長為上次優為中常平為下次優以上並召赴閣試嵗九月命學士兩省官考試於祕閣御史監之試六論每首五百字以上於九經十七史七書國語荀揚管子文中子正文內出題差楷書祇應四通以上為合格仍分五等以試卷繳奏御前拆號人四等以上召赴殿試其日上臨軒親䇿限三千字以上宰相撰題差初覆考詳定赴試人引見賜坐殿廊兩廂設垂簾幃幕青褥紫案差楷書祗應內侍賜茶果對䇿先引出處然後言事以三等為上恩數視廷試第一人第四等為中視廷試第三人皆賜制科出身第五等為下視廷試第四等人賜進士出身不入等與簿尉差遣已上並謂白身者若有官人則進官與升擢舊制六論與正文及注疏內出題至是有司請除疏義弗用乾道二年夏六月孝宗以久無應詔者乃詔權於經史諸子正文出題又以士人身在幽隱無由自達仍許監司守臣解送四年五月後數嵗乃得李仲信焉乾道制科本末恩數李仲信本末自復制科七十年但得李垕仲信一人而已初紹興七年冬吕安老舉選人胡邦衡及汪彥章舉布衣劉汝一邦衡遂除樞密院編修官乾道三年虞雍公撫蜀首薦仲信於朝不報五年春汪聖錫為吏部尚書復以應制詔上其詞業時垕父仁父為祕書少監也其年冬禮部言李垕詞業乞送兩省侍從參考訖依紹興元年九月指揮施行鄭仲一權侍郎三省勘會李垕詞業已經御覽陳應求虞并父為左右相有旨特令來年三月依格召試命下左正言施元之德初方候對因為起居郎兼權中書舍人林機景度言故事無獨試者當繳之景度即奏制舉所以待非常之才渡江以來從臣亦常論荐其人若劉度祝鎰是也然皆寢而不報蓋事體至重不可輕也按胡邦衡亦與吕安老舉賢良詞業上即日除樞密院編修官景度蓋未知此也今復此舉必依祖宗典故勿使論者可得而議其失則國家可以示公而垕得此名亦無忝矣謹考舊制具本人詞業繳進送兩省侍從參考分為三等次優以上召赴閣試糊名考校無一人獨試者今垕詞業未經參考而又獨試一名恐非典故今所有録黃未敢書行德初亦奏祖宗制科之設自有典故今李垕詞業雖除付後省未有許令參考繳奏指揮遽有召試中書之命即是未應前後典故兼國子監看詳明言合送兩省侍從參考况將來閣試六論本朝典故亦須三四人以上糊名考校無一名獨試者乞重此非常之科且以垕詞業令有司公共參考來上俟相繼有一二人然後俾之就試庶幾有得賢之實無幸進之譏詔除汪應辰李燾有妨嫌令兩省侍從官參考聞奏十二月丙午指揮仁父時兼權左史既而上聞二人握手私語乃大怒之左相陳應求奏元試中有獨試故事幾為人所使因極論二人之姦後二日詔林機施元之身居出納言責之地朋比相通可並放罷十二月二十九日庚戌旨揮六年夏兩省侍從參考到垕詞業援證既詳遣詞亦贍欲為次優户書曽欽道為首有旨八月下旬召試四月十二日癸巳後十餘日利路又繳到吳淇應賢良方正科詞業詔參考聞二十六日丙午又月餘應求坐論祈請事免相五月十九日己卯仁父亦出漕河北六月二十七日丙子時虞并父獨相仁父與應求素善疑當路沮之入辭面奏疏言制舉獨試一人雖有穎贄林陶李孜高志寧錢彥逺趙彥若吳奎謝悰故事而垕涉學荒淺恐不足當此異恩别致人言乞候將來更有進卷合格當召者許令同試上不許仲信乃乞隨侍并父為奏有旨别聽指揮七年春科詔既下并父因進呈召試賢良當降詔上曰數十年來未有應此選者并父曰昨李垕已得旨召試或者與其父燾不相樂聲言欲沮之垕以此乞隨侍上曰今可召試矣令九月召試中書四月四日戊申降旨九月戊戌召試中書後省前一日命學士嚴考至日嚴考試右史李秀叔參詳比試仲信凡五通六論題一曰明主有必治之道二曰湯法三聖三曰人者天地之心四曰厯律更相治五曰三家言經得失六曰揚雄張衡孰優十月乙巳進呈上曰昨覽垕成文亦好一日之間成數千言良不易也并父曰記題試難垕能記其五上曰湯法三聖出功臣表而垕以為諸侯王表却是記得全文不差十一月甲戌上親䇿於集英殿有司考入第四等戊寅上特御殿引見賜制科出身故事賢良方正無唱名之例而禮部言若倣選舉進士皇帝御殿推恩足彰崇儒求言之盛遂從之周子充為禮部侍郎林謙之兼權郎官尋授左文林郎瀘川郡節度使推官淳熙初為祕書省正字兼國史院編修官纍遷著作郎被章去久之奉祀歸蜀而卒李文簡與孫牧齋書之後被旨八月次旬召試造物者意乃不然公出諱以沮遏之尋因入辭力告上乞免上弗許仍宛轉託渠具奏始有指别聽候旨揮其間曲折甚多垕必具報而虞直閣公亮行狀乃云李應制科差日命官且試矣會有欲搖沮之者李不復望試從公圖之於是虞公亟入奏用蘇子由以病展日故事為更命官改日鎖院今以史考之未見改日命官之事亦不省出諱謂何雖虞公數論林施不當罪復以郡處之然卒獨試者虞公之力也制六科題淳熙再試科制本末制六科題舊以四通為合格淳熙四年李仲信之弟孰季修復舉賢良方正南士頗嫉之而近習貴璫又恐制䇿之或攻已而共搖沮焉會台守趙子直舉宣教郎薑凱信等唐與正舉迪功郎鄭建德吏部侍郎趙粹中舉亳州布衣馬萬頃應詔上問輔臣故事召試賢良嘗有黜落者否執政對曰昨來召試止李垕一人他日若試數人須有優劣既而潘察院緯又上章言制科論䇿皆燈窗著述之文而䇿限三千字亦豈無平日待對之語惟六論一場所當加意若罷注疏命題而復以四通為合格則與應進士舉一場試經義五篇者何異試之日有詔以五題通為合格是嵗始命糊名謄録如故事所試六論一曰因者君之綱二曰易數家之傳孰優三曰前世厯法差四曰十二節備如何五曰王學本賈氏六曰動靜繁寡如何後二日考試院言試卷內多有不知題目出處及引用上下文不盡止有僅及二通者上命賜束帛罷舉者周益公輩皆放罪或曰故事六題一明一暗上下文有度數及事數謂之暗題是時舍人錢師魏素與周李諸人異趨且承嬖近旨奏言制舉甚重須稍難其題御筆因差師魏考試故所命皆暗題云仁父時為禮部同修國史仲信為著作郎未幾仲信被旨考上合式因䇿問本朝制科典故有云蘇洵皆嘗黜落富弼張方平粗試題意亦不免錯誤坐此為臺官所攻皆罷去仲信亦罷明年秋言者又論注疏命題蓋以觀其博洽謂宜復舊又從之十一年夏校書郎奚商衡轉論制科取士不必拘三年之制上諭大臣曰賢良得人國家盛事遂特以六月五日降詔然未有應者十二年春李獻之以右史直禁中面奏賢良之舉肇自漢文本求讜言以裨闕政未聞責以記誦之事也使其才行學識如朝董之倫而注疏未能盡記則於治道又何損乎乃復罷注疏命題於是陳天與守池舉閩人莊治立宗卿守平江舉郡人滕成十三年六月召試六論題一曰身者治之本二曰聖人通天地之心三曰五星為經緯四曰厯律本於易五曰六德以民為紀六曰岑彭馮異之功孰大二人皆四通顔侍郎師曽為考試官言其文理平常不應近制遂罷之自是制科無復得試者矣博學宏詞科試格恩例附博學宏詞科紹興三年七月始置紹聖間既廢制科不用乃創宏詞科大觀中改為詞學兼茂至是用工部侍郎李擢奏别立此科以制誥詔書表露布檄針銘記贊頌十二件為題古今雜出六題分三場每場一古一今遇科場年應命官除歸明流外進納及常犯贓人外許徑赴禮部自陳先投所業三卷朝廷降付學士院考其能者召試見任官經所屬投所業應格召試然後任附禮部貢院知舉官分三等考校以合格真卷納中書省看詳宰執將上上等遷一官選人改京官無出身人賜進士及第並免召試除館職中等減三年磨勘與堂除無出身人仍賜進士出身並擇其尤者召試館職下等減二年磨勘與堂除無出身人賜同進士出身遇館職有闕亦許審察召試初詞科惟有出身許應此科上以用武權停此擢請復科而其子益能粗有文墨於是有司看詳兼許任子就試亦非舊典蓋為益能計也然益能卒不與選自立科後入中等者惟汪叔詹洪景嚴湯進之三人其六十九人皆下等蓋蘄之也舊例每舉合格不得過五人若人材有餘臨時取旨紹興後所取未嘗過三人淳熙八年以後又止取一人慶元五年應宏詞者三十有一人無合格者也三嵗取士三嵗取士祖宗舊制也建炎元年當省試以啚城故展用二年紹興元年當殿試以行明堂禮亦展用二年十年當秋試廖中丞剛建言自治平以來三嵗舉士率用大禮科場省殿試為三年故任子與登第人注闕無妨而漕司經費亦給自軍興再展今秋試與大禮相妨請展一年以應古制上納其言乃詔諸州以十年發解而十二年省殿試焉自後科場以十年為凖四科祖宗以來但用詞賦取士神宗重經術遂廢之元祐兼用兩科紹聖初又廢建炎二年王唐公為禮部侍郎建言復以詞賦取士自紹興二年科場始復曽侍御統請廢經義而專用詞賦上意鄉之吕元直不可而止十三年國學建髙司業抑崇言士以經術為本請頭場試經義次場試詩賦末場試子史論時務䇿各一首許之十五年詔經義詩賦分為兩科於是學者競習詞賦經學寖微二十五年冬上諭沈守約曰恐數年之後經學遂廢明年二月詔舉人兼習兩科內大小經義共三道三十一年言者以為老成經術之士強習辭章不合聲律請復分科取士仍詔經義合格人有餘材許以詩賦不足之數通取不得過三分自今年太學公補試行之迄今不改先是舉人既兼經義詩賦䇿論應號四科然自更制以後惟紹興十四年二十九年兩行之而止蓋舉人所習已分為二不可復合矣類省試類省試者始髙宗在揚州以軍興道梗建炎元年十二月遂命諸道提刑司選官即漕司所在州類試率十四人而取一人開封以臺官監試諸道令提刑臨時實封移牒漕司一員不得預考校榜揭逺方之士多訴其不公紹興元年六月始專擇諸路憲漕或帥守中詞學之人總其事時張魏公為宣撫處置使以便宜令川陜舉人即置司州類省試五年始試進士於南省惟四川即試宣撫司自七年後又移置制司迄今不改始朝廷既命宣司類試又詔選有出身清強見任職司一員監試見任京朝官有出身曽任館學或有文學者充考試官二十七年五月言者以為不能無弊悉罷之令赴南省事下國子監楊文安椿時以兵部侍郎兼祭酒言於朝曰蜀士多貧而使之經三峽冒重湖狼狽萬里可乎欲去此弊一監試得人足矣遂請令監司守倅子弟賓客力可行者赴省他不在遣中二十九年七月吏部侍郎周綰復請遣行在清望官充監試上以道逺難遣乃以成都漕臣王之望詹叔充監試嘉州守臣何逢源資深為考試官而别所亦差官監考試又詔監試官依監學除法取摘試卷詳定類省試降敕差官自此始是日禮部侍郎孫道沖侍經筵請罷類試令徑赴禮部上曰早晚與執政議今嵗已無及後舉當遣御史監之太沖曰祕語契驗豈御史所能防自慶元後監試考試官率以南士餘官選南士及蜀人參之然去取之柄專在南人無復曩時之疑矣國子監解試行在國子監解試以察官一員監試郎中二員充考試官職事釐務官六員充點校試卷官試太學生及武舉而别試所以郎官一員充考試官兼監試職事釐務官三員充點校試官試國子生及朝士同姓有服親南省以學士或尚書一員權知貢舉又侍從臺諫二員權同知貢舉卿監郎官八員察官二員充參詳官館學及職事釐務官二十員充點校試卷官兼試宏詞及宗室别試所以卿監一員充考試官兼試職事釐務官四員充點校試卷官附試武舉殿試以館學郎官四員充初覆考官各以餘官一員充點校試卷官侍從二員充詳定官兩省二員充編排官以上並降敕押入院諸路解試諸路解試官故事皆自轉運司選差率以本州通判監試本路見任或待闕官充考試官乾道六年四月丙午始命諸州試官皆隔一郡差以絶請託之弊時劉通靖章為禮部侍郎用其請也淳熙十六年春試王侍郎溉為潼川漕始令試官每員皆立三郡合符合乃聼其入後又行之西川迄今不改慶元四年有果州州學教授王華者考昌州春試於尚書斷章出問明年正月尚書省奏罷華時漕臣汪德輸故相伯彥孫太府卿召嗣子也議者謂汪祖任入官故擇考官不善張尚翁為監察御史因謂自今漕臣不由科第進者更委他監司一員選官校試仍擇有文學士望者一人為點校官專掌命題去取之事即有不稱加以重罰從之蓋自嘉泰元年始四川類省試官四川類省試官自敕差監試主文之外制司差考試官四員以有出身知州充點校試卷官十員以京官選人有士望者充别試所則但差小試官二員而已舊監試主文皆是差提運轉近嵗多以郡為之而考試官率差倅二至郡守之嘗任館學者或不差非故典也宗室差試官自熙豐以來宗室不差試官淳熙六年十一月周益公為吏部尚書始請宗室充學官及考試八年正月遂命趙子直為省試别院考試官紹熙四年以子直知貢舉然外郡至今未有差宗室校試者蓋漕吏守舊法而不知新旨焉燈挾之禁燈挾之禁近嵗惟行在國子監及南省行之若兩浙漕司則雖禁燈而以弛挾書律矣其他郡國秋試率達旦乃罷雖類省試亦然至紹興二十九年王瞻叔護試始復禁之然習俗之久矣雖令不行今秉燭挾書如故諸路同日解試祖宗舊制諸路州軍科場並以八月五日鎖院惟福建去京師地逺先期用七月川廣尤逺又用六月紹興十三年八月詔以閩廣去行在不逺並令八月五日鎖院然其諸軍州有例選日引試由是舉人多貫通而再試於他州者或妄引親賢而再試於别路者至有一身而兩次預為薦送者二十四年正月詔太學及諸路並以中秋日引試惟四川則悉用三月十五日焉類省試舊以九月二十四日制置司言去行在地逺恐舉人赴御試不前請以八月鎖院許之迄今不改避親牒試牒試者舊制以守倅及考試官同異姓及有服親大功以上并婚姻之家與守倅門客皆引嫌赴本路轉運使别試若帥臣部使者與親屬門客則赴鄰路率七人而取一人紹興後牒猥試者多至二十三年成都一路就試者三千五百人而發解則五百人矣議者以此為濫於是成都路以八十三人而潼州路以八十人為定額時眉倅李彥輔永康倅郭印皆坐牒試避親屬舉人冒濫雖會赦猶展磨勘年及降官然此弊特東西兩川夔州路而與東南諸漕司則解不過三數人而已至紹興五年夏王巽澤溉自成都轉運判官召還入見極言其兩路冒親詭貫之弊乞各存十人外均與本路諸州從之仍各以二十人為定額丘宗卿時為制置使請復每路止存十二人若其就試者少則以二十人而取一人奏可舊制命官鎖廳赴漕試者與避親舉人同試王巽澤為益漕始令分場以革假手之弊於是西蜀皆然蓋自紹熙三年春三月始潛藩恩試潛藩恩試者蓋自未渡江之前有之然必曽請舉人兩到省以上乃得試紹興二年蜀州舉人以髙宗覃恩往赴類省試理堪試則送試院不限人數取文理優長之人乃為合格也初任除知州教官自是而為兩學之選矣嘉泰元年二月言者請四川制置司遇類省試年分倣禮部附試學官許有出身人具其所業而赴制置司陳乞委有出身通判或教授看詳是嵗就試者四人而取二人蜀人試教官自此始初出官人銓試銓試者舊有之凡任子若同進士出身之人皆赴建炎兵火後權停紹興三年始復無出身人許習經義詩賦時議或刑統義斷案十三年九月詔兼試二場惟有出身人試律如故其任子之在蜀者舊法令益梓兩路漕司輪年分春秋銓試乾道二年從知蜀州楊民望之請委制置司主之後又降敇差監試考試官惟蜀士同出身之在東南者則免銓試故事春秋再試十人而取七人乾道二年後止春試二人而取一紹熙末議者病其寡學乃試三人而取一後三年謝用光為吏部侍郎上言今世祿之家已留意學問請復舊制詔許焉今蜀中銓試甚寬凡假手者率費七百緡又有勢要子孫鮮不與選或謂宜悉赴吏部然吏部亦不免此勢要當如祖宗時先試而後命可也舊銓試未合格者許堂除淳熙中孝宗始嚴其令八年八月趙魏公帥瀘奏其子顯書寫機宜文字既受敕矣木待問藴之在西掖緣他事以未銓試為言遂寢其命紹熙元年八月計司業又奏乞中選人就吏部長二廳前簾試中然後許參選小經義一首或小賦或省題詩一首眀年四月吏部條具如所奏內同進士出身并恩科人更不簾試仍四川制置司一體施行從之黃子由時為考功郎中建言今已增試律義自不須更簾試大臣進呈光宗曰簾試革其代筆之弊正當更嚴豈可廢也三年八月謝子肅侍郎又言銓試不中四十以上注箋另開人乞令郎官就長二廳寫律一條俾之解釋如或不通未得參注從之如任子降等補文學者與恩科人皆免銓試孝宗以為非是亦命試焉惟宗室子弟銓試則試場中無雜犯者皆出官蓋朝廷優天屬之意廣東西漕司舊亦有銓試乾道八年罷之試教官試教官者自熙豐間始程伊川嘗非之今不廢其法凡有出身人考試者先具所業經義三道詩賦各三道赴禮部陳乞者文理堪試則送試院不限人數取文理優長之人為合格初任除知州教官自是為兩學之選嘉泰元年二月言者請四川制置司遇類省試年分做禮部附試學官許有出身人具所業赴制置司陳乞委有出身通判或教授看詳是嵗就試四人而取二人蜀人試教官自此始試刑法試刑法者亦自熙豐間始舊附銓試院兵火後權停紹興三年始復後又降敕差試官二員專撰刑法問題號為斷案其合格分數例以五十五通作十分為率五分以上入第二等下係二十七通七釐半四分半以上入第三等上係二十四通七釐半四分以上入第三等中係二十二通以上凡試入二等者選人改京秩蓋趙忠簡為相以刑名之學其廢已久故白上請復之今遂大理評丞之選二十五年四川制置司請每三年就類省試院别差刑法官二員校試從之新科眀法新科眀法者熙寧間改舊眀法科為之崇寧初廢取其解省額歸禮部建炎二年正月大理少卿吳環言法官闕人請復此科許進士嘗得解貢人就試從之紹興十一年始就諸路秋試每五人解一名省試七人取一名皆不兼經義眀年御試詔察院分為二等第一等夲科及第第二等夲科出身十四年七月言者以為濫請解省試各遞增二人解試七人取一省試九人取一所試斷案刑名粗通以十分為率斷案及五分刑名統義文理俱通者為合格無則闕之自後舉者人兼經義十六年二月遂罷迄今不能復矣覆試權要子弟覆試權要子弟者太祖之法也紹興十二年秦申王當國其子熺始冠多士二十四年其孫塤者復試南省為第一及廷試有司擬塤為榜首上閲之置之第三會淮南提舉常平朱冠卿應詔上書極言其弊於是追奪塤出身敕而曹冠以下七人有官者有改𢃄右字者餘並剝放二十七年始詔兩省臺諫侍從有服親省試合格者令禮部具名以聞命後省覆試自是遂為故事鎖廳人不為狀元鎖廳人不為狀元非故事也祥符二年梁固廷試第一固翰林學士灝之子景德初已賜進士出身矣皇祐初沈文通以齋郎對䇿為第一宰相陳公恭疑已仕者不當為第一名乃降為第二其後王昂榜本嘉王楷汪洋榜本秦熺陳誠之榜本黃中王佐榜本董德元梁克家榜本許克昌蕭國榜本趙汝愚鄒應龍榜本莫子純曽一龍榜本許奕皆用此例新進士期集新及第進士舊以名次髙下率錢期集貧者或稱貸於人裕陵聞之熙寧六年始賜新進士錢三千緡為期集費自余中始也渡江後賜千七百緡自是遂為故事舊新進士入謝賜謝恩銀百兩熙寧六年亦罷之今新進期集所號為團司置局於禮部貢院釋褐日即赴上三人主之其職事有紏彈箋表主管題名小録掌儀典客掌各色器用掌膳掌酒果監門等事多至百餘人仍具所差名姓申禮部御史臺照會後旬日朝謝又數日拜黃甲敘同年於禮部貢院其儀三名設褥於堂上東西相向同年四十已上立于東廊四十已下立于西廊皆再拜拜已擇榜中年長者一人狀元拜之復擇最少者一人拜狀元又數日赴國子監謁謝先聖先師鄒國公用釋菜禮三名為三獻榜中有望者一人為監禮官已謝賜聞喜宴于禮部貢院侍從已上及館職皆與知舉官押宴已宴立題名石刻乃罷局焉大凡團使至狀頭授告出國門乃罷國朝三元孫漢公淳化二年舉進士自開封至南省廷試皆第一前未有也至咸平五年王沂公青州南省廷試皆第一慶厯二年楊審賢皇祐元年馮當世復皆第一宋有國二百餘年為三元者止此四人爾制策入三等再舉制科本朝制策入三等者四人吳正肅蘇文忠范子功孔常甫再舉制科者一人張問定景祐元年茂才五年賢良方正也此亦前所未有新進士廷射新進士廷射舊未有淳熙初孝宗常論大臣欲令文士能射御武臣知詩書二年詹晉卿榜上特御射殿引晉卿以下一百三十九人按射翼日引第五甲及特奏名一百五十一人皆具襴笏入殿起居易戎服射訖乃退正奏名中的中帖上垜者推恩有差特奏名五等人射合格者與文學其他例賜束帛凡用三千匹云紹興初黃丞相奏言射以觀德既不合格而復賜之帛則似無為此例可削去亦省費之一端也上從之廷試賜燭舊例廷試舉人至暮者許賜燭然殿深易黑日昃則殿上燭出矣慶元五年上初䇿士江西正奏名進士黃實嚴州特奏名進士黃甫鑑納卷最後亷州特奏名進士劉嘉猷賜燭至一更四點御藥院言故事賜燭正奏名降一甲如在五甲降充本甲末特奏名降一等如在第五甲與攝助教詔如故事世傳張子韶嘗扣殿陛賜燭納卷最後上親取其策觀之歎其鮮亮遂擢為榜首其實不然殿試詳定官别立等祖宗舊制殿試初考官既定等乃定封印以送覆考復定等第而詳定所或從初或從覆考不許别自立等嘉祐間王荆公為詳定官始乞不用初覆考兩處等第别自立後遂為例紹興五年八月孫叔詣為學士上言如此則髙下升黜盡出于詳考官而初覆考殆為虛設請復舊制如初覆考皆未當乃許奏稟復置等第從之是嵗殿試兩考立等不同詳定所以聞詔編排官定奪趙公時陳議以為非是請用崇令闕隔二等纍及五人各開具合升降因依以聞詔可然自紹興乾道淳熙紹熙之際殿榜上三名多人主親擢云諒暗罷殿試自咸平以來人主有三年之喪則罷殿試而以省元為榜首真宗朝孫僅仁宗朝宋效英宗朝彭汝礪神宗朝許安世徽宗朝李釡髙宗朝黃公度孝宗朝朱待問今上朝莫子純傅行簡是也舊制止除職官惟天聖二年宋元憲獨除京官通判紹興八年黃公度復補京官遂自為故事四川數省試榜首恩數隆殺四川數省試第一恩數視殿試第三人蓋紹興五年以軍興道梗十一月戊子有旨川陕數省試第一人賜進士及第與依行在第三人恩例餘並同進士出身其後何道夫耕對以蜀人才策為丞相所怒乃令禮部奏云數試髙第人多在道途遷延不肯即赴令皇上拭目而望自今第一等人並賜進士出身奏可十八年八月癸巳自是無有不赴御試者惟上不親策則數試第一人恩數如舊第二第三人皆附第一甲九名以上附第二甲云宗室鎖試遷官宗室有官鎖試無官應舉者唱第日皆遷一官若濮王子孫則加一等舊解省皆七人而取一淳熙中詔省試十人乃取一人又有取應宗子者同進士出身餘補承信郎而已宣和六年沈元用榜宗室始不入五等至今以為例焉武舉換文武舉者自仁宗以來有之諸路州軍舊無解額但只就兵部取解率以七十人赴省試前期軍頭引見司於內弓箭庫試驗弓馬於别所附試文以七書義五道兵機第二道上又臨軒親策翼日閲弓馬焉榜首補保義郎與其巡檢差遣並注監當渡江後乃試弓馬於殿前司焉每舉登第者率二十人淳熙後增至四十人自淳熙三年四川數省試始試武士四路共解四十二人省額凡六人乾道六年正月劉孺文在禮曹嘗請復武舉制科而不果淳熙初上以武舉授官與文士不類二年三月乙巳詔武舉第一人補秉義郎堂除諸軍計議官使得預軍中謀議序位在機宜之上他並於進士恩數為差令吏部前一年闕依黃甲注授七年三月丙辰詔武舉願從軍者殿試第一名與御前同正將三名以上同副將五名以上及省試為魁者同守備將舊制監察御史以上許保任武舉一員後增為二會閣門舍人林宗臣請寬保任之法增其人數是月辛未又詔通直郎武翼大夫以上皆得舉二人四月己酉詔小使臣係武舉出身者遭家艱並解官持服用吏部侍郎程函輝國器請也十年十月乙亥詔邉縣注武舉出身人凡武人射兩石弓馬射九斗謂之絶倫苟絶倫雖程文不合格並賜第紹興二十九年趙夢熊武藝絶倫又省殿試皆第一即令為閣職焉乾道淳熙間太學諸生久不第皆去從武舉已乃鎖其􅈦應進士第時王卿月請敘首應二科後官至修注近歲江伯虎君用陳續嗣功亦連中二科伯虎淳熙八年武舉第一人十一年進士第四甲遂換承事郎恩數與狀元等朝廷靳之十六年十月因知歸州林𨽻秀建言遂罷鎖廳之令江後通判泉州而卒陳今知永康軍童子舉三朝推恩人數童子舉者自真廟以來有之髙宗一朝童子求試者三十有六人授官者五人萬頃彭興張宗柔朱虎臣劉轂永免文解者一人晏章免文解者一人林佐國紹興三年始賜帛罷遣者九人紹興三年四月兄弟童子三人邵國州江安松戴滋又張嵓叟巖卿未知何許人惟朱虎臣者能排陳步射及讀七書故補承信郎劉轂以小校子五歲善騎射故補校尉虎臣浮梁人既召見特又賜金帶以寵異之此亦前所未有孝宗一朝童子求試者七十四人而命官者七人有吕嗣興者衢州人也四嵗能誦書切韻變四聲書八卦上召見面俾吟詩遂授從政郎賜錢三百緡令伴皇孫榮國公誦讀乾道八年春也又有臨川王克勤尤為警敏初命右從事郎盧陵李如圭三山林公洽何擢並右迪功郎三山何致逺將仕郎廬陵郭洵直下州文學光宗一朝童子求試者十七人無補官者惟從仕郎吳綱年九嵗能誦六經語孟以夀聖親姪孫特改承務郎仍依補法壬子四月也童子賜出身祕書省讀書晏元獻初以童子召試遂賜出身令祕閣讀書久之即以為正字乾道末上踵故事以臨川王克勤敏叔為祕書省讀書制祿視正字之半淳熙初上幸祕閣館職皆遷官選人改京秩有司言克勤優於學上詔以文林郎久之臺官有言其過者遂除初等職官後復以鎖廳中第為太學博士之職自來未有繼之者特奏名試特奏名試自仁宗朝始其後寖寬凡監學生二舉皆免解一作免請同舉人特舉年四十五五十以上者皆赴殿試取其半授官年六十以上試入四等者與嶽廟建炎二年髙宗登極時詔入五等者並調官至今以為例故事恩試等第一人賜進士出身除諸州教授第二人同出身渡江後川陕特奏名人就試於制置司三十年又降敇差監試考試官近歲朝廷以其冗濫患之乃詔三人而取一由是恩收之員少減矣太學養士最盛太學飬士最盛於崇觀間紹興中詔以七百人為額正舍生三十員內舍生百員外舍生五百七十員每三年科場率四人而取一若即行校藝而升上舍者則不待選舉而竟釋褐焉時王㬇知臨安府括民間冒占白地錢歲入十二萬緡有竒為太學飬士之費十六年詔外舍生以千人為額其後三舍生率八百餘人云舊兩學覃恩無免解法孝宗即位始創之自是每有覃慶輒復舉行省額動增數十人遂為定例矣國子監試法國子監生員皆胄子也舊制行在職事官同姓緦麻親釐務官太功親聼補試入學每三年科場率三人而取一若二補中則七十而取一焉然太學生皆得以公私試積校定公數升舍惟國子生以父兄嫌但寄理而已須父兄外補乃移入太學而後得升慶元二年三月傅景仁在翰苑建言國子生員多偽濫請自今職事官期親釐務官子孫乃得試補從之凡監學生皆給綾牒若謁生在外遇科舉則試于漕司舊公私試皆學官主之自淳熙後公試乃鎖院降敇差官學官蓋不得預武學武學自祖宗以來京師有之乾道七年七月庚寅詔學該赴解試人以五十人為額然郡國未之建也慶元五年六月乙亥言者請即諸州州學置武士齊舍選官按其武藝且籍在官荒田以備餼廪從之然後亦不克行釋褐狀元恩例舊制太學生舍生積校以優而舍試又入優等者就化原堂釋褐號釋元例補承事郎太學正録淳熙初鄭自明由此選不數年而為著作郎補郡自明數言事上甚喜久而稍厭之六年劉純叟堯夫復以解褐除國子正時王仲行為兵部尚書奏言今兩優釋褐初除京秩即授學官視狀元制科恩數過之事理不當乞先與外任時知滁州張商卿亦言今中上舍為學官不數年便可作監司郡守獄訟財賦非所素習豈能保其不繆乞先注職官上然之十月丙申詔與殿試第二人恩例太學補試太學補弟子員故例每三嵗科舉候朝廷差官銷院凡四方舉人皆得就試取合格者補入之謂之混補淳熙後朝議以就試者多欲為之限制乃立待補之法諸路漕司及州軍皆以解試終埸人為準每百人取六人許赴補試率開院後十日揭榜然逺方士人多不能則為他人取其公據代之冒濫滋甚慶元中遂罷之嘉泰二年復行混補就試者至三萬七千餘人分六埸十八日引試云蜀學郡國之學最盛於成都學官二人皆朝廷遴選弟子員至四百人他學者亦數百人然未有校試選貢之法淳熙中胡長文為蜀帥嘗議倣太學别立解額會有沮之者不果行慶元三年春士人王正則等訴于朝請以漕司解額移於成都府學事下制置司後亦寢今蜀士之年少者多聚成都若精擇師儒稍立月書季考之令又量取諸路漕司之餘額以豫之俾有所欣慕而成其才庶乎其有益也宗學宗學東都盛時有之紹興十四年春惠國公士和同知大宗正事始請建學于臨安學生以百員為額太學生五十人小學生四十人職事各五人署諸王宫大小學教授一員在學者皆南宮北宅子孫也若親賢宅近屬則别置教授兼以館職不在宗學之列釋奠宗子侍祠郡國釋奠先聖宗子侍祠舊制無之自從紹興十五年始州縣文臣詣學謁先聖乃許視事舊制亦無之自于紹興十四年始改諸王宮教授陳孝恭知永州羅長源建此二議而朝廷行之文宣王鎮圭紹興十四年國學初建內出鎮圭以奉文宣王慶元三年上將行大禮而內府無圭乃于國子監借文宣王圭用之鄉飲酒鄉飲酒者紹興二年四月林待制保為禮部郎中請命太常草具其禮下郡邑行之又詔非常與鄉飲酒者毋得應舉其儀有肅賔祭酒主獻賔酬主人酬介介酬衆賔修爵無算沃洗揚觶拜送拜既凡十二節又有約束凡事主人以守令其酒食器用卿大夫士之有力者共為之行之十餘年士人不以為便二十六年四月新通判撫州陳洙之請雖不遇鄉飲酒者許應舉又詔鄉飲酒聼人自為之公家毋得預自是不復講焉建炎雜記甲集卷十三

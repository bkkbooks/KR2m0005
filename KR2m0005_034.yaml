body:
  text: 建炎雜記乙集卷十四宋李心傳撰雜事二岳少保誣證斷案岳武穆飛之死王仲元揮麈錄載王俊吿變狀甚詳且云嘗得其全案觀之仲貫父為尚書郎問諸棘寺則云張俊韓世忠二家爭配饗時俊家具賂取其原案藏之今不存矣余嘗得當時行遣省劄考其獄詞所坐一時煅煉文致之詞然猶不過如此則飛之寃可見矣今錄於後紹興十一年十二月二十九日刑部大理寺狀准尚書省劄子張俊奏張憲供通為収岳飛處文字後謀反行府已有供到文狀奉聖旨就大理寺置司根勘聞奏今勘到龍神衛四廂都指揮使閬州觀察使髙陽關路馬歩軍使副都總管御前軍都統制權副都統節制鄂州軍馬張憲僧澤一右朝議大夫直秘閣添差廣南東路安撫司參議官于鵬右朝散郎添差通判興化軍孫革左武大夫忠州防禦使提舉醴泉觀岳雲省蔭人智浹承節郎進奏官王處仁從議郎新授福州專管巡捉私鹽蔣世雄及勘證得少保武勝定國軍節度使充萬夀觀使岳飛所犯内岳飛因為探報得金人侵犯淮南前後十五次乃受親劄令指揮策應措置戰事而坐觀勝負又逗留不進及因董先張憲問張俊軍馬如何怎生地言之道都敗了回去也便乃指斥乘輿問張憲董先道你只將一萬人已跎踏了及因罷兵權後又令孫革寫書與張憲令措置别作擘畫又令看訖焚之又令張憲虛申報四太子大兵前來侵犯上流自是之後張憲商議待反背而據襄陽及把截江㟁兩下令虜官私舟船俟又累次令孫革奏報不實及制勘虛妄等罪除罪輕及指斥乘輿情理相切害者斬係罪重外法等稱律有臨軍征討稽期三日者斬其岳飛合依斬刑私罪上定斷合決重杖處死看詳岳飛坐擁重兵於兩軍未解之間十五次被受御筆拜遣中使督兵逗留不進及如此時輙對張憲董先指斥乗輿情理相切害者又説張憲董先跎踏張俊韓世忠人馬及移書與張憲令措置别作擘畫致張憲意待謀反據守襄陽等處作過委是情理深重勅罪人情重法輕奏裁張憲為収岳飛書令憲别作擘畫因此張憲謀反要提兵占據襄陽投拜金人因王俊不允順方有無意作過之言並知岳飛指斥切害不告并依隨岳飛虛申無糧進兵不得及依于鵬書申岳飛之意令妄申探報不實及制勘虛妄除罪輕外法等稱律謀叛絞其張憲合於絞刑私罪上定斷合決重杖處死仍合依例追毁出身以來吿勅文字除名本人犯私罪絞舉官見行取㑹候到别具施行岳雲為冩諮目與張憲稱可與得心腹兵官商議擘畫因此致張憲謀叛除罪輕次等外法等稱勅傳報朝廷機密事流三千里配千里不以蔭論勅刺配比徒三年本罪徒以上通比滿六年比加役流律五品犯流以下減一等其岳雲合比加役流私罪斷官減外徒三年追一官罰銅二十斤入官勒停看詳兵雲因父罷兵權輙敢交通主兵張憲節次催令得與心腹兵官擘畫因此致張憲提兵謀叛及傳報朝廷機密惑亂軍心情重奏裁岳雲犯私罪徒舉官見行取㑹到候别具施行于鵬為所犯虛妄并依隨岳飛冩諮目與張憲等妄說岳飛出使并令張憲妄供探報除罪輕外法等稱𠡠為從不配律五品犯流罪減一等于鵬合徒三年私罪官減徒二年半追一官罰銅十斤入官勒停情重奏裁于鵬犯私罪徒舉官見行取㑹候到别具施行孫革為依隨岳飛冩諮目與張憲稱措置擘畫等語言并節次依隨岳飛申奏朝廷不實除罪輕外法等稱律奏事不實以違制論徒二年律共犯罪徒減一等其孫革合徒一年半私罪官減外徒一年合追見任右朝散郎一官官誥文字當徒一年勒停情重奏裁孫革犯私罪徒舉官見行㑹侯到别具施行王處仁為知王貴申奏朝廷張憲背反供伸岳飛并説與蔣世雄等稱𠡠傳報漏泄朝廷機密事流三千里配千里應罪刺配比徒三年本罪徒以上通比滿六年加徒流官當准徒六年其王處仁各於比加徒流私罪斷合追見任承節郎并歴任承信郎共兩官官誥文字當徒三年據案别無官當更罰銅八十斤入官勒停情重奏裁王處仁犯私罪流舉官見行㑹問候到别作施行蔣世雄為見王處仁説王貴申奏朝廷張憲待背叛事岳飛處覆除罪輕外法等稱律傳報漏泄朝廷機密事流三千里從減一等其蔣世雄合徒三年私罪斷官減外徒二年半合追從議郎秉義郎兩官官誥文字當徒二年餘半年更罰銅十斤入官勒停情重奏裁蔣世雄犯私罪徒舉官見行㑹問候到别具施行僧澤一為制勘虛妄并見張憲等待背叛向張憲言不如先差兩隊甲馬防守總領運使衙門并欲與張憲詐作樞密院劄子發兵過江及要模刻樞密院印文除罪輕外法等稱律謀叛者絞從減一等其僧澤一合流三千里私罪斷合決脊杖二十本處居住一年役滿日放仍合下本處照僧人犯私罪流還俗條施行情重奏裁智浹為承岳雲使令要將書與張憲等拜受岳雲金馬令智浹將書與張憲等共估錢三百二貫足除罪輕外法稱律坐贓致罪十疋徒一年十疋加一等罪止徒三年謂非監臨主司因事受財七品官子孫犯流罪以下聽贖其智浹合徒三年贓罪贖銅六十斤情重奏裁小貼子據貼黃稱契勘岳飛次男岳雷係岳飛一處送下今來照證得岳雷别無干渉罪犯縁由為岳飛故節飲食成病依律合召家人入侍已就令岳雷入侍看覷候斷下案内人所有岳雷亦乞一就處分降下又小貼子稱所有僧澤一合下本處依條施行又小貼子稱契勘數内于鵬見行湖北轉運司根究銀絹等四百萬合下所屬照㑹後根究歸着日即乞依今之所斷指揮施行又小貼子稱看詳岳飛張憲所犯情重逐人家業并家属合取自朝廷指揮拘籍施行看詳岳飛等所犯内岳飛私罪斬張憲私罪絞并係情理所重王處仁私罪流岳雲私罪徒並係情理所重蔣世雄孫革于鵬私罪徒并係情理稍重無一般例奉聖㫖根勘合取㫖裁斷有㫖岳飛特賜死張憲岳雲并依軍法施行令楊沂中監斷仍多差兵將防䕶餘依斷于鵬孫革蔣世雄王處仁除名内于鵬孫革永不収叙于鵬送萬安軍孫革送潯州王處仁送連州蔣世雄送梧州並編管僧澤一決脊杖二十刺面配三千里外州軍牢城小分収管智浹决臂杖二十送二千里外州軍編管岳飛張憲家属分送廣南福建路州軍拘管月具存亡奏聞編管人并岳飛家属並令楊沂中俞俟其張憲家属令王貴汪叔詹多差得力人兵防送前去不得一併上路岳飛張憲家業籍没入官委俞俟汪叔詹逐一抄劄具數尚書省餘依大理寺所申并小貼子内事理施行仍出榜曉諭應縁上件公事之人一切不問亦不許人陳吿官司不得受理建炎雜記乙集卷十四

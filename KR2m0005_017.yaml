body:
  text: 建炎雜記甲集卷十七宋李心傳撰財賦四國初至紹熈中都吏祿兵廪祖宗時中都吏祿兵廪之費全嵗不過一百五十萬緡元豐間月支三十六萬宣和間崇侈無度然月支一百二十萬渡江之初連年用兵猶月支不過八十萬至淳熈末朝廷無事乃月支一百二十萬而非泛然所及其金銀綿絹不與焉以孝宗恭儉撙節而支費擬於宣和則紹興休兵以後百司宫禁循習承平舊弊日益月増而未能裁削也渡江後郊賞數渡江後郊賞建炎二年用錢二十萬緡金三百七十兩銀十九萬兩帛六十萬匹絲綿八十萬兩皆有竒紹興元年越州明堂内外諸軍犒賜九百六十萬緡四年建康明堂增至二百五十九萬緡宿衛神武右軍中軍七萬二千八百餘人共支二百三十一萬毎人率為十三千有竒劉韓岳王四軍十二萬一千六百餘人共支二十八萬毎人率為二千有竒而方州不與其後日有増益二十八年冬祀上自立賞格命有司行之是嵗錫賚金緡視前郊減半葢自宫禁百官宗戚閹宦下至醫祝胥皂人人有之不可復廢矣三司户部沿革國朝承五季之舊置三司使以掌天下利權宰相不與王荆公為政始取財利之柄歸於中書元豐制户部尚書左曹侍郎各一員掌經賦右曹侍郎一員掌常平苖役坊場山澤之令由是版曹不能經畫中都百官諸軍廪給亦不能理建炎初以軍興國用不足始命張誠伯以同知樞密院事提領措置户部財用黄道周潜厚以經祠副之其後孟富文庾沈忠敏與求皆以執政繼領利權由是少給然所取大率出於經制之外焉自罷總制司版曹但掌經費嵗入僅五千緡出亦稱是一有不足未免支移或遇軍興則除禁帑應副外版曹但能預借民間坊場淨利四百萬緡紹興三十一年十月癸酉或利賣度牒六百萬緡而已隆興二年二月乾道初孝宗嘗記户部嵗入之數較之嵗用但闕三百萬緡元年十二月丁亥時㑹子初行李侍郎若川因請増印二百萬緡二年二月然上半年尚闕五十萬上命左藏南庫以銀㑹子半與之三月壬辰自是版曹嵗借南庫錢百餘萬緡因以為例淳熈中韓子師為户部尚書始免例借自後皆守其規約焉先是上以諸路財賦收支浩繁令兩侍郎分路管認乾道六年正月乙酉淳熈十年王宣子為户部尚書始請於次年四月將諸道監司守倅所起上供錢比較以定賞罰許之八月甲午其後減展磨勘銀有差由是罕有遺欠者迄今遂為定制左藏庫㑹計錄左藏庫者國家經賦所貯也淳熈中左藏庫封過三衙百官請給成嵗為錢一千五百五十八萬餘緡銀二百九十三萬餘兩金八千四百餘兩絲綿一百十八萬餘兩絹一百四十八萬餘疋以直計之金銀錢帛共約計三千餘緡而宗廟宫禁與非泛之費不與焉紹熈間鄭傅之湜以秘書郎轉對為上言今黄老之宫衛卒動以百數外戚家廟防户之兵多於太廟額外將校之俸錢半扵正額取給外庭百官之費不足當闕門醫職近侍之半請明詔大臣裁定經費上自乘輿下至庶府除奉宗廟事兩宫給兵費外一切量裁斟酌罷其不急損其太過時趙徳為户部侍郎因請稽考内外財置紹熈㑹計錄俟見大槩之後命户部宰屬同共詳議而一二大臣公心叶意為之斟酌以其所減損而以予民遂命版書葉叔羽中執法何自然檢正林和叔左右司沈信叔楊濟甫與徳老同為之二年正月丁未丁丑兩次降㫖未幾自然丁内艱去官後亦未聞有所減也左藏南庫左藏南庫者本御前掌管激賞庫也孝宗即位之初年改之先是紹興休兵後秦檜取户部窠名之可必者盡入此庫户部告乏則予之檜將死屬之御前由是金幣山積士大夫至指為瓊林大盈之比二十九年夏河流淺澁綱運不通髙宗嘗出内帑錢五百萬緡以佐調度五月己未已而謂輔臣曰朕息兵二十年所積豈以自奉葢以備不時之須免臨時科取重擾民爾及軍興又出九百萬緡為出師勞功之用明年夏詔從臣條具足食足兵之䇿三十二年四月己亥黄通老為禮部侍郎建言足食之計在於量入為出今天下財賦半入内帑有司莫能計其盈虚請用唐徳宗楊炎之策歸之左藏及上受禪袁伯誠孚在諫院復以為言上從之遂改内藏激賞庫為左藏南庫焉七月癸丑然南庫移用皆自朝廷非若左帑直𨽻版曹為經費也淳熈末始併歸户部十年八月二十八日上諭大臣曰此庫併歸版曹朕亦省事既而都省令户部管認南庫錢二百萬餘緡版書王宣子奏此皆奉親及内教所須不可欠闕計嵗祗應支九十五萬而見在止三十五萬其應入者又三十九萬有竒既闕二十一萬緡而南庫例還户部沙田錢二十三萬緡又在其外合之為欠四十四萬緡是南庫歸版曹無益而有損也乞就撥歸封掌庫其朝廷年例合還户部錢却於封掌庫支取不從既而蔣世修正言又奏南庫撥歸户部於今二年而庫名尚存官吏如故乞併罷上曰若盡廢庫名出入必殽亂可以左藏西上庫為名十二年正月三日於是諸路嵗發南庫窠名錢一百九十八萬餘緡改𨽻本庫後又改稱封掌下庫仍𨽻户部焉紹興元年十月二日左藏封掌庫左藏封掌庫者孝宗所剏也其法非奉親非軍需不支至淳熈末年往往以犒軍或造軍器為名撥入内庫或睿思殿或御前庫或修内司有司不敢執鄭溥之為勅令所刪定官因轉對為上力言之事已十三年矣庫中所儲金至八十萬兩銀一百八十六萬餘兩又有糴米錢度牒錢而下庫復儲見緡當五六百萬十六年夏溥為秘書郎因轉對又為光宗言之䟽入命户部稽考以聞十六年六月然卒不竟也慶元後毎封掌庫取撥錢輙數十萬緡銀亦數萬兩黄金亦數千兩葢以奉神事親之費云六年六月撥封掌庫錢一百萬緡修太皇太后攅宫七年撥二十萬緡入内藏八月撥十五萬緡并銀二萬兩充秋季供奉太皇太后使用又撥金二千五百兩銀二萬充明堂使用又撥一百萬緡修奉太上皇帝攅宫一季之間所撥金銀錢計直二百五十萬緡葢多非泛支用故爾常年則不及此數焉内藏庫激賞庫内藏庫者始因藝祖削平諸國收其帑藏貯於講武殿而太宗太平興國三年因分左藏北庫為内藏庫亦謂景福内庫然嵗入不過錢百餘萬緡銀十餘萬兩真宗咸平中嘗謂宰相曰祖宗置内藏所貯金帛以備軍國之用非自奉也二聖削平諸國親視郊兵所費不貲出於是三司所假凡六千萬兩於淳化迄景徳毎嵗多至三百萬少亦不下百萬三年不能償即蠲除之此庫乃為計司備經費耳故仁宗後西北事起大率多取給於内藏神宗用王荆公計凡摘山煮海坑冶𣙜貨户絶没納之則此舊三司窠名屬左藏庫與常平免役坊場河渡禁軍闕額地利之資悉歸朝廷元豐元年更内藏庫名凡三十二庫毎庫一詩一字目之五年又取苖役羡財為元豐庫直𨽻朝廷在内藏之外張編載元豐庫宜政殿庫乃内藏也本在講武殿後改即崇政殿庫按太府寺南為崇政庫元豐庫在太府寺南元祐初宣仁共政吕正愍公又建元祐庫以備封掌皆號朝廷庫務徽宗崇觀後則大觀東西等庫西城所處無不皆天子私藏而版曹告竭矣髙宗渡江但有内藏及激賞二庫秦丞相用事毎三宫生辰及春秋内教冬年寒食節與諸局所進書皆獻金幣由是内帑山積紹興末有詔除太后生辰及内教外餘並減半二十九年八月丁巳孝宗初又併書詩禮物罷之紹興中始數取封掌錢入内藏上受禪又取淮東總領所羨財五十萬緡入内禁藏識者嘗以為言激賞庫即所謂左藏南庫御前申庫御前申庫者紹興中置凡乘輿所須圖畫什物有司不能供者悉於申庫取之故百工技藝之巧者皆聚於其間日費無慮百千萬内中既有酒庫而申庫所釀尤勝以其餘酤賣頗侵戸部窠額以此軍儲常不足二十九年冬張子公再為吏部尚書因見上言王者以天下為家不當私置申庫以侵國用上從其請盡罷之人由是知申庫之設非上本意也三省樞密院激賞庫三省樞密院激賞庫者渡江後所創也自建炎龍興堂膳始減至維揚又減至臨安又減紹興四年秋趙元鎮為川陜荆襄都督既而不行遂以督府金錢入三省樞密院激賞庫十年秦㑹之當國以烏珠畔盟用兵須犒賜之物乃計畆率錢徧天下五等貧民無得免者然兵未嘗舉而所歛錢盡歸激賞庫其後至嵗支三十八萬緡堂厨萬五十千東厨萬二千玉牒二萬四千日厯勅令所國史院各二萬尚書省犒設一萬三千中書門下七千密院九千識者指為冗費二十九年冬上命御史舍人識之朱漢章洪景嚴奏嵗減二十萬緡十二月癸亥詔可孝宗受禪復減嵗用錢為十萬緡二十二年七月壬戌迄今不改合同憑由司合同憑由司者宫禁所由取索也嵗取金銀錢帛率以百萬計但愁數除破耳雖有嵗終考比之令然郎官第赴内東門司終日巍座而數璫與數㜮自為㑹稽郎官不得預畢事則卷牘尾亦俾之書名而已紹熈二年春議者以為濫予横賜無以撙節請自今内諸司所給賜所營造所取悉從有司定為中制惟正供而已其濫恩横賜皆釐正之詔葉叔羽趙徳老何自然同稽考正月辛未其後亦不果裁節焉修内司修内司者掌宫禁營繕渡江後浙漕及京府共為之紹興末趙侍郎子繡為浙漕奏免修繕以其事歸修内司嵗輸緡錢二十萬後減五萬緡乾道初有司請悉除免上曰如宗廟有損動處安得不修乃再減緡錢五萬然修内司逐時於左藏庫關支錢物猶為不少今又厯赴北部驅磨不過斧若干具鍬钁若干柄而已一錢尺帛並不卦厯故户部亦不得而稽考焉國用司國用司者孝宗始置語在官制中然於國用未有所制也乾道三年春蔣子禮初秉政因謝㤙除留身奏事為上言今費財最甚莫如養兵近陳敏減汰二千人戚方減汰四千人大約一兵毎月減二十千汰兵固為良策然今之軍士類多有官若與之外任既不廢劵錢又加供給大抵離軍使臣每員月費四十餘千劵錢三十六千供給五千臨安一府八十員嵗費錢二萬六千緡以此推之諸道可知雖減之於内而増之於外未見其得上曰若是則減汰全無益子禮曰豈惟無益而已今減六千人則必招填六千人是倍費也臣契勘在内諸軍毎月逃亡事故常不下四百人若權住招一千半内外可暗省二百八十萬緡異時財用有餘更招少壯者練習之不惟省費又可兵精上以為然子禮由此驟相然識者謂此策暫可行也若利其闕額而為之是又蹈宣政之覆轍矣是日二月壬申子禮奏事退御筆批自今宫禁内人并百官三司將校軍兵諸人毎月五日國用房開具前月支過上五項請給數目人數具開進呈自此月為始外路軍馬降式下諸路總領所逐月開具并非泛泛支用之數以聞永為定式云其後廢國用房而版曹進册如故𣙜貨務部茶場𣙜貨務部茶場舊東京有之建炎二年春始置于揚州正月壬辰是年又置于江寧二月乙丑紹興三年又置於鎮江及吉州五年冬省吉州務而行在務場隨移臨安以都司提領其始嵗收茶鹽一息錢六百九萬餘緡紹興元年六年九月詔嵗收及一千三百萬緡許推賞時以為極盛矣休兵已久嵗課倍増二十四年收二千六百六十萬緡三十二年收二千一百六十五萬緡皆有竒乾道三年三月詔以二千四百萬緡為額建康千二百萬緡臨安八萬緡鎮江四百萬緡於是淮東總領所實在鎮江月支𣙜貨錢三十萬緡為贍軍之用淳熈中三務場官吏互爭課賞始禁鎮江務鈔引不得至臨安十年以朱少卿佺為淮東總領遣屬吏劉荀訴諸朝時黄徳澗為中執法率臺諫上言鎮江務場軍食所係倘有不售其害非輕臨安務場年額未始有虧萬一無有羨財不過官吏不該泛賞而已請令提領官總三務場増虧有無以為殿最而鎮江鈔少復如著令許至臨安從之六月戊申自是鎮江務場始給矣豐儲倉外路積糧豐儲倉者紹興二十六年夏始置先是王公明為司農卿寺丞請令諸路以管錢糴米赴行在鍾侍郎世明因奏令諸路嵗發常平陳米十五萬斛啟倉贍軍言者以其壊常平法奏絀之韓尚書仲通在版曹乃請别儲粟百萬斛於行都以備水旱號豐儲四月戊戌其後又儲二百萬斛於鎮江及建康然頗有借兑三十年夏詔補還之四月乙丑今關外亦積糧一百萬斛有竒然行在嵗費糧四百五十萬斛餘建康鎮江皆七十餘萬斛今中都所積但三月之糧關外積糧亦不能支一年古者三十年必有九年之蓄自乙酉休兵至今近四十年矣謂宜益儲積糧以為飢荒軍旅之備否則増糴如嵗用之數以陳易新使常有一年之蓄庶乎其可矣淮東西湖廣總領所淮東淮西湖廣三總領所自休兵後朝廷科撥諸州縣財賦及𣙜貨等錢與之淮西嵗費錢七百萬緡米七十萬石張魏公為都督増神勁軍二萬嵗益費二百萬緡湯丞相以為言故後亦廢然為總領者但能拘收出納而已固非能以通融取予之術行乎其間也至乾道中淮西嵗費已増為一千一百餘萬緡而米猶如故淮東總領所嵗費錢七百萬緡米七十萬石而諸郡及鹽司所輸之緡多愆期者毎月五十八萬緡内浙鹽司三十萬平江鎮江府及常州共十五萬江西九郡共十二萬湖廣總領所嵗費錢九百六十餘萬緡米九十萬石諸路所輸率亦常負十分之三然合三總領所支僅當四川一年之内數益川中糴買嵗為八百三十餘萬緡而三總領收正色米故也凡三總領所嵗用户部經常錢九百萬緡而𣙜貨所支不預渡湖始發三合同關子乾道中以關子折閲詔嵗増撥四川錢帛為二百萬緡補之錢一百七十萬緡綢絹絲綿在内淳熈末盡損之以損四川鹽酒重課而内府償焉朝廷既以嵗額撥錢嵗為永數近嵗軍中大請受人漸少由是年支之外計司稍有贏餘有司疑朝廷惡其優多掩蔽所餘不盡載于成册往往妄稱䟎積以為已功紹熈末内藏庫下淮東總領所取撥羡財明年二月葉正才言此項當存留以備緩急請詔有司自今除毎嵗收支外並將有管實在之數開具成册使朝廷通知有餘不足之數若非緣軍前事毋得輙支移起發欲以他用雖有中㫖許執奏不行俟儲積漸多朝廷經制既立然後職窠名之重輕考撥定之數目寛減州縣還以予民從之惟四川總領所自建炎以後専利權不從中覆故得以守其職業焉四川總領所二事四川總領所贍軍錢并金帛以紹興休兵之初計之一嵗大約費二千六百六十五萬緡其五百五十六萬緡酒課今減為四百一十餘萬三百七十五萬緡鹽課今減為三百餘萬四百餘萬緡糴本二税上科一百四萬緡茶司錢額一百四十四萬逓年實發此數二百三十一萬緡經總制司錢語在經總制前事中九十萬緡錢銀引免界貼頭錢語在兑界事中二十四萬緡三路稱提錢語在其事中十萬緡西河州鹽錢始趙應祥為大漕也紹興五年四川收錢物總三千三百四十二萬緡而所出多五十二萬緡嵗支三千三百九十四萬餘緡吴武安一軍費緡錢一千九百九十五萬明年收錢減二百八十萬出錢増六百六十六萬緡以宣撫司儧剰錢補其闕一年缺九百四十六萬緡而武安軍需増錢三百八十萬緡凡二千三百七十五萬應祥既與武安不協遂丐免七年李子及代為都轉運司一嵗本司所入視六年増六百七萬緡凡三千八百二十九萬所出減二百三十一萬緡凡三千八百二十九萬以入較出猶虧一百六十二萬緡八年子及上䟽言本司應副軍前正色折估米二百六十五萬斛有竒而宣司兵籍以紹興六年考之止有六萬八千餘人計費米若干之例共約費若干斛是米數尚有餘於人數也葢宣司兵官視軍士居十之二官員一萬七千七百餘員兵士五萬七百四十九人皆繫名冗員之人而官員請給十倍於諸兵計司安得不困時武安亦劾子及饋餉不繼子及遂坐免十二年朝廷既罷兵鄭亨仲為宣撫副使右䕶軍嵗計猶缺錢七百七十八萬緡明年詔増印錢引四百萬十六年以後始節次寛減重賦至七百萬緡十八年亨仲召歸而宣總所樁積錢至五千餘萬當此之時蜀中號為優裕乃休兵之力也辛巳用兵諸將増招至十萬六千人増馬五千匹而茶馬等司嵗輸又多所負由是總領嵗闕至六百四十萬緡乾道四年二月丙申有㫖四川宣撫司集四路漕臣於利州以財賦之入對立養兵之額於是宣撫虞雍公澄覈兵籍去其老弱者近萬人諸軍開落詭籍者二千人定立軍額為九萬七千有竒又頗取四漕嵗錢以益之至淳熈間軍籍視武安時増三之一嵗用視武安時減三之一焉葢自乾道再和軍中大請受人益少由是稍有羨財毎遇減放鹽酒絹布激賞之屬計司所抱多至數十萬緡而二十萬緡實此錢也紹熈三年至慶元三年楊少卿輔抱鹽酒三十萬緡權少卿安節抱布估錢三十萬有竒零絹估錢二十八萬緡權少卿安節抱布估錢三十萬緡激賞絹二十萬緡只此六年間計司已抱一百萬緡矣㑹職者猶謂四川總領所多有餘羨其實不然東南三總領所掌利權皆有定數然軍旅饑饉則告乞于朝惟四川在逺錢幣又不通故無事之際計臣得以擅取予之權而一遇軍興朝廷亦不問自建炎軍興後應祥權鹽酒之課折絹布之估科激賞之費倍糴本之輸商賈農民征率殆盡辛巳之役王瞻叔無以為計遂大括白契以贍軍朝廷知其擾民而不容止也自應祥瞻叔為善理財後近嵗趙徳老楊嗣勲權少卿相繼總賦皆以減放為急蜀人幸之徳老嘗減鹽酒折估錢一月凡七十萬緡然今計司所取錢猶有無藝者淳熈六年蠲免鹽酒重課而所折之絹布猶如故至今遇閏月財不減謂之加閏通不過二萬緡又如諸縣井契錢自王瞻叔以來毎損之以助省計而王徳和悉拘入計所通不盈十萬緡此皆失於𤨏碎者也謂宜損其無藝而善藏其餘無事則以予民有事則以給餉庶乎其可爾諸州軍資庫諸州軍資庫者嵗用省計也舊制毎有計度轉運使嵗終則㑹諸郡邑之出入盈者取之虧者補之故郡邑無不足之患自軍興而計司常患不足給凡郡邑皆以定額窠名予之加賦増員悉所不問由是州縣始困近嵗離軍添差大為州郡之患紹興十一年四月己未初用張循王奏離軍將佐並與添差郡患無以給二十七年六月丙辰兵部奏大郡無過百人次郡半之小郡三十人為額從之而宗室戚里歸明歸正甚至於樂藝賤工胥吏雜流亦皆添差慶元一郡而添差四十員盡本府七務場所入不足以給四員總管之俸其間有十五年不徙任者計其俸入錢二十餘萬緡米十餘萬斛揚州㑹府也嵗輸朝廷錢不滿七八萬而本州支費乃至百二十萬緡民力安得不困紹興初議者請裁定朝廷經費然後使版曹盡一嵗之入正其舊籍削去虚額擇諸路監使之愛民而通財計者俾之稽考調度蠲其煩重以寛民力朝廷未克行今之為郡者但能撙節用度譏察滲漏使嵗計無乏已號過人無復及民之政矣公使庫公使庫者諸道監帥司及邉縣州軍與戎帥皆有之葢祖宗時以前代牧伯皆歛於民以佐厨傳是以制公使錢以給其費懼及民也然正賜錢不多而著令許收遺利以此州郡得自恣若帥憲等司又有撫養備邉等庫開抵當賣熱藥為所不為其實以助公使耳公使苞苴在東南尤甚揚州一郡毎嵗饋遺見於帳籍者至十二萬緡江浙諸郡毎以酒遺中都官嵗有五六千斤以至數千瓶淳熈中王仲行尚書為平江守與詞官范致能胡長文厚一飲之費毎至千餘緡時蜀人有守潭者又有以總計攝閏者視事不半嵗過例饋送皆至四十五萬緡供宅酒至二百餘斛孝宗怒而絀之九年正月戊子三月乙未然其風葢未殄也東南帥臣監司則罷號為上下馬隣路皆有饋計其所得動輙萬緡近嵗蜀中亦然其㑹聚之間折爼率以三百五十千為準有一身而兼數職者則併受數人之饋遺獻酬之際一日而得二千餘緡其無藝如此頃嵗陳給事峴為蜀帥馮少卿憲為成都漕就以所遺元物報之陳怒奏其容覆賍本朝廷遣之逮陳敗乃得其直時芮國器侍郎趙子直丞相相繼為江西漕凡四方之聘幣皆不入于家斥其資置養濟院於南昌以養貧者朱少卿時敏為潼州守受四方之饋每以其物報之趙徳老鎮成都受而别儲之臨行以散宗室之貧者此皆㢘節之可紀也惟總領所公使錢以科次取於大庫軍故歛不及民然正數不多而嵗用率十數萬每嵗終上其數於户部輙以勞軍除戎器為名版曹知而不告也所謂公使醋錢者諸郡皆立額白取於屬縣縣歛於民吏以輸之小邑一嵗亦不下千緡人尤以為怨謂宜罷互送而捐遺利使上下一體而害不及民則合祖宗之制建炎紹興户口數建炎三年兩浙路主户口户二百一十二萬二千七十二口二百五十六萬七千八百毎十户率為十五口有竒成都府路户一百十三萬一千四百八十九口三百二十六萬九千三十六毎十户率為三十口弱紹興二十九年諸路户一千一百九萬餘口一千六百八十四萬餘毎十户率為十六口弱三十一年户一千一百三十六萬餘口二千四百二十餘萬毎十户率為十一口有竒三十三年户一千一百十三餘萬口二千三百一十一萬有餘毎十户率為二十一口弱四川元豐紹興淳熈户口數四川六十州一百九十九縣元豐二年户二千一百餘萬口一千六百餘萬紹興三十二年户二百六十四萬餘口七百五十一萬餘毎十户率為三十口弱淳熈二年户二百五十八萬有餘口七百四十三萬餘本朝視漢唐户多丁少之弊西漢户口至盛之時率以十户為四十八口有竒東漢户口率以十户為五十二口可準周之下農夫唐户人口至盛之時率以十户為五十八口有竒可準周之中次自本朝元豐至紹興户口率以十户為二十一口以一家止於兩口則無是理葢詭名子户漏口者衆也然今浙中户口率以十户為十五口有竒蜀中户口率以十户為三十口弱蜀人生齒非盛於東南意者蜀中無丁賦故漏口少爾昔陸宣公稱租庸調之法曰校閲而衆口可知是一丁受田決不可令輸二丁之賦非若兩税鄉司能開闔走弄於其間也自井田什一之後其惟租庸調之法乎建炎雜記甲集卷十七

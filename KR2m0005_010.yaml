body:
  text: 建炎雜記甲集卷十宋李心傳撰官制一丞相總論建隆至乾道相名更易丞相秦官也自漢末改為大司徒歷代不能正國初循唐制以三公至曹侍郎同平章事為宰相首相帶昭文館大學士亞相帶監修國史末相帶集賢殿大學士神宗新官制于三省置侍中中書二令虛而不除以尚書左右僕射兼門下中書侍郎為兩相然中書揆而議之門下審而復之尚書承而行之則是首相不復與朝廷議論矣慶元初司馬公相乃請令三省合班奏事分省治事自紹聖以後皆因之時議者謂門下相凡事既同進呈則不應自駁已行之命是省審之職可廢也政和時蔡京以太師總領三省號公相乃廢尚書令改侍中中書令為左輔右弼亦虛而不除改左右僕射為太宰少宰仍兼兩省侍郎靖康中何文縝將拜相夜夢神持弓矢射中其僕乃先乞復太少宰為僕射吳正仲當制請更為丞相不從建炎三年吕元直初相議者請三省為一于是元直解中書侍郎改同中書門下平章事乾道八年孝宗稽古改左右僕射為左右丞相去侍中兩令之名遂為定制云御營使御營宿衛使御營使者建炎元年六月始命宰相李伯紀為之本以行幸總齊軍中之政其後遂專兵柄樞密院幾無所預吕元直在位專恣尤甚臺官趙元鎮等以為言元直遂免時議者以為宰相之職無所不統本朝沿五代之制政事分為兩府兵權付于樞密本年又置御營使是政出于三也請罷御營司以兵權付之樞密院而以宰相兼知庶幾可以收兵柄一賞罰節財用四年六月甲戌遂以宰相范覺民兼知樞密院事罷御營使及官屬以其事歸密院為機速房焉御營使一員或二人以宰相兼副使一員以執政官兼參贊軍事以從官兼提舉一行事務以大將兼其將佐有都統制一員及五軍統制已下官紹興三十一年金海陵入冦上將臨江視師其冬以和義郡王楊存中為御營宿衛使寇平復免明年孝宗即位又以御營使命之然但自名一司掌殿前忠勇等軍非復建炎之比矣都督軍馬同都督都督古官也晉宋間有之唐以後不置紹興初吕元直復相謀進取秦檜亦欲奪其權乃共議令元直以左僕射都督江淮荆浙諸軍事置司鎮江元直覺之遽歸而命孟富文以參知政事權同都督已而落權字四年趙元鎮自知樞密院事為川陜宣撫處置使元鎮以與吳玠共事為嫌乃改都督川陜荆襄諸軍事五年春元鎮與張德逺並相遂帶兼都督諸軍馬入衛七年秋德逺將罷先廢都督府隆興初德逺再入乃命以樞密使都督江淮軍馬焉二年德逺去位都督府復廢其秋赫舍哩志寧入冦詔湯進之以左僕射為之進之逗遛不行乃命王瞻叔以參知政事為同都督瞻叔亦乞免于是遂命和義王楊存中代為都督府非宰相而為都督自存中始都督行府張魏公之初為都督也以行府為名凡事干朝廷則關三省樞密院孟富文時在政府大不平曰三省密院乃奉行行府文書耶因稱疾求去隆興初魏公再為都督時宰相陳魯公湯慶公皆主和議故朝廷所行多與都督府異魏公乃言臣節制江淮軍馬其進退調發當從督府取㫖施行近日主兵官及師守監司輒以軍期事務徑申朝廷已而劄下依本府指揮仍取責當行人軍令狀外謹具奏知上曰豈有不申朝廷之理十月辛巳乃詔江淮軍馬調發應援都督府取㫖施行其餘事務並令申奏如舊督視軍馬督視軍馬者紹興三十一年冬十一月葉審言始以知樞密院事為之朝議以審言非相臣故其名下都督一等蓋不考趙豐公故事失之也隆興初張魏公既為江淮都督乃命汪明逺徹以參知政事督視湖北京西軍馬焉其方城失守汪謫台州遂拜令魏公督之制國用使同知國用事制國用使舊未有隆興初言者請法有唐之制命宰相兼領三司使職事財榖出納之大綱宰相領之于上而户部治其詳上是之命祕省討論來上乾道二年冬遂命宰相兼制國用使參知政事同知國用事五年二月戊申罷國用司八年正丞相官名夏四月詔丞相事無不統所有兼制國用事與參知政更不入銜云參知政事參知政事自太祖朝始置元豐官制改為門下中書侍郎尚書左右丞建炎三年合三省之政于是李漢老自尚書右丞改除參知政事復舊制也故事丞相謁告則參預政事之臣例不得進擬差除惟丞相夢錫罷上未得人則參知政事行相事多不踰年少者才旬月獨淳熙初葉夢錫罷相龔實之行丞相事近三年言者以為懷私擅政遂有英州之禍焉樞密使樞密使自唐以來率二員並用魏仁浦吳延祚並為之國初仁浦拜集賢相自是止除一使至太平興國初曹武惠彬楚景襄昭輔始復並用後未有繼之者及真宗時以王文穆陳文忠並為樞密使由是遂為故事迄仁宗不改英宗地平四年文忠烈吕惠穆並用神宗熙寧五年文忠烈陳秀公並使樞庭用此故事髙宗紹興十年張循王俊韓蘄王世忠既罷兵乃並除樞密使十二年張循王猶在位時以孟信安王忠厚為山陵使乃亦暫拜樞密使焉渡江後元樞並除蓋有所為也知樞密院事知樞密院事太宗淳化二年始置以張遜為之然使與知院未嘗並除熙寧元年文潞公吕宣徽為使陳秀公自㑹稽召為知院非故事也元豐官制行廢樞密使故政和末鄧萃公官至少保猶止為知院焉其後鄭居中蔡攸童貫之徒既位三公乃更領樞密院事紹興七年秦申王為使沈忠敏自同知遷知院事蓋張魏公既荐秦相未欲其與已並又以故相不可除他官乃先白髙宗降㫖以本兵之地事權宜重依祖宗故事置樞密使而知院同知院亦皆仍舊由是並除自後則否樞密副使祖宗故事樞府置使則除副使置知院則除同知院淳化二年太宗既以張遜知密院于是冦忠愍溫恭肅皆自副使改同知院事康定元年仁宗用晏元獻公為樞密院使于是王鄧公杜正獻鄭天休皆自同知改除副使自後皆然元豐末廢副使渡江後秦申王首復除樞密使王敏節副之既而張韓二大將並除樞密使嶽武穆副之合故典矣近嵗張魏公汪明逺虞并父王公明王季海周洪道王謙仲趙子直繼除樞密使而其副止稱同知蓋相承之誤簽書樞密院事簽書樞密院事太平興國四年置是時石元懿公以兵部員外郎充樞密直學士止用本官職簽自是初除皆帶密直及罷乃拜端明殿學士焉太宗至真宗朝文臣簽樞才五人其四人還樞副張文定以本官罷至神宗時曽令紳以憂去免喪乃除端明元祐後王彥霜劉仲逢皆以端明罷遂為故事元豐官制廢簽樞其後童貫以使相為之以貫官至三司乃更為領院事靖康初李參政回首拜延康殿學士簽書延康今為端明自是遂為故事同簽書樞密院事同簽書樞密院事自郭宣徽後不置明受末李漢老鄭致剛嘗並拜未及謝而上反正李遷右丞鄭落同事紹興九年王倫交割地界亦命帶焉其後不復置隆興末虞雍公一為之升朝官除簽樞簽書樞密故事有以員外郎為之而無三丞以下為之者元祐初王彥霖以承議郎龍圖閣待制除受乃除遷朝奉郎建炎初張全真富季申皆自奉議郎御史中丞除簽樞亦用此制靖康二年曹忠逹輔紹興十四年李資政文㑹皆以升朝官為之曹承議郎李奉議郎蓋中書失之而舍人無正之者樞密參用文武張說本末自建炎以來樞密使副參用文武仁宗親政以後但除夏守斌王貽永王德用狄青數人英宗朝郭逵一人而已元豐改官制武臣不為二府政和末始命童貫簽書河西北面兩房事後遂領院事焉靖康用兵乃除种忠憲師道建炎中復除王襄愍淵時苗傅等不平遂有明受之變自是武臣不復典樞密矣紹興九年秦丞相將罷三大將兵柄乃以樞密使副授之蓋自童貫後皆因事用人非常典也乾道七年張說為明州觀察使樞密都承㫖說娶夀聖皇后女弟上厚眷之時為政乃除說簽書樞密院事制下朝論閧然說辭不果拜遂以安慶軍節度使還第焉踰時復以是命之說亦不辭又踰年遂進知樞密院事淳熙元年秋罷為太尉尋降觀察使居撫州三年冬許自便七年秋卒上念之詔復承宣使陳給事峴封還録黃乃止說子薦文州刺史說敗亦貶彬州葭明觀察使外戚典樞密祖宗盛時率用外戚典兵馬而無樞使者惟慶厯中王鄧公貽永以主壻為之然議者不以為忝元祐中韓文定在樞管其弟端節既選尚為臺諫所攻旋亦罷去紹興初樞密都承㫖闕執政請以保靜軍承宣使謝煥為之煥懿節后父也㫖朕不欲戚里任朝廷官乃不許上受禪韓平原托胄自知閣門事除承㫖亦固辭自請奉祠云紹興中孟仁仲使樞密蓋以典山陵故事已即罷樞密院屬樞密院屬官舊有都副承㫖以武臣為之編修官二員以文臣為之熙寧中始以文臣為都承㫖元祐後又詔恩數如權侍郎紹聖初廢髙宗在㑹稽武臣辛道宗為都承㫖頗用事紹興初道宗既免乃詔用兩制為之元年十二月丙寅然但聞用一二人而已淳熙中王抃用事久孝宗惡焉遂復士人今上初立薛象先以户部侍郎兼都承㫖何自然以為非祖宗成憲斥去之建炎中又用元豐故事置檢詳一員祿賜與都司外郎等三年六月庚午時御營司既廢密院置幹辦官四員既而以其名不雅馴改為計議官在編修官之上建炎四年十一月乙卯紹興十一年始省四月庚寅三省樞密院賞考司建炎初李伯紀為政始于三省樞密院置賞功司吕元直初相遂省之及范覺民以宰相兼樞密院乃于樞密置機速房紹興二十九年又罷辛巳用兵復置乾道六年始罷凡錢糧事歸三省邉防兵政歸密院焉拾遺補闕拾遺唐官也太宗以正言司諫易之淳熙十五年正月兵部侍郎林栗言國家纍年以來宰執百寮職無虛位御史三院亦不乏人獨諫諍之官尚有闕員居其位者往往分其御史之職至于針規闕失寂無聞焉原依唐制置拾遺補闕左右各一員皆三年為任仍加訓諭官以遺補為名不任糾彈之職孝宗從之以許深夫薛象先充其職班著監察御史上請給之人從依監察御史例光宗立復省直學士院權直學士院權行宫直院直院翰林直學士權直學士院自開寶二年盧丞相多遜始權直學士院自開寶六年張舍人淡始翰林權直自乾道九年崔舍人敦詩始學士院權直自淳熙五年崔舍人敦詩始國朝故事率以從官兼直院若左右史少卿監之類則止稱權直院焉近嵗崔大雅以樞密院編修官趙大本以校書郎陳內翰宗召以著作佐郎兼直蓋特命也紹興末髙宗視師建康時何內翰溥屬疾不能從而直院虞并父使兩淮乃命唐立夫以起居郎兼行宫直院車駕還復省庶官兼侍讀故事經筵官自兩省臺端以上兼侍講若大卿監以下則止兼崇政殿說書元祐中司馬公休以著作佐郎兼侍讀時朝議以文正公之賢故有此命乾道末張敬夫以吏部員外入侍經幄用公休故事亦兼侍講焉自改官制後庶官非二史而兼侍講者才數人范純甫司馬公休張敬夫是國朝經筵非進士出身者三人吳傳正吕源明張敬夫翰林講讀學士翰林講讀學士真宗朝始置元豐官制去翰字及學士名元祐復之以命蘇子瞻趙元考而已渡江後獨范元長常一為之史館專官陸務觀本末自真廟以來史館無專官神宗嘗欲付曾子固以五朝史事乃命為史館修撰使專典領其事子固所草俱不當神宗意書不克成孝宗修五朝史而列傳久未畢遂召李仁父洪景盧踵為之皆奉京祠不兼他職者數年而史始畢乃自開院至成書凡二十有八年秉筆者百有餘人時景盧請通修九朝正史上許之景盧復言制作之事已經先正名臣之手是非褒貶皆有据依乞命後來史官無得輒將成書擅行刪改然書未就而景盧去國淳熙末修髙宗實録但以他官兼之至紹熙末年而功未及半陳君舉直學士院建請以右文殿祕閣二修撰并舊史館校勘三等為史官自校勘供職稍遷祕閣修撰又遷右文殿修撰在院三五年如有勞績就對庶幾有專官之效無冷局之嫌然亦不克行明年但增檢官三員而限一年畢其後又七年而髙録始成時當修髙宗正史孝宗光宗實録朝論覺無專官始外召傅景仁陸務觀為在京宫觀免奉朝請令修史于是務觀還政久矣乃落致仕以為同修國史兼實録院同修撰焉務觀山隂人時年七十有八提舉祕書省提舉祕書省者官制以來無之政和初制以命蔡攸其後秦伯陽繼居是任紹興末髙宗召信安孟王忠厚為醴泉觀察使乃命提舉祕書省以寵之月過局如宰執例孟王薨亦省提舉太史局提舉太史局者舊率以近臣兼之熙豐間司馬公王和甫繼居是任後不復置紹熙五年十月復置以命薛象先明年何自然以非舊典為言遂罷去蓋務反趙子直之政而詳考也太史局日官舊止于五官正孝宗時始增春夏秋冬中五官大夫六院官六院官檢鼓糧審官告奏進也例以京官知縣有政績者為之亦有自郡守除者則繼即除郎如鹿伯可是也故恩數略視職事官而不入雜壓紹興十一年胡如明以料院除監察御史遂遷副端乾道後相繼入臺者有宋敦書蕭之敏陳升卿傅淇等數人而六院彌重號為察官之儲矣淳熙初龔實之秉政其內弟林宓幹辦審計司遇郊恩而林上京秩乃白上以六院官班寺監承之林用事得封贈父母龔後為謝朗然所紏而南竄此其一事也紹興二年夏六院官始復入雜壓在九寺簿之下焉五月庚戌降㫖環衛官環衛官者唐有之領宿衛兵若今之三衙祖宗時其官不廢然無職事但以處藩師代還及宗室除拜而已元豐官制改外臣皆不除惟宗室則如故隆興中孝宗始命學士洪景嚴等討論故事因復制以授武臣其法正任除上將軍承宣使至刺史為正任遙郡大將軍皆以官領刺史至承宣使為遙郡正使除將軍武翼大夫以上是也使臣以下左右郎將訓武郎以下皆有添給及從人而無職事若除𬋩軍則解或領閣門皇城司之類則仍帶焉惟戚里子弟不除是時李太尉顯忠首除左金吾衛上將軍上諭湯慶公曰此文臣館閣耳平時在環衛中庶見得人才近嵗郭太尉果自右驍衛郎將受知孝宗以本官職事不二三年遂至邉帥矣迄至環衛官皆為戎師之儲云內侍兩省入內內侍省皆宦官之職也舊號前後省紹興三十年九月以前省無職事廢之今入內內侍省此舊後省也吏額三十五人分五房所掌內殿引對羣臣發金字遞收接邉奏賜臣寮到闕茶藥新除執政御史中丞支賜宗室節度使以下夏葛藥春幡勝新火喜雪御筵每月奉香表往􅑼宫忌辰酌獻看經設獄太廟薦新并奏告差宫闈令太禮執事并王進衮冕祈禱降御封香車駕行幸差官應奉人使在道及到闕燕賜宣召學士及試一行事務聖節宰臣以下齊筵皇太子等乳香執政官酒果辨驗迎奉到御容賜蕃夷晏大朝㑹差應等官皆其職也其官有都知副都知押班等名渡江後又掌藏金國誓書及八寶內東門司內侍省屬也掌機密門户合同慿由司掌御前及宫禁取索金帛御藥院掌應奉禮儀衣服湯藥舊制內侍御誕節許進子十二試以墨義即中程者候三年引見供職紹興三十三年冬張真甫為殿中侍御史以宦者員衆為上言之孝宗曰朕有此意久矣祖宗時止許一人進一子朕意欲依祖宗法真甫奏事畢㫖言此曹人多則党盛今人數已不少若平時無事猶可設使當母后少主之時豈不能為禍漢唐之事是已遂命內使省開具見在人數聞奏元年㑹慶節權免進子于是定以二百人為額焉閣門閣門者左列之清選也舊時有知閣門事同知閣門事多以外戚勳貴人為之其下又有閣門宣贊舍人乃掌贊唱書命閣門祇候掌侍衛班列于乾道間孝宗始訪昔時儒臣館閣之制度乃增置閣門舍人以待武舉之入官者先召試而後有命又許轉對如職事官供職滿二年者與其邉郡遂為戎帥部刺之選云近嵗熊提刑飛譙知閣門熙載姜節使特立之進皆自此階故武臣以舍人為清要紹熙之初蔣介有召試之命葛楚輔丞相言介武舉苐一人乞免試上從之二月九日丁卯降㫖建炎雜記甲集卷十

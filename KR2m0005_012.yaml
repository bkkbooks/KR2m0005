body:
  text: 建炎雜記甲集卷十二宋李心傳撰官制三皇子除官例祖宗故事皇子初除防禦使太祖第二子及英宗初為皇子並防禦使太宗以後或封王或封國公謹恭憲王初封衛王鎮恭懿王初封涇國公之類其間亦有封郡王郡公者昭成太王初封廣平郡王靈榮王初封樂安郡公之類神宗諸子初除皆節度使封國公稍遷郡王加平章事平章事今開府儀同三司至出閣封王則始兼兩鎮加司空後皆因之司空今之少保紹興末莊文太子自蘄州防禦使躐拜少保封鄧公淳熙末今上自安豐軍節度使亦拜少保封嘉王蓋重長嫡也視祖宗時恩數為優云親王贈官例舊制皇子皆贈三司二令元豐改官制以侍中中書尚書令為三省長官不贈典乾道中正丞相官名削侍中兩令之位故魏惠憲王雖孝宗愛子生止為使相薨止贈兩州牧蓋上意以子弟居師傅官不順而三省長官已廢故但以州牧優之慶元中嗣秀王以山陵總護之勞當遷而官已至太師乃拜中書令王辭不拜已而上有殤子亦贈太師中書令追封兖王不知今官制已無二令之名此宰司失於詳考也宗室兩鎮節度使故事同姓秉旄者非親弟愛子無得兼兩鎮熙寧初惟孝定王允弼榮易王允良以其屬近行尊故乃得之慶元初嗣秀王伯圭既辭中書令詔有别議優崇之禮如命兼兩鎮焉國朝二百五十年宗室秉雙旄者僅三人爾知太宗正事知太宗正事仁宗始置用太祖太宗之後屬近行尊者各一人於是首命濮安懿王為之自是率以近屬官至正相者領焉渡江後頗用南班往往多不得人無以表率更事刻削宗室皆患之淳熙初宗政闕趙溫叔言崇宣簡公不息之賢自江西轉運判官召為右監門衛大將軍忠州防禦使知大宗正事非常制也不息字人仲曽祖懷榮穆王宗暉蓋濮王第六子祖仲損沂王又士圃以南班扈駕北遷乾道中遙拜集慶軍節度使仁仲中進士第所至有聲績官昭慶軍承宣使在宗司數言天下事上甚重之其諸孫多進士高第者宗室奉使自熙豐以來宗室雖為外官未常有出使者乾道七年趙溫叔為賀金國生辰使孝宗特命武翼郎兩浙西路兵馬鈐轄伯驌副之時方議受書禮故特選之為介也近嵗善義不兼皆以尚書郎使北蓋用伯驌例云淳熙十一年親賢宅多才為正旦副使南班近屬出疆者止此一人耳宗室知舉及任學官紹興末孝宗有詔宗室不許注學官七月丁未乾道中師烜者廷試中甲科自言於上於是許注甲科八年五月乙亥淳熙中既詔宗室省試十人取一吏部尚書周洪道乃請許充學官及考試從之六年十一月壬午紹熙中遂命趙子直知貢舉而外郡至今不差試官蓋有司循習之過也三公備官三公自祖宗以來罕嘗備官獨宣和末三公止十八人三少不論太師三人蔡京童貫鄭紳太傅四人王黼燕王俁越王偲鄆王楷太保十一人蔡攸肅王樞儀王㮙渡江後以用兵故紹興十二年秦申王為太師張循王韓蘄王為太傅劉安城王為太保其後乾道初楊和王吳信王並為太傅紹熙初史會稽王為太師嗣秀王為太保蓋自紹興後三公未嘗備官焉太師並除故事太師未嘗並除紹聖初始有文潞公彥博吳榮王顯宣和中蔡魯公京童貫鄭平梁王紳靖康初燕王俁越王偲紹興初秦申王檜張魯王俊紹興末會稽王浩嗣秀王伯圭文臣節度使節度使祖宗時非近屬及有大功者不除宣和末節度使凡六十人議者以為濫親王皇子二十六人宗室十一人前宰執二十人大將四人外戚十人宦者恩澤七人靖康初因中丞陳賓王言九人換授梁師成朱勔梁方平已罪死而宗室以覃恩建節者十有四人將帥特拜者二人凡六十二人以俸嵗賜計之是一年費緡錢七十萬也渡江後節度使率不過十幾人自建炎至嘉泰宰相繼拜者六人呂忠穆張忠獻虞忠肅皆以勳史會稽王張以舊趙魏公葛文定以恩執政一人葉右丞夢得從官二人而已張瑞明登楊學使倓外戚節度使國初外戚罕有建節者太祖時杜審進以元舅之尊窮老才得節度使仁宗用張光佐一時名臣力爭之其後除拜浸多中興外戚節度使二十有二人孟后姪忠原鄭后姪孫藻韋后弟淵姪謙讜邢后父煥弟孝陽吳后弟益姪琚環璹郭后弟師禹夏后弟執中謝后弟淵李后姪孝友考純韓后曽季祖托胄父同卿從祖邈徽宗王貴妃父舜民高宗劉貴妃父懋恩舊節度使哲廟以前節度使未有以恩澤除者若王顯張冕輩雖以舊恩而貴然皆以嘗任省府得之而崇寧後始除郭天信朱勔二人紹興中曹勛韓公懿乾道中曽覿嘉泰中薑特立譙金雍皆以攀附恩澤乃參官節度使宦官節度使真廟以來宦者官雖尊止於遙郡承宣使而已宣政間始除童貫楊戩梁師成談績李穀梁方平等十許人靖康初政皆貶奪之渡江以來間有為正任承宣使者慶元中王德謙已除節度使大臣交奏乃不行德謙亦坐斥語在時事中兩鎮三鎮節度使國朝元臣拜兩鎮節度使者才三人熙寧初韓魏公元豐中文潞公紹興中吕誠公是也然三公卒辭之渡江以來諸大將若韓張吳嶽楊劉之流率至兩鎮節度使其得加至三鎮者三人韓蘄王鎮南武安寧國張循王靖江寧武靖海劉安城王護國寧武保靜舊制惟婦人封得兼兩國若大長公主及上乳母皇太后娣妹皇后母之類是也政和中蔡京以明堂成封陳魯國公辭不拜其後童貫遂封徐豫國公紹興中秦檜以進書恩亦封秦魏公大臣兼封止此三人而已時京檜卒辭於是三代及小君皆加兩國之贈乾道末上既立太子欲加恩於魏邸始封韋夫人為韓魏國夫人親王夫人兼封亦前所未有自後恩平王夫人吳興俞夫人及國母卜夫人並用此例兩國公主兩國夫人故事郡主未有兼封者崇寧中上謁濮安懿王祠時王女惟曹氏婦安康郡主在乃特封安定普寧郡主賜甲第居之其後未有此比郡公不著開國字國朝封爵之制階至奉直大夫職至權侍郎已上遇郊封縣開國男若從官經恩則纍加至某郡開國公若將相虛邑實封通滿萬户則封國公而無封郡公者惟宗室追封則有之凡宗室贈節度使則追封國公贈承宣使則追封郡公贈觀察防禦使則追封侯也近嵗費戒父以避祖名始詔繫銜權不著開國字亦前此所未有執政為閣學士故事曽任宰相不為資政殿學士蓋降職至大資政止曽任執政不為閣學士蓋降職至端明止淳熙中魏丞相杞初以端明殿學士起廢而林樞密安宅亦以龍圖閣學士奉祠前是舊相未有為端明若閣學士以前執政為之則自張天覺路公弼後惟秦檜之餘黨李文會巫伋等八九人其執政僅三月餘故用此例庶官除次對庶官補外未嘗有除次對紹興初太常少卿蘇遲樞密院檢詳歐陽懋請外補時方録用黨人子弟大臣以蘇文定公之子而歐陽文忠公之孫也皆特除待制而羣論者以為言乃改集英殿修撰焉其後少常久次者始除之其龍圖閣檢詳以下罕有得職名者云外官除次對祖宗時自三司使御史中丞翰林學士知制誥之外未有侍從職事官故邉帥積勞者率以直龍圖閣除天章閣待制元豐官制後惟實歷權侍郎以上乃得之淳熙中吳茶馬總程舍人叔達皆自外除待制外除殊命也趙子直當國言者以為今賢士大夫往往不樂為外官蓋外權太輕雖欲施設而不得騁故也今日之事勢莫若稍重外重之術必使帥漕總領可以馴致於從官而後可久任而重可以責事功詔可紹熙五年十一月戊申未幾子直去位亦不克行慶元初楊廷秀始自外祠除文華閣待制寄祿分左右寄祿官分左右此元祐政也紹興初復舉行之淳熙初宗室善俊者言建官以為本范純仁偏見孝宗納其説又去焉今任子雜流惟細轉通直郎奉直中散大夫如故若帶貼職則超資焉故小京官瑣廳登第者若遷號曰平遷兩任或轉三任者看出身人不為監使當寄祿可也中散大夫七樣錦中散大夫舊謂之十樣錦今不然矣舊身子職官今初品官耳初奏通仕郎出官與將仕郎同但以拜命日理服律年月舊身後許上遺表推一子恩今減一年磨勘奏薦雖不隔郊然滿兩名有正法實與其正郎無異其他聽存但虛文謂之七樣錦可也減年對實歷磨勘舊制以恩例減磨勘年者率以四年為一官故有初改官人部數綱而徑轉朝奉郎者朝廷患之隆興二年春始著對使實歷之令及乾道三年郊祀左選奏三百人右選千七百餘人六年郊祀左選奏補二百餘人而右選如故蓋以文臣對使實厯故也淳熙中議者請祠官有實歷者雖遷至員郎以上毋得任子事下祕書省國史院時鄭少嘉尚書修國史建請京官以上須是歷一任者乃許任子孫八年正月辛未從之選人改官額選人改官舊無定數紹興後多不過九十人少或至五十人紹興二年八十八人二十五年六十八人三十年七十四人三十一年五十人補選及職事官皆不在數三十二年遂至一百十三人孝宗患之隆興元年四月詔以百員為額乾道三年七月又通四川為一百二十員七年十月有司請不必限員數奏可時虞丞相當國也淳熙初上以官冗稍嚴升改之令於是六年引見改官不及七十員而補選在焉周馮道為吏部尚書七年三月因請以七十員為額是年四月又增八十員職事官并引見改官六十五人四川換給一十五人特旨改官不與焉十三年三月又詔職事官改官在八十員嵗額之外自是嵗改京官者僅百員至今遂為永制奏舉京官奏舉京官祖宗時無定數有其人則舉之太平興國年間則諸州通判亦得舉京官熙寧中取以為提舉實平官員數元祐中嘗暫復之至紹聖又罷淳熙六年九月上以嵗貢京官數濫命給舍臺諫議之王仲行吕希時兼給事中乃請六曹寺監户部右曹郎官同嵗減舉貢三之一諸路監司減四之一禮部國子監長二減三之二前執政嵗減二員知州無縣者嵗止一員嵗終不除運副而判官補發者不理為職司奏可慶元元年十一月復詔判官補發副使狀理為職司又詔職司狀不得用二紙用姚察院愈奏也在京選人舊無外路監司薦舉渡江後詔以六部長二作職司乾道七年九月罷之惟館學官通理四考不用舉主改官蓋纍聖優賢之意減舉吏員館學改官例近制選人實歷十二考者減舉主一員先是紹興二十九年七月敕令所刪定官嘉泰間人滋請嵗於改官員中差減員數以待實歷十考舉主不及格之人庶抑貪冒而養亷素上命及給舍議之洪景盧章安國言此法一開則選人不出十餘年坐至京秩乃止隆興初始舉行之舊舉主須員足乃以其牘上若所舉人物故或罷免則不計故有得薦牘十餘而不克磨勘者淳熙中始有遂施放散之令人故以此皆便之隆興元年三月己酉詔選人十二考無贓私罪者減舉主改官須入初改官人必作令謂之須入紹興中數申嚴之後亦或廢孝宗在位持之甚嚴慶元初復詔除殿試上三名南省元外并作邑五年四月又用程察院松言詔大理評事已改官未歷縣之人並令親民一次己著為令舊時補改官人並令其試邑是月陳正言自強請初任未終之人先注僉判一任方許親民從之自後雖宰相子弟及殿試甲科等人無有不宰邑者矣廣南攝官初祖宗朝以廣南地逺例人不足以資正官故使舉人兩與荐送者試刑法於漕司以其合格者攝兩路正攝凡五十人月俸錢十千米二斛滿二年則錫以真命後又增五十人號曰待次崇觀後又增五十人號曰額外其注擬皆自漕司建炎初敕歸吏部踰年無願就者吏部請復歸漕司從之宫觀使祠官供給近制前宰相見任使相領京祠者並為宫觀使若在外則少保以上始得名使相已下提舉宫觀而已至淳熙初史會稽王以崇信軍節度使開府儀同三司提舉洞霄宫蓋用此制紹熙初趙衛公以節鉞充醴泉觀察使家居非舊典也近嵗葛文定以覃恩除使相亦止提舉洞霄宫舊祠官無供給政和中蔡京著令庶官降本資序二本侍從以上不降趙忠簡為相始除之功號功號始唐德宗國朝因之至元豐乃罷中興後加賜者三人而已韓蘄王世忠揚武翊運功臣張魯王俊安民靖難功臣劉安城王光世和衆輔國功臣此外惟安南國王初除及經恩亦加功號檢校官檢校官者自唐以來有之凡內職崇班今修武郎武臣副使則以上初除及遇恩皆帶若文臣則樞密宣徽節度使始帶焉自三公謂太尉司徒司空三師僕射常侍尚書至賓客祭酒凡十餘等元豐改官制武臣承宣使已下皆罷惟存檢校三公三師以待節度使之久次者政和後改三公為三少若武臣纍加至檢校少師則拜太尉文臣纍加至檢校少師則拜開府儀同三司安南國王初襲封加檢校太尉經恩遷檢校太師外蕃刺史州則檢校太子賓客此外皆不帶云勳官勳官自戰國以來有之至唐始以為虛名國朝循唐制文臣朝官武臣崇班以上遇恩輒加之由雲騎尉至上柱國凡十二轉政和中罷淳熙末朝議欲復之以旌有功如貼之職此後亦不果行今惟安南闍婆占城三國王始加封上柱國南丹州刺史加武騎尉焉天聖至嘉泰四選人數祖宗時內外文武官通一萬三千餘員天聖中兩制兩省不及三十員京朝官不及二千員三班使臣不及四千員慶厯中兩制兩省至五十員京朝官二千七百餘員流內銓選人僅萬計乾道中京朝官已至三四千員選人已七八千員紹興二年京朝官四千一百五十九員合四選凡三萬三千一十六員慶元二年京朝官如紹熙之數選人增至一萬三千六百八十員大使臣六千五百二十五員小使臣一萬八千七十員通四選凡四萬二千有竒蓋五年之間所損增止九千餘員可謂官冗矣嘉泰元年春左選京官以上三千一百三十三員選人萬五千二百四員大使臣以上六千八百五十四員校尉以上萬二千六百十六員通四選共三萬七千八百餘員是五年間所損益僅四千餘員未知何故堂後官堂後官謂三省都房録事也補職及一年改宣教郎五年滿願出職者與通判十年以上與郡守建炎初年李伯紀為相建請堂吏出職者止與通判從之迄今不改省部樞密使吏額尚書省吏額二百四人正額都事主事令史書令史守當官共七十四人守闕一百三十人分房十有四中書門下省吏額二百三十八人正額録事已下八十八人守闕一百五十人中書六分門下省四房分十有三樞密院吏額三百二十七人副承旨主事令史書令史共一百二十七人守闕貼房二百人尚書六曹吏額九百二十人主事令史書令史守當官四房共四百九十五人正貼司私名楷書法司四等共四百二十五人吏部七司三百五十九户部五司二百八十八禮部四司五十六兵部四司一百三十五刑部四司六十三工部四司一十九建炎初上幸淮甸三省吏至揚州者二百五十八人而已詔皆遷一官其後滋益三年乃命有司立額州縣吏額紹興末州縣吏額猥多二十六年八月楊中丞鵬舉請省之以寬民力事下諸路常平司時浙東七州吏額四千人提舉官趙公稱首奏損其半他路率如此然今州縣吏額雖減而私名往往十倍於正數民甚苦之建炎雜記甲集卷十二

body:
  text: 建炎雜記甲集卷十六宋李心傳撰財賦三官田官田舊多在東南有之靖康中帝命經制司鬻蔡京王黼田為糴本翁端朝中丞為經制使言恐生弊幸乞租與客戶歲收課利損其二分從之然諸道閒田頗多既利厚而租輕因有增租以攘之者於是爭端紛搆田之詞訟繁興紹興二十八年知溫州黃仁榮請鬻之以止訟㑹和內翰溥亦請鬻官田為常平本從之其後戶部㑹其數得錢五百萬緡自是舉行之獨營田不廢省莊田省莊田者今蜀中有之號官田自二稅外仍科租應大小麥豆糙白米穀桑麻蕎芋之數十有八種無不畢取之既髙估其直又每引别物輸稱提錢民甚苦之然其實皆民間世業每貿易官仍收其算錢但世相沿襲謂之官田不知所始也屯田屯田者紹興初陳密直規為安復漢陽軍鎮撫使以境內多官田荒田乃倣古屯田之制命射士兵民分為耕墾其說以兵民不可並耕故使各處一方凡軍所屯之田皆相其險隘立為堡寨冦至則保聚捍禦無事則乘時田作其射士皆分半以耕屯田少增錢糧官給牛種收其租利有急則罷從軍凡民戶所營之田水田一畝賦粳米一斗陸田賦豆麥各五升滿二年無缺輸給為永業流民自歸者以田還之凡營屯田事府縣官兼行之皆不更置官吏條畫既具乃聞於朝詔與奬焉元年十一月丁未下詔三年下其法於諸鎮使行之悉以陳規條畫為主江北無牛具其地仍用古法以二人拽一鋤凡授田五畝為甲别給菜田又五畝為廬舍稻場初年免田租之半官屯以使臣主之民屯以縣令主之以歲課多寡為殿最三年二月癸酉其後諸鎮又廢不果行四年諸子發建言荆襄之間沿漢沔上下膏腴之地七百餘里土宜麻麥古謂之上中請選良將領部曲鎮之招集流亡務農重穀冦來則禦冦去則耕不過三年兵食自足詔送都督亦未克行是時韓蘄王在淮東屯田上命在閩中市牛賜之為屯田之用五年閏二月壬申五年冬張魏公在行府請屯田郎中樊賔往江淮措置遂改屯田為營田後以其擾民但令諸路監司領其事三十年李顯忠為池州都統制復請令諸軍屯田十一月丁未俄軍興未暇及逮敵退議者建言宜於淮甸屯田以修兵備詔兵部侍郎陳應求往淮東工部侍郎許覺民往淮西措置三十二年三月甲子已而上謂大臣曰士大夫言此者甚衆必須先有定論用諸民乎用諸軍乎若論既定當先為治城壘廬舍使老小有所歸蓄積有所藏然後可為陳魯公曰今西北歸正人願就耕者甚衆已降牛種本錢及治廬舍矣其後應求請募兵耕荒蠲其徭役及七年起租賦上可之五月甲辰乾道中有郭震者以建康都統守廬州始創屯田遂除節鉞俄又罷屯田兵令歸正又請佃蓋得不償費也荆襄田者自紹興以後專𨽻都統司亦粗有所入乾道二年乃詔除籍者及總領所外他司毋得預三月己酉其語互見營田事中營田營田者紹興元年解潛為荆南鎮撫使以所管五州絶戶及官田年來荒廢者甚多乃以便宜開闢直祕閣宗綱為屯田使召人使耕分收子利乃以上聞詔以綱為鎮撫使營田官五月辛酉渡江後屯營田始此其後荆州軍食多仰給於營田省縣官之半焉其秋遂命河南淮南措置屯田九月庚申已而河南鎮撫司營田官汪直清言河南殘破民歸業者尚罕所創營田全責之軍兵恐力微難以號令請鎮撫司翟興兼營田使十月戊寅時諸鎮尚未就緒命蜀中公安令倚營田辦集選官十一月丁未蓋解為帥故也三年韓世忠為江東宣撫司上命措置建康營田世忠言荒田雖多大半有主難以如陕西例請募民承佃蠲三年租滿五年不言給佃人為世業於是詔江北浙西皆如之田租初年全蠲次年半減四月己丑尋又免科配役十月辛卯自後營田專用諸民五年王觀察彥為荆南帥言已措置營田八百頃自蜀中買牛賦民詔多方措置十一月丁酉先是言屯田者甚衆而行之未見其效六年張魏公以都督出行邉乃奏改江淮屯田為營田凡官田若逃田並無拘籍以五頃為二莊官給耕牛具種子農器劃之别佃一莊以一人為長每莊官募民承佃其法五家為一堡又給畝為菜田又貸本錢七十千分二年償勿取息命措置官樊相伯賔王中孚舉行之正月丙午尋命五大將韓劉張吳嶽及江淮荆襄利路帥臣悉領營田使時李伯紀為江西大帥亦言今日之事莫利屯田然兵革災傷之餘民力必不給請命江淮湖北宣撫司招納京東西河北流移之人貸種收田勿取其入次年乃收三之一又次年則半收之詔都督行府措置三月吕元直時為湖南大帥因請錢十萬緡興屯田五月丁亥其秋中孚入見上諭令竭力久任議者恐張相還朝欲留措置於是遷相伯司農少卿提舉江淮營田公事置司建康府擢中孚屯田員外郎以為之副官給牛種撫存流亡歲中收本穀三千萬斛有竒七月壬申除二人除客戶當給六分官收十萬餘斛然議者猶以為奉行竣速或抑配豪戶或强科保正田瘠難耕多收子利民間有鬻已牛而飬官牛耕已田以償官租者此見中嶽廟李寀奏中孚上疏爭之且言願假歲月勿責近效上許之七年二月辛巳七年夏魏公猶在中書亦覺其擾民乃言自置營田司數年已有成效請罷司以監司兼領六月己丑十九年夏兩浙提領營田曹泳言根括得鎮江荒田二千二百餘頃請悉以為營田六月甲戌二十一年鎮江諸軍都統制劉寶請民戶識認營田者畝償開墾工夲五千緡許之三月丁未尋詔諸道倣此由是營田漸以還民矣隆興二年孝宗諭大臣以營田事欲使歸正人耕之湯丞相曰歸正人未可用諸軍不歸人有恐懼可使白時中提舉四川茶馬以管營田湯相薦其才正月庚子上召見之俾以營田事後亦不克行而罷其後淮東西田􅌰以歸正人耕之乾道中又詔蠲州縣撮收課子八年七月仍免其徭賦焉關外營田關外營田者紹興六年吳玠為宣撫副使兼營田使治廢堰於梁洋率軍民營田凡六十莊計田八百五十四頃其初因兵火後民多失業故募人耕之量收租利李子公為大漕奏言漢中之地古稱沃野每畝除出糧租外止收三石為率約收二十五萬石乞付本司贍軍可省內郡水軍朝廷難之但賜玠詔書奬諭時七年秋吳玠死胡承公鄭亨仲代為宣撫使休兵後亨仲又行之關外四州及興州大安軍所營田至二千六百十一頃除糧種分給外實入官細色四十萬一千四十九石得㫖撥十二萬石赴成都路對糴米而金州墾田五百六十七頃歲入萬八十六石餘石不與焉時十五年春也乾道再和後强將豪民利於承佃故為缺輸得不償費虞丞相允文代吳璘為宣撫使乃與利路安撫使朝侍郎公武總領財賦查少卿籥共議以謂軍民雜處侵漁百端又於數百里外差科保甲指教耕田聞有二三年不得替者水旱則令保甲均認租數民甚苦之兼所收之租不償所給之數如興元府歲收租九千六百七十三石而種田官兵請給乃為一萬一千四百四十石他皆類此於是宣撫司始以便宜召人承佃抽兵歸營時四年秋以眀年夏宣撫司奏其事於朝詔可至淳熙初墾田至七千五百五十七頃而租入止有九萬八千石有竒慶元後又止為六萬六千石而金州田租亦止二千二百三十一石焉六年冬王少卿寧總計增其課朝廷以邉民不便罷之其語在時事中堣田堣田者江浙淮南有之蓋以水髙於田故為之堣岸宣州化民惠成二堣相連長八十里蕪湖縣萬春陶新和政三官墟共長一百四十五里當塗縣廣濟墟長九十三里私堣長五十里建炎末為敵馬所壞紹興初命守臣葺治之建炎永豐堣有田千頃初以賜韓忠武後歸秦丞相今𨽻行宫淮西和州無為軍亦有堣田紹興三十年張少卿初為漕徙民於近江增葺堣岸官給牛種始使之就耕凡堣岸皆如長堤植榆柳成行望之如畫云圭田圭田自三代以來有之夲朝㳂唐不廢其制咸平初既定以官莊及逺年逃田充其數天聖中言者以謂多寡不均又貪吏或多取歲租以害細民七年八月詔罷天下職田悉以其歲入租課送官具數上三司以所在時估定價而均給之九年二月復故慶厯三年九月更定守令佐職官頃畝之限靖康元年五月始借一年輸內帑建炎初以國用不足遂拘天下職田𨽻提刑司元年六月乙酉李伯紀免相復給之眀年吕源為發運副使復請收圭田以贍軍上不許八月壬子紹興末東南諸路收圭租二十三萬斛有竒州縣有過給者上聞之命及格則止二十九年十二月癸酉舊制圭租皆給正色至是江西湖南米斗才數十而圭租乃令折價至三四十陳正獻為殿中侍御史為上言之遂命復輸夲色三十年十一月庚寅隆興初又有權借一年之令元年六月乾道改元以軍事始息又借職田米三年用王大寶尚書請也元年七月辛亥八年冬復還之十月丙辰時四川州縣職田宣撫司已借十年為軍中減汰使臣之用乾道四年虞雍公申請㑹其數歲得十二萬八千八百九十九緡而已淳熙初亦還之淳熙末言者又論州縣守倅合得圭租皆折現緡其他則交夲色乃是小官事下戶部戶部奏在法圭租以前後官在任月日均給不許折錢即人戶願施錢而施增實直者准律科罪之十四年三月戊辰今蜀中圭租皆折現錢又多從隔郡支給相承已久莫知始於何年僧寺常住田僧寺常住田者所在多有之紹興中髙宗嘗取其絶産隸郡國飬士久之常住鬻祠部度牒其徒寖微二十年春命司農寺丞鍾世眀往閩中措置寺觀絶産賦租自及常住歲用外歲得羡錢三十四萬緡入左藏庫眀年張始營節使為帥又請於朝十還六七矣今眀州育王臨安徑山等寺常住膏腴多至數萬畝其間又有特旨免支移科配者頗為民間之患焉金銀坑冶金銀坑冶湖廣閩浙皆有之湖廣廣東西金坑湖南廣東江東西浙東西福建銀坑祖宗時除沙石中所産黃金外歲貢額銀至一千八百六十餘萬兩渡江後停閉金坑一百四十二銀坑八十四紹興七年詔江浙金銀坑冶並依熙豐法召百姓採取自備物料烹煉十分為率官收二分二月戊申然民間得不償課本州縣多責取于民以備上用三十年用提㸃官李植言更不定額五月丙戌饒州舊貢黃金千兩孝宗時詔損三之一今諸道上供銀兩皆置場買發蜀中銀每發稱一兩用夲錢引六而行在左藏庫折交才直三千三百云然民間之直又不滿三千髙宗嘗諭輔臣以非劉晏懋遷之術欲更革之戶部以錢又折半為詞而止二十六年二月庚辰其實吳蜀錢弊不能相通捨錢帛無以致逺故莫如之何銅鐵鉛錫坑冶銅鐵鉛錫坑冶者閩蜀湖廣江淮浙路皆有之祖宗時天下歲産銅七百五萬斤鐡一百十六萬斤鉛三百二十一萬斤錫七十六萬斤皆有竒渡江後其數日減至紹興末江東西福建廣西湖南潼州府利路十四州歲産銅二十六萬三千一百六十九斤九兩信州膽銅九萬六千五百斤饒州膽銅二萬三千四百斤潮州膽銅八萬八千九百斤黃銅二百斤潭州膽銅三千四百斤建寧府黃銅八千三百斤連州黃銅二千八百斤池州膽銅四百斤汀州黃銅六十斤邵武軍黃銅三百斤潼州府黃銅六千斤利州黃銅七千斤興州黃銅一千六百斤南劍州黃銅三千六百斤江東西廣南湖南福建二十州産鐵八十八萬三百二斤十三兩而蜀中所産不與焉信州二十五萬七千斤撫州十一萬七千斤吉州二十九萬斤建州四萬斤鬱林州二萬七千五百斤興國軍二萬四千九百斤饒州一萬七千斤舒州一萬七千五百斤賔州一萬四千六百八斤江州一萬三千八百斤潭州一萬三千斤惠州一萬二千七百斤韶州一萬二千斤廣州六千九百斤池州六千八百斤洪州三千五百斤辰州三千四百斤處州一千三百斤徽州一千二百斤南雄州四百斤皆有竒江湖閩廣浙東二十州産鉛十九萬一千二百四十九斤十三兩信州十一萬五千斤潯州二萬二千二百斤南劍州九千五百斤賔韶州皆五千六百斤雍連州皆五千斤興國軍六千斤衡州四千一百斤建寧府三千二百斤峽州三千七百斤潭州一千八百斤舒州七百斤處州五百斤衢州四百斤溫州南恩州皆二百斤桂陽軍七十二斤韶州六十斤皆有竒湖廣四州産錫二萬五百四十八斤六兩賀州一萬二千六百斤桂陽軍三千八百斤彬州二千四百斤衡州一千五百斤皆有竒視祖額鐵才及四分餘鉛及六釐銅及四釐錫及三釐皆弱東南失悉輸岑水鉛山永興利四場銅為泉司之用惟川鐵以鑄錢云舊婺州銅融福峽州南安軍鉛贑宜州南安軍錫坑皆廢膽銅者蓋以鐵為片浸之膽水中後數十日即成銅凡銅場十四鐵場三十八鉛場二十四錫場五云東南諸路鑄錢增損興廢夲末東南諸路鑄錢國朝承南唐之舊為之未廣也咸平三年馬忠肅亮以虞部員外郎出使始於江池饒建四州歲鑄錢百三十五萬貫銅鉛皆有餘羡真宗即以忠肅為江南轉運副使兼都大提㸃江南福建路鑄錢四監凡役兵三千八百餘人大中祥符後銅坑多不發逮天禧末所鑄才一百五萬及蔡京為政大觀中歲收銅止六百六十餘萬斤比祖額虧四十餘萬斤內舊場四百六十餘萬斤膽銅一百餘萬斤石銅七十萬斤新場三十萬斤江湖閩廣十監每年共鑄錢二百八十九萬四百緡計用銅一千十一萬五千斤江州廣寧二十四萬池州永豐三十四萬五千饒州永平四十六萬五千建州豐國二十四萬四百已上四監一百三十四萬緡衡州咸寧共二十萬舒州同安十萬嚴州神泉十五萬鄂州寶泉十萬韶州永通八十三萬梧州元豐十九萬已上六監一百五十六萬緡逐路交用以所入約所用計少銅三百三萬五千斤自渡江後歲鑄錢才八萬緡近歲始倍蓋銅鐵鉛錫之入視舊才二十之一舊一千三百二十萬斤今七千餘萬斤所鑄錢視舊亦有二十之一爾鑄錢諸監紹興慶元年榷銅鑄錢諸監自紹興初以江池殘破逺涉大江遂廢之元年八月甲申是歲才鑄錢八萬眀年以范汝為作亂權罷建州鼓鑄二年二月丙戌二年汝為平復鑄錢泉司應副銅錫六十五萬餘斤歲額鑄錢二十五萬然是歲才鑄十二萬緡耳三年劉立道中宣諭江南歸奏言泉司官吏之費歲為十三萬緡而木炭本錢如鑄錢之數請省其官屬從之十二月癸未是時坑冶盡廢每鑄錢一千率用夲錢二千四百五年閩漕鄭士彥奏廢豐國監而歲與泉司認發新額錢二月丁巳議者以為不可其冬户部侍郎王俁請復鑄錢及官鬻銅器以剔私鑄之弊十二月辛亥眀年遂悉斂民間銅器以鑄錢又詔私鑄銅器者徒二年六年五月甲午贑饒二監新額錢四十萬緡提㸃官趙伯瑜以為所得不償所費遂罷鑄錢歲額銅炭積而不用盡取木炭銅鉛夲錢及官吏闕額衣糧水腳之屬凑為年計十三年韓球為使必欲鑄新錢調民興復廢坑鑄至於發墓冢廬舍而盡無所得又請籍坑戶姓名約定買納錢數閏四月丁巳民大以為擾郡邑至毁錢為銅以應其命然所鑄亦才十萬緡二十四年遂罷鑄錢司而歸之諸漕二十七年戶部侍郎林覺請出版曹錢八萬緡為饒贑詔三年鑄夲錢權以五十萬緡為額七月庚午未幾殿中侍御史王圭復言泉司不可廢湯致逺在樞院以為不然請與三省議沈丞相等乃奏以戶部侍郎榮薿茂世領提㸃許置官屬二員八月庚申然錢監既廢復不一故兵匠有闕不補視舊數十損有三積其衣糧號三八闕額錢眀年洪景嚴為起居舍人為上言銅器之害上命出御府銅器千五百事付泉司二十八年七月庚辰遂大斂民間銅器以鑄錢許告賞其後得銅二百餘萬斤二十九年趙郡王令詪在版曹因請以三分闕額錢為鑄夲二月丁亥其秋復置提㸃官七月乙巳眀年夏泉司言歲課但可鑄十萬緡諸道銅加以鉛錫可鑄六十萬緡是時乃暫依所請權以十萬緡為額工部奏為五十萬緡三十年五月丙戌然亦止鑄十萬緡而止云今泉司歲額增十五萬緡小平錢至一萬八千緡折二錢六萬六千緡折小平錢十三萬二千緡歲費鑄夲及起綱糜費約用二十六萬緡司屬之費又約二萬緡東南十一路一百十八州之所供也其名色有坑冶課利錢分衣糧錢木炭錢錫夲錢約二十一萬緡必一歲所收實不過十五六萬緡耳其歲過課金一百三十八兩二錢銀坑額七分三分本司銅三十九萬三千八十三斤八兩鉛三十七萬九百斤錫一萬九千八百七十五斤鐵二百三十二萬八千斤此歲所權十無二三皆以錢貨於坑戶以取給然亦不登當二錢千重四斤五兩銅二斤九兩半鉛一斤十五兩半錫二斤木炭五斤除火耗六兩外净錢計上稱重四斤十三兩銅二斤十五兩半鉛二斤一兩半錫三兩木炭八斤除火耗七兩外净錢計止半視舊制銅少而鉛多天禧之末每千錢用銅三斤十四兩鉛一斤八兩錫八兩建州豐國又減鉛五兩銅亦如之紹興之制每小錢一千用銅二斤半鉛一斤五兩炭五斤蓋七百七十七文為一千者也合小平錢一千足乃用北科則錢愈鍥薄宜矣慶元三年乃復禁銅器二月癸巳民間舊有者限兩月赴官投賣每兩以三十錢酬之二月庚子民間多不盡輸遂命再兩箇月不復酬以錢違者許人告六月庚申湖州舊鬻鏡行於天下至是官自鑄之二年八月甲戌已用右曹郎官趙彥括奏禁銷錢為銅器買者科違制之罪乃以匿隱論其爐戶决配海外永不放回仍許告捕因復置神泉監以所括民間銅器鑄當三大錢仍權𨽻工部八月戊子惟嚴錢直輸行在官而建韶饒贑州皆自提㸃所泛湖由江入漕渠輸之京帑焉然祖宗時內帑雖歲收錢一百五緡江池饒連四監熙寧中額而每年退却六十萬三千人支一百萬赴三司是內帑每年得一十一萬六千餘緡而右藏得九十三萬三千餘緡今歲額止十五萬而𨽻封樁者半內藏者半左藏咸無焉宜版曹之日困也川陜鑄錢川陜舊皆行鑄錢祖宗時蓋利䕫三州皆有鐵冶故即山鑄錢卭州舊鑄錢十萬緡建炎初轉運判官靳博文以為歲費夲錢二十一萬得不償費乃罷之二年六月乙卯紹興十年鄭亨仲為四川宣撫使始即利州鑄錢歲十萬緡以救錢引之弊率費二千而得千錢置官六人兵匠五百人歲用監官錢七萬緡四路稱提錢十四萬緡為鑄本十月戊申其後增至十五二十三年嘉守王知逺請復嘉卭鑄錢監事下計司六月丁酉於是復置監於卭州眀年詔卭州歲鑄三萬緡利州九萬緡四月乙酉共費本錢引十七萬五千緡利州十一萬四千卭州六萬一千每千率費千四百二十五年又詔利州鑄大小錢各二萬凡大錢一千重十二斤小錢一千重七斤於是每歲鼓鑄夲三萬三十一年再減利州錢為六百緡大小各半云施州舊亦鑄錢萬緡南平軍數千緡紹興末皆減今蜀中歲鑄十萬施州錢紹興三十年以鐵炭艱難減為七千南平軍以廣苖少亦減為千緡並無光者淮上鐡錢淮上舊鑄銅錢兵火後舒州不復鑄錢但行饒建等錢而已乾道初林樞密安為右諫議大夫議以銅錢多入北境請别禁之而即蜀中取錢行之淮上事既行洪景伯參政言其不可上問之景伯曰今每州不得千緡一州以萬戶計之每家才得數百恐家間無以貿易且客無回貨鹽場有大利害上以為是乃不行元年九月丁巳但即蜀中取十五萬緡行之費和二州而已五年秋王公眀使蜀伸前議六年夏遂命司農寺丞許子中往淮西措置即舒蘄二州鑄夾錫鐡錢舒州同安監歲二十五萬緡蘄州蘄春監十五萬緡淳熙七年春舒守趙子䝉蘄守施溫舒皆以鑄錢增羡遷官正月己卯然淮民大以為擾八年秋王謙仲知舒州入見為上言之遂減舒州錢額十萬緡與蘄州通三十萬焉七月癸卯後踰月又詔權罷鼓鑄一年九月丁丑二年既復鑄錢因命淮漕臣兼提㸃江淮湖北鐵冶鑄錢公事增歲額至六十萬緡然淮錢日移而又著令不許過江人甚賤之乃復減為四十萬東南㑹子見前關子東南舊無㑹子大觀中蔡京當國嘗倣州交子法為錢引之然所出猥多又官司不以出納故旋即廢紹興元年冬髙宗在越張忠烈俊以神武右軍分屯婺州朝廷以水道不通始置見前關子召商人入中其法入見錢於婺州執關子赴杭越𣙜貨物請錢每錢搭十錢為優潤十月壬寅六年春張忠獻為都督張如瑩澄主管行府財用請依四川法造交子與見緡並行先造二十萬緡行於江淮既又造二十萬緡為糴夲務置行在交子務二月甲辰將悉行之東南趙公需時為諫官為上言官無夲錢怕民不信其不便者五胡南翰交修亦言姦民僞造抵罪必多朝廷遂改為關子以十千而至五百凡五等紹興末頗舉行焉當時臨安之民復私置便錢㑹子豪右主之錢處和為臨安守始奪其利以歸于道既而處和遷戶部侍郎鼓錢事是戶部為之三十一年春遂置行在㑹子務二月丙辰從𨽻都茶場悉視川錢引法行之東南諸路凡上供軍需並同現錢仍賜左帑錢十萬緡為夲乾道初戶部以財匱增印㑹子二百萬緡李侍郎若川因請兵官廪給減現錢嵗中可得緡錢二百四十萬上以其動衆難之二年二月辛未時㑹子初行軍中多以為不便鎮江都統制郭振與總領趙公稱有隙奏乞公稱易現緡行夲軍上以諭輔臣洪丞相曰楮幣在處可行但須得夲錢稱錢乃可遂命行之淮東三月辛亥然楮劵所出既多而有司出納皆用現錢民不以為便陳天與良祐在諫院為上言之尤甚已增𣙜貨務入納㑹子二分上諭輔臣不可失信於民二年三月癸卯三年遂出南庫錢二百萬緡收回所增㑹子而命三衙全支銀錢時㑹子已造者二千八百餘萬已用者一千五百六十餘萬而在民間者九百八十萬緡始命盡收之已降內藏內庫銀各百萬兩矣曽欽道為戶部侍郎乞存民間見在者五百十九萬上從之然銀直既抵軍士患其所闕殿帥王琪因為執政言之欽道復以分數支㑹子上不欲魏丞相曰今㑹子已非前日比上乃許之七月己亥先是諫官陳天與嘗言不可失信于民乞復置㑹子務三月癸未蔣恭政行丞相事力主之其冬復印新㑹子五百萬十一月己酉四年春詔諸軍諸司皆分數支㑹子德夀宫依舊交見錢禁中亦分數交㑹子三月甲申其秋曽欽道奏僞造㑹子入籍其資充賞再犯依川錢引發從之八月癸卯五年春詔以一千萬緡一界時欽道已先版書而陳已若以兵部侍郎提領共奏乞如川錢引例兩界相沓行始許之正月辛酉六年春言者謂楮幣可行於無事之時不可行於有事之際今銀直抵平宜廣收買或以度牒折納非徒交用悉以楮幣乃令諸道監司别庫積銀以備緩急奏雖下後不克行二月丙戌七年春詔州郡上貢許用七分㑹子三分見錢正月然有司取於民悉以見錢上命約東之六月辛酉淳熙十三年秋詔今後再犯僞造㑹子雖印支不全成但已經行用論如律九月乙巳今江浙㑹子一千率得銅錢七百五十湖北㑹子一千率得錢五六百其法自一貫五百三百至二百凡四等民甚便之自㑹子創造至今四百年遂與現緡並行不可復廢矣凡㑹子亦兩界並行總三千六百萬第七界又增印子五百二十三萬八千八百有竒實為四千一百二十餘萬湖北㑹子湖北㑹子者隆興元年秋總領王琪始創造謂之直便㑹子凡七百萬緡乾道元年春楊倓帥荆南謂不可通行於諸路乞令戶部以五十萬緡兊換其後遂收三百萬緡止餘四百萬淳熙五年冬又令戶部印給三百萬緡而總領周嗣武言自來鹽商無回貨率以㑹子市酒飲而又令㑹子通行則茶引不信軍食必闕遂寢之十一年始通行於四路淳熙初梁聰為京湖總領㑹其已出應換之數五百六十二萬緡遂一造兩界焉每界二百七十萬緡總為五百四十萬兩淮㑹子兩淮㑹子者乾道二年夏初令戶部印給三百萬緡謂之交子不得過江八年秋以交子壞始出行在易㑹子收兊紹興三年夏議者以淮上鐵錢多欲革其弊因子直為吏部尚書與從官陳進叔羅春伯謝子肅等合奏乞印造兩淮㑹子三百萬貫付于兩路每貫鐵錢七百七十淮東二分淮西一分依湖北例三年一對更不申辰事下兩省臺諫議而尤延之等議以為可遂施行之其㑹子仍分一貫五百二百者凡三等尤許轉至江池太平常州建康鎮江府興國江隂軍界內行應用兩淮上供及戶部錢物並𣙜發現錢三年令淮南漕司樁管而沿江八州軍合發上供一半㑹子則許用交子通融起發江淮東西所樁管焉蓋自紹興辛巳二月以後至紹興壬子八月以前行在湖北兩淮創行交㑹總為四千九百六十餘萬緡以敵蜀中之數矣四川錢引四川錢舊成都豪民十六戶主之天聖元年冬始置官交子務十一月戊子每四年兩界印給一百二十五萬總崇觀間夾兩用兵興增至二千四百三十萬緡崇寧元年增二百萬二年又增一千一百四十三萬四年又增五百七十萬大觀元年又增五百五十四萬由是引法大壞每兊界以四引而易其一蔡京患之大觀元年夏改交子為錢引四月甲子舊交子皆毋得兊三年秋詔復以天聖年額為凖七月建炎初靳博文為益漕以軍食不繼始以便宜增印錢引六十三萬緡二年六月其後張忠敞盧立之席大光規紹視師率增印矣紹興七年夏四川不得泛印錢引五月庚寅然邉備空虛泛印􅌰如故十年春用樓仲輝印錢引者徒二年不以赦免正月戊子未數月以贍軍錢闕又命印五百萬緡三月戊子十二年鄭亨仲復奏增四百萬緡三月辛卯三十年軍事將起王瞻叔增印一百七十萬緡三月眀年虞并父宣諭川陜亦增印一百萬緡三十二年六月辛丑紹熙二年以展年兊界增還計所一百七十萬緡慶元三年三路旱復減放又增一百萬緡今前後兩界共盡收錢引四千九百萬緡有竒其法自一千至五百凡二等每錢引一千民間直鐵錢七百已上而輸官則一千二百八十云錢引兊監界自天聖立川交子法每嵗錢一易人户輸紙墨費三十錢紹興十一年秋增為六十四七月壬寅每界無慮一百七十萬緡與更易不盡者號火水不到錢二年亦餘萬緡悉令計司取之以備邉用然引屬總引而抄紙場錢引務𨽻成都漕司故更易不盡者總漕屢爭之二十八年夏孫太冲奏以為稱提本錢詔茶馬司檢察五月癸亥其後􅌰歸計司焉紹熙二年上憫蜀民之勞詔權展一界乃易慶元四年冬丁端叔自四川茶馬代還入見言川交子二年一兊每引納貫頭錢八十文足民甚苦之今計所多算財每請界展一年永為定制章下置制司十一月時袁起嚴為帥上言令民間每兊錢引一千貼納錢引六十四文足每界總領所收貼頭錢凡百八十萬緡今欲展年當求對補之䇿其一紹興初曽印百七十萬緡今凡八年則兊界兩三次間暗增貼頭錢已三四十萬其一去嵗增印錢百萬緡異時每界增貼頭錢亦僅七萬此二者略可相當兼總領所每界撥還漕司工墨錢十九萬緡今既展年不復對撥而又每界水火不到之緡幾十萬皆總所得之若展一年所不到者又倍凡此皆可以對補展年所虧之數明年春有㫖許之三月戊申六年冬兊界水火不到錢才七萬五千四百四十八緡嘉泰二年陳日華曎總領謝用光為帥請之朝蓋復以二年一兊蓋軍餉所仰不可復展矣關外㑹子關外銀㑹子者紹興七年吳涪王為宣撫副使始置於河池二月丙午其法一錢或半錢凡一錢銀㑹子十四方紙四紙折錢引一貫半千銀㑹子一萬紙每八兩折錢亦如之初但行於魚關及階成岷鳳興泰六州嵗一易其錢𨽻軍中武安薨遂屬計所十七年七月復造於大安軍再嵗一易乾道四年四月始增一銀錢三萬紙九月行於文州其後稍益增迄今每二年印給六十一萬餘紙共折川錢引十五萬緡鐵錢㑹子鐵錢㑹子者興元府金洋州用之創自隆興元年其法自三百二百至一百凡三等迄今每二年印給二百四萬緡共折川錢引四十萬緡始是總領趙郎中沂奏獲其年十月四日癸巳指造六十萬緡折錢引十萬貫行于金州至隆興二年六月乾道四年正月纍增乃及此數也建炎雜記甲集卷十六
